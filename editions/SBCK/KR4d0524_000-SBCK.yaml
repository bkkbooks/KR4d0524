front:
  text: 重刋青陽文集有元死節之士合肥余忠宣公􅆣既後之􅁆載當􅀦朝洪武初􅃙命有司祠公于安慶春秋􅀕祀其旌忠􅂆義之意厚矣先友吴陵張君彦剛好古尚賢嘗衰輯公之遺文􅍢板以傳然其􅀁作散佚四方弗克盡
  hash: sha256:0f4e8459d554624afa7fbe93abee1948ea4dea1f41c95e86ec0f9b0c4ed3bbec
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0524_SBCK_000-1a}
body:
  text: 覩其全君恒以為憾至今又􅁆載矣予宗姪沅陵縣丞誠盖聞彦剛之風而興起者臨民稍暇􅂧取忠宣公文集譌者正之偽者去之損者􅀘之遺者益之積累既乆仍夀諸梓其意不亦羙㢤雖然忠宣公之節義政亊當與日月争光宇宙悠久固不待乎斯文之傳與否然晩生後學仰企前脩霑溉餘馥有不􅀎忘情者庶􅂉扵兹見焉正統十年春三月吉曰翰林院侍講學士兼經筵官淮南髙榖引青陽先生文集附録序青陽先生文集若干卷武威余忠宣公所著也其前集若干卷巳繍梓行扵世續集若干卷及士大夫忻慕公髙風大莭播之文辝者又若干􅃃則維揚張仲剛氏採諸四方而裒集成編者也所散逸者猶多仲剛尚訪求之次苐附焉其用心亦勤矣夫太上立徳其次立功其次立言公之徳追配扵古人公之功有􅀘扵當時文章雖公餘事然片言􅃗字必求前世作者之精英而議論雄偉多過人者使公生全盛日則斯文自可垂示扵後奈何值勝􅀦板蕩以􅀌軍當日滋之敵竟仗莭就死功徳之卓異夫誰可及也余讀公與執政書慨然􅁨國家之顛危惻然憫生民之困悴凡攻取平㝎之計設施措置之方如􅃌諸掌當時皆苟且偷安譬猶焚烈火扵積薪而卧其上雖言之剴切痛苦曽莫之恤公死莭之志巳决扵此矣夫公雖視死如歸彼其􅀦歩當何如哉余􅀼謂􅀦家不幸而有忠臣士君子不幸而為忠臣夫明良相逢都俞吁咈之􅆒扵大廷不待􅂢軀殞命以為賢也張巡顔杲卿王彦章諸君子豈不願為稷契哉不幸臨其時而取義焉耳公盖其儔也使夫居宰輔守民社握兵符者皆能如公之志則􅀦家安有危亡之患哉聖朝以忠義勵天下公之祀已載扵彛典名已傳扵信史雖其死不為幸而其慷慨英烈之氣􅇒青雲而貫皎日者與天地同不朽也仲剛以全集示余徴言余奚容喙辝不􅀗乃述其㮣如右仲剛名毅以孝行􅁛士林是集之編可見其知所慕云青城山人王汝玉序青陽先生文集序文莫盛扵三代而三代無以文名者其名不以文也漢以降始有以文得名而其文已不復三代之盛矣嗚呼豈惟文哉文者徳之華行之表徳行之不足而名能文者亦偽耳是故山之寳氣結為龍文日之回光散為霞采十圍之木上干霄漢秀色而繁隂必其莭􅆬勁堅根柢深固非風雨所能揺振者有元古文聲教􅀁􅀍鴻儒秀士萃于一時繪繡錯施韶濩迭奏著作之盛擬諸三代至如服章縫持翰墨以蒞戎事而能樹駿功守大節誠無愧扵古人則四海之内百年之間青陽余先生一人而已至正之亂天下騷然名都大邑所在為墟文武之臣鮮克勤事而先生以􅀌軍守皖城持必死之志處就危之地岌乎江上與天為謀使􅀦勢既衰而復振民心已離而復合者盖五六年城蹈先生與其夫人若子俱死于難平生所為文悉為煨燼中元士大夫所嘗傳誦者南北析離不可復得得諸其門人郭奎僅數十篇而已嗚呼汝鳩亡而忠臣之志不泯白華逸而孝子之心無窮以先生勲徳之茂節行之著使其文不傳自􅁕以名世矧猶有如奎所傳者雖然三代之文厄扵秦火莫得其全而僅存者世謂之經以其所以為訓者皆人道之常也先生當大變而不失其常是以身為訓者也然則植世教勵名節以與詩書並傳者将不在其文也夫先生名闕字廷心武威人至順癸酉進士官至淮南行省左丞命下而先生巳死増謚文忠進封夏􅀦公嘗讀書青陽山中學者􅁛之曰青陽先生故用以名其集云番易程國儒序青陽先生文集序頽齡無㡬朋舊周落已盡呻吟疾痛中忽得同年余君廷心詩文一帙讀之輙泫然流涕而嘆曰嗚呼世安得復有如吾廷心者哉廷心文章學問政事名莭雖古之人有不得而兼者廷心悉兼之世豈復有斯人哉元統初元予與廷心偕試藝京師是科苐一甲寘三名三名者皆得進士及苐巳而廷心得右榜苐予忝左搒亦然唱名謝㤙予二人同一班列錫宴則接肘同席而坐同賜緋服同授七品官當是時予與廷心無甚相逺者其後予以應奉翰林需次丁父祖父母三䘮乞奉毋就養江南沉役下僚學殖日益荒􅁾而廷心方由泗州入翰林為應奉為臺為省聲光赫著如干將􅀤硎莫敢觸其鋒文章學問與日俱進如水涌山積莫􅀎窺其突扵是予之去廷心始相逺矣又其後連過時変予以毋􅁨竄伏鄉里深恨不得乗一障以効死而廷心以羸卒数千守􅀌城屹然為江淮保障者五六年援絶城䧟竟秉莭状義與妻子偕死生為名臣殁有羙謚扵是予之去廷心又大相逺矣嗚呼廷心已矣世安得復有如吾廷心者哉􅂉者以為廷心之死乃天之􅀅䘮斯文予以為廷心雖死面斯文固未䘮也廷心之􅀌忠大莭􅁕以照暎千古燁然為斯文之光而何䘮之有焉使皆如世之貪生畏死􅅴就屈辱而猶靦然以面目視人者則斯文之䘮盖掃地盡也豈非廷心之罪人哉廷心詩尚古雅其文温厚有典則出入􅀴傳䟽義援引百家旨趣精􅀷而議論閎逹固可使家傳而誦之鑿鑿乎不可易也愔其藁煨燼無遺獨賴門人郭奎掇拾於學者記録之餘得數十篇以傳而或者猶以不見全藁為恨夫以一草一木之微巳􅁕以􅀚造化發育之妙則凢世之􅁒知廷心者又奚以多為尚哉昔太史司馬公述屈原離騷之􅈲謂推其忘可與日月争光嗚呼屈原不可尚矣千載而下知廷心者其無司馬乎廷心嘗讀書青陽山中及仕而得禄多聚書以惠來學學者􅁛為青陽先生故是集亦以靑陽為名云雲陽李祁序字一􅀄又號希籧附靑陽山房記靑陽山房在今廬州東南六十里巢湖之上因山以為名武威余公讀書之䖏也余公之未苐也躬耕山中以飬其親即田舎置經史百家之書釋耒則􅁍坐而讀之以求古聖賢之學是時禾有青陽山房之名也及其出而仕也不忘其􅀄乃闢其屋之隘陋而加葺焉益儲書其中冀休官需次之睱以與里中予弟朋友講學于此扵是始有青陽山房之名然而未有記也文客京師謁公于翰林辱不鄙而與之論學因及靑陽山房之事而属以記固辞不􅀗退而思之余公世家武威而㞐淮西武威之俗以馳焉試劍為雄淮西在宋時為極􅁁其民操干戈持弓矢習戰閗賴􅀦家豕平􅅯武修文未百年間余公以儒自􅁬文章政事燁然為時所宗而名聲遂流聞於天下是雖風俗與時移易而余公以㧞萃之資出羣之材超世之志有不可誣者矣向使余公習其故常當􅀦家􅅯武修文之餘風俗與化移易之後不知學問其天資才智自足以取富貴不過冨貴之人将以號扵天下曰儒者則未也所貴於儒者以其能學先王之道也故雖窮為匹夫其言其行猶足以化民而成俗遺風餘韻亦􅁕以起人仰慕扵無窮而况扵有位者乎夫青陽山房以余公而得名不然一田舎耳故地不自勝因人而勝人不自賢以學而賢甚矣人之不可以不學也余公之有是山房也非以自􅀻也欲使學者讀書扵此也里之子弟􅀍余公之教皆曰青陽山房多書吾其㳺焉讀書而有成郡邑之人慕余公之義又将曰青陽山房多書學之者衆吾其㳺焉讀書而有成四方之士聞余公之風莫不曰青陽山房多書學之者皆有成吾其㳺焉後来継今聞風而興起者又若是將見賢才濟濟出為􅀖家之光青陽山房傳之不朽矣豈不盛哉此記所為作也若夫湖山之勝深者􅆂雲天髙者薄霄漢蛟龍之所蟠虎豹之所蹲怒而為風喜而為雨聲色動植之物隂晴明晦之變古人之所争今人之所賞遺墟奥壌可喜可􅀶則又青陽山房之竒􅀚也當有名公􅂋人妙能文辞者㳺而賦之記不俻録余公名闕字廷心至順癸酉進士及第初命泗州同知擢翰林應奉遷刑部主事復入翰林為脩撰拜􅁥察御史轉禮部員外􅀰出為湖廣行省􅀰中徴入集賢為經歴㝷改翰林待制今為浙東㢘訪僉事云新安程文記
