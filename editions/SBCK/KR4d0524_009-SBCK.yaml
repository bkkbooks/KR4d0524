body:
  text: 詩楊平章崇徳樓重城控秋塞丹樓耀芳甸赬霞上氛氲蒼林下葱倩長河城􅁁急積岨窓中見逺鴈㓕㞐延行雲歸鄯善大賢謝卿相垂幃化郷縣春䖝觸寳瑟餘花飄玉研方􅀙董園樂陋彼謌梁轉伊子去山澤寒齋秋草徧載覧登樓篇益重臨淵羡八月十五日䖏州分司對月玄武夕始正華月生秋旻金波何穆穆緑桂滿中輪俳佪出西陸照耀此甌閩光流河宿􅀮氣隨商律振餘輝動軒房紫蘭含微津皇天降嘉􅀊五政亦已陳樂㢤一巵酒􅁢矣同庶人有所思春風起寒色春衣方重熏新装􅐈羅幕清唱入行雲艷色若流月芳澤謝蘭芬嬋姢信無度我思何在君長安陌浩浩長安陌璚樓夾廣㕓鴛鴦御溝上芍藥吹樓前駿馬追韓嫣金尊約鄭䖍功名有時有且得樂當年伯九徳興學詩上徳撫玄運􅈼㑓尹神京三雍烝髦士五學訓齊氓登􅁔陳羽縣鵉刀奉䴡牲優㳺樂清化大道嘉方行送孫教授皇情重聲教宵装尓載馳邉城南􅗲外礼殿左江陲楫譲陳椰噐弦􅁔䕃薜帷全勝冝春郭花落閉門時賦得君子泉送彭公􅁠爲黄州教君子􅃿已乆遺井郡齋中本寓思人意兼全澤物功銀􅇃駁故蘚玉甃落寒桐㡬日趨官舎横經誦飬􅂪賦得春雁送司執中江西憲幙春風起蘋末旅鴈尚回翔乳鴨嬌同啑新蒲短可蔵應懐洞庭水非避寒垣霜客路煩懐􅁬題書􅀉帝郷賦得蛾眉亭送王徳常御史赴南臺江亭望華崿望望似脩眉掃黛偏􅀎巧含顰知爲誰姢娟微雨裏脉脉夕陽時千里乗􅍡去因之傷别離南歸偶書二首帝城南下望江城此去郷関半月程同向春風折楊柳一般離别两般情二月不帰三月帰已􅀅行篋換征衣殷勤為報家園樹緩緩開花緩緩飛别樊時中㢘使光禄橋西惜觧携春星􅁒傍露盤低自来宫柳多離思更着城烏在上啼龍丘萇吟贈程子正重出戰龍起新室群鳥亦翩翩偉㢤龍丘生抱琴帰故山仰視天際鴻俯弄席上絃清吟發踈越逸響遺澗泉悠悠鳯翔漢婉婉虬媚川清風自千古何用􅀎草玄筞續輯元統癸酉廷對䇿苐一甲第二名臣聞之周武王曰惟天地萬物父母惟人萬物之靈亶聦明作元后元后作民父母此言君天下者凢以仁而已臣嘗思之天地生物而厚扵人矣而扵生人之中􅀹厚扵聖人其所以厚扵聖人者􅁒其推生物之心以加諸民是仁者人君臨下之大本也臣謹稽天地之驗之徃古則仁之爲道夏以之爲夏商以之爲商周以之爲周祖宗以之而創業後聖以之而守成其理可謂至要而亦可謂至難矣恭惟陛下有聦明睿知之姿有寛􅁉温柔之徳愛民而好士神武而不殺爰自􅀄潜仁孝之聲固已播聞扵中外今兹誕膺付託龍飛當天䡖徭役薄賦歛罷土木之役恤鰥寡之民而仁厚之澤果有以大􅀍扵天下當天命眷祐之􅀄人心歸向之日又􅀎不自滿假拳拳以守成之大計下詢承學之臣頋臣庸愚無所通暁然臣􅀚陛下䇿臣之言反復乎三代及漢守成之艱難而深􅓪乎今日當行之切務自非聖心獨詣􅀷有以考之扵古質之扵今灼知上天作君之心與夫祖宗創業艱難之計者不􅀎爲是言也臣伏讀聖䇿曰古人有言得天下者爲難保天下爲􅀹難臣以爲人之扵仁憂患而思勉者易安樂而勿失者難夫造草昧之際英雄角逐之㑹而世主之心所以不敢暇逸者鮮不如敵國之在旁嚴父之在上其思所以康濟小民恵鮮天下者盖饋屡輟而􅆍屡興此其势之易然者也天下既定方内無事兵革不動四荒向風天下之臣又曰奏祥瑞豊年頌聖徳者聲相聞扵朝􅁔太平者足相躡扵道雖以創業之君尚不免扵不終之漸况其後世乎盖治平則志易肆崇高則氣易驕志肆則敗度之心滋氣驕則爱民之意熄如是則豈復念夫先世艱难勤苦爲何如㢤甚者至以其祖宗爲昔之人無聞知見其先世勤儉之迹則田舎翁得此亦􅁕矣此亦势之有必然者也陛下以保天下爲难此臣􅀁以踴躍忻忭而不自知陛下此言可以承宗庙可以奉六親可以育群生可以彰洪業臣拜手稽首而爲天下賀願陛下永永无忘此言也臣又讀聖䇿曰自古持盈守成之君莫盛扵三代夏称啓􅀎敬承継禹之道殷称賢聖之君六七作周称成康􅀎􅆀形措夫以禹之功而惟啓以文武之徳而惟成康賢聖之君之衆莫􅀂殷亦不過六七而已其後惟漢之文景而言文景之治猶不得此之三代善継承者何若斯之难也臣以爲惟思祖宗得天下之难者則扵保天下也斯無难啓太丁太甲太戊祖一盤庚成康文景之君則思祖宗創業之难而保之者也桀紂幽厲桓靈則反是故伊尹之扵太甲則明言烈祖之成徳周公召公之扵輔相成王也亦諄諄於文王之典武王之大烈盖知其祖宗得天下之難則必􅀎求其所以得之之道矣知其所以得天下之道則知所以保天下之道矣夫祖宗得天下之道即其子孫保天下之道也孟子曰三代之得天下也以仁此仁者祖宗得天下之道也易曰何以守位曰仁此仁者子孫保天下之道也夫仁之难成亦已乆矣持盈守成之君若是之难得者冝㢤臣又讀聖䇿曰我祖宗積徳累世至扵太祖肇啓土宇建帝號又七十餘年世祖始一天下以致至元之治厥惟艱哉頋予冲人頼天地祖宗之靈紹膺嫡綂継承之重實在朕躬夙夜競競未􅀗其道臣以爲陛下此言可謂􅀷知祖宗創業之艱難者也當其巡天西下又詔定西夏懐髙昌北取遼金南取趙宋其經营開創之事有不待賤臣之言而後知􅀂夫祖宗所以淂天下之本則陛下之所當知也臣嘗妄論之我國家之得天下與三代同自太祖􅁸􅃋漠而膺帝圖世祖揮天戈以一海内不恃強一而其仁義之師自足以服􅁀亂不用智力而其寛大之徳自足以結人心至扵渡江臨鄂與建元之詔􅀚之則我國家得天下之本一仁而巳矣故以曹彬之事􅒛帥臣而革􅒛之日市肆有不閈以火易之元建國號而中綂之紹天下所歸心大祖既以七十餘年而平一之世祖又以四十餘載而生聚之徳在民心功在史䇿以聖継聖傳至陛下吾祖宗所以淂天下之道是即陛下保天下之道也然曰未云􅀗者是即文王望道未見之心也臣何以多言爲臣又讀聖第曰子大夫通今學古其求啓之所以敬豕六七君之所以称賢聖成康之所以致刑措其道安在文景之所以不及三代其故何繇及今日之所以持􅄹守成孰先孰後孰本孰末何以致刑措称賢聖継祖宗之盛悉心以對毋有所􅀮臣以爲三代及漢之君其見称扵當世者雖有不同然不過守其凡世之仁而巳矣而昑陛下之所以持􅄹守城之道又何以他求也哉洪水滔天下民昏墊而成允成功者禹之仁啓之所以敬承者此也啓網祝征􅄷餉者湯之仁太甲以之處仁遷義太戊以之治民祗懼武丁以之嘉靖殷􅀖祖甲以之保恵庶民盤庚以之鞠人謀人之保㞐此所以称聖賢也以言文王之仁則無凍綏之老以言武王之仁則行大義而平􅁀乱成王時制礼樂以文之而巳耳康王物奉恤厥若而巳耳其所以教化行刑罰措仁之浹扵民故也漢家制度視三代雖有愧然髙帝之寛仁爱人實㓕秦誅項之本原文帝之務在飬民景帝之遵用成業實卓然爲漢賢君其不及扵三代者無太甲仁義之功無成王緝熈之學故耳以今日之道而言臣則以爲守成之本仁也所當先務者仁也至曰功曰利曰甲兵錢榖曰簿書期㑹曰禁令條教皆末而當後者也然就仁之中而其本末先後亦不容以無序也有先王之仁心有先王之仁政孔子之告顔子曰克已復礼爲仁此以心言也孟子告齊梁之君所謂五畒之宅百畒之田與夫學校庠序之􅁼此以政言也有是心無是政則其心終不􅀎有治扵天下有是政無是心則其政亦不􅀎以自行必有内外本末交相通貫是即尭舜之近也陛下有顔淵明睿之姿可以致脩身之功有尭舜君師之位可以推愛民之澤不冝狃扵近功安扵卑下而不以聖賢自期也臣頋陛下萬機之睱取孔孟之言而􅀷䆒之体之扵身揆之扵事求其何者爲欲何者爲理知其爲􅁒而必克之知其爲理而必復之明以察其幾勇以致其决日日而克之亊事而復之則自心正身􅁱而仁不可勝用矣或扵聴朝之時或扵進講之際数召大臣延問故老􅀷知咨訪某事爲先王之仁政而未盡行某亊爲今日之弊端而未盡革某害未去某利未興某賢未用某物失所敏以求之信以出之時省而速行之委任責成而程督之使天下疲癃殘疾淂其生鰥寡􅀌獨淂其養而無有一物之不遂其生則民物安阜而人莫􅀎禦矣異時陛下五刑不試如周成康聖賢之作如商諸王夫然後可以荅上天玉成陛下之心生民蘄望陛下之意先帝兹皇付託陛下之􅀷計而我國家時萬時億之綂可以傳之永世而無􅆠矣詩云冝民冝人受禄于天古人有言曰愛民者必有天報陛下誠如臣之所期則申命之休􅀅如日之昇如月之恒矣伏愿陛下少開天日之光淂賜鍳察則臣不勝大幸祗冐天威臨書不勝戰慄之至題永明智􅁴壽禅師唯心訣後永明壽禅師平生著述甚多唯心訣者其猶般若之心􅀴也孫城祐上人頃作􅀚心堂扵廣福寺及見西菴遂公明教䑓淂是編即以衣資刻之甫畢工属余歸自范陽詣題其後心者萬化之原也迷則愚悟則聖存則治亡則亂易所謂差之毫􅁵繆以千里者正指是言也是編扵心之細無不燭體用無不該三藏十二部精要之言無不在是先民言聖賢千言萬語只是􅁒人􅀅已放之心約之使返復入身来自􅀎㝷向上去此又永明著書立言之心也元綂甲戌五月謹題憲使董公均役之記浙江東海右道㢘訪使古者井天下之田以授民民百畒易者倍之􅂯易者􅂯倍之其養均也則九壌程九貢㕓二十而一近郊十一逺郊二十而三甸稍縣都皆十二其取之又均也小任以力則上地家三人中地二家五人下地家二人大任以兵則比為伍閭為两族為卒䣊為旅州為師郷為軍其役之又均也之一者正政之大端也大端具而又為之刑政以防民情為之學校以道民性為之公卿大夫士以登民材其制詳故不亂其本􅀷故不㧞是以商周之世皆七八百年而後衰也自經界疲扵是田不在公而飬不均矣飬不均則􅁟㑹民数皆不可知而賦與役不均矣飬與賦與役之不均雖周公為政不可以言治也浙東古千越之地也其地之微無甚貧甚冨之家山谷之間有一畆居十畆之田者祖孫相保至累世不失又其􅁟瘠故其小人勤身而􅅚力其君子尚撲儉而敦詩書非若呉人之兼并武断大家􅀵榖􅀊至数百萬斛而小民皆無益藏此固易治之地有賢師帥爲之制而道利之其亦可以庻㡬矣乎然余嘗行郡以􅀚民風其庻人之役扵官者徃徃閭左之民也而冨人則有田而不役甚者或不以征􅀊終保正称貸而輸之至破産者無筭此其田雖近扵均而役則不均也至正十年秋藁城董公来長越憲省民所疾苦乃田井田者吾雖不得而行而役不可不均扵是擇其部吏之清強者委之以事以衢州路經歴王仲謙西安縣主簿張拜住治金華青田縣尹葉伯顔治武義永嘉縣丞林彬祖治永康而蘭溪州逹魯花赤怯烈夫義烏縣逹魯花赤亦憐真浦江縣逹魯花赤㢘阿季八哈東陽縣丞􅃽受益自治其邑義烏縣則復以衢州路録事范公琇爲之輔而捴管陳伯顔不華捴領之先期一月令民及浮圖道士各以田自占其􅂉蔽匿及占不以實者没其田令既浃乃保以一正属民履畒而書之具其田形􅆠畎主名甲乙北次以上官官按故牘而加詳覈之曰魚鱗冊以㑹田别為右契予民使蔵之曰烏由以主業其征之所㑹曰䑕尾冊以詔役弓兵􅀠卒鋪兵為至劳坊里正主首次之館天歩夫又次之凡民田多者役其劳少者役其逸又其少而不􅁕役者則出錢以助竒田不助者則以待夫不虞之役其一人而有数保之田者各役之即賣其田則買者丞其􅃥凡一州六縣之田二万六千四百二十四頃四十九畒役者一万二千六百六十八名故役而今復者四千三百名所未役而今役者三千四百六十名役而不復者休而始役之冊成一留縣一蔵府一上憲司扵是野無倖民公無逸征強弱有倫賦役有􅀴上下和洽􅀊以有年盖公之遇人有礼故吏盡其力其使民有義故貧者戴其徳而樂其復冨者服其公而忘其劳以故為是大制政不粛而成民不􅅰而治也傳曰天地飬万物聖人飬賢以及万民公之是舉兼礼与義則誠賢者矣継今之人毋替公政或推其所未及則越之民樂樂利利其福豈可既哉故扵終事也其下咸願刻石以示不朽以􅆣嘗陪其末議而知其梗槩遂来属筆焉至正辛邜十二月記染習寓語為􅂫友作人若近賢良喻如紙一張以紙包蘭麝因香而得香人若近邪友喻如一枝桞以桞穿魚鰲因臭而得臭結交警語君子相親姑蘭􅀅春無夭色之媚目有清香之襲人小人相親如桃􅀅春有夭色之媚目無幽香之􅊞人附送余廷心赴大學維􅀭程廷珪前壬申年作蘆葉䔥蕭江上秋呉船三日住􅀭州靛花􅀷染青綾􅀍雲葉新裁紫綺裘官驛馬嘶風滿􅀣别筵人散月當樓明年征鴈􅀅書去人在蓬瀛弟㡬洲两伍張氏阡表張氏本䣜陽人其先世有諱豈者徙家淮南之两伍邨子孫繁冨皆有羙田在湖上無貧者君之祖子可始為儒教子君父諒裔日誦書不問其家生業見異書無錢質衣買之故君家在諸張中獨貧而教子益不怠君諱共辰字景星少以儒薦爲與化縣教諭崇明州學録㤗州學正雲南栢興府建康路两學教授改将仕郎主安豊霍丘縣簿而卒弟竑字景山亦由天長㤗興教諭􅀭州學正真州教授以􅀅仕郎滁州判官致仕初張氏雖盛然皆農家無聞人自君父以􅂄學著称鄕校逮君兄弟登仕版有聞譽故两伍張氏遂称江淮間君爲人寛厚不􅄝利㞐貧晏如不以動心竑性剛介好賢而疾􅁖此两人者所操雖異而士大夫与之交者一爱敬之君兄弟仕時其父巳死矣君毎与人言其先世必鳴咽流曰吾先人以儒者望吾兄弟吾兄弟今皆讀書爲儒官雖貧亦何憾㢤余徃吏淮南聞君伯仲之名甚習君之孫天永遂得其先世之㮣如此重爲慨息盖維俗之数矣來之季時其地専用武故民多尚勇力而事格閗有號為進士登科第者徃徃皆武學也混一以来其俗益降民之賢者始安於農畮其下則紛趨於末以争夫魚塩之利其積而至大富者輿馬之華宫廬之侈封君莫之過也故其俗益薄儒以為不足以利已朝廷設科以誘之今三十年民亦少出應詔君父子自㧞扵衆人之中傾家以為學可不謂之豪傑之士哉天永自􅀣嶄然弱冠属文敦義異時非能振其宗乎詩書之教能淑人心學之至可以為聖賢其次不失為善人其緒餘亦可以得禄以振耀其宗族夫孰知不足以利巳者為其家之大利與君之於郷可表以厲俗矣君兄弟殁两伍之墓隘不能塟乃改卜􅌼邨塟焉君配陳氏子二人禎桃源縣教諭男三人天序天庭天庸竑娶李氏子一人爕􅀅仕佐􅀰楊州教授孫男三人長天永次天竒天亨至正六年二月述題黄氏貞節集皇元至正十二年余􅇅奉旨出守安慶時􅁁警事􅃊日㝷干戈憫憫無湏􅁷得攄懐思越六年丁酉撫金谿呉級以書抵轅門請題其母黄氏貞節集併録其所譔􅀕夫文及訓子詩三十韻讀之辭義􅃊正風莭凛凛令人増氣㮣所恨行伍中筆硯廢置乆安得從容諸先軰翰墨之後思發其幽潜乎然􅇅也方以忠君為務而級也拳拳以孝母為念聲相應而氣相求是可無一言以慰人子顯親之心耶及觀黄氏年十九嬪扵呉曽未㡬而夫死涕泣誓不更嫁破衣弊屣身操井臼賣簮珥以㐮舅姑之䘮日訓二子以學夜分乃􅄰男長以室女長以家閨門肅雍動止無纎毫愧悚叔徳著扵鄕閭令名逹扵朝省足以表儀扵當世矣若古之衞共姜曹大家班班經史者不是過也其同郡翰林呉公奎章虞公皆有叙述同里危素叙其詩曰世之人不􅀎天其天而有愧扵黄氏者多矣嗚呼我國家以仁義肇基朔􅁟乾端坤倪靡不臣服列聖相承風教宏逺宜可以登三邁五超越乎漢唐矣胡何自兵興以来州縣披靡􅀎卓然以正道自立者僅不一二見其餘賣降恐後不啻犬豕昻昻丈夫真無女婦之識良不悲㢤且天下有可爲之機而無敢爲之士民情有向善之意而無激善之才遂使淳良化爲梟惡骨肉轉爲􅄷讎叛潰奔離益相􅆷賊聞黄氏操行如此彼獨何心朝廷百年休養之㤙寜不􅇳矣此予讀黄氏詩文益有感焉宜夫徳人鉅卿咏賛不已盛朝所以旌其門復其家昭名扵史冊者豈偶然㢤予又聞黄氏之子級以一介貧賤奮不顧身集郷丁禦強􅁀里閈淂全非其毋訓之素􅀎若是耶是皆可書淮南行省􅂙政西夏余闕識題叚吉甫助教別野圖玉署掛新圖如君舊􅀮居􅈐髙乃霞上葉変是秋􅀄㳺客看常在溪声聴却無只此同登望豈必命柴車青陽先生文集卷之九終
