front:
  text: 青陽先生文集卷之四門人淮西郭奎子章輯
  hash: sha256:7e615862b2074042256a2e7072f53613ceb3779d98216f23628e40e862f6d006
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0524_SBCK_004-1a}
body:
  text: 序送帰彦温赴河西㢘使序河西本匈奴昆耶休屠王之地三代之時不通扵中􅀦漢始取而有之置五郡其間自李唐以来拓䟦氏乃王其地號為西夏至扵遼宋日事戰伐故其民多武勇而少文理然以予􅀚之予家合淝合淝之戍一軍皆夏人人面多􅀺墨善􅀐射有長身至八九尺者其性大抵質直而上義平㞐相與雖異姓如親姻凡有􅀁得雖簟食豆􅅅不以自􅀻必召其朋友朋友之間有無相共有餘即以與人無即以取諸人亦不少以属意百斛之粟數千百緍之錢可一語而致具也􅀊時徃耒以相劳問少長相坐以齒不以爵獻夀拜舞上下之情怡然相讙醉即相與道其郷鄰親戚各相持涕泣以為常予初以為此異郷相親乃尓及以問夏人凢􅀦中之俗莫不皆然其異姓之人乃如此則其親姻可知矣宜其民皆親上死長而以彈丸黒子之地抗二大􅀦􅀓世五六百年而後亡非偶然也自數十年来吾夏人之㞐合淝者老者皆巳亡少者皆巳長其習日以異其俗日不同少貴長賤則少傲其長兄強弟弱則兄棄其弟臨小利害不翅毫髮則親戚相賊害如仇讐予猶疑江淮之土薄而人之生長扵此者亦因以變及以問夏人凢􅀦中之俗今亦莫不皆然其扵親姻如此則異姓之人可知也夫夏小􅀦也際時分裂而用武必不􅀎篤扵􅀁教而區區遐方教之亦未必合扵先王之法及􅀦家受天命一海内􅀵其兵甲而摩以仁柔飬之以學校而誘之以利禄今百餘年扵兹絃誦之声内自京師逹扵海􅗲其教亦云至矣而俗廼日降如此吾不知其何􅀃也我祖宗之置肅政㢘訪司扵天下大要以風俗為先而其職以學校為重故世謂之風憲是得先王為治之意也故嘗選任尊官非道徳爵位出乎庻僚者不得與是選所以為民表也今皇帝用嵬名公為御史大夫公乃歴選朝著盡㧞諸名臣為㢘訪使而無帰君彦温以樞宻院判官而為河西君少擢科目能古文辭有大節由國子􅀶士五轉而遷是官仐為廉使扵夏必能興學施教以澤吾夏人吾夏人聞朝廷以儒臣為尊官以蒞已必能􅀚扵學以服君之化風俗必當丕変以復扵古其異姓相與如親姻如國􅀄時如余所云者矣故道吾夏之俗以朢吾帰君焉送月彦明經歴赴行都水􅁥序中國之水頼禹治之而悉平而河獨為患至今未巳者何也河失禹之道而治河者不以禹之所治治之也盖河出崑崙合諸戎之水東流以入中國其性勁悍若人性之有強力其来也甚逺而其注中國也為甚下又若建瓴水扵峻宇之上則其所难治也固冝且中原之地平曠夷衍無洞庭彭蠡以為之滙故河嘗横潰為患其執非多為之委以殺其流未可以力勝也故禹之治河自大邳而下則析為三渠大陸而下則播為九河然後其委多河之大有所冩而其力之所分而患可平也此禹治河之道也自周定時河始南従訖扵漢而禹之故道失矣故西京時其受患特甚雖以武帝之才乗文景冨庻之業而一瓠子之㣲終不能塞而付之無可柰何而後巳自瓠子􅂯决而其流為屯氏諸河其後河入千乗而徳棣之河又播為八漢人指以爲太史馬頬河者是其委多河之大有所冩而力有所分大抵偶合扵禹所治河者由是而訖東都至唐河不爲患者千数百年或者以謂玉景隄防之力及大不然使無屯氏及徳棣諸河河之大無所冩而力無所分景以㝷文之防而捍猶螳螂之駕而可以捍大車之奔吾不信也惟河之委既多大有所冩而力又有所分景之隄防特以捍漸水之衍溢者耳比趙宋時河又南决至於南渡乃由彭城合汴泗東南以入惟而漠之故道又失以河之大且力惟一淮以為之委無以冩而分之故今之河患與武帝無異余嘗以爲中國之地西南髙而東北下故水至中國而入海者一皆趍扵東北古河自龍門即穿西山踵趾而入大陸地之㝡下者也然河天下之獨水也凢水一石率泥数斗嘗道出梁宋􅀚河所决凢水之所􅀍比其去即穹㞐大木盡沒地中漫不見踪跡河之行扵地方也数十年而河徙千乗自漢而後千数百年而河徙彭城然南方之地本髙於北故河之南徙也难而其北徙也易自宋南渡至今殆二百年而河旋北迺其势然非有他􅀃也比者河北破金堤輸豊沛曺鄆諸郡大受其害天子哀民之墊溺廼䟽桞河􅁒引之南工不就又遣平章政事嵬名公御史中丞李公及禮部尚書㤗不花公沉雨珪有邸及白馬而祀之河之患不已乃㑹諸老臣集議治河者諸老臣無能言其􅀃獨尚書㤗不華公以為當濬河棄道復引河以入彭城而待制楊梓人力以為棄道不可濬設使濬之而河未必􅀎入庙堂無􅀁􅀙遣都水使者相其便害或者以為當築隄起曹南訖嘉祥東西三百里以障河之北流則漸可啚以導之使南庙堂􅀙之廼置都水分監以任其事選朝臣之知水者為都水而吾同年月君彦明為元幕将行以問扵余余不知河事者雖然諺有之曰不習為吏眡巳成事以事巳成者為君言則古所以治河者可見也今河惟不反故道則其势可障而排之使南使反扵故道由漢之千乗以入海則囯家􅀅無水患千餘年如東都與唐之時乎今禹之九河既不可復考而河亦不復徳棣之間漢人􅃌以為太史馬頬河者尚未泯可㝷究如􅈁河之道是􅀅大有所寫而力有所分非若一淮之小而扼其势而使之横潰為吾民害也今夫庙堂之議非以南為壑也其慮以為河之北則㑹通之􅈇􅆸其係扵朝廷甚重余則以為河北而㑹通之􅈇不􅆸何也􅈇以汶而不可以河也河北則汶自彭城以下必微微則吾有制而相之亦可以舟以􅈇書所謂浮于汶逹于河者是也余特􅁒防鉅野而使河不妄行俟河復千乗然後相水之冝而修治之特一人之􅀻言也朝廷方事隄防固無事此廼以彦明言者似迂逺而不切也萬一隄防不􅁕以禦河則余之言或有時而驗焉故為之叙送樊時中赴都水庸田使序􅀦家置都水庸田使扵江南本以為民而賦稅為之後往年使者昧扵本末之義民嘗以旱告率挋之不受而盡征其租入比又以水告復逮繫告者而以為姦治之其心以為官為都水而民有水旱之患如我何扵是吴越之人咻然相譁以為厲巳㑹天子問民所苦迺以為民實水非姦遂劾逐使者破械縦民而以聞上朝議乃歴選公卿有學術知大體者為之使而吾樊君時中以江南湖北道肅政㢘訪使而􅁶是職自君之来官僚叶和吏畏民服政以大行命下之日無不相視嗟咨以惜其去獨其友余闕躍然曰東南民力自前巳謂之竭矣况今三百餘年昔之盛者衰登者耗今其貧者力作以苟生冨者悉力以供賦有持其産為酒食子人人皆望而去之其窮而無告甚扵前世益逺矣其可重困之今而得賢使者以蒞之修其溝澮相其作息不幸而有水旱之灾則哀矝而為之􅀁民之窮者其少瘳矣乎今之木之實繁者其技披其本䟽者其幹㧞况扵􅀦與民乎哉故善樹木者簡其實而厚其本善為􅀦者䟽其賦而厚其民理之較然者也時中慷慨有大志臨大事果毅不擇利害而為之今其行也其能有以大慰吴越之民望以副朝廷之􅀝注也必矣二月􅀄吉式發鄂城卉木繁盛賔僚具在各為詩以􅁛羙之予故首序焉送范立中赴㐮陽詩序宋髙宗南􅁶合淝遂為邊地守臣多以武人為之凢百餘年間未嘗一􅀊無兵革故民之豪傑者皆去而為􅀅校累功多至莭制郡中衣冠之族惟范氏商氏􅁑氏三家而巳三家之在當時貴不過通判􅂋者或至知縣與府族亦未甚大也皇元受􅒛包褁兵革休飬元元民既冨庶矣而又修礼樂㝎治具諸武臣之子弟無􅀁用其能多伏匿而不出春秋月􅃋郡太守有事扵斈衣深衣戴烏角巾执􅇼豆罍爵唱賛道引者皆三家之子孫也故其材皆有􅀁成就至學校官纍纍有焉當宋季時諸武臣之冨貴眡三家篾如也而百餘年之後惟儒家子入為弟子出為人師隨其才之大小皆有聞扵時雖天道忌滿惡􅄹而儒者之澤深且逺􅀙古然也范氏世多聞人立中尤通敏由郡直斈為㐮陽教諭宋亡時蜀流寓之士多在江漢意必有老成典刑人也有老成典刑人與之逰立中此行􅀅大有得范氏之後有大􅂋者必立中也扵其行也書以贈之李克復総管赴贑州詩序仁皇帝即位録懐来功􅆀髙位者無慮数十百人獨韓􅀦李公以甘盤之􅁬為㝡􅂋位平章総百度君臣一德銳精治古而韓公相業見称於天下後世者設科􅂑士其㝡也元綂􅀄余忝論薦計偕如京師與諸同年求韓公子孫得今伯徴太常相往来又識克復屯田扵京師比来佐泗州而君復為泗州屯田提舉日與君䖏念天下士所以復見前代賔興之盛者由韓公士不及見韓公見屯田不其猶見韓公乎且與太常同年辱使納礼故以太常之事君者事君􅃋月􅀊時必􅀙諸僚友造君苐君暇亦輕裘緩帯以一小吏持馬過我我必為之傾盖而後去君色􅃊而氣和有斈而知体坐終日屹然扵先朝人物故實無不熟而知聴其言亹亹如環之無端坐客無􅀎置一辞也去年秋既書滿宰相以君有門閥且乆更事非散地所冝䖏奏為贑州路総􅃹州之長貳及諸屯田與九州之人往賀君闕在次舉琖拜君言曰仁皇帝之文徳入人也深天下不忘仁皇帝必及扵韓公朝廷録勲舊家首言君斯文之興可俟矣請以為天下賀又曰韓公􅀎以道術昌其家君兄弟􅀎保功名以有光扵韓公􅆀中二千石請以賀君又言江之西文教之盛者曰吉曰贑多士彬彬焉人之􅀁以厲扵斈科目之興也扵韓公之始而厲扵斈獨不扵韓公之季以治哉贑雖号难治君䖏之余知其為易也請以賀扵是程泗州賦詩四韻坐客人士皆為詩以道其行使書吾􅀃以為引􅀭君􅂋民詩集序我囯􅀄有金宋天下之人惟才是用之無所專主然用儒者為㞐多也自至元以下始浸用吏雖執政大臣亦以吏為之由是中州小民粗識字􅀎治文書者得入臺閣共筆劄累日積月皆可以􅆀通􅂋而中州之士見用者遂浸寡况南方之地逺士多不􅀎自至扵京師其抱材緼者又往往不屑為吏故其見用者尤寡也及其乆也則南北之士亦自町畦以相訾甚若晋之與秦不可與同中囯故夫南方之士微矣延祐中仁皇初設科目亦有所不屑而甘自没溺扵山林之間者不可勝道是可惜也夫士惟不得用扵世則多􅆀力扵文字之間以為不朽而文辝者有幸有不幸者至扵老而無􅀁用矣而其文又遂泯不􅂋是又可哀也比年大江之南山林之士有挟其文藝逰上囯而遇知扵當世士之彈冠而起者相踵京師大官之家皆有其客而週知扵當世者亦比比有之若豫章楊显民者抱其才藴不屑扵科目甘自􅃿溺扵山林之閒當士群起而有遇之時而又終不肯一出以干時􅂑譽是其中必有所􅀒而然也予雖不識􅂋民然聞其人力斈而操行通古今之務江南之士漸其澤而有名作甚衆其弟子之登科目仕州縣者亦能以政􅁛其家固貧而年又􅀅老廼日䔥然吟咏以自樂無少怨怒不平之氣其殆古有道之士耶余讀而愛之其弟子凃頴持其所謂水北小房集者来京師􅀅刻之以傳扵世余為題其首使後知􅂋民南州之士有所􅀒者也是盖有道之士也貢㤗父文集序余天性素迂常力矯治之然終不􅀎入繩墨矯治或甚則遂病不能勝因思以為迂者亦聖賢以為羙徳遂任之一切􅀙其所樂常行四方必迂者然後心爱之而與之合凢捷機変者雖強與之然心終不樂也故暫合而􅂺去京師天下声利之區也迂非所冝有嘗隂以求之士大夫之間得一人焉曰貢㤗父㤗父故斈士仲章君之子能詩文少逰太斈有時名因自貴重不妄為進取有所不可交者亦不妄與交故吾二人者驤然相得若魚之泳扵江獸之赱扵林也時㤗父為應奉翰林文字固多暇者即與聚盍有􅂼一品魚一盤飲酒三行或五行即相與賦詩論文凡􅀴史詞章古今上下治乱賢否啚書彛噐無不言者意少適即聮鑣過市㩀鞍談謔信其所如而止及暮無所止則相與問曰􅀅何之皆曰無所之也乃各䇿馬還自古暨今在公貴人能求賢常少然自至元􅀄姦回執政乃大惡儒者因􅀃當囯者罷科㪯擯儒士其後公卿相師皆以為常然而小夫賤􅀠亦皆以儒為􅅓詆當是時士大夫有欲進取立功名者皆強顔色昏旦往􅀱扵門媚􅀃以妾婢始得尺寸此正迂者之所不能為也因翶翔自放無所求扵人巳而皆無所遇予既帰淮南㤗父亦以親嫌辤官歸除紹㒷推官不相見者為㝡乆去年大原賀君為丞相蒐羅天下人才之有政譽者而㤗父之治為浙東西苐一廼得復召為應奉余適入朝為待制相見益􅂬計其别十年矣吾年少扵㤗父􅂡髪皆白而㤗父銳然面紅白如出其别後所為詩文甚冨且大進益知為㤗父真豪士也夫以士之賢無所遇而淹扵下僚冝其悲憤無聊而不􅀎盡也頋乃自樹卓卓以其餘力而􅆀勤扵文斈且其貌充然非其中有所􅀒盖不􅀎尓然則吾㤗父之迂又過我逺矣夫古之賢士多不兼扵文藝文藝雖卑而世亦貴而傳之者爱其人故也不賢者之扵文藝雖極其精人猶􅀅賤之亦何以為也㤗父忠孝人也其功名事業當不待文與詩而􅀓而况扵兼有之耶余昔与之别今見其文如此今又當别去計相見時其文又必有過此矣扵其行也序而識之送􅁑元哲序文者物之成章者也在天而為三辰在地而為川岳其在扵人若堯舜之治化孔孟之道徳仲由之政冉求之藝一皆謂之文今持以言辝之精為文者夫言之精莫精扵周公孔子二聖人之扵言豈有求其精而然㢤而其文何其若是其蔚也其楊雄司馬相如韓子歐陽子始號為工扵文者彼其扵周公孔子之文非不􅁒窮日夜之力極一世之􅀁好孜孜焉追硺磨礪以求其精而卒不􅀎至焉濂溪二程大子之學其視楊雄司馬相如韓子歐陽子盖有􅀁不暇然味其言淵然而􅀷雄然而厚晬然而醇使得列扵聖門雖顔子曽子􅀅不􅀎過則夫言之精者又若不待窮日夜之力極一世之􅀁好孜孜焉追琢磨砺以求至扵聖人而後賢此無他聖賢道徳之光積中而彂外故其言不期其精而自精譬猶天地之化雨露之潤物之魂魄以生葩華毛羽極人之智巧所不能為亦自然耳故學扵聖人之道則得聖人之言學扵聖人之言則非惟不得其道并所謂言胥不􅀎至矣金谿􅁑元喆􅁬以文章名江南既擢弟其文又傳扵京師衆謂元喆之文冝為天子粉飾太平鋪張鴻業以􅀓扵後世㑹有守􅈗之選遂以為興化録事余知元喆終以文選非乆扵外者也扵其别也故与之論文送許具瞻序余讀周易之謙未嘗不掩􅃃而歎曰聖人待小人之心一何如是其至也夫陽君子也隂小人也小人盛則干君子故隂至三則􅂂君子盛亦未嘗不下小人故陽至三則謙謙虚也陽本實而云虚者不自滿假故屈而下扵隂也是謙以下為徳者也􅀄而謙謙下而又下者也二則浸以上矣故以鳴謙鳴者以言謙也三則益上而位髙故以劳謙劳者以功謙者也以功而謙厚之至也厚之至而民焉有不服者乎故三之辭曰劳謙君子有終謙而民既服君子之道終矣謙既終民既服進而之四何施而不可聖人之心猶以為吾之待小人者未之厚也又自反而撝謙故四之辭曰無不利撝謙其徳巳厚其謙已撝進而之五而小人者之終不可以化入也扵是乎有侵伐之師故五之辭曰不冨以其鄰利用侵伐不冨以鄰徳之盛也利用侵伐順之至也聖人之待小人至是可謂尽心焉耳矣昔者禹征有苗苗民逆􅒛益之賛禹惟在扵謙禹遂有舞干之舉此其􅀁謂撝謙也謹猶撝而未格則其侵伐者禹終得而巳乎哉祖宗受􅒛汛掃六合以有堯舜所未有之天下聖天子紹承熈洽愛民猶子堯舜之仁不是過也頃者盗起海隅剽民財犯官􅈇其罪可誅而區區赤子又特一􅀅校之力􅀁能舉迺不以為罪止扵招諭盗又止我省臣以求降此尤可誅也而亦􅀙其請且曰徳不下宣此吏之罪遂盡変易並海之為宣慰及其郡縣之官選能當其任者得三十八人親御便為給符傳而諭遣之嗚呼此􅀁謂無不利撝謙而禹之所以待苗民者也三十八人之中天台許君具瞻當治鄞具瞻余同年進士也其行端㓗其材勇以幹前知武義時攝金華縣事武義之民群訢憲府請還君金華之民亦群訴扵憲府留君不􅁒其去其得民如此可謂􅁛兹選矣故余為道聖天子愛民之深與夫所用具瞻者如此非惟勉具瞻亦以告夫民也贈刑部􅁺史鎦彦通使還京序舒岸大江為城北赱英頴南直番歙西通黄蘄湘漢鄂岳東距鳩巢􅀁謂四通八逹之地也自之興所在􅀙􅅍舒介其間而獨徇義乗莭不與之共戴天故群盗環攻之舒亦不少屈撓日治矝㦸弓矢以與之相格閗盜大至則男操兵婦給餉童子負瓦石空巷乗城與之決戰如是者今五年其勞如此故其冨者日貧而貧者日死以耗入其市㕓里䔥然適其野榛莾􅃿人不見行跡至其館簠簋不治餼牽不具委積不充使者之道此怒而去者往往有焉其以公事来者多眡賂以為喜愠喜為春温愠為秋凛或怒而去則民相與踧踖曰禍其始此耳不甘食安䖏者累月而未寕逮無事迺巳浚儀鎦君彦通為秋官􅁺亦以事来㞐郡浮啚毎食􅂼一噐飯一盂饋之珎羞則辤盡之財則艴然以怒持莭至軍中勇者執手以勉之創者涕泣以劳之其㞐此特乆而民爱之如始至惟恐其去巳也傳曰有功而見之則􅀃也君重其民情而閔其劳民之􅀃也亦其冝也臨川毛順孫受君尤至與士大夫賦詩以羙之余故䖏合淝知君為􅁺㢘而有􅀎以為士之羙君者非譽也故序而冠諸其首為髙士方壼子歸信州序尭舜之時以幽并為􅃋易元興舉尭舜未有之天下而一之而幽并始為土中以為四方之極然其地去荆􅀭數千里而氣苦寒而多風非其土着至則手皸而􅁕裂其㞐䖏服食異用絺􅁑果茗魚鱐之物不􅀎以易􅆀皆性之所不便故南方之人其至者恒少非為名與利無􅀙而至焉又况浮啚老子之徒以遺外世俗為道其扵名與利盖有􅀁不屑故其至者尤少􅂉至焉者則亦名利之人也髙士方壼子至正中至自信州余始遇之以為名利之人也徐與往耒見其氣泊然其貌充然人與之譚當世之事則俛而不荅獨其性好􅀞人以礼求之始為出其一二皆䔥散非世人􅀁􅀎及嘗為余言太行者天下之脊而㞐庸虎北者天下之岩險也其雄傑竒䴡非江南之􅀁有天府之蔵王公鉅人之􅀁有皆古之名晝余􅀁願見者今皆見之而有以慊吾志充吾之􅀁操吾非若世俗者區區而至也余曰賢㢤方壼其古􅀁謂善操技者與夫輪扁之為斵知斵之為羙不知有王公之貴知斵之為得不知有􅀳楚之冨故其為技也古今之善斵者莫加焉今子㡬扵是矣其有不臻扵古者耶吾黨之學者苟遷扵物其尚􅀎望子耶扵其行也相率為詩以贈之聚魁堂詩序安慶郡文學秦宗徳特其友人豫章嚴撰書耒請曰去年丙申江西行中書之郷試也臨江貢士有曽魯者偕其友廬陵解􅂪髙飛鳯劉倩玉俱就試寓止同舎往还復同舟而載拆號四人者俱在甲乙選列捷報至髙與劉觧乃留魯家郷人因名曽氏之館曰聚魁堂云璞與魯姻婭也復率大夫士之􅀎文辞者賦詩羙之謂宗徳常獲􅀻扵公書耒請序願勿辝将以爲榮焉余曰科目取士吾嘗司文衡扵中外矣退而攷其所得父子同榜者有之兄弟聮名者有之師生俱在選者有之若同志同升鮮有聞如曽魯者也其理似不偶然豈有數存其間耶然不􅁕泥也余惟爱魯之交友得人而人之與魯交􅀎登科目發身也由此而升以行道以致君以澤民將無不可吾意四方者亦嘗彈冠相慶矣則親朋賦詩以志喜也固冝宗徳曰斯言甚善請書以為序送李宗㤗序淮東南西北道之地其民忠而能守囯者三郡曰廬夀舒自之興壽守先治戰俻與民為守至􅂺敗然不能保其近地民無耕收而長淮之餉道又絶以􅆀父子相食而後潰廬大郡其南沮澤之地大而有名者三十六俗名之曰圍地廣而􅁕耕而守與􅀅才下余嘗識之凡其日之所營夜之􅀁思非宴楽之事則掊克之政也民有持耒耜扵門者則曰召使奪而辱之民飢以死城大而不能守乃歛四境郷兵以守之又無以食以賦冨者大都剽吏殺人而莫之禁至以其兵去之城遂䧟余至舒時囯門之外數十里之地皆盗柵也幸戰而勝乃為攘剔旁近之地令民耕之築壘以護其作役其不􅀎耕者時莭与之繕城隍修予㦸而又明其政刑平其賦歛治其争訟朞月而頗張今民之勇者無敢譁弱者無􅀁悵如氶平特然惟教民之術有未治耳方􅀅與學士修其庠舎共講唐虞治道夫人性命之􅀃則禍亂有不􅁕㝎者若姑孰李宗秦志學而行端又吾􅀁當延而礼之者也而力不􅁕宗㤗族人䧟在姑孰者聞多自㧞扵宣􅀅往来之又義之所不敢止者姑序吾懐而與之别蔵乗法䟽後序續增天下之書􅀶者未嘗無要法五聲十二管可以盡天下之音聲十干十二支可以盡天下之甲子􅁚形指事轉註諧聲㑹意假借可以盡天下之文字其統之有宗其㑹之有元充之而不窮合之而不遺知者創物其有功扵世􅁼如此佛氏有法䟽書㑹萃名義而藏十二部之理無不在誠要法也西菴遂公罷講逰方二十年歸乃取而脩訂之􅀘其􅀁未俻白其􅀁未明去其所未安明性相析機冝刋定名體目曰蔵乗法䟽濡湏有道之士文公無學以衣資若干貫刻之板以恵四方昔邵子皇極經世以元㑹運世􅄛為十二萬九千六百年以盡事物無窮之變其文􅀶其義冨蔡西山撮其機括為指要一編其有功扵邵子大矣遂公之書是亦大蔵之指要與余讀傳燈婆子請趙州轉經繞禪床一市云轉經巳婆云只轉得半蔵半蔵全蔵姑置勿問五千四十八􅃃一周行頃何為而轉之此父西菴不傳之妙因書之􅃃末在學者所自得青陽先生文集卷之四
