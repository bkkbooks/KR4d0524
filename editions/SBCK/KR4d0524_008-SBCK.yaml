front:
  text: 青陽先生文集卷之八門人淮西郭奎子章輯
  hash: sha256:290147cdc3f9a70fbd79a2536ed9939ab25cc8e40c188f6188212e312e1fc299
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0524_SBCK_008-1a}
body:
  text: 雜著題宋頋主簿論朋黨書後先生之時上與下同患故國家之政夫人而得言之召康公所謂士獻詩史獻典瞽獻書百工諫庶人傅語近臣盡規親戚􅀘察故凡事之得失政之利害國之治亂上無不有以全知而慎􅁱之而至扵無敗盖天下之􅀔如操舟舵師失利豈特棹夫之患㢤而凢同舟之人患也故有憂天下之心者無不有以盡其言不盡其言者是不憂天下者也有憂天下之心者由有以知其得失利害治亂之故不憂天下者是不知所以得失利害治亂之故者也夫天下之大患在扵人之不淂言而淂言者不以言與雖言之而不用其甚者至以爲俗雖有憂天下之心之人而知天下淂失利害治亂之故者亦不敢言而國遂以亂亡如秦季世盖可監見而世主終不以爲戒何㢤三代而不􅀂宋之一代人心世道猶有近古内而宰執侍􅀙䑓諌有奏䟽卿監以下不得日奉朝請則有論對朝臣上殿則有奏劄皆與天子酬酢扵殿陛之間如家人父子之相與外而監司郡守几所職亊皆淂以䟽聞天子親御筆劄以報之目有書至萬言者若亊大体重言者不以言則大學京學諸生與凡􅅊布之士皆淂詣􅆣上書言之至其晚年􅁠臣執命士益探䁀鑊冐刀鋸而論亊不可壅遏其下與上同患如此故􅀎外捍強國内􅁱民亊傅緒三百餘年而後亡雖先王之世人心之㣲亦何以過此也予昔與圭齋諸先軰􅁱宋史嘗愛徳祐時有蕭䂓者前論丁大全黔面貶嶺南既舎還又與京學生葉李論賈似道又􅂯貶似道罷陳冝中當國得詔還學猶伏􅆣論事竒氣櫟櫟如平時宋亡我世祖皇帝追大臣物素當時言者淂葉李用以爲執政而規獨不見盖當時率諸生論賈者規也李特因以成亊者耳惟李應時掩以爲名而䂓遂不見知扵世欤扵是時䂓巳老死或伏溺而不出耶予屡􅁒傳其人扵史以不􅀎詳而止至今惜之永嘉頋仲明謁選来京師示余以今大宗伯逹公所書其先世主簿君與蕭侍􅀰論朋黨書言論慷慨而激烈時秦檜柄國方以威􅁠銓制天下士大夫罹其禍者甚衆而君言􅀂此此予之所素歎以爲人心世道之􅍇者故爲之書逹公昔予局之監也其爲之書亦必重歎扵斯焉題孟天暐擬古文後秦燔燒詩書百家之言漢興稍掇拾之諸子後出然頗􅇎以依倣之􅀃如國䇿諸篇多蒯徹之流所撰甚至􅀼取他書以足之如見秦者豈盡短長之舊㢤孟君天暐善模倣先秦文章多􅀎似之其讀國䇿當􅀎辨之知予言爲不妄也䟦揭侍講遺墨後豫章掲先生好􅁛奨後斈人有片善即誇道之不去口况扵通家之好故人之子有可誇道者耶故世称先生爲忠厚先而生子㳂亦克􅀣立世其文行此忠厚之報書曰人之有善􅀂巳有之以􅀎保我子孫􅀺民信㢤彼竭疾者聞先生之風亦可媿矣題凃頴詩集後凃君叔良来京師與余同􅆍䖏凡兩載􅅅藜飯糗之餘相與論古今人詩皆有造詣􅀹長扵五言其精䴡有謝宣城歩驟平淡閒適不减孟浩然叔良年甚少􅀅来何可量耶余嘗論學詩如錬丹砂非有仙風道骨者不􅀎有所或也叔良殆有仙風道骨者耶旦晚余􅀅有越中之行與叔良同處不知又在何日臨別殊難爲情讀此􅀹不􅁒舎吾叔良也叔良勉旃他日聞大江之南有謝宣城者必吾叔良也此亦足以名世豈待區區外物㢤御書賛今上皇帝潜邸廣西時書方谷字賜臣毛遇順謹賛曰皇徳淵靚泊如大虚海上浴日惟書爲娱穆穆玄雲垂若脂素神馬登河驚鵉㳺霧臣順霑賜今益造玄雲漢在上湖可寳焉􅏦岳禱雨文具官余􅆣謹告扵南岳􅏦山之神曰凡列扵天地之間者吏食君禄以治其争訟神享君祀以禦其灾患無非事者也自盗之興同安之民農失其耕工失其業商失其資吾吏日夜孜孜以啚利之安集之以思報君食然自去􅀊以来田苗屡旱雨澤不時百姓饑死此則非吏之所􅀎爲而神之責也夫所謂神者以其聦明正直而􅀎福善禍􅁋者也昔者凶盗燔尔宫廟既尔粢盛而吾民紓忠迪義以殄㓕之而神乃禍民而弗禍盗所謂福善禍􅁋者安在吏􅂉不職以干天和神乃降灾扵民而弗降灾扵吏所謂聦明正直者安在夫群神雖舉各有攸職􅀎興雲致雨者惟山川之神耳尔神受命作岳司命之􅀉在東北西三神之上又吾同安封内之神也水旱之責不扵汝而奚歸今白露􅀅近雖雨無及兹與神期三日大雨田禾熟成􅀅率吾民修尔宫廟奉尔祭祀不然􅀅與民啚變置汝其無悔勉勵葉縣尹手批名伯顔告青田縣尹葉承事聖天子憂憫􅀺元而承宣者不􅀎道􅀭徳意反以厲民君蒞邑之初即有政平訟理之譽若漢黄覇魯恭皆可師法詩云靡不有􅀄鮮克有終君尚冝益脩羙政以追配扵前人固不偉欤公堂酒二樽專人奉劳西海祝文維兊爲澤奠位宅西翕輸隂彚蕩泊金天我有駿􅒛肇􅏾兹澨祀事惟常扵皇無替后土祝文媪靈旁魄合徳扵天食扵汾睢爲古方澤有嚴毋事殷薦齋明蘄我亟生永沐光化西岳祝文節彼靈岳荒扵華陽二儀鍾秀三條分方興雨祈祈嘉祉耿耿以報以霾神休惟永河瀆祝文水伯之徳􅁛自前古肆予寕神罔有弗至粹庙伊嘉况載薦閔兹瘝人以翕􅁀横江瀆祝文水徳之靈神寔位長鴻紀六州澤施三壌秔稌􅁢殖飛潜資飬我報以祀神㢤昭享中鎮祝文岩岩大岳為望扵兾宣徳禀神作鎮中土唯中是建四方之極神祐我民列岳所眡西鎮祝文天作髙山典司雲雨作福扵下秩配君公有嚴崇鎮奠我岐下恵扵西土民人所薦湖廣省正旦賀表二儀啓暦申逢首祚之期四海登圗誕際朝元之㑹普天均慶庶物皆春中賀運撫休嘉功深對育與民同始須觧網之寛條属吏在延布畫衣之新憲光輝縟典益固皇基臣等猥以凡庸叨陪亮采身江湖而心魏􅆣遥陳晋錫之詞内君子而外小人願介㤗来之祉正旦賀箋㐲以青陽煥景丕陳元㑹之儀􅊮史表年申告履端之慶和薫率土喜治岩宸合徳無􅆠徽音有馥六宫進御人􅆂樛木之㤙九廟烝嘗時謹采蘩之事茂臨蒼律益介鴻禧臣等逺任旬宣阻趋朝覲􅎛盤獻頌仰瞻玄武之光桂殿迎春早應高禖之瑞聖節賀表㐲以華渚效祥光臨首夏大廷行慶忻對上儀凡四表之尊親同一心而舞蹈功超振古仁治含生竭智附賢特重合衡之選䡖徭薄賦屡預綸紱之思徳與氣㳺夀冝川至臣等旬宣江漢企望蓬莱承露絲囊遥獻無􅆠之頌齊天寳命願符有道之長書合魯易之作頴川老翁謌後續集至正四年河南北大饑明年又疫民之死者半朝廷嘗議鬻爵以賑之江淮冨民應􅒛者甚衆凡得鈔十餘萬錠粟􅁛是㑹夏小稔賑事遂已然民罹此大困田莱盡荒蒿藜􅃿人􅀌兎之跡滿道時予為御史行河南北請以富民所入錢粟貸民具牛種以耕豊年則收其本不報覧易之之詩追憶往事為之惻然濟川字􅀃濟川者熈寕張子瑞之號也子瑞世以活人為功聞扵時其艱於衞生若川險者咸以舟楫濟之乙未春避地来歸䄂􅃃求予字并􅀃予方􅁒濟時艱得其人亦可尚已而言曰濟川者司命之謂忠惟􅒛弗罹扵險弗嬰扵疾􅂌終其天者為正嬰扵疾罹扵險廼􅆷其生為夭夭也者靡有司之者也嗚呼惟天生民有欲汲汲扵民孜孜扵利蛟龍黿鼉之澗風濤險濬之所阻車馬限往来罔知禍厲者唯病夫渉情蕩扵中氣戾扵外膏肓蠱瘵之府疲癃殘疾之基賊脉理伐夀齡罔重攝飬者唯病夫身此醫藥之利扵人猶舟楫之利扵天下二者固相若已雖然巨君正國爕隂陽以利天下其道其術亦不外扵是􅀃􅒛曰若濟巨川用汝作舟楫此子瑞之志也此其所以為號也此濟川字之􅀃也賛晦父前子後大帶長􅅂人仰其名家誦其書盛㢤若人是謂用譽
