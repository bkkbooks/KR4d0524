front:
  text: 青陽先生文集􅃃之一門人淮西郭奎子章輯
  hash: sha256:bec4e22bb2dbb0257224dcd7d10221368e7889bb084c5c10723c168bcffed15b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0524_SBCK_001-1a}
body:
  text: 詩擬古二首昔在西京日縱􅀚質前聞皇皇九衢裏列第起朱門借問誰􅀁居丞相大将軍平明事逰謁車馬若雲屯芍藥調􅅅鼎拂􅎜鑄酒尊頌聲羙東魯逸奏出西秦廽風薄蘭氣十里楊清芬東家有狂生容顔若中人謬言擬宣尼幽思切玄文著書空自苦名宦乃不振悠悠千載下安有楊子雲昊天轉時律大火西南馳勁商發羣􅄜白露降嚴威􅄃衣起視夜明月鍳薄蜼翩翩征鴈翔唧唧寒蛩悲紅蘭委芳采栢葉亦離披喬喬千丈松􅀌生泰山隈凝霜裂其膚層氷断其柢摧殘若傾益蒼翠終不移草木有至性明哲冝戒哉白馬誰家子白馬誰家子緑轡縵胡纓腰間双寳劒璀璨雪花明甫出金華省還過五鳳城君王賜顔色七寳奉威聲夜入瓊樓飲金罇滿繍楹燕􅁎陳屢舞楚女奏鳴筝慷慨頋賔從英風四坐生一朝富貴盡不如秋草荣黔婁固貧賤千載有餘名擬古楊沛楊生仕州縣謀􅀦不謀身一朝觧印綬歸来但長貧茅茨上穿漏頽垣翳緑榛空􅇃積風雨蝸牛止其巾辛苦豈􅁕念殺身旦成仁天門山保寕知府楊丹梓人作記楊子􅀶地志名山屢出王但言􅀮弥匪崇冠峙嵩梁井絡通遥甸天經列鉅障羣峰如􅔽蓞歴乱發金塘玉壷既嶇愕天門逈開張宛䖝連紫葢丹泉濺石床入門䕃脩竹中夏若寒霜靈鳥多異色中林皆妙香耀真啓幽室積石構瑶房萬里秘􅄀奥千秋阻秩望惟應學仙侣結桂共相羊送鎦伯温之江西㢘使得雲字祖帳依仙舘車葢何􅌭紛使君驅駟馬衣上繡成文中坐陳綺席羽觴流薄薫情多酒行急意促􅁔吹殷况我同郷友同舘復同羣􅀄暘麗神臯遥望澄逺氛廽鏕望双􅆣五色若卿雲蒼茫􅀊年徂東西􅄮路分道長㑹曰逺何以奉殷勤惟有凌霜栢天寒可贈君送李好古之南臺御史都門相送處旭日動蘭暉綺樹鸎􅀄下金溝絮漸飛分􅆖向逺道把􅃑恋音徽去去江南陌應㸔滿路威送普原理之南臺御史兼東察士安霜署起南天雲霄􅀞榜懸两幃猶可對二妙古難全夏木籠彫檻風華度繡筵時應聮􅀐岀誰謂非神仙送霍維肅令尹握手蘭宫外朝光滿禁􅂗山寒知塞近苑静斍鶯踈草草離罇既悠悠征輛驅還應􅎮時念不羡执金吾秋興亭渉江登危榭引望二川流双城共臨水两岸起飛樓漢渚深初緑江皐逈易秋金風􅀭素浪丹霞麗綵舟登髙及佳日能賦命良儔御者奉㫖酒庖人供膳羞一為山水媚能令車􅀐留為語同懐者有睱即来遊安南王留宴将命坐藩服式禮奉國賔賢王重意氣延客列華䄄肅肅髙堂上圎方饋八珍齊優􅇎趙女􅁔曲一何新遺響從風發雕梁落素塵中觴毎傳滿眷眷难具陳厚徃已有愧懐报恐無因九日鄂渚登髙南州理秋拔嘉節恊乾陽爰與幕中友臨眺陟崇岡維時天氣粛芬菊巳沾霜雷雷風振谷凄凄日在房髙雲歛楚岫曜景逰川漲㣲徑出丹林列坐泛金觴佳賔未易合良㑹安可常英曹幸文雅献酬寜計行預恐还吹㡌煩君戒太康吕公亭鄂渚江漢㑹茲亭宅其幽我来窺石鏡兼得眺芳洲逺岫雲中没春江雨外流何如乘白鶴吹笛過南楼詠井上桃花本是仙源種移向禁中㘽為愛妖嬈色偏臨露井開先天􅀚仙客錬金地蒼山􅀷㡬重至今龍虎氣猶在琵琶峰峰前石路整金澗垂楊嶺万壑閟阿宫千年奉丹鼎日日采三秀人人吹玉笙既要王子􅀳復命董双成方朔金門歩春来多自豫青鳥㡬時还御書􅀉君去北􅆣懐羙禄南山思逺逰劳心如御水東去復西流黄鶴楼嶣嶤黄鵠嶺巋巍構楚材澄江環盡楯連城抗鉛階雕衡朱鳥峙淵井緑荷開􅀮見長沙渚想望陽雲臺晴霄一仰止輪奐信羙㢤淮南儻好道日夕化人来别樊時中桃華灼灼柳絲柔立馬看君發鄂州懊惱人生是离别不如江漢共東流宴晴江山拱北楼漢坻開繡閣蕭然似渚宫晴江華楯外列岫綺錢中樹色青罇緑荷花女臉紅賢王敬愛客樂宴意何終山亭㑹琴圖連山環絶壑雲木乱紛披中有抱琴者有如荣啓期䔥然乆不去問子欲何為絶塵軒元㒷寺二首網軒開翠崿山水下䓗籠江中宝牀擁樹杪􅀞欄紅心融二障㓕境静六塵空應似青蓮葉齊開縁水中壓雲軒軒轅鑄鼎䖏仙臺成晝圗寒雲生洞渚􅊕色入蒼梧如霧飄丹閣非烟起玉炉年年漫耒此無處挽龍胡大别山栢􅀣竒樹如蛟蜃盤骫上虚空􅀌生雖異桂半死反如桐香帶金炉氣色暎綺錢中靈從后皇服年随天地終常瞻北枝翠終古欝䓤葱竹嶼秋水鏡䑓隍􅀌州入淼茫地如方丈好山接㑹稽長紫蔓林中合紅蓮葉底香何人酒船裏似是賀知章題虞邵菴送别圗南州山水䴡中田􅀊事豊時貞文物粲道合朋軰同濟濟衆君子班坐䕃青松廻洲環偃月丹林結綵虹翔鷗方矯矯鳴鴈亦嗈嗈即趣情已展染翰思弥工予亦幽棲者纓冠朝北宫披圗誦佳詠邈尓想髙風送危應奉分院上京峽路􅀓清警金輿夾綵㫋还如向姑射詎比幸􅅴泉苑樹紛成幄関榆始委錢􅀙臣偏寵近載筆幔城􅁁題叚應奉山水圗二首水如剡溪水山似剡溪山想見魲魚羙扁舟常不还花􅀮玉堂署曲几對雲峰為問江南客何如九里松嘉樹軒為胡士恭作嘉植将百􅀊積翠廣庭間髙柯出閭巷低枝䕃井乾流膏從風颺芳氣散如蘭别有清霜節將同綺樹看鶴齋為薛茂弘道士賦葉縣飛鳬舄琴髙駕赤鱗豈􅀂青田鶴萧洒迺仙倫刷羽琪樹側振唳華池津騫騰朢霄漢逸氣已冲天錬液諒有驗㓕景入無垠还乗過緱嶺舉手謝鄉人禎祥菊為沙伽班院使賦舊花已萎絶新花迺􅂯芳都縁禀金氣特觧傲司蔵旖旎生殘馥葳蕤出故房應憐蕙草質戢頴委㣲霜賦得九里松送呉元振之江浙左丞結駟向青郊松隂九里遥言從天笁寺自度小春矯偃蹇成芝盖蕭瑟䕃蘭橈相送􅀅何贈期君保後凋龍丘萇吟贈程子正􅀾龍起新室羣鳥亦翩翩偉哉龍丘生抱琴㱕故山仰視天際鴻俯弄席上絃淸音發䟽越逸響遺澗泉悠悠鳯翔漢婉婉虬媚川清風自千古何用能草玄送􅀚至􅀎赴㱕徳知府善理崇富敎長辟䓁烹鮮况兹乆凋瘵望治功宸淵綬組承明裏結駟双闕前燕郊芳草歇啇墟大火懸髙懐薄霄漢􅄃轡殊慨然揆予眛時用載槖􅀙甘泉庶聞兩歧詠為予書汗篇送黄紹及第㱕江西上林華落盡東門餞别􅀄逰絲横輦道金波溢鏤渠含觴不􅀎飲躑躅此城隅念子正英妙丹泉媚緑蕖翻然阻山岫邈尔問􅄐居芸閣誰同坐蒲生孰共書時應有詞賦為􅀉北飛魚送胥式南還孟冬寒律應原野降繁霜客子􅌒逰覧結笥还故鄕驅車出城闕旭日懸晶光綺宫上爛爛翠閣後蒼蒼豈無京華志晞景􅀤清楊冨貴在荣遇貧賤有安行恒恐􅀊年迫皐蘭凋紫芳君㸔沙上鴈騫翮乃隨陽題合魯易之四明山水圗窓中望蒼翠春木起晨霏􅀌嶂􅅻盈尺長松未合圍蕭蕭此仙客日日候岩扉念爾空延佇王孫且未㱕題黄河清艮岑幽居大明照四海之子乃陸沉逺絶仁義絆結宇幽藪隂薈翳谷中路嶄崱北山岑窓鸎響初䕃隴月頽夕林時憑曲水几蕭散發長吟委化諒為逹滯樂恐遂􅁋援琴皷招􅀮念子為薫心題施氏西屿書堂中智貴得性得性非易求羡君淠水曲松竹􅞴層丘春秋當佳日兄弟各命儔捴轡􅇒晨術展席面緑流叅差瓊峰出泓澄綺磧周緗荷承繡宇黄鳥響䟽樓起坐玩芳帙為樂鮮優㳺河陽耻巧宦建春厭旅愁安得周公瑾為舘孫仲謀送方以愚之嘉㒷􅁠官帝仁同禹泣典憲輟朝纓我友膺時選御命出承明是日芳莭屇列餞多鉅卿桃開疑組色鳥囀襍􅁔聲仰獻一杯酒逺慰千里行丈夫有逺業文墨非􅀁營勉布惟良政持用畣皇情玉雪坡為周伯温賦江梅有至性􅀎怡君子顔開花競芳莭櫂秀帯春寒惟与玉同色还􅅓雪易殘芳香拂羅䄂如薫金􅀶山置此賔席上人人別意㸔題劉氏聽雪樓羣峰擁臨檻脩竹欎菁菁䕃向曲池好聲惟雪夜清天寒三日卧人道是􅀽生題光禄主事􅍑仲桓海棠圖沉香羯皷打春寒􅅻見開時又見䦨爭似君家屏幛裏年年􅀊人有花看送王其用隨州省親都門楊桞萬絲垂城下行人駟牡騑宫中近得三年謁篋裏新裁五色衣漢皋秋晚逰娼少夢陼波寒獵火微我有愁心似征鴈隨君日日向南飛題合魯易之鄞江送别圗欲去更还頋依依恋􅀁知今朝去亰日似子渡江時宋􅂋夫學士輓詩紫陌暗蒼茫松門近太行悲笳翼唇軸素􅌧引魚荒故筆誰探取神書永共蔵愁㝷持槖地秋隂結女牀馬伯庸中丞哀詩結纓趨魏闕俛仰二十霜化途易遷逝故老今盡亡維時逰公門時莭㑹髙堂峥嵘奉餘論炫燿晞报章制若縟繡陳聲若宝瑟張儀若龍文鼎燁若照夜璫阡眠出工巧幻妙極豪芒抽思究皇術振藻詠時康是時朝廷上才彦侯有望公如逸虬出萬􅂹為留行念此今已矣松栢杳茫茫驅車入珂里穹門委􅁬衡珠移靑淵涸桃盡故蹊荒龍火出勁秋玉衡変春陽朝荣計巳殞夕秀豈不芳感彼椎輪始惻惻我心傷祝蕃逺經歴輓詩逸􅁤無还轍驚川有怨思蒼苔生􅁬舘素簡委空帷龔勝誰相弔虞翻少見知惟應問道者廬墓薦江蘺􅂋紅梅翠竹圗竹葉梅花一色春盈盈翠佃俺丹唇休言畫史無情思􅁍勝宫中剪綵人題蛾眉亭空亭瞰牛陼髙髙凌紫氛澄江萬里至華崿两眉分落日兼霞彩流光成綺紋慿軒引蘭酌休憶謝􅀅軍南山贈􅀮者君家南山下南山果何如開如陣雲黒向背凌空虚木客采薜荔怨女詠蘼蕪何當牽白大見君巖下書賦得慈恩寺塔送李惟中赴西䑓侍御祗園開塔廟遐瞰盡三秦琱玉裁文陛金銅結綺輪髙摽双􅆣外流影㶚陵津􅄃轡还登晀題名継昔人蘭亭奉節過東鄙揔轡臨越墟覧此崇山阿亭樹猶晋餘陽林積珎木禊館䟽􅍢渠徴風旋䡖瀬宛委寫成書秋抄霜露滋清商滿縣隅紅蓮凋綺蕋微瀾見躍魚籍芳泛羽觴眡聴良有娯消揺大化内豈必三月􅀄汪尚書夫人輓詩喧喧引長紱簫鳴閭井間旌連綺霞閣路指敬亭山泉底鵉䑓掩城中翟葢还尚書老㱕國誰與襲芳蘭贈澄上人壊色衣裳護七條手持經卷意蕭蕭頭陀寺裏相逢後又向天台訪石橋贈山中道士善琴山中道士緑荷衣新抱瑶琴出翠㣲巳與塵縁断来􅉨逢人猶鼓雉朝飛題紅葵蛺蝶圗蛺蝶既無數秋花亦滿枝終焉不飛去似怨弄芳遲自集賢嶺入大龍山皖公標椘甸兹嶺孕竒形翠積樅江滸崇冠吕􅂪城戒途入中林平岡駐我旌延望失來術周覧多􅀁經峩峩石窓矗窅窅巖岫􅄀離離雲朝隮粲粲樹敷荣関弓射鳴鴈羣谷振弦聲仰憐山人居俯恱洞下耕蒼龍啓春􅀱金虎􅀵光精權家既非學農用或可明頋言同載者為爾鑄阿兵安􅂟郡庠後亭讌董僉事亭名天開圗畫鯨鯢起㐮漢郡邑盡焼殘兹城獨完好使者一開顔省風降文囿弭莭遵曲于双池夾行徑累榭在雲間天姓羣峰出地逈滄江環霞生射蛟臺鴈􅃿逢龍山開罇華堂上命酌頫危䦨主人送瑶爵伹云嘉㑹難豈為杯酒讙樂此罷民安魄淵無恒彩清川有急瀾明晨起􅆖服相望阻重関題周伯寜畫殺機起無象平陸忽成江蒼生既猛􅍑日馭經紛虹舉目墟里間但見蒿與蓬惟有王官谷于今似畫中九日宴盛唐門今日良宴集玉帳設金縣賔􅁛此嘉辰令徳應重乾凄凄秋陽升湛湛江景鮮西馳三澨津東瞻九華山文湍帯粉堞卿雲覆綵㫋清􅁔送銀爵泛此秋花妍嗟予逺征人别家今四年采􅅔夜㱕戍操築朝治垣微此一日􅂬苦辛良可憐中觴感前諜撫運當太平燔柴盛唐郡泛舟摐江前臨川射長蛟雄風推八埏竪儒􅓎􅀙役任重力迺綿武功既無成文徳何由宣徴勲倘有済敢愧魯仲連登太平寺次韻董憲副蕭寺行春望下方城中雲物変凄凉野人篱落通􅏦口賈客㠶檣出漢陽多難漸平堪對酒一罇未盡更焚香慿将使者陽春曲消盡征人鬂上霜三月廿九日郡庠後亭讌盧啓先僉事晨集欵江陼列席當蕙櫋斯亭信􅂋敞翠嶺帯澄川潮駕冝城歩山積司空原青松紛􅀍徑紅桃競發園衆賔起為夀繁轉出嬌絃中觴念逺离􅀊行巳􅄪遷漂萍有時合浮雲未見旋今朝不為樂来㑹知何年􅀉題環秀亭五柤寺宗老来相報黄梅盗已平􅀓聞一峯下还有九江横象構誰􅀎壊香䑓積可成慿詢㡬小刼又復到昆明題溪樓溪水緑悠悠髙樓在溪上日暮望江南舟中采菱唱奉和􅈲南上人喜雨之什􅅩良雖不作詩不妨一􅀚也出車横門道采􅅔皖溪水襍耕不逢年軍士常飢餒奉牲赱羣望悃迫忘汝尓皇皇大司命配天奠南紀方屯啓時澤拯民出頴死雲章変膚寸雨势来不巳睇領三峰深行阡九江起開房各菶菶擢葉方泥泥􅀃郊君牡騑饁野田畯喜未論車箱滿巳見沽酒􅈲斯民既云樂兵甲行可洗赫靈有耿祉夀夭誠在巳􅁋隂無往轍薄伐有㓙理撫事非偶然􅈵薄􅄼致此騁辭継周頌屢豊自天子送康上人徃三城嘗登大龍嶺横槊視四方原野何䔥條白骨紛交横維昔休明日兹城冠荆楊芳郊列華屋文欀􅀍五章乗車衣螭繡貴擬金與張此􅍔誰􅀁為念之五内傷竪儒􅍝乗障永賴天降康摐陽將觧甲皖邑寖開壃耕夫縁南畝士女各在桒念子中林士振筞亦有行我聞三城羙龍嶺在其傍連林積脩阻下有澄湖光明當洗甲兵從子卧石牀七哀殷武誦罙阻周魯􅁔東征聖哲則有然我何敢留行斬牲祀怒時釁􅈜起前旌野布魚䴡陣山鳴鐃吹聲凾関何用塞受降行巳成路逢故鄕人取書􅀉東亰􅀉言東亰友勉樹千載名一身未􅁕惜妻子非無情􅁑編脩輓􅁔景光昔别情何樂今還語向誰幽房通貝􅆣空館􅇢蕪絲未過徐公墓徒懐有道碑扁舟望湖曲消淚濕江蘺􅓸孝女詩王裒廢蓼莪女亦有􅓸娥哭漁奉慈母凄􅈵䕃女蘿幽樷啼􅈍露芳樹罷鸎􅁔迢逓城南路諸姑将謂何賦得鉅野澤送宋顯夫僉事之山南堤上柳沉沉春蒲汎陼禽濟田東滙闊汝水北流深落日依中沚浮雲積太隂㣲茫㸔不盡渾似别時心夜坐和成太常二首叔片月生碣石㣲光桂玉弓秋河空窅窕遥暎建章宫哀鴻知時莭南飛正匆匆感君思親味惻惻此心中牽牛表宫雉華星動綺錢沉沉鳷鵲􅀚悠悠清漏傳無才愧三益虗食念百㕓綿思至申旦莫継瑶華篇送張有恒赴安慶郡經歴曉路通髙嶂春城入大江草生垂釣浦人語讀書緫肅客移茶鼎行田載酒缸幕寮誰得似髙歩絶紛厖宋􅀕酒輓􅁔二首文章知有數耆􅁬忽先零東井開圗晝西山閟爽靈司徒虗執饋太史早栞銘帳望平原繍時時問客星又東閣哀長别南宫闕嗣音相知誰復舊為恨果如今江漢無時返奎文永夜深凄􅋽釣魚地落日下遥隂謝堯章妻輓􅁔草滿章䑓墓松欹石柱廬憶㱕司隷里能誦伏生書夜哭聞茅店春祠􅇎筍爼傷心夫與子塵簡若為舒送李伯寔下苐逺江南已後續増之子不得意南行無怨辭官河人杳杳客路雨絲絲古木淮隂市春城孺子祠悽然十里别為賦小星詩羙浦江鄭氏義門復大􅂐浙東苐一家五字以旌之省風浦江滸慿軾歴髙門借問㞐㡬何九世今不分觧􅆖青松林爱此季與昆檢身事先訓禮度尤恭温生祥亦何用有後天􅀁敦常棣閔叔咸厲階悲婦言一朝或問念䘮敗寕具論清源無濁流芳蘭有競芬摛毫誦勿替勉哉賢子孫大口迎駕和􅀚應奉韻二首晨光開翠崿廣路净炎氛玉䭾度流水華盖爛垂雲既御大宛馬还朝鯷海君都人望旌纛楽㢤􅁔采芹仗出弹筝峽川原彀􅀐分天行粛大化時邁耀前聞整蹕傳清道􅈭吹入行雲日暮望双􅊴草木亦欣欣送王関赴泗州行捕提舉蒼茫呉楚㑹縱横淮坂流春氷未泮渚芳杜巳生洲􅀭旌朱樓前張獵靑山幽獻功效大兕亦􅆀公子裘消揺􅁕為楽何嗟晚不侯待制張廷羙姑阿慶詩葭菼啓望囯灼灼詠桃夭操觚染芳藻短髮未勝翹始聆白雪句兼􅀓黄竹謡蘭萌􅀄映砌春霜巳降霄秋榛覆故隴驚蓬颯􅅆飈金尊與瑶席庶􅁕奉仁嬌雲松棲初日髙楼上􅃃幔對黄山黄山出霄漢爛熳發靑蓮􅂙差非一􅃺朝夕看屢妍九華承双舄敬亭附駢筵漫漫雲罨嶺沉沉松覆泉清焱坐中起如聞帝女絃静有幽事楽動無塵慮牽消揺恱心目兹道可長年靑陽先生文集卷之一
