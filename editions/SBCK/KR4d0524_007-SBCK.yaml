front:
  text: 青陽先生文集卷之七門人淮西郭奎子章輯
  hash: sha256:8af3b0b861f49fcd6690da2df4b556699fb78cad68a9c5c1ae4875f90aeda641
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0524_SBCK_007-1a}
body:
  text: 墓表􅁑徴君墓表君諱聞孫字景先姓􅁑氏累世皆􅀮合肥巢湖之上有少田力耕以爲學至君祖嗣武始􅀘太學生遷桐城縣主簿宋亡遂歸􅀮淮安忠武王録宋官襲泉縣丞辭不受而自放扵詩酒以終父天民亦􅀮徳弗耀君生十九年而􅀌􅀎自䇿厲爲學天性警敏日誦数千言輙終身不忘㞐家孝友待朋友有信義毎旦冠衣詣毋束夫人問起㞐躬眠食飲惟夫人色所􅁒即趋爲之凡物夫人未食即弗御也親􅁬知其然每食親以先以餽君使奉夫人嘗以貧出爲頓文學既而曰此非養志之道也㝷不復仕其後宰相薦君文行可用擢翰林國史院編􅁱官復辭不赴召而教授扵其家諸生不逺齊楚之路皆來從之余嘗謁君湖上升堂拜束夫人君侍側湏髮皓然進几捧觴進退旋辟惟謹爲好言温藉之母夫人年八十餘耳目聦明泄泄然樂也食下始出坐館中爲諸生談先生之道諸生環列􅁱整皆若有得焉者間以親故入城中城中人無少長争􅀱迎謁以不至其家爲耻君與人言無賢不肖率依扵忠孝其語切直初􅀂不可親及徐就之乃甚有味乆而不厭也里中有閗訟官府所不能折者君以一言决之其見重扵鄉如此以故郷大夫有大政與大獄多以詢君君亦通練誠懇問無不言諸大夫隂用之鄉人多􅂪其利此余之所知而郷人未盡知也至正五年毋夫人以夀終扵家予徃吊之君衰􅀴癯然衆以爲君者不勝䘮如此是年冬余還京師而君遂以死矣鳴呼聖人之道猶夭然而一本扵卑近精粗本末無二致也而世或騖扵髙虚􅀂徳合一官行庇一郷者徃徃薄之以爲不足爲君平生不事大言髙論而先生行事皆聖賢之實用其用以教人亦必以此雖不肯出仕以盡其所學而其學之可用盖不待出而後見也其文章平實称其爲人有文集􅀂干卷藏扵家配􅌼氏子男一人楨黄岡縣學教諭女六人皆適士族君之殁以至正五年九月癸巳其塟在十二月癸酉年六十一明年其友余􅆣表其墓曰昔予登第還里中里中長老言朝廷召君時合肥之學甘露降扵松明年又降扵栢占者曰國家養老之祥也君得扵人者如此而得扵天者又如彼非䔍扵孝友積誠而不巳其􅀎然乎郷人之士過君墓者式之張同知墓表澧之兹利有􅀮者曰張君積學厲操居州之雍沙郷雍沙之人称之以爲􅀎孝君䘮父時年始十四即養毋而􅀎敬生事大小自盡身力一不以属毋而務有以樂其心母素多病君自侍側具湯液食飲行坐卧起必自扶掖之而未嘗去左右如此者殆三十年間適市心動亟歸眡毋火發帷家人無在者毋病卧且驚不􅀎起君冐烟熖裭幃撲㓕之㣲君毋㡬不􅀎免毋病甚嘗割股肉以療之夜即焚香􅈼天願以已年益毋壽毋殁哀戚甚躬􅀒􅁟爲墓不以委僮奴人是以謂之孝也良重信之有争訟者不詣公府而詣君取直其里之麀鹿泉者郷人素賴以溉田延祐丙辰夏大旱泉竭衆相與祠其上䘮豚敗鼓卒不能出泉乃水以赱君曰泉閟禾且稿民不知死所矣泉其􅂉者聴孝子乎君為沐浴而􅉨􅂯拜為民請泉出如綫衆讙曰泉至矣君乃又􅄪拜泉沛然如初所溉方數十里之地是年獨得􅀊人益齺然謂君誠孝子也君性介直不阿郷里敬之有撓曲為欺者見君面􅂺發赤其事寡娣有恩義經紀其家事如其家凢細行􅀋此多可書者不書大其孝也君通尚書以授其子兊兊亦􅀶學有文章元統元年貢于礼部中髙䓁授同知茶􅁜州事君以子貴封承事郎英徳州同知聲光􅂋融享有禄飬凡七年以夀終扵家自君之􅃿兊之治民日有政譽轉尹當􅂗公㢘勁毅以治行􅁛徴為翰林􅀦史院編脩官君子曰天與善人孝者善之紀也故孝者必有子今扵君徴之尤信君諱杏孫字子春以至元已即十一月二十一日卒年五十有四以某年某月塟州之懐徳郷永樂村青山谷張氏世為蜀之安岳人曽祖文震宋呉潜榜進士官至知江安縣相圎避亂始􅁶澧自圎而下皆世治儒術然無􅂋者􅂋乃自君始是可表也
