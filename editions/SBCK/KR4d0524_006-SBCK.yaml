front:
  text: 青陽先生文集卷之六門人淮西郭奎子章輯
  hash: sha256:51cb4b7eaf1491e30aa7c2dcae7600fd5c30e25707b8832311923ba7a4d6aac1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0524_SBCK_006-1a}
body:
  text: 銘濟羙堂銘􅀚夫封建之命攸貴􅁚賢考室之詩奥蘄朱芾盖人以人而競家以材而興情之所願孰大扵此濟羙堂者丞相賀公所居之正􅆍也自公之先奕世載徳忠貞以茂功而基業恵愍以厚澤而亢宗名冠庶僚勲配名族故􅀎保其富貴世守兹堂蕭何之第不爲势家所奪晏嬰之廬當守先人之􅁬念兹多懼思貼無窮故取文子之言以爲扁表所以昭先烈示後昆庶幾持􅄹之戒不忘扵侑坐良相之業可續扵箕裘某忝登公之堂知公所以命名之意謹爲銘曰皇慶有極析木之津孰爲林匹作我世臣烈烈賀氏祖孫承徳肅肅崇構奠兹王國厥兹有室爰考斯堂儉不至國質乃逾章前檐翠􅀚後䴡玄武荣並棲鵉制惟旋馬䟽承但嶺閾鏡瑶泉􅔿􅔿文井塵筵惟公先王克濟厥羙其羙維向黄中通理忠貞法相我世皇啓兹陪輔爲時廪京恵愍肯構􅀣立有茂恵農商工澤深仁厚兩公之懿後先相望故㞐不斥䟽爵弥光礼賢扵館䴡族於室廟寕鬯貞庭具鍾食出有旌棨入有圖書龍光載􅃬戚里通車徳及累世至扵今公􅁬庸扵位開誠布公登選㑓良挈彼宇寰隮扵平康天子是君民命是頼敦功盤石垂裔河帶小心寅畏念兹厥􅀄欲其曽玄眠此渠渠百尺之木其本必倍混混源泉其流無既惟忠惟孝爲本爲源勉師元凱相我皇軒青陽縣尹􅀽君功銘并序紅軍起頴六縦掠江淮之南南方之地雄都鉅鎮諸侯王之所封藩臣臬司之所治髙城浚隍長㦸強弩之所守環輙碎之鮮有固其國者青陽小邑也非有山溪之險兵甲之利􅆛貅熊虎之衆以爲之固也昔者行戍過之其邑屋無所燬敗其民安生樂亊無桴鼓之驚其館人具酒肉芻粟迎劳使者無䘮乱窮苦之態如治平時問其所以全則皆其尹􅀽君之功也君􅀄逰太學舉茂才五轉而尹兹邑爲人端敏精強重知人情里俗與其所疾苦而其心一以愛人爲主本民有閗訟􅀙容召逮不数言折之庭中未嘗有留獄也邑有積患吏之所不爲理者悉薅􅌨治一切與之道利之冗吏悍卒不敢入縣門以干其公大家武人不敢肆虐其鄉與其過人其治既巳張矣乃以其睱日作伏羲神農黄帝祠祀之俾民知所本始吉月望日衣􅀷衣角巾拜謁孔子廟退坐講席横經析義進民􅀚聴其左以習知立身行巳之大端扵是上下相率惟君言之爲聴張弛禁止無抑其教者其治如此故民徳之而無畔心及盗入番君即委家野䖏令民爲保伍自守其地而身徃来督㫝之相民之良者收其豪以爲已用其無良而起應者誅磔無遺有盗至率民􅊇􅀾如武夫徤􅀅然其勇如此故民恃之而有競心卒􅀎外捍憑陵内固根本至扵今日休也余出入乱中以􅀚南方之民或盗至而乱或未至而迎降撞搪譎恠有如􅀑蜮豈獨異性人哉由吏政不足以淂民心勇不足以振民氣民興而善者亦莫之􅀎守也使夫天下之吏皆得如君者用之則亦何至如今者之事㦲不幸有之則亦易治不至若是極也今亂而甫定也湖湘之間千里爲虚驛馳十餘日荆􅁄沒人漫不見行跡青陽之民扵是益以君爲有徳扵我也平㞐􅁛謂皆曰我君而不忍名字君邑之故老與其學士願銘貞石薦君功徳垂扵無窮而使儒生程孔昭請辝扵余余故史氏也扵志義無所譲乃爲之銘君名俊字孟敏富州人也辭曰元受天命并臣萬􅀖如山如澤或生蛇龍馮淮逾江殘呉嚙楚信嘯厚兇邑無完者徂兹青陽番人所毗君治有政民亂無階亂民来既俾民爲伍君先以勇衆繕厥武民以爲城治以爲兵大􅀖攸畏小􅀖攸愾相彼亂􅀖裒骨如麻尔父尔子耕稼嘯􅁔亂之所定􅁄生有尔室尔家䆒爲安宅君功在時民亂弗知既克底靖功爲君歸載其肥羜及其㫖酒祝君無歸亦戒難老念之謂之易由􅂌之至扵孫子懐允無止南山之華其媺如英嫓扵君功民􅀃無􅆠勉學齋銘爲汪民作飛黄之疾一日千里駑馬弗輟十駕可至聖源扵學不以其才􅂉利而勉殊􅂗同歸人十已千人一巳百孰云余愚而聖可作行百里者其半九十十里弗勉不入扵室尔祖好􅁱厥有令名勉兹學者聿􅀚其成鎦府君墓銘元至元戊寅八月十六日鄱鎦君殁既塟而天下兵亂不克立竭墓左今海宇晏夷冢子昺始刻銘以昭厥志君諱斗鳯字友梧毋李夢鳯翥北斗間而生故名君踈髥偉度倜儻􅀒竒氣嘗攻舉子業屡試不利監郡馬公某舉茂材部使者主公都中賢之復交薦授集慶句容校官既而慨然曰大丈夫坐廟堂佐天子出號令以保丈庶民不然仗節出萬里外氣懾夷狄耳奈何棲棲服章逢郷井耶逐絶江渡淮遡河濟過齊魯之􅀖遨逰燕趙間週迴秦漢故都南還呉楚登髙酌酒弟古豪傑遺跡􅀤為謌詩皆磊落魁竒當時虞文靖公集揭文安公奚斯札部􅀰中具公師道皆咸交君愛其材雄贍争言扵中書擢應奉翰林文字未上而卒年三十二以卒之年十月十五日塟鄱義城東潘超之源遺詩文若干卷燬扵兵父諱環岫字傑夫两浙塩運提舉大父安朝宋國子生君家世簮纓光奕史牒宋贈檢校太尉中書令左僕射封頴川王浩八世祖也君克継詩書有志弗􅀗􅂋庸惜哉配朱生昺昱爕三男子昱爕亦夭昺復業儒文聲動縉紳間銘曰猗鳯鳥昧靈兆壽􅂚少氣則浩跖而老顔而夭匪天道􅀆
