body:
  text: 序送歸彦温赴河西㢘使序河西本匈奴昆耶休屠王之地三代之時不通於中國漢始取而有之置五郡其間自李唐以來拓跋氏乃王其地號為西夏至於遼宋日事戰伐故其民多武勇而少文理然以予觀之予家合淝合淝之戍一軍皆夏人人面多黎黒善騎射有長身至八九尺者其性大抵質直而上義平居相與雖異姓如親姻凡有所得雖簞食豆羮不以自私必召其朋友朋友之間有無相共有餘即以與人無即以取諸人亦不少以屬意百斛之粟數千百緍之錢可一語而致具也歲時往來以相勞問少長相坐以齒不以爵獻夀拜舞上下之情怡然相讙醉即相與道其鄉鄰親戚各相持涕泣以為常予初以為此異鄉相親乃爾及以問夏人凡國中之俗莫不皆然其異姓之人乃如此則其親姻可知矣宜其民皆親上死長而以彈丸黑子之地抗二大國傳世五六百年而後亡非偶然也自數十年來吾夏人之居合淝者老者皆已亡少者皆已長其習日以異其俗日不同少貴長賤則少傲其長兄强弟弱則兄棄其弟臨小利害不翅毫髮則親戚相賊害如仇讐予猶疑江淮之土薄而人之生長於此者亦因以變及以問夏人凡國中之俗今亦莫不皆然其於親姻如此則異姓之人可知也夫夏小國也際時分裂而用武必不能篤於所教而區區遐方教之亦未必合於先王之法及國家受天命一海内收其兵甲而摩以仁柔養之以學校而誘之以利禄今百餘年於兹絃誦之聲内自京師逹於海徼其教亦云至矣而俗迺日降如此吾不知其何説也我祖宗之置肅政亷訪司於天下大要以風俗為先而其職以學校為重故世謂之風憲是得先王為治之意也故嘗選任尊官非道徳爵位出乎庶僚者不得與是選所以為民表也今皇帝用嵬名公為御史大夫公乃歴選朝著盡拔諸名臣為亷訪使而吾歸君彦温以樞宻院判官而為河西君少擢科目能古文辭有大節由國子博士五轉而遷是官今為亷使於夏必能興學施教以澤吾夏人吾夏人聞朝廷以儒臣為尊官以蒞巳必能勸於學以服君之化風俗必當丕變以復於古其異姓相與如親姻如國初時如余所云者矣故道吾夏之俗以望吾歸君焉送月彦明經歴赴行都水監序中國之水賴禹治之而悉平而河獨為患至今未已者何也河失禹之道而治河者不以禹之所治治之也蓋河出崑崙合諸戎之水東流以入中國其性勁悍若人性之有強力其來也甚逺而其注中國也為甚下又若建瓴水於峻宇之上則其所難治也固宜且中原之地平曠夷衍無洞庭彭蠡以為之滙故河嘗横潰為患其勢非多為之委以殺其流未可以力勝也故禹之治河自大伾而下則析為二渠大陸而下則播為九河然後其委多河之大有所瀉而其力有所分而患可平也此禹治河之道也自周定時河始南徙訖於漢而禹之故道失矣故西京時其受患特甚雖以武帝之才乘文景富庶之業而一瓠子之微終不能塞而付之無可奈何而後已自瓠子再决而其流為屯氏諸河其後河入千乘而徳棣之河又播為八漢人指以為太史馬頰河者是其委多河之大有所瀉而力有所分大抵偶合於禹所治河者由是而訖東都至唐河不為患者千數百年或者以謂王景隄防之力乃大不然使無屯氏及徳棣諸河河之大無所瀉而力無所分景以尋丈之防而捍猶螳螂之臂而可以捍大車之奔吾不信也惟河之委既多大有所瀉而力又有所分景之隄防特以捍漸水之衍溢者耳比趙宋時河又南决至於南渡乃由彭城合汴泗東南以入淮而漢之故道又失以河之大且力惟一淮以為之委無以瀉而分之故今之河患與武帝無異余嘗以為中國之地西南髙而東北下故水至中國而入海者一皆趨於東北古河自龍門即穿西山踵趾而入大陸地之最下者也然河天下之濁水也凡水一石率泥數斗嘗道出梁宋觀河所决凡水之所被比其去即穹居大木盡没地中漫不見踪跡河之行於地也方數千年而河徙千乘自漢而後千數百年而河徙彭城然南方之地本髙於北故河之南徙也難而其北徙也易自宋南渡至今殆二百年而河旋北迺其勢然非有他説也比者河北破金堤踰豐沛曹鄆諸郡大受其害天子哀民之墊溺迺疏柳河欲引之南工不就又遣平章政事嵬名公御史中丞李公及禮部尚書台哈布哈公沈兩珪有邸及白馬而祀之河之患不已乃會諸老臣集議治河者諸老臣無能言其説獨尚書台哈布哈公以為當濬河棄道復引河以入彭城而待制楊梓义力以為棄道不可濬設使濬之而河未必能入廟堂無所從遣都水使者相其便害或者以為當築隄起曹南訖嘉祥東西三百里以障河之北流則漸可圖以導之使南廟堂從之迺置都水分監以任其事選朝臣之知水者為都水而吾同年月君彦明為元幕將行以問於余余不知河事者雖然諺有之曰不習為吏眡已成事以事已成者為君言則古所以治河者可見也今河惟不反故道則其勢可障而排之使南使反於故道由漢之千乘以入海則國家將無水患千餘年如東都與唐之時乎今禹之九河既不可復考而河亦不復徳棣之間漢人指以為太史馬頰河者尚未泯可尋究如縷河之道是將大有所瀉而力有所分非若一淮之小而扼其勢而使之横潰為吾民害也今夫廟堂之議非以南為壑也其慮以為河之北則會通之漕廢其係於朝廷甚重余則以為河北而會通之漕不廢何也漕以汶而不可以河也河北則汶自彭城以下必微微則吾有制而相之亦可以舟以漕書所謂浮于汶逹于河者是也余特欲防鉅野而使河不妄行俟河復千乘然後相水之宜而脩治之特一人之私言也朝廷方事隄防固無事此迺以彦明言者似迂逺而不切也萬一隄防不足以禦河則余之言或有時而驗焉故為之叙送樊時中赴都水庸田使序國家置都水庸田使於江南本以為民而賦税為之後往年使者昧於本末之義民嘗以旱告率拒之不受而盡征其租入比又以水告復逮繫告者而以為姦治之其心以為官為都水而民有水旱之患如我何於是吳越之人咻然相譁以為厲已會天子問民所苦迺以為民實水非姦遂劾逐使者破械縱民而以聞上朝議乃歴選公卿有學術知大體者為之使而吾樊君時中以江南湖北道肅政㢘訪使而選是職自君之來官僚協和吏畏民服政以大行命下之日無不相視嗟咨以惜其去獨其友余闕躍然曰東南民力自前已謂之竭矣况今三百餘年昔之盛者衰登者耗今其貧者力作以苟生富者悉力以供賦有持其産為酒食予人人皆望而去之其窮而無告甚於前世益逺矣其可重困之今而得賢使者以蒞之修其溝澮相其作息不幸而有水旱之災則哀矜而為之所民之窮者其少瘳矣乎今夫木之實繁者其枝披其本疏者其幹抜况於國與民乎哉故善樹木者簡其實而厚其本善為國者疏其賦而厚其民理之較然者也時中慷慨有大志臨大事果毅不擇利害而為之今其行也其能有以大慰吳越之民望以副朝廷之倚注也必矣二月初吉式發鄂城卉木繁盛賓僚具在各為詩以稱美之予故首序焉送范立中赴襄陽詩序宋高宗南遷合淝遂為邊地守臣多以武人為之九十餘年間未嘗一歲無兵革故民之豪傑者皆去而為將校累功多至節制郡中衣冠之族惟范氏商氏葛氏三家而已三家之在當時貴不過通判顯者或至知縣與府族亦未甚大也皇元受命包裹兵革休養元元民既富庶矣而又修禮樂定治具諸武臣之子弟無所用其能多伏匿而不出春秋月朔郡太守有事於學衣深衣戴烏角巾執籩豆罍爵唱贊道引者皆三家之子孫也故其材皆有所成就至學校官纍纍有焉當宋季時諸武臣之富貴眂三家蔑如也而百餘年之後惟儒家子入為弟子出為人師隨其才之大小皆有聞於時雖天道忌滿惡盈而儒者之澤深且逺從古然也范氏世多聞人立中尤通敏由郡直學為襄陽教諭宋亡時蜀流寓之士多在江漢意必有老成典型人也有老成典型人與之遊立中此行將大有得范氏之後有大顯者必立中也於其行也書以贈之李克復總管赴贑州詩序仁皇帝即位録懷來功致髙位者無慮數十百人獨韓國李公以甘盤之舊為最顯位平章總百度君臣一徳銳精治古而韓公相業見稱於天下後世者設科取士其最也元統初余忝論薦計偕如京師與諸同年求韓公子孫得今伯徴太常相往來又識克復屯田於京師比來佐泗州而君復為泗州屯田提舉日與君處念天下士所以復見前代賓興之盛者由韓公士不及見韓公見屯田不其猶見韓公乎且與太常同年辱使納禮故以太常之事君者事君朔月歲時必從諸僚友造君第君暇亦輕裘緩帶以一小吏持馬過我我必為之傾蓋而後去君色嚴而氣和有學而知體坐終日屹然於先朝人物故實無不熟而知聴其言亹亹如環之無端坐客無能置一辭也去年秋既書滿宰相以君有門閥且久更事非散地所宜處奏為贑州路總管州之長貳及諸屯田與九州之人往賀君闕在次舉琖拜君言曰仁皇帝之文徳入人也深天下不忘仁皇帝必及於韓公朝廷録勲舊家首言君斯文之興可俟矣請以為天下賀又曰韓公能以道術昌其家君兄弟能保功名以有光於韓公致中二千石請以賀君又言江之西文教之盛者曰吉曰贑多士彬彬焉人之所以厲於學科目之興也於韓公之始而厲於學獨不於韓公之季以治哉贑雖號難治君處之余知其為易也請以賀於是程泗州賦詩四韻坐客人士皆為詩以道其行使書吾說以為引楊君顯民詩集序我國初有金宋天下之人惟才是用之無所專主然用儒者為居多也自至元以下始浸用吏雖執政大臣亦以吏為之由是中州小民麤識字能治文書者得入臺閣共筆劄累日積月皆可以致通顯而中州之士見用者遂浸寡况南方之地逺士多不能自至於京師其抱材藴者又往往不屑為吏故其見用者尤寡也及其久也則南北之士亦自町畦以相訾甚若晉之與秦不可與同中國故夫南方之士微矣延祐中仁皇初設科目亦有所不屑而甘自没溺於山林之間者不可勝道是可惜也夫士惟不得用於世則多致力於文字之間以為不朽而文辭者有幸有不幸者不幸者至於老而無所用矣而其文又遂泯不顯是可哀也比年大江之南山林之士有挾其文藝遊上國而遇知於當世士之彈冠而起者相踵京師大官之家皆有其客而遇知於當世者亦比比有之若豫章楊顯民者抱其才藴不屑於科目甘自没溺於山林之間當士羣起而有遇之時而又終不肯一出以干時取譽是其中必有所負而然也予雖不識顯民然聞其人力學而操行通古今之務江南之士漸其澤而有名者甚衆其弟子之登科目仕州縣者亦能以政稱其家固貧而年又將老迺日蕭然吟咏以自樂無少怨怒不平之氣其殆古有道之士耶余讀而愛之其弟子凃頴持其所謂水北小房集者來京師將刻之以傳於世余為題其首使後知顯民南州之士有所負者也是蓋有道之士也貢泰父文集序余天性素迂常力矯治之然終不能入繩墨矯治或甚則遂病不能勝因思以為迂者亦聖賢以為美徳遂任之一切從其所樂常行四方必迂者然後心愛之而與之合凡捷機變者雖强與之然心終不樂也故暫合而輙去京師馳逐聲譽之區也迂非所宜有嘗隂以求之士大夫之間得一人焉曰貢泰父泰父故學士仲章君之子能詩文少游太學有時名因自貴重不妄為進取有所不可交者亦不妄與交故吾二人者驩然相得若魚之泳於江獸之走於林也時泰父為應奉翰林文字固多暇者即與聚盍有蔬一品魚一盤飲酒三行或五行即相與賦詩論文凡經史詞章古今上下治亂賢否圖書彞器無不言者意少適即聯鑣過市㨿鞍談謔信其所如而止及暮無所止則相與問曰將何之皆曰無所之也乃各策馬還自古暨今王公貴人能求賢常少然自至元初姦回執政乃大惡儒者因説當國者罷科舉擯儒士其後公卿相師皆以為常然而小夫賤𨽻亦皆以儒為嗤詆當是時士大夫有欲進取立功名者皆强顔色昏旦往候於門媚説以妾婢始得尺寸此正迂者之所不能為也因翺翔自放無所求於人已而皆無所遇予既歸淮南泰父亦以親嫌辭官歸除紹興推官不相見者為最久去年大原賀君為丞相蒐羅天下人才之有政譽者而泰父之治為浙東西第一迺得復召為應奉余適入朝為待制相見益歡計其别十年矣吾年少於泰父鬚髮皆白而泰父鋭然靣紅白如常出其别後所為詩文甚富且大進益知泰父真豪士也夫以士之賢無所遇而淹於下僚宜其悲憤無聊而不能盡也顧乃自樹卓卓以其餘力而致勤於文學且其貌充然非其中有所負蓋不能爾然則吾泰父之迂又過我逺矣夫古之賢士多不兼於文藝文藝雖卑而世且貴而傳之者愛其人故也不賢者之於文藝雖極其精人猶將賤之亦何以為也泰父忠孝人也其功名事業當不待文與詩而傳而况於兼有之耶余昔與之别今見其文如此今又當别去計相見時其文又必有過此矣於其行也序而識之送葛元哲序文者物之成章者也在天而為三辰在地而為川岳其在於人若堯舜之治化孔孟之道徳仲由之政冉求之藝一皆謂之文今特以言辭之精為文者夫言之精莫精於周公孔子二聖人之於言豈有求其精而然哉而其文何若是其蔚也揚雄司馬相如韓子歐陽子始號為工於文者彼其於周公孔子之文非不欲窮日夜之力極一世之所好孜孜焉追琢磨礪以求其精而卒不能至焉濂溪二程夫子之學其視揚雄司馬相如韓子歐陽子蓋有所不暇然味其言淵然而深雄然而厚睟然而醇使得列於聖門雖顔子曾子將不能過則夫言之精者又若不待窮日夜之力極一世之所好孜孜焉追琢磨礪以求至於聖人而後已此無他聖賢道徳之光積中而發外故其言不期其精而自精譬猶天地之化雨露之潤物之魂魄以生葩華毛羽極人之智巧所不能為亦自然耳故學於聖人之道則得聖人之言學於聖人之言則非惟不得其道幷所謂言胥不能至矣金谿葛元哲舊以文章名江南既擢第其文又傳於京師衆謂元哲之文宜為天子粉飾太平鋪張鴻業以傳於後世會有守宰之選遂以為興化録事余知元哲終以文選非久於外者也於其别也故與之論文送許具瞻序余讀周易之謙未嘗不掩卷而歎曰聖人待小人之心一何如是其至也夫陽君子也隂小人也小人盛則干君子故隂至三則履君子盛亦未嘗不下小人故陽至三則謙謙虛也陽本實而云虛者不自滿假故屈而下於隂也是謙以下為徳者也初而謙謙下而又下者也二則浸以上矣故以鳴謙鳴者以言謙也三則益上而位髙故以勞謙勞者以功謙者也以功而謙厚之至也厚之至而民焉有不服者乎故三之辭曰勞謙君子有終謙而民既服君子之道終矣謙既終民既服進而之四何施而不可聖人之心猶以為吾之待小人者未之厚也又自反而撝謙故四之辭曰無不利撝謙其徳已厚其謙已撝進而之五而小人者之終不可以化入也於是乎有侵伐之師故五之辭曰不富以其隣利用侵伐不富以鄰徳之盛也利用侵伐順之至也聖人之待小人至是可謂盡心焉耳矣昔者禹征有苗苗民逆命益之賛禹惟在於謙禹遂有舞干之舉此其所謂撝謙也謙猶撝而未格則其侵伐者禹終得而已乎哉祖宗受命迅掃六合以有堯舜所未有之天下聖天子紹承熙洽愛民猶子堯舜之仁不是過也頃者盜起海隅剽民財犯官漕其罪可誅而區區赤子又特一將校之力所能舉迺不以為罪止於招諭盜又止我省臣以求降此尤可誅也而亦從其請且曰徳不下宣此吏之罪遂盡變易瀕海之為宣慰及其郡縣之官選能當其任者得三十八人親御便殿給符傳而諭遣之嗚呼此所謂無不利撝謙而禹之所以待苗民者也三十八人之中天台許君具瞻當治鄞具瞻佘同年進士也其行端潔其材勇以幹前知武義時攝金華縣事武義之民羣訴憲府請還君金華之民亦羣訴於憲府留君不欲其去其得民如此可謂稱兹選矣故余為道聖天子愛民之深與夫所用具瞻者如此非惟勉具瞻亦以告夫民也贈刑部掾史劉彦通使還京序舒岸大江為城北走英頴南亘畨歙西通黄蘄湘漢鄂岳東距鳩巢所謂四通八逹之地也自兵興所在從亂舒介其間而獨徇義秉節不與之共戴天故羣盜環攻之舒亦不少屈撓日治矟㦸弓矢以與之相格鬬盗大至則男操兵婦給餉童子負瓦石空巷乘城與之決戰如是者今五年其勞如此故其富者日貧而貧者日死以耗入其市㕓里蕭然適其野榛莽没人不見行跡至其館簠簋不治餼牽不具委積不充使者之道此怒而去者往往有焉其以公事來者多眂賂以為喜愠喜為春温愠為秋凜或怒而去則民相與踧踖曰禍其始此耳不甘食安處者累月而未寧逮無事迺已浚儀劉君彦通為秋官掾亦以事來居郡浮圖每食蔬一器飯一盂饋之珍羞則辭賮之財則艴然以怒持節至軍中勇者執手以勉之創者涕泣以勞之其居此特久而民愛之如始至惟恐其去已也傳曰有功而見之則説也君重其民情而閔其勞民之説也亦其宜也臨川毛順孫愛君尤至與士大夫賦詩以美之余故處合淝知君為掾亷而有能以為士之美君者非譽也故序而冠諸其首髙士方壺子歸信州序堯舜之時以幽幷為朔易元興舉堯舜未有之天下而一之而幽并始為土中以為四方之極然其地去荆揚數千里而氣苦寒而多風非其土著至則手皸而足裂其居處服食異用絺葛果茗魚鱐之物不能以易致皆性之所不便故南方之人其至者恒少非為名與利無從而至焉又况浮圖老子之徒以遺外世俗為道其於名與利蓋有所不屑故其至者尤少或至焉者則亦名利之人也髙士方壺子至正中至自信州余始遇之以為名利之人也徐與往來見其氣洎然其貌充然人與之談當世之事則俛而不答獨其性好畫人以禮求之始為出其一二皆蕭散非世人所能及嘗為余言太行者天下之脊而居庸古北者天下之岩險也其雄傑竒麗非江南之所有天府之藏王公鉅人之所有皆古之名畫余所願見者今皆見之而有以慊吾志充吾之所操吾非若世俗者區區而至也余曰賢哉方壺其古所謂善操技者與夫輪扁之為斵知斵之為美不知有王公之貴知斵之為得不知有晉楚之富故其為技也古今之善斵者莫加焉今子幾於是矣其有不臻於古者耶吾黨之學者苟遷於物其尚能望子耶於其行也相率為詩以贈之聚魁堂詩序安慶郡文學秦宗徳持其友人豫章嚴撰書來請曰去年丙申江西行中書之鄉試也臨江貢士有曾魯者偕其友廬陵解蒙髙飛鳯劉倩玉俱就試寓止同舍往還復同舟而載拆號四人者俱在甲乙選列捷報至髙與劉解乃留魯家鄉人因名曾氏之館曰聚魁堂云僕與魯姻婭也復率大夫士之能文辭者賦詩美之謂宗徳常獲私於公書來請序願勿辭將以為榮焉余曰科目取士吾嘗司文衡於中外矣退而攷其所得父子同榜者有之兄弟聯名者有之師生俱在選者有之若同志同升鮮有聞如曾魯者也其理似不偶然豈有數存其間耶然不足泥也余惟愛魯之交友得人而人之與魯交能登科目發身也由此而升以行道以致君以澤民將無不可吾意四方者亦當彈冠相慶矣則親朋賦詩以志喜也固宜宗徳曰斯言甚善請書以為序送李宗泰序淮東南西北道之地其民忠而能守國者三郡曰廬夀舒自盗興夀守先治戰備與民為守至輙敗然不能保其近地民無耕收而長淮之餉道义絶以致父子相食而後潰廬大郡其南沮澤之地大而有名者三十六俗名之曰圍地廣而足耕而守與將才下余嘗識之凡其日之所營夜之所思非宴樂之事則掊克之政也民有持耒耜於門者則曰召使奪而辱之民飢以死城大而不能守乃斂四境鄉兵以守之又無以食以賦富者大都剽吏殺人而莫之禁至以其兵去之城遂陷余至舒時國門之外數十里之地皆盗柵也幸戰而勝乃為攘剔旁近之地令民耕之築壘以䕶其作役其不能耕者時節與之繕城隍修矛㦸而又明其政刑平其賦斂治其爭訟朞月而頗張今民之勇者無敢譁弱者無所悵如承平時然惟教民之術有未治耳方將與學士修其庠舍共講唐虞治道天人性命之説則禍亂有不足定者若姑孰李宗泰志學而行端义吾所當延而禮之者也而力不足宗泰族人陷在姑孰者聞多自抜於宣將往來之又義之所不敢止者姑序吾懷而與之别藏乘法疏後序天下之書博者未嘗無要法五聲十二管可以盡天下之音聲十干十二支可以盡天下之甲子象形指事轉註諧聲會意假借可以盡天下之文字其統之有宗其會之有元充之而不窮合之而不遺知者創物其有功於世類如此佛氏有法疏書會萃名義而藏十二部之理無不在誠要法也西菴遂公罷講遊方二十年歸乃取而修訂之補其所未備白其所未明去其所未安明性相析機宜刋定名體目曰藏乘法疏濡須有道之士文公無學以衣資若干貫刻之板以惠四方昔卲子皇極經世以元會運世衍為十二萬九千六百年以盡事物無窮之變其文博其義富蔡西山撮其機括為指要一編其有功於卲子大矣遂公之書是亦大藏之指要與余讀傳燈婆子請趙州轉經繞禪床一帀云轉經已婆云只轉得半藏半藏全藏姑置勿問五千四十八卷一周行頃何為而轉之此又西菴不傳之妙因書之卷末在學者所自得青陽集卷二欽定四庫全書青陽集卷三元余闕撰記含章亭記坤者天下之至文而世謂坤為含章者美而含之六三之事非盡坤之道也嘗觀於地山川之流峙至文也風霆之流形至文也鳥獸草木之彚生至文也故夫子贊之以為光大又以為化光又以為美在其中暢於四肢天下之文孰加焉而三獨含章何謂也夫乾尊道也坤卑道也故乾主於五而坤主於二若三四者爻之無位者也乾之四近於尊故曰或躍或可以進也坤之三近乎卑故曰含章可貞可晦而可用也夫子釋含章可貞以為以時發者相時而動之意故曰可者僅詞也若四近於尊而括囊矣上儗於尊則龍戰矣是故龍君象也若六五者可謂至尊而非據矣自非中徳何以能吉故曰黄裳黄中之色裳下之服夫惟有是中徳故不失其體也無棣徐君子謙博古而通今自監察御史郎官署為諸道肅政亷訪使者政理蔚然俱可謂之文矣惟坤之六二可以當之非六三之事而其名亭謂之含章者人不知其所云也余與君處江夏凡期年知君之為人沖然賢者也曾子稱顔子以為以能問於不能以多問於寡有若無實若虛君嘗慕而師之羣居相與不言不知其有藴也然則君所謂含章者其必以此豈世所謂斷章取義者歟君曰子之言然雖然子論含章先儒所云請求諸通經者而質之穰縣學記學校之教聖人所以盡人性者也夫人之性天命也天命者諸生徧予者也其理仁義禮智其器君臣父子夫婦長㓜朋友其文昏喪冠祭朝覲會同射飲軍蒐此性之體然也若夫忠信也而流為殘賊禮讓也而流為爭奪文理也而流為淫慝此性之失而非其本然者也聖人人之綦隆也是故為之學校之教師法之化禮義之道所以正人心而定天命也而世儒之言有曰殘賊爭奪淫慝者性也必賴聖人為之教然後忠信禮讓文理興而生人之道立是不知性者之言也今夫鳥之鷇也飛而逐其雌獸之生也走而軼其羣然止於飛走而已也惟人之性其天命者也是故充其知可以通晝夜之道而知死生之説推其才可以參天地而贊化育何也所性而有故也今曰性無善也必聖人為之教而後善則敺鳥獸以由于學校之教師法之化禮義之道亦可以為忠信禮讓之理也其可乎是故桮棬棟宇聖人所以盡木之性也引重致逺聖人所以盡馬牛之性也學校之教師法之化禮義之道聖人所以盡人之性也其教已立其化以行其道以成之後於是忠信立而殘賊息禮讓著而爭奪寡文理明而淫慝平其動之也神其漸之也深則夫民之心可與為善可與為惡可與為治可與為亂夫豈奪之以惡而與之以善易之以亂而誘之以治使其民至於如是哉亦盡其性而已矣有弗若於吾化弗迪於吾道者然後為之刑政以齊之則刑政者先王所以輔治而未嘗以為先也是故教成而王政成而霸咸無焉而亡其道有大小而其教有淺深如此自先王之迹息而天下之治皆苟且由其知治而不知教而其甚者遂至亂亡相尋終莫能勝民之棼棼者皆不考乎此大元之興百有餘年列聖丕承日務興學以為教黨庠塾序徧於中國雖成周之盛將不是過夫穰大縣也自入職方以距于今吏猶未能為民立學蒙古伊嚕布哈君來監縣乃曰學校之教先王為治本也遂出其田禄以為民倡民歡樂之乃買地於州治之西攻其正位肖孔子及顔子以下十四人之像於殿餘七十二子以及諸儒之從祀者悉繪之於兩序後為學舍廩厝以安居其師弟子前闢門道屬於大衢立表而題其上曰穰縣之學學甫成會天子以學校考吏課君方樂有學校教民也而乃以憂去其同年友成君遵寔家於穰入朝為禮部郎中言君所以待穰之民甚厚而篤於教思如此故既去而民至今思之而恐後之未知所以教而民未知所以學也為予誦其所聞以告之君操行廉白為政以愛民為本日常偲偲然若已傷之是可謂良有司也况予於君亦同年也故為記之湘隂州鎮湘橋記湘水出零陵北至湘隂入洞庭而湘隂諸山谷之水則會於城南為東湖以入湘方春夏時水潦降而洞庭漲則湘水不能入湖因以湠漫為大浸州為湖南北孔道凡行者之陸出與夫鄉民之有事於州者每涉湖則有風濤之虞否則又為舟人還阻之患宋之時州有鄧氏媪率其田人作大堤絶湖以屬之州為二木橋以釃湖水行者徳之謂之鄧婆橋當徳祐末橋毁官為復之至大徳中旋敝州人黄仲規乃以私財命其子惟敬率衆為石橋南北楗石為崖中纍石為髙柱布木靣石其上為屋九楹覆之以與民為㕓易其名曰鎮湘橋歴四十餘年至元初覆木又敝屋且壞惟敬之弟惟賢惟徳徳發其帑得錢萬貫以告州人將卒其先之功州人樂為相之又得錢二萬五千貫乃撤覆木施石梁更作大屋中為道左右為市肆橋廣若干尺袤若干尺上可以任大車下可以通千斛舟飾以綵繪逺而望之爛若隂虹之飲湖中行者之􅉨來與州人之市於此者若由康莊而履堂奥不知其有湖之阻也夫水天下之至險聖人為之舟楫以濟民而舟楫需人之力人之力有限而涉者之無窮也不須人而能濟有無窮之利者惟橋為然夫橋之利大故其費亦大非若一舟楫之可易具非有司與大家之力則不能為黄氏非有大作業大廩藏而為有司大家之事力有不足至父子相承乃克成此夫亦難能也惟徳之子天禧有才藻通經術屢領鄉薦余校藝鄂渚時得其文以置前列其擢第也將亦易然黄氏有子如此必多益於人如是橋類也故為記之漢陽府大成樂記禮樂出於天而備於人卑髙以陳者禮也絪緼而化者樂也故禮者天地之大節樂者天地之大和其體極乎天蟠乎地其用行乎隂陽而通乎鬼神夫人者天地隂陽鬼神之會而禮樂者觀㑹通以行其道也其君臣上下賓主之有其文升降揖讓綴兆清濁之有其度禮以著節樂以為和節以别同和以合異是皆天之所畀而非人之所為也然心天命也欲心生也欲熾而無以治之則心梏亡矣禮樂者先王用之以迪民心而定天命者也是故朝覲會同禮樂以接郊社廟享禮樂以成軍旅賓客禮樂以治用之於天神格用之於人鬼享用之於民而民事治故習俗美而侵侮蕩淫之心無自而生天下之大政豈有出於此者哉洪荒之道邈矣堯舜以還歴夏商周禮樂始備而天下稱為極治成康之後浸以就弛至春秋而壞爛極矣漢之時禮雖麤具於經而亡散者亦已甚樂之道蕩然雅頌所存特其文而已耳是故其禮失者其俗汙其樂濫者其教衰天下之治所以不及於三代者禮樂不足之故也皇元之興諸事未遑即定著孔子廟祀之禮既又令天下廟祀用大成樂令雖具而吏亦鮮能應詔制春秋奠薦類以鼔吹行事夫禮樂者以之習民使之飽聞而飫見之然後入人深而成功大孔子廟者鄉大夫屬民敷教之地而民幸有禮可以畧見先王之道而樂又不備由吏之為政不知本末與所先後也如此漢陽府孔子廟祀舊亦循用俗樂河東譚君知府事乃率其同寅相與出俸金作雅樂器教授余時獻以其事來請宰臣是之為遣一封傳作之平江數月而樂至為琴瑟笙笛塤篪各二特鐘特磬柷敔鞉鼔各一簫八編鐘磬各十六擇諸生肄習之八月丁丑有事於學宫人聲在上樂奏在下翕如純如疾舒以度禮儀既舉觀者咸作而歎曰禮樂之用大矣若夫子監於四代樂取韶舞其治所先在放鄭聲欽若彞教以迪民性夫禮樂之存有如餼羊薦于明靈永永是享於是州之士相與樂譚君之政而喜民復見先王之樂也咸願刻石樹之廟廷余為之書而使歸刻焉新修大寧宫記華西神川原大寧宫者華人以為古后土之祠也宫故並嶽祠宋真宗幸華山賜今額以華山道士武元亨主之其後元亨以祠隘請於朝改作之於神川之上宫初甚侈大至靖康時兵燬里中人嘗修復之然庳隘不能如舊觀金正大中乃加增拓下距於今二百有餘年故屋皆壞無能修葺之者里人張某欲以私力加繕治之未及為而殁其子某乃追成先志以錢二萬五千貫具材木瓴甓會工藝自門至寢為屋若干楹凡期月而成左氏曰共工氏之子曰勾龍能平水土為后土之官故祀以為后土盧植諸儒從之遂以為后土勾龍也蔡邕則曰勾龍社神也堯祠之稷之神柱與棄也漢后土祠在國壬地社稷之位在未地為王肅之説者又曰社與稷皆土神但生育之功異故有二名耳史記武帝初郊雍太史祠官言當祀后土於方澤立為五壇壇一黄犢太牢具天子從之乃東立后土祠於汾隂脽上親望拜之如郊則漢以下地祗有社又有后土后土之説紛紛莫能統一以余考之皆失也鄭司農曰后土社神也蓋社以地言后土以神言社之有后土猶郊之有上帝也曰帝曰后皆能宰之稱天子之社神曰后土諸侯而下之社神亦曰后土者猶郊之神曰上帝而五方主氣者亦謂之帝不以嫌也五土之神吐生萬物而稷者五穀之長也人非土不生非榖不養是以先王尊而祀之勾龍有功於水土柱與棄有功於稼穡故以配食其神曰祀勾龍以為后土者猶所謂禘嚳而郊稷是也又周禮以血祭祭社稷五嶽其以血祭則非人鬼且其祀先五嶽則不得為勾龍亦明也古之制天子祭天地諸侯祭山川大夫祭五祀位有貴賤故祀有大小而后土之祀自天子逹於庶人所以生者一也王者為羣姓立社曰大社自立社曰王社諸侯為百姓立社曰國社自立社曰侯社大夫以下成羣立社曰置社大社國社為民祈報也王社侯社自為祈報也大夫以下無民人莫為立社又不得自立社故與民族居百姓之上乃立社以祈報之今國都至於郡縣皆有社獨置社亡耳民春秋雖有社祭然無壇壝主位牲齊儀章皆不應於禮其踵事而生者益甚莫為之禁夫不祀其所得祀非義也祀其所不得祀非禮也后土者民之所得祀者也今雖不能應於禮能修而祀之其賢於失禮而犯義者也余之同年光禄主事虎理翰君家於華義張氏之斯舉也而屬記於余焉梯雲莊記晉地土厚而氣深田凡一歲三藝而三熟少施以糞力恒可以不竭引汾水而溉歲可以無旱其地之上者畝可以食十人民又勤生力業當耕之時虛里無閒人野樹禾牆下樹桑庭有隙地即以樹菜茹麻枲無尺寸廢者故其民皆足於衣食無甚貧乏家皆安於田里無外慕之好間有豪傑欲出而仕由他岐皆可以得官爵故其為俗特不尚儒周行郡邑之間環數百里數百家之聚無有一人儒衣冠者獨楊黄許氏以儒稱於鄉三時力田一時為學褒衣博帶出入里巷之間其族數十家化之皆敦於禮每歲時上塚族人各具酒饌羣至墓下推長者一人主祀以次奠薦既竣長者坐少者以序羅拜之然後皆坐相與行獻酬之禮子弟有為小不善者則長者進而誚讓之衆皆進曰長者言然請改是乃已至於再至於三而終不能改也則衆相與擯絀之不與同祭祀如是者已三世矣嘗詢其族人許氏之祖有義甫君者攻詞賦有聲於時其弟恒甫君治經義通周易號松谿先生然皆隠不仕恒甫之仲子克敬始以教官歴太常奉禮翰林國史院編修官而孫寅字可賓與余同登元統元年進士第擢翰林國史院檢閱官中書掾中書照磨名聲益顯楊黄之許遂為其鄉著姓郡守為表其邑中之居曰梯雲坊其後河東僉憲楊君士傑行郡至是曰楊黄者可賓之所生長其田廬丘墓皆在如是又命有司易其莊為今名以風厲其鄉人使知儒之為可貴也夫儒之所以為可貴以先王之道之所在也是以古者少使居學老使居塾不如是者不列於王官不可以長民故時不貴儒而儒貴後世之用人不必盡出於儒者也則民何由知其可貴而貴之比年朝廷設科以待天下之士民始稍稍知所趨向獨晉俗堅强不輕而變今賢使者殊其宅里明其貴賤示其好惡其意豈為許氏計哉昔常衮為福建觀察禮貌其士俗以丕變而况上有用儒之君下有風厲之使吾見晉之人父詔其子兄訓其弟其必相謂曰弗若許氏不可以同祀弗若可賓不得以為秀民耒耜以業詩書以語民之彬彬將若鄒魯矣然余嘗聞之民可以身化難以利誘可賓為人侃侃篤於孝誼有位於朝行顯貴矣乃以親老棄其官而養人皆賢之以賢者而化民如草尚之以風也其有不從者乎故余為記其表閭之始且以觀其成焉合淝修城記至正十一年冦起淮南自浙西江東西湖南北以及閩蜀之地凡城所不完者皆陷合淝之城久圮且夷倉卒為木栅以守栅成賊大至民賴栅以完其後僉憲馬君至顧而曰以栅完民幸也非所以固迺白皇孫宣讓王及其憲使髙昌公議修其城遂發公私錢十萬貫召富人之為千夫長百夫長者傭小民相故所圮夷盡築之富人得官發錢無甚費咸喜助所不足小民方饑得傭錢奔來執事鼛鼔不設鞭扑不施捧柴荷畚麕至競作自十三年二月朔戒事九月畢城四千七百有六尺六門環為睥睨設周廬廬具飾器門皆起樓櫓相盗所必攻者甓之計用木若干甓四百四十八萬用人之力七十七萬八千城成而盗不至者今期月矣余生長合淝知其俗之羙與夫所不從亂而可與守者有三焉其民質直而無二心其俗勤生而無外慕之好其材强悍而無孱弱可乘之氣當王師之取江南所至諸郡望風降附獨合淝終始為其主守至國亡乃出降天下既定南人爭出仕而少不逹則怨議其上而不可止吾合淝之民布衣蔬食秀者治詩書朴者服農賈昏喪社飲合坐數百人無一顯者無愠怒不平之色驅牛秉耒雞鳴而耕朝而息日出而耕莫而息不合耦而終十畝負二石之米日中趨百里而無徳容惟其質直而無二心故盗不能欺勤生而無外慕之好故利不能誘強悍而無孱弱可乘之氣故兵不能訹昔者木栅猶足以力戰禦冦而無肯失身於不義者今而得賢使君修其垣墉救其疾苦㩦持撫摩以與民守之而民之與君又歌舞愛戴與君守如子弟之於父兄手足之與頭目然自今至於後日是惟無盗有亦不足憂也君前為庸田僉事城姑蘇今憲淮南又城合淝一人之身而二郡之民賴之以有無窮之固儒者之利不其博哉君名世徳字元臣雅爾喀斡國人由進士第厯官應舉翰林文字樞宻都事中書檢校庸田僉事為今官與余前後為史氏城又余之所志而未成者也義為紀之其敦事與凡供役之人則載之碑隂大節堂記皇帝御天下之十五年念君徳之不宣民生之未遂乃詔丞相更守令之法著考課之令厯柬朝臣以為郡縣親御便殿賜之酒而諭遣之於是天下之吏人人奮厲以治所謂六事者以成功名稱上意宗正郎中韓君建之守安慶也獨鮮有所事其政清浄而已在官三年頴六之盗起所在竒衺之民羣起從之殺守令據城邑時天下久平民生長不識兵革而郡縣無城廓無兵備卒然有變吏往往盗未至先去而城陷有不去者盗至而民不與之守城亦陷明年十一月盗入宿松破太湖潛山吏多徙家江中為去計君獨無所徙而治城隍計軍實以示民必守不去越明年春盗入桐城以桐人來攻城君縱民出擊之盗敗去自二月至於九月盗之來攻者十有一大小百餘戰皆敗之盗大忿乃悉衆而東舳艫數百里鉦鼔之聲動天地王師敗績小孤山十月癸夘盗逐北至城下城南郛久􅈥為民居而聯羣艦為城盗縱火舟燒聯艦艦潰火入南門燒民居諸守將亦潰民恐甚走來眂君君方部署寮吏為戰守如恒日民乃無恐且戰且撲火甲辰盗傅西郛戰却之明日傅東郛又戰却之相火所經撤民屋材夜栅之旦具甲寅盗力攻無所得利諸潰者聞城完且相率來援盗望見之乃夜引去余來戍郡道聞城陷矣比至乃完問故父老皆曰韓君完我君時亦去則民無與為守民無與為守則城之完不完蓋未可知矣方朝廷更化時吏皆黼藻其政以角一日之能君若無能然者及臨大變其所能者乃若人之所未易能君誠不可以小知也予觀於今南方之國不頻於盗非其所力攻有能守者矣而頻於盗者為難頻於盗徼幸於一勝有能守者矣而屢勝者為難民屢勝矣至於敗且危於是不去而上効死以保其下下効死以衞其上卒能因敗為功以危為安如君之為者蓋千百之十一此人之所難能也曾子所謂臨大節而不可奪者君其人歟郡所治屬縣六西至於懷寧又西至於潜山又西至於太湖武夫義民列砦相望百戰抗盗賴君以為根本而無叛意東至於池又東至於姑孰數郡之民賴君以為藩屛而無死傷之禍君之所完不既大矣哉余抵郡十日盗復大至與君率衆殱之盗不至者今再朞矣十四年春三月朝廷録十月功特加君中奉大夫秩從二品幙官以下各升秩有差余因名其㕔事曰大節之堂所以揚君之懿於無窮也雖然治之亂猶旦之有夜也後之人坐其堂而思其人思其人而懼其時有不協於其行不完於其民者獨不欿然於君者乎余之名堂又所以勸於無窮也時與君守者逹嚕噶齊西夏阿爾長普照磨楊恒録事司逹嚕噶齊摩哩齊録事黄圖倫台録判爕理桀錫權懷寧縣逹嚕噶齊約蘓圖安慶萬户府經歴郝瑞千户李思禮卲永堅王國英許元琰賈伯英額森特穆爾魯沁耀珠洪保張彬路忠金嗣元葛延齡百戸盧顯宗卲文質韋與權齊世英宗達周文謝茂陳士達楊買兒朱傑李玉祝茂夏興侯興祖吕重禄朱臣孫朱惠龍彈壓嚴繼祖伍子雲張宏晁關保揚州弩軍翼千户賈禧百户王孫兒伯勒齊爾布哈㳂海翼百户毛偉牽連書之使與有聞於不朽君字公懋遼西人憲使董公均役記古者井天下之田以授民民百畝易者倍之再易者再倍之其養均也則九壤程九貢市㕓二十而一近郊十一逺郊二十而三甸稍縣都皆十二其取之又均也小任以力則上地家三人中地二家五人下地家二人大任以兵則比為五閭為兩族為卒䣊為旅州為師鄉為軍其役之又均也之二者王政之大端也大端具而又為之刑政以防民情為之學校以道民性為之公卿大夫士以登民材其制詳故不亂其本深故不拔是以商周之世皆七八百年而後衰也自經界廢於是田不在公而養不均矣養不均則土會民數皆不可知而賦與役不均矣養與賦與役之不均雖周公為政不可以言治也浙東古於越之地也其地之民無甚貧甚富之家山谷之間有一畝之居十畝之田者祖孫相保至累世不失又其土瘠故其小人勤身而飭力其君子尚樸儉而敦詩書非若吳人之兼幷武斷大家收穀歲至數百萬斛而小民皆無蓋藏此固易治之地有賢師帥為之制而道利之其亦可以庶幾矣乎然余嘗行郡以觀民風其庶人之役於官者往往閭左之民也而富人則有田而不役甚者或不以征歲終保正稱貸而輸之至破産者無算此其田雖近於均而役則不均也至正十年秋藁城董公來長越憲省民所疾苦乃曰井田者吾雖不得而行而役不可不均於是擇其部吏之精强者委之以事以衢州路經厯王仲謙西安縣主簿張拜珠治金華青田縣尹葉巴延治武義永嘉縣丞林彬祖治永康而蘭溪州逹嚕噶齊齊哩克齊義烏縣逹嚕噶齊額琳沁浦江縣逹嚕噶齊羅阿李巴哈東陽縣丞蔣受益自治其邑義烏縣則復以衢州路録事范公琇為之輔而總管陳巴延布哈總領之先期一月令民及浮圖道士各以田自占其或蔽匿及占不以實者没其田令既浹乃保以一正屬民履畝而書之具其田形疆畎主名甲乙比次以上官官按故牘而加詳覈之曰魚鱗册以會田别為右契予民使藏之曰易由以主業其征之所會曰鼠尾册以詔役弓兵𨽻卒鋪兵為至勞坊里正主首次之館夫步夫又次之凡民田多者役其勞少者役其逸又其少而不足役者則出錢以助竒田不助者則以待夫不虞之役其一人而有數保之田者各役之即賣其田則買者承其役凡一州六縣之田二萬六千四百二十四頃四十九畝役者一萬二千六百六十八名故役而今復者四千三百名所未役而今役者三千四百六十名役而不復者休而始役之册成一留縣一藏府一上憲司於是野無倖民公無逸征强弱有倫賦役有經上下和洽歲以有年蓋公之遇人有禮故吏盡其力其使民有義故貧者戴其徳而樂其復富者服其公而忘其勞以故為是大制政不肅而成民不擾而治也傳曰天地養萬物聖人養賢以及萬民公之是舉兼禮與義則誠賢者矣繼今之人毋替公政或推其所未及則越之民樂樂利利其福豈可既哉故於終事也其下咸願刻石以示不朽以闕嘗陪其末議而知其梗槩遂來屬筆焉至正辛夘十二月記青陽集卷三欽定四庫全書青陽集卷四元余闕撰碑銘慈利州天門書院碑皇上稽古明道飭躬建極孜孜於治者十有四年慨然念生民之未遂徽化之未洽遂詔大臣嚴守令之選更考績之法使之務農桑興學校以其殿最而進退之維時貫侯阿尔思蘭哈雅來監慈利乃均賦疏訟剔除奸强期月之間民志丕應州有廟學既敝且壞侯與同知州事楊君雄偉判官李君巴延焦君克忠勸其邑人萬文綬悉修完之天門書院者國初時州民田公著作之山中傍隣䝤峒􅕄教罕至椽棟摧腐神用弗寧租入單寡士無以養名存實廢靡所為教於是山長張徳明以請於侯侯益大愳不任以􅈥教本民有田懷徳詣侯言曰昔吾父榮孫嘗為州作三皇廟鄉邦稱之今仁侯幸導宣徳意惠教遐壤願輸財力遷而大之乃度地於澧水之陽天門之麓揆日程事百工並作期月而學成宫廟閑敞堦序整峻講肄厝㸑具治弗遺稱其所謂諸侯頖宫者民士懷道鼔篋而至敬業樂羣惟侯之教侯復為之據經引史開析疑義訢訢顒顒有如鄹魯邑人楊侯舟張侯兊皆以髦俊登名天府有政有文侯又尊而禮之以表民厲俗其於教思亦云勤矣然不自以為功使使來鄂願有紀述曰俾吾民獲聞道徳仁義之言君之賜也昔我祖宗已篤於教武宗仁宗益大用勸至於皇上同符往哲法宫之中萬幾之暇惟先王簡册臥起與俱以古之治徳禮是首乃著吏課俾民興學荒遐所任非賢不使故爾民得賢侯以治以教俾爾㳺乎詩書之淵而息乎禮義之圃其小人服禮以事其上其君子力學以待用則上之徳與民之幸其眂於古豈不侈且大哉宜有銘詩以昭化志功章於無窮前侯額森哈雅君之昆季世系勲閥具見州學之碑銘曰帝篤保惠惟守惟比詢於台衡命以六事貫侯振振慈利是監去其螟蟊使民耕蠶既綱既紀於學有事民誰子來惟此田氏惟此田氏貲長厥里相侯有作丕應厥志厥初𤣥聖越處在阿樂是侯興式遷於嘉嵩梁有佳井絡所委凌黔轢溆為望於澧山有松栢是斵是削是髹是艧為棟為桷陟其在筵龍章朱延臨爾炳然降觀於宇秩秩有序作配在下笙磬柷敔牲齊維旅侯入即事其儀伊詡坎坎擊鼔有士如雨侯陳其書以教以語以酬以酢以論以報執爵與醬以事父老理融於中和暢於膚有頑弗即亦來在隅有簡有秩惟帝訓勑惠於天常於帝之極昔弗課吏祇事以文令著孔嚴民章聿興楚公之孫兄弟先後克廣帝心道民於厚天門之嵯新廟有儀侈兹侯功俾民遂歌安慶城隍顯忠靈祐王碑城隍祠古不經見自唐以來始稍稍見之今自天子都邑下逮郡縣至於山夷海嶠荒墟左里之内無不有祠然以余觀之民之事神與夫神之著靈於民鮮有聞如舒者也舒故楚壤也其俗巫鬼今乃他無所祠祀獨於城隍出必祈反必報水旱疾疫必禱一歲之中奉膋蕭膏鐙旛幢於庭者無虚日五月之望里俗相傳以神生之日也民無貧富男女旄倪空巷閭出樂神吹簫伐鼔張百戱遊像輿於國中如是者盡三日而後止其祠眂他郡為特盛至正中頴六之盗起江淮以南郡縣陷没者十七八及盗之平所在為墟舒特與盗竟大小格鬬前後百餘民率咨神而後行卜朝以戰則朝而捷卜夕以戰則夕而捷羣盗未嘗一日得志而去者故其城郭廬屋眂他郡為特完民不忘神徳相率出泉以新其廟又請於朝乞崇其號以大報之中書下其事太常博士議升神於王號顯忠靈佑十四年夏四月報下帥守及民以少牢祀神於前殿而揚言於衆曰夫舒大嶽之裔也非南方諸國之所能擬其神之著靈固宜且吾舒人親上死長既義而忠神之降休亦其宜也乃為銘詩刻之廟門以薦道神休民徳於無窮其辭曰巖巖大嶽時維皖潜臨此大邦為望於南神宫於鑠追房綺閤玉几在中衮衣朱舄其靈有皇其聲有那使人齋明奔走是宜彼惛不臧盗兵以狂蠭屯於疆其斾央央我民秉義弗隨禦之殷輪鼔之褁創斧之其衷伊奭赫若皎日神之正直宜福之錫天人之縡具曰旭卉明者眎之端若觀火天因者人人成者天相彼草木其固可言此有榮木蕃彼雨露彼有顛由自無承者凡今亂邦孰無神依民失厥道胡能有右桓桓舒人為君為國先民有言自求多福其充厥行孝父長兄弗祈於神丕乃降祥而自不義不率不迪來瞻於宫神吐不食古師之克執律以報今我小康敢忘厥佑嚴嚴奉常秩號有光牲幣版章升真于王禮行既具樂奏既卒工祝致告徂賴無極其自於今無害有年民樂齗齗烝衎於神化城寺碑小河出霍東流至六北轉南折以入於􅚉河曲有洲二參互衍迤帶之以清流被之以嘉木齊頭諸峯離列其前森蔚峭麗如屏如㦸可指而數禪師洪聰泰定初自邢開元寺游淮過而樂之州民闞氏為買其地乃築室前洲居焉學佛者聞其行多往從之室隘不能容六人乃委貨利輸材木築廣其居久而從之者益衆而人之為築者益大前有門中有壂左右有序為穹屋壂後以庋佛為堂序西以棲僧鐘魚鈴磬凡浮圖之器皆具隄其傍聯絡二洲滙水其中以溉田為圃以蔬為塲以樹襍植梨栗棗柿寮竹之屬數千本春土膏動則率其徒及優婆塞負耒出耕而躬為耨衆亦勤田力作力齊而糞多凡食百餘人而稻麥麻菽果茹不取於人而常裕務閒即合其衆講其師之説因號其寺為化城皇孫宣讓王雅敬佛乘與為外護六人之事佛者亦無不禮焉余聞聰嘗厯事江南名僧其才幹敏其行敦樸而勤苦其言辯博善於誘人平生未嘗蓄一錢有所得悉以俾其弟子使治其居故人慕而愛之而就此易也然余聞之古農工商士皆用世之人也浮圖後出其道以出世為説而須世以生故言道者病焉聰學出世之道而不須於世故君子取之禪師松江人姓陸氏初事法忍海翁師後受具於開元明公銘曰洋洋清川藹藹蘭渚名標化城斯實寳所芝陑藤井丹檻瓊戸翠嶺承牕瑤溪環宇寳樹朝䕃水華晚妍未瞻靈鷲已肅祇園朱鳥殷宵倉庚司序夫須以耕閑閑於野陽烏斂曜清鐘戒夕詵詵學徒栖禪于室練心淨域結軌𤣥涂渡河析獸袖衣啓珠内無佚已外弗求物以學以耕其誰之疾王侯歸依四性效績斵辭貞珉永告無斁濟美堂銘觀夫封建之命攸貴象賢考室之詩粤蘄朱芾蓋國以人而競家以材而興情之所願孰大於此濟美堂者丞相賀公所居之正寢也自公之先奕世載徳忠貞以茂功而基業惠愍以厚澤而亢宗名冠庶僚勲配名族故能保其富貴世守兹堂蕭何之第不為勢家所奪晏嬰之廬當守先人之舊念兹多懼思貽無窮故取文子之言以為扁表所以昭先烈示後昆庶幾持盈之戒不忘於侑坐良相之業可續於箕裘某忝登公之堂知公所以命名之意謹為銘曰皇慶有極析木之津孰為林匹作我世臣烈烈賀氏祖孫承徳肅肅崇構奠兹王國厥兹有室爰考斯堂儉不至固質乃逾章前檐翠觀後麗𤣥武榮並棲鸞制惟旋馬疏承仙嶺閾鏡瑤泉􅔿􅔿文井塵筵惟公先世克濟厥美其美維何黄中通理忠貞㡳法相我世皇啓兹陪輔為時廩梁惠愍肯構樹立有茂惠農商工澤深仁厚兩公之懿後先相望故居不斥疏爵彌光禮賢於館麗族於室廟寧鬯貞庭具鐘食出有旌棨入有圖書龍光載錫戚里通車闕徳及累世至於今公奮庸於位開誠布公登選俊良挈彼宇寰隮於平康天子是若民命是賴敦功磐石垂裔河帶小心寅畏念兹厥初欲其曾𤣥眠此渠渠百尺之木其本必倍混混源泉其流無既惟忠惟孝為本為源勉師元凱相我皇軒青陽縣尹袁君功銘并序紅軍起頴六縱掠江淮之南南方之地雄都鉅鎮諸侯王之所封藩臣臬司之所治高城浚隍長㦸强弩之所守環輙碎之鮮有固其國者青陽小邑也非有山溪之險兵甲之利貔貅熊虎之衆以為之固也昔者行戍過之其邑屋無所燬敗其民安生樂事無桴鼓之驚其館人具酒肉芻粟迎勞使者無喪亂窮苦之態如治平時問其所以全則皆其尹袁君之功也君初遊太學舉茂才五轉而尹兹邑為人端敏精强重知人情里俗與其所疾苦而其心一以愛人為本至民有鬬訟從容召逮不數言折之庭中未嘗有留獄也邑有積患吏之所不為理者悉薅櫛治一切與之道利之冗吏悍卒不敢入縣門以干其公大家武人不敢肆虐其鄉與其過人其治既已張矣乃以其暇日作伏羲神農黄帝祠祀之俾民知所本始吉月望日衣深衣角巾拜謁孔子廟退坐講席横經析義進民觀聽其左以習知立身行巳之大端於是上下相率惟君言之為聽張弛禁止無抑其教者其治如此故民徳之而無畔心及盗入畨君即委家野處令民為保伍自守其地而身往來督眂之相民之良者收其豪以為巳用其無良而起應者誅磔無遺有盗至率民逆戰如武夫健將然其勇如此故民恃之而有競心卒能外捍憑陵内固根本至於今日休也余出入亂中以觀南方之民或盗至而亂或未至而迎降撞搪譎恠有如鬼蜮豈獨異於人哉由吏政不足以得民心勇不足以振民氣民興而善者亦莫之能守也使夫天下之吏皆得如君者用之則亦何至如今者之事哉不幸有之則亦易治不至若是極也今亂而甫定也湖湘之間千里為墟驛馳十餘日荆棘没人漫不見行踪青陽之民於是益以君為有徳於我也平居稱謂皆曰我君而不忍名字君邑之故老與其學士願銘貞石薦君功徳垂於無窮而使儒生程孔昭請辭於余余故史氏也於志義無所讓乃為之銘君名俊字孟敏富州人也辭曰元受天命并臣萬邦如山如澤或生蛇龍馮淮逾江殘吳嚙楚狺嘯厚㓙邑無完者徂兹青陽畨人所毗君治有政民亂無階亂民來既俾民為伍君先以勇衆繕厥武民以為城治以為兵大邦攸畏小邦攸愾相彼亂邦裒骨如麻爾父爾子耕稼嘯歌亂之所定棘生有闢爾室爾家究為安宅君功在時民亂弗知既克㡳靖功為君歸載其肥羜及其㫖酒祝君無歸亦戒難老念之謂之易由畀之至於孫子懷允無止南山之華其媺如英嫓於君功民説無疆勉學齋銘為江澤民作飛黄之疾一日千里駑馬弗輟十駕可至聖源於學不以其才或利而勉殊塗同歸人十巳千人一已百孰云余愚而聖可作行百里者其半九十十里弗勉不入於室爾祖好修厥有令名勉兹學者聿觀其成鎦府君墓銘元至元戊寅八月十六日鄱鎦君殁既葬而天下兵亂不克立碣墓左今海宇晏夷冡子昺始刻銘以昭厥志君諱斗鳯字友梧母李夢鳯翥北斗間而生故名君疎髯偉度倜儻負竒氣嘗攻舉子業屢試不利監郡馬公某舉茂材部使者王公都中賢之復交薦授集慶句容校官既而慨然曰大丈夫坐廟堂佐天子出號令以保乂庶民不然仗節出萬里外氣懾强敵耳奈何棲棲服章逄鄉井耶遂絶江渡淮遡河濟過齊魯之邦遨遊燕趙間週迴秦漢故都南還吳楚登髙酌酒弔古豪傑遺跡發為歌詩皆磊落魁竒當時虞文靖公集揭文安公傒斯禮部郎中吳公師道咸交君愛其材雄贍爭言於中書擢應奉翰林文字未上而卒年三十二以卒之年十月十五日葬鄱義城東潘超之原遺詩文若干卷燬於兵父諱環岫字傑夫兩浙鹽運提舉大父安朝宋國子生君家世簮纓光奕史牒宋贈檢討太尉中書令左僕射封潁川王浩八世祖也君克繼詩書有志弗獲顯庸惜哉配朱生昺昱燮三男子昱燮亦天昺復業儒文聲動縉紳間銘曰猗鳯鳥昧靈兆夀曷少氣則浩跖而老顔而夭匪天道兮墓表葛徴君墓表君諱聞孫字景先姓葛氏累世皆隠合肥巢湖之上有少田力耕以為學至君祖嗣武始補太學生遷桐城縣主簿宋亡遂歸隠淮安忠武王録宋官授龍泉縣丞辭不受而自放於詩酒以終父天民亦隠徳弗耀君生十九年而孤能自策厲為學天性警敏日誦數千言輒終身不忘居家孝友待朋友有信義每旦冠衣詣母束夫人問起居躬眂食飲惟夫人色所欲即趨為之凡物夫人未食即弗御也親舊知其然每食親必先以餽君使奉夫人嘗以貧出為頓文學既而曰此非養志之道也尋不復仕其後宰相薦君文行可用擢翰林國史院編修官復辭不赴召而教授於其家諸生不逺齊楚之路皆來從之余嘗謁君湖上升堂拜束夫人君侍側鬚鬢皓然進几捧觴進退旋辟惟謹為好言温藉之母夫人年八十餘耳目聰明泄泄然樂也食下始出坐館中為諸生談先王之道諸生環列修整皆若有得焉者問以親故入城中城中人無少長爭候迎謁以不至其家為恥君與人言無賢不肖率依於忠孝其語切至初若不可親及徐就之乃甚有味久而不厭也里中有鬬訟官府所不能折者君以一言決之其見重於鄉如此以故鄉大夫有大政與大獄多以詢君君亦通練誠懇問無不言諸大夫隂用之鄉人多蒙其利此余之所知而鄉人未盡知也至正五年母夫人以夀終於家予往弔之君衰絰癯然衆以為君若不勝喪如此是年冬余還京師而君遂以死矣嗚呼聖人之道猶天然而一本於卑近精粗本末無二致也而世或騖於高虚若徳合一官行庇一鄉者往往薄之以為不足為君平生不事大言髙論而行事皆聖賢之實用其用以教人亦必以此雖不肯出仕以盡其所學而其學之可用蓋不待出而後見也其文章平實稱其為人有文集若干卷藏於家配倪氏子男一人楨黄岡縣教諭女六人皆適士族君之殁以至正五年九月癸巳其葬在十二月癸酉年六十一明年其友余闕表其墓曰昔予登第還里中里中長老言朝廷召君時合肥之學甘露降於松明年又降於柏占者曰國家養老之祥也君得於人者如此而得於天者又如彼非篤於孝友積誠而不已其能然乎鄉之人士過君墓者式之張同知墓表澧之慈利有隠者曰張君積學厲操居州之雍沙鄉雍沙之人稱之以為能孝君喪父時年始十四即養母而能敬生事大小自盡身力一不以屬母而務有以樂其心母素多病君自侍側具湯液食飲行坐臥起必自扶掖之而未嘗去左右如此者殆三十年間適市心動亟歸眂母火發帷家人無在者母病臥且驚不能起君冒烟熖褫幃滅之微君母幾不能免母病甚嘗割股肉以療之夜即焚香籲天願以巳年益母夀母殁哀戚甚躬負土為墓不以委僮奴人是以謂之孝也良重信之有爭訟者不詣公府而詣君取直其里之麀鹿泉者鄉人素賴以溉田延祐丙辰夏大旱泉竭衆相與祠其上喪豚敗鼓卒不能出泉乃率以走君曰泉閟禾且槁民不知死所矣泉其或者聴孝子乎君為沐浴而往再拜為民請泉出如綫衆讙曰泉至矣君乃又再拜泉沛然如初所溉方數十里之地是年獨得歲人益齺然謂君誠孝子也君性介直不阿鄉里敬之有撓曲為欺者見君靣輒發赤其事寡姊有恩義經紀其家事如其家凡細行類此多可書者不書大其孝也君通尚書以授其子兊兊亦博學有文章元統元年貢于禮部中髙等授同知茶陵州事君以子貴封承事郎英徳州同知聲光顯融享有禄養凡七年以夀終於家自君之没兊之治民日有政譽轉尹當塗公亷勁毅以治行稱徴為翰林國史院編修官君子曰天與善人孝者善之紀也故孝者必有子今於君徴之尤信君諱杏孫字子春以至元己夘十一月二十一日卒年五十有四以某年某月𦵏州之懷徳鄉永樂村青山谷張氏世為蜀之安岳人曾祖文震宋吳潜榜進士官至知江安縣祖圓避亂始遷澧自圓而下皆世治儒術然無顯者顯乃自君始是可表也兩伍張氏阡表張氏本䣜陽人其先世有諱豈者徙家淮南之兩伍村子孫繁富皆有美田在湖上無貧者君之祖子可始為儒教子君父諒裔日誦書不問其家生業見異書無錢質衣買之故君家在諸張中獨貧而教子益不怠君諱拱辰字景星少以儒薦為興化縣教諭崇明州學録泰州學正雲南栢興府建康路兩學教授改將仕郎主安豐霍丘縣簿而卒弟竑字景山亦由天長泰興教諭揚州學正真州教授以將仕郎滁州判官致仕初張氏雖盛然皆農家無聞人自君父以耆學著稱鄉校逮君兄弟登仕版有聞譽故兩伍張氏遂稱江淮間君為人寛厚不嗜利居貧晏如不以動心竑性剛直好賢而疾惡此兩人者所操雖異而士大夫與之交者一愛敬之君兄弟仕時其父已死矣君每與人言其先世必嗚咽流涕曰吾先人以儒者望吾兄弟吾兄弟今皆讀書為儒官雖貧亦何憾哉余往吏淮南聞君伯仲之名甚習會君之孫天永遂得其先世之槩如此重為慨息蓋淮俗之數易矣宋之季時其地專用武故民多尚勇力而事格鬬有號為進士登科第者徃往皆武學也混一以來其俗益降民之賢者始安於農畮其下則紛趨於末以爭夫魚鹽之利其積而至大富者輿馬之華宫廬之侈封君莫之過也故其俗益薄儒以為不足以利巳朝廷設科以誘之今三十年民亦少出應詔君父子自拔於衆人之中傾家以為學可不謂之豪傑之士哉天永自樹嶄然弱冠屬文敦義異時非能振其宗乎詩書之教能淑人心學之至可以為聖賢其次不失為善人其緒餘亦可以得禄以振耀其宗族夫孰知不足以利巳者為其家之大利與君之於鄉可表以厲俗矣君兄弟殁兩伍之墓隘不能葬乃改卜倪村𦵏焉君配陳氏子二人禎桃源縣教諭孫男三人天序天庭天庸竑娶李氏子一人燮將仕佐郎揚州教授孫男三人長天永次天竒天亨至正六年二月述青陽集卷四欽定四庫全書青陽集卷五元余闕撰䇿元統癸酉廷對䇿臣聞之周武王曰惟天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母此言君天下者凡以仁而已臣嘗思之天地生物而厚於人矣而於生人之中尤厚於聖人其所以厚於聖人者欲其推生物之心以加諸民是仁者人君臨下之大本也臣謹稽天地之理驗之往古則仁之為道夏以之為夏商以之為商周以之為周祖宗以之而創業後聖以之而守成其理可謂至要而亦可謂至難矣恭惟皇帝陛下有聰明睿知之姿有寛裕温柔之徳愛民而好士神武而不殺爰自初潜仁孝之聲固已播聞於中外今兹誕膺付託龍飛當天輕徭役薄賦斂罷土木之役恤鰥寡之民而仁厚之澤果有以大被於天下當天命眷祐之初人心歸向之日又能不自滿假拳拳以守成之大計下詢承學之臣顧臣庸愚無所通曉然臣觀陛下䇿臣之言反覆乎三代及漢守成之艱難而深徹乎今日當行之切務自非聖心獨詣深有以考之於古質之於今灼知上天作君之心與夫祖宗創業艱難之計者不能為是言也臣伏讀聖策曰古人有言得天下者為難保天下為尤難臣以為人之於仁憂患而思勉者易安樂而勿失者難天造草昧之際英雄角逐之會而世主之心所以不敢暇逸者鮮不如敵國之在旁嚴父之在上其思所以康濟小民惠鮮天下者蓋饋屢輟而寢屢興此其勢之易然者也天下既定方内無事兵革不動四荒向風天下之臣又日奏祥瑞豐年頌聖徳者聲相聞於朝歌太平者足相躡於道雖以創業之君尚不免於不終之漸况其後世乎蓋治平則志易肆崇高則氣易驕志肆則敗度之心滋氣驕則愛民之意熄如是則豈復念夫先世艱難勤苦為何如哉甚者至以其祖宗為昔之人無聞知見其先世勤儉之迹則曰田舍翁得此亦足矣此亦勢之有必然者也陛下以保天下為難此臣所以踴躍忻忭而不自知陛下此言可以承宗廟可以奉六親可以育羣生可以彰洪業臣拜手稽首而為天下賀願陛下永永無忘此言也臣又讀聖䇿曰自古持盈守成之君莫盛於三代夏稱啓能敬承繼禹之道殷稱聖賢之君六七作周稱成康能致刑措夫以禹之功而惟啓以文武之徳而惟成康賢聖之君之衆莫若殷亦不過六七而已其後惟漢之文景而言文景之治猶不得比之三代善繼承者何若斯之難也臣以為惟思祖宗得天下之難者則於保天下也斯無難啓太丁太甲太戊祖乙盤庚成康文景之君則思祖宗創業之難而保之者也桀紂幽厲桓靈則反是故伊尹之於太甲則明言烈祖之成徳周公召公之於輔相成王也亦諄諄於文王之典武王之大烈蓋知其祖宗得天下之難則必能求其所以得之之道矣知其所以得天下之道則知所以保天下之道矣夫祖宗得天下之道即其子孫保天下之道也孟子曰三代之得天下也以仁此仁者祖宗得天下之道也易曰何以守位曰仁此仁者子孫保天下之道也夫仁之難成亦已久矣持盈守成之君若是之難得者宜哉臣又讀聖䇿曰我祖宗積徳累世至於太祖皇帝肇啓土宇建帝號又七十餘年世祖皇帝始一天下以致至元之治厥惟艱哉顧予沖人賴天地祖宗之靈紹膺嫡統繼承之重實在朕躬夙夜兢兢未獲其道臣以為陛下此言可謂深知祖宗創業之艱難者也當其巡天西下又詔定西夏懷高昌北取遼金南取趙宋其經營開創之事有不待賤臣之言而後知若夫祖宗所以得天下之本則陛下之所當知也臣嘗妄論之我國家之得天下與三代同自太祖皇帝起朔漠而膺帝圖世祖皇帝揮天戈以一海内不恃强大而其仁義之師自足以服暴亂不用智力而其寛大之徳自足以結人心至於渡江臨卾與建元之詔觀之則我國家得天下之本一仁而已矣故以曹彬之事命帥臣而革命之日市肆有不閉以大易之元建國號而中統之紹天下所歸心太祖既以七十餘年而平一之世祖皇帝又以四十餘載而生聚之徳在民心功在史策以聖繼聖傳至陛下吾祖宗所以得天下之道是即陛下保天下之道也然猶云未獲者是即文王望道未見之心也臣何以多言為臣又讀聖策曰子大夫通今學古其求啓之所以敬承六七君之所以稱賢聖成康之所以致刑措其道安在文景之所以不及三代其故何繇及今日之所以持盈守成孰先孰後孰本孰末何以致刑措稱賢聖繼祖宗之盛悉心以對毋有所隠臣以為三代及漢之君其見稱於當世者雖有不同然不過守其先世之仁而已矣而今日陛下之所以持盈守成之道又何以他求也哉洪水滔天下民昏墊而成允成功者禹之仁啓之所以敬承者此也啓網祝征仇餉者湯之仁太甲以之處仁遷義太戊以之治民祇懼武丁以之嘉靖殷邦祖甲以之保惠庶民盤庚以之鞠人謀人之保居此所以稱聖賢也以言文王之仁則無凍餒之老以言武王之仁則行大義而平暴亂成王特制禮樂以文之而已耳康王特奉恤厥若而已耳其所以教化行刑罰措仁之浹於民故也漢家制度視三代雖有愧然髙帝之寛仁愛人實滅秦誅項之本原文帝之務在養民景帝之遵用成業實卓然為漢賢君其不及於三代者無太甲仁義之功無成王緝熙之學故耳以今日之道而言臣則以為守成之本仁也所當先務者仁也至曰功曰利曰甲兵錢穀曰簿書期會曰禁令條教皆末而當後者也然就仁之中而其本末先後亦不容以無序也有先王之仁心有先王之仁政孔子之告顔子曰克己復禮為仁此以心言也孟子告齊梁之君所謂五畝之宅百畝之田與夫學校庠序之類此以政言也有是心無是政則其心終不能有洽於天下有是政無是心則其政亦不能以自行必有内外本末交相通貫是即堯舜之道也陛下有顔淵明睿之姿可以致修身之功有堯舜君師之位可以推愛民之澤不宜狃於近功安於卑下而不以聖賢自期也臣願陛下萬機之暇取孔孟之言而深究之體之於身揆之於事求其何者為欲何者為理知其為欲而必克之知其為理而必復之明以察其幾勇以致其決日日而克之事事而復之則自心正身修而仁不可勝用矣或於聽朝之時或於進講之際數召大臣延問故老深加咨訪某事為先王之仁政而未盡行某事為今日之弊端而未盡革某害未去某利未興某賢未用某物失所敏以求之信以達之時省而速行之委任責成而程督之使天下疲癃殘疾得其生鰥寡孤獨得其養而無有一物之不遂其生則民物安阜而人莫能禦矣異時陛下五刑不試如周成康聖賢之作如商諸王夫然後可以答上天玉成陛下之心生民蘄望陛下之意先帝慈皇付託陛下之深計而我國家時萬時億之統可以傳之永世而無疆矣詩云宜民宜人受禄于天古人有言曰愛民者必有天報陛下誠如臣之所期則申命之休將如日之昇如月之恒矣伏願陛下少開天日之光得賜鑒察則臣不勝大幸祇冒天威臨書不勝戰慄之至
