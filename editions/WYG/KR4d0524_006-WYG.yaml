body:
  text: 濟美堂銘觀夫封建之命攸貴象賢考室之詩粤蘄朱芾蓋國以人而競家以材而興情之所願孰大於此濟美堂者丞相賀公所居之正寢也自公之先奕世載徳忠貞以茂功而基業惠愍以厚澤而亢宗名冠庶僚勲配名族故能保其富貴世守兹堂蕭何之第不為勢家所奪晏嬰之廬當守先人之舊念兹多懼思貽無窮故取文子之言以為扁表所以昭先烈示後昆庶幾持盈之戒不忘於侑坐良相之業可續於箕裘某忝登公之堂知公所以命名之意謹為銘曰皇慶有極析木之津孰為林匹作我世臣烈烈賀氏祖孫承徳肅肅崇構奠兹王國厥兹有室爰考斯堂儉不至固質乃逾章前檐翠觀後麗𤣥武榮並棲鸞制惟旋馬疏承仙嶺閾鏡瑤泉􅔿􅔿文井塵筵惟公先世克濟厥美其美維何黄中通理忠貞㡳法相我世皇啓兹陪輔為時廩梁惠愍肯構樹立有茂惠農商工澤深仁厚兩公之懿後先相望故居不斥疏爵彌光禮賢於館麗族於室廟寧鬯貞庭具鐘食出有旌棨入有圖書龍光載錫戚里通車闕徳及累世至於今公奮庸於位開誠布公登選俊良挈彼宇寰隮於平康天子是若民命是賴敦功磐石垂裔河帶小心寅畏念兹厥初欲其曾𤣥眠此渠渠百尺之木其本必倍混混源泉其流無既惟忠惟孝為本為源勉師元凱相我皇軒青陽縣尹袁君功銘并序紅軍起頴六縱掠江淮之南南方之地雄都鉅鎮諸侯王之所封藩臣臬司之所治高城浚隍長㦸强弩之所守環輙碎之鮮有固其國者青陽小邑也非有山溪之險兵甲之利貔貅熊虎之衆以為之固也昔者行戍過之其邑屋無所燬敗其民安生樂事無桴鼓之驚其館人具酒肉芻粟迎勞使者無喪亂窮苦之態如治平時問其所以全則皆其尹袁君之功也君初遊太學舉茂才五轉而尹兹邑為人端敏精强重知人情里俗與其所疾苦而其心一以愛人為本至民有鬬訟從容召逮不數言折之庭中未嘗有留獄也邑有積患吏之所不為理者悉薅櫛治一切與之道利之冗吏悍卒不敢入縣門以干其公大家武人不敢肆虐其鄉與其過人其治既已張矣乃以其暇日作伏羲神農黄帝祠祀之俾民知所本始吉月望日衣深衣角巾拜謁孔子廟退坐講席横經析義進民觀聽其左以習知立身行巳之大端於是上下相率惟君言之為聽張弛禁止無抑其教者其治如此故民徳之而無畔心及盗入畨君即委家野處令民為保伍自守其地而身往來督眂之相民之良者收其豪以為巳用其無良而起應者誅磔無遺有盗至率民逆戰如武夫健將然其勇如此故民恃之而有競心卒能外捍憑陵内固根本至於今日休也余出入亂中以觀南方之民或盗至而亂或未至而迎降撞搪譎恠有如鬼蜮豈獨異於人哉由吏政不足以得民心勇不足以振民氣民興而善者亦莫之能守也使夫天下之吏皆得如君者用之則亦何至如今者之事哉不幸有之則亦易治不至若是極也今亂而甫定也湖湘之間千里為墟驛馳十餘日荆棘没人漫不見行踪青陽之民於是益以君為有徳於我也平居稱謂皆曰我君而不忍名字君邑之故老與其學士願銘貞石薦君功徳垂於無窮而使儒生程孔昭請辭於余余故史氏也於志義無所讓乃為之銘君名俊字孟敏富州人也辭曰元受天命并臣萬邦如山如澤或生蛇龍馮淮逾江殘吳嚙楚狺嘯厚㓙邑無完者徂兹青陽畨人所毗君治有政民亂無階亂民來既俾民為伍君先以勇衆繕厥武民以為城治以為兵大邦攸畏小邦攸愾相彼亂邦裒骨如麻爾父爾子耕稼嘯歌亂之所定棘生有闢爾室爾家究為安宅君功在時民亂弗知既克㡳靖功為君歸載其肥羜及其㫖酒祝君無歸亦戒難老念之謂之易由畀之至於孫子懷允無止南山之華其媺如英嫓於君功民説無疆勉學齋銘為江澤民作飛黄之疾一日千里駑馬弗輟十駕可至聖源於學不以其才或利而勉殊塗同歸人十巳千人一已百孰云余愚而聖可作行百里者其半九十十里弗勉不入於室爾祖好修厥有令名勉兹學者聿觀其成鎦府君墓銘元至元戊寅八月十六日鄱鎦君殁既葬而天下兵亂不克立碣墓左今海宇晏夷冡子昺始刻銘以昭厥志君諱斗鳯字友梧母李夢鳯翥北斗間而生故名君疎髯偉度倜儻負竒氣嘗攻舉子業屢試不利監郡馬公某舉茂材部使者王公都中賢之復交薦授集慶句容校官既而慨然曰大丈夫坐廟堂佐天子出號令以保乂庶民不然仗節出萬里外氣懾强敵耳奈何棲棲服章逄鄉井耶遂絶江渡淮遡河濟過齊魯之邦遨遊燕趙間週迴秦漢故都南還吳楚登髙酌酒弔古豪傑遺跡發為歌詩皆磊落魁竒當時虞文靖公集揭文安公傒斯禮部郎中吳公師道咸交君愛其材雄贍爭言於中書擢應奉翰林文字未上而卒年三十二以卒之年十月十五日葬鄱義城東潘超之原遺詩文若干卷燬於兵父諱環岫字傑夫兩浙鹽運提舉大父安朝宋國子生君家世簮纓光奕史牒宋贈檢討太尉中書令左僕射封潁川王浩八世祖也君克繼詩書有志弗獲顯庸惜哉配朱生昺昱燮三男子昱燮亦天昺復業儒文聲動縉紳間銘曰猗鳯鳥昧靈兆夀曷少氣則浩跖而老顔而夭匪天道兮
