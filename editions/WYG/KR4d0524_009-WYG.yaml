body:
  text: 雜著題宋顧主簿論朋黨書後先王之時上與下同患故國家之政夫人而得言之召穆公所謂士獻詩史獻典瞽獻書百工諫庶人傳語近臣盡規親戚補察故凡事之得失政之利害國之治亂上無不有以全知而慎修之而至於無敗蓋天下之勢如操舟舵師失利豈特棹夫之患哉而凡同舟之人患也故有憂天下之心者無不有以盡其言不盡其言者是不憂天下者也有憂天下之心者由有以知其得失利害治亂之故不憂天下者是不知所以得失利害治亂之故者也夫天下之大患在於人之不得言而得言者不以言與雖言之而不用其情甚者至以為俗雖有憂天下之心之人而不知天下得失利害治亂之故者亦不敢言而國遂以亂亡如秦季世蓋可監已而世主終不以為戒何哉三代而下若宋之一代人心世道猶有近古内而宰執侍從臺諫有奏疏卿監以下不得日奉朝請則有論對朝臣上殿則有奏劄皆與天子酬酢於殿陛之間如家人父子之相與外而監司郡守凡所職事皆得以疏聞天子親御筆劄以報之日有書至萬言者若事大體重言者不以言則大學京學諸生與凡韋布之士皆得詣闕上書言之至其晚年權臣執命士益探鼎鑊冒刀鋸而論事不可壅遏其下與上同患如此故能外捍强國内修民事傳緒三百餘年而後亡雖先王之世人心之􅍇亦何以過此也予昔與圭齋諸先輩修宋史嘗愛徳祐時有蕭規者前論丁大全黔靣貶嶺南既赦還又與京學生葉李論賈似道又再貶似道罷陳宜中當國得詔還學猶伏闕論事竒氣烈烈如平時宋亡我世祖皇帝追大臣物色當時言者得葉李用以為執政而規獨不見蓋當時率諸生論賈者規也李特因以成事者耳惟李應時掩以為名而規遂不見知於世歟於是時規已老死或伏溺而不出耶予屢欲傳其人於史以不能詳而止至今惜之永嘉顧仲明謁選來亰師示余以今大宗伯達公所書其先世主簿君與蕭侍郎論朋黨書言論慷慨而激烈時秦檜柄國方以威權鈐制天下士大夫罹其禍者甚衆而君言若此此予之所素歎以為人心世道之媺者故為之書達公昔予局之監也其為之書亦必重歎於斯焉題孟天暐擬古文後秦燔燒詩書百家之言漢興稍掇拾之諸子後出然頗襍以依倣之説如國䇿諸篇多蒯徹之流所撰甚至竊取他書以足之如先秦者豈盡短長之舊哉孟君天暐喜模倣先秦文章多能似之其讀國䇿當能辯之知予言為不妄也跋掲侍講遺墨後豫章掲先生好稱奬後學人有片善即誇道之不去口况於通家之好故人之子有可誇道者耶故世稱先生為忠厚先生之子㳂亦克樹立世其文行此忠厚之報書曰人之有善若已有之以能保我子孫黎民信哉彼媢疾者聞先生之風亦可媿矣題凃頴詩集後凃君叔良來京師與余同寢處凡兩載羮藜飯糗之餘相與論古今人詩皆有造詣尤長於五言其精麗有謝宣城步驟平淡閒適不減孟浩然叔良年甚少將來何可量耶余嘗論學詩如鍊丹砂非有仙風道骨者不能有所成也叔良殆有仙風道骨者耶旦晚余將有越中之行與叔良同處不知又在何日臨别殊難為情讀此尤不欲舍吾叔良也叔良勉旃他日聞大江之南有謝宣城者必吾叔良也此亦足以名世豈待區區外物哉御書贊今上皇帝潜邸廣西時書方谷字賜臣毛遇順謹賛曰皇徳淵靚泊如大虚海上浴日惟書為娛穆穆𤣥雲垂若脂素神馬登河驚鸞游霧臣順霑賜今益造𤣥雲漢在上胡不寳焉潛嶽禱雨文具官余闕謹告於南嶽潛山之神曰凡列於天地之間者吏食君禄以治其爭訟神享君祀以禦其菑患無非事者也自盗之興同安之民農失其耕工失其業商失其資吾吏日夜孜孜以圖利之安集之以思報君食然自去歲以來田苗屢旱雨澤不時百姓饑死此則非吏之所能為而神之責也夫所謂神者以其聰明正直而能福善禍淫者也昔者凶盗燔爾宫廟竭爾粢盛而吾民紓忠迪義以殄㓕之而神乃禍民而弗禍盗所謂福善禍淫者安在吏或不職以干天和神乃降灾於民而弗降灾於吏所謂聰明正直者安在夫羣神雖舉各有攸職能興雲致雨者惟山川之神耳爾神受命作嶽司命之寄在東北西三神之上又吾同安封内之神也水旱之責不於汝而奚歸今白露將近雖雨無及玆與神期三日大雨田禾熟成將率吾民修爾宫廟奉爾祭祀不然將與民圖變置汝其無悔勉勵葉縣尹手批名巴延告青田縣尹葉承事聖天子憂憫黎元而承宣者不能道揚徳意反以厲民君蒞邑之初即有政平訟理之譽若漢黄霸魯恭皆可師法詩云靡不有初鮮克有終君尚宜益修美政以追配於前人固不偉歟公堂酒二尊專人奉勞西海祝文維兊為澤奠位宅西翕輸隂彚蕩泊金天我有駿命肇域兹澨祀事惟常於皇無替后土祝文媪靈旁魄合徳於天食於汾脽為古方澤有嚴母事殷薦齋明蘄我涵生永沐光化西嶽祝文節彼靈嶽荒於華陽二儀鍾秀三條分方興雨祈祈嘉祉耿耿以報以霾神休惟永河瀆祝文水伯之徳稱自前古肆予寧神罔有弗至萃廟伊嘉况載薦醟閔兹瘝人以翕暴横江瀆祝文水徳之靈神實位長鴻紀六州澤施三壤秔稌允殖飛潛資養我報以祀神哉昭享中鎮祝文岩岩大嶽為望於兾宣徳禀神作鎮中土唯中是建四方之極神祐我民列嶽所眂西鎮祝文天作髙山典司雲雨作福於下秩配君公有嚴崇鎮奠我岐下惠於西土民人所薦湖廣省正旦賀表二儀啓歴申逢首祚之期四海登圖誕際朝元之會普天均慶庶物皆春申賀運撫休嘉功深對育與民同始須解網之寛條屬吏在延布畫衣之新憲光輝縟典益固皇基臣等猥以凡庸叨陪亮采身江湖而心魏闕遥陳晉錫之詞内君子而外小人願介泰來之祉正旦賀箋伏以青陽煥景丕陳元會之儀彤史表年申告履端之慶和薰率土喜洽岩宸合徳無疆徽音有馥六宫進御人涵樛木之恩九廟烝嘗時謹采蘩之事茂臨蒼律益介鴻禧臣等逺任旬宣阻趨朝覲椒盤獻頌仰瞻𤣥武之光桂殿迎春早應髙禖之瑞聖節賀表伏以華渚效祥光臨首夏大廷行慶忻對上儀凡四表之尊親同一心而舞蹈功超振古仁洽含生竭智附賢特重銓衡之選輕徭薄賦屢頒綸綍之恩徳與氣游夀宜川至臣等旬宣江漢瞻望蓬萊承露絲囊遥獻無疆之頌齊天寶命願符有道之長書果囉羅易之作潁川老翁歌後至正四年河南北大饑明年又疫民之死者半朝廷嘗議鬻爵以振之江淮富民應命者甚衆凡得鈔十餘萬錠粟稱是會夏小稔賑事遂已然民罹此大困田萊盡荒蒿藜没人狐之跡滿道時予為御史行河南北請以富民所入錢粟貸民具牛種以耕豐年則收其本不報覽易之之詩追憶往事為之惻然濟川字説濟川者熙寧張子瑞之號也子瑞世以活人為功聞於時其艱於衞生若川險者咸以舟楫濟之乙未春避地來歸袖卷求予字并説予方欲濟時艱得其人亦可尚已而言曰濟川者司命之謂也惟命弗罹於險弗嬰於疾畀終其天者為正嬰於疾罹於險迺戕其生為夭夭也者靡有司之者也嗚呼惟天生民有欲汲汲於名孜孜於利蛟龍黿鼉之澗風濤險濬之所阻車馬限往來罔知禍厲者唯病夫涉情蕩於中氣戾於外膏肓蠱瘵之府疲癃殘疾之基賊脈理伐夀齡罔重攝養者唯病夫身此醫藥之利於人猶舟楫之利於天下二者固相若已雖然匡君正國爕隂陽以利天下其道其術亦不外於是説命曰若濟巨川用汝作舟楫此子瑞之志也此其所以為號也此濟川字之説也贊晦庵父前子後大帶長裾人仰其名家誦其書盛哉若人是謂用譽題永明智覺夀禪師唯心訣後永明夀禪師平生著述甚多唯心訣者其猶般若之心經也孫城祐上人頃作觀心堂於廣福寺及見西菴遂公明教臺得是編即以衣資刻之甫畢工屬余歸自范陽請題其後心者萬化之原也迷則愚悟則聖存則治亡則亂易所謂差之毫釐繆以千里者正指是言也是編於心之細無不燭體用無不該三藏十二部精要之言無不在是先民言聖賢千言萬語只是欲人將已放之心約之使返復入身來自能尋向上去此又永明著書立言之心也元統甲戌五月謹題題黄氏貞節集皇元至正十二年余闕奉旨出守安慶時邊警事嚴日尋干戈憫憫無須㬰得攄懷思越六年丁酉撫金谿吳級以書抵轅門請題其母黄氏貞節集併録其所譔祭夫文及訓子詩三十韻讀之辭義嚴正風節凛凛令人增氣槩所恨行伍中筆硯廢置久安得從容諸先輩翰墨之後思發其幽潛乎然闕也方以忠君為務而級也拳拳以孝母為念聲相應而氣相求是可無一言以慰人子顯親之心耶及觀黄氏年十九嬪於吳曾未幾而夫死涕泣誓不更嫁破衣弊屣身操井臼賣簪珥以㐮舅姑之喪日訓二子以學夜分乃寐男長以室女長以家閨門肅雍動止無纎毫愧悚淑徳著於鄉閭令名達於朝省足以表儀於當世矣若古之衞共姜曹大家班班經史者不是過也其同郡翰林吳公奎章虞公皆有叙述同里危素叙其詩曰世之人不能天其天而有愧於黄氏者多矣嗚呼我國家以仁義肇基朔土乾端坤倪靡不臣服列聖相承風教宏逺宜可以登三邁五超越乎漢唐矣夫何自兵興以來州縣披靡能卓然以正道自立者僅不一二見其餘賣降恐後不啻犬豕昂昂丈夫真無女婦之識良不悲哉且天下有可為之機而無敢為之士民情有向善之意而無激善之才遂使淳良化為梟惡骨肉轉為仇讐叛潰奔離益相戕賊聞黄氏操行如此彼獨何心朝廷百年休養之恩寧不辜矣此予讀黄氏詩文益有感焉宜夫徳人鉅卿咏贊不已盛朝所以旌其門復其家昭名於史册者豈偶然哉予又聞黄氏之子級以一介貧賤奮不顧身集鄉丁禦强暴里閈得全非其母訓之素能若是耶是皆可書淮南行省㕘政西夏余闕識染習寓語為蘇友作人若近賢良喻如紙一張以紙包蘭麝因香而得香人若近邪友喻如一枝栁以栁穿魚鱉因臭而得臭結交警語君子相親如蘭將春無夭色之媚目有清香之襲人小人相親如桃將春有夭色之媚目無幽香之襲人青陽集卷六
