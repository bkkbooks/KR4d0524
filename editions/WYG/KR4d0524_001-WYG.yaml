body:
  text: 詩卷二序卷三記卷四碑銘墓表卷五策書卷六雜著欽定四庫全書青陽集卷一元余闕撰詩擬古昔在西京日縱觀質前聞皇皇九衢裏列第起朱門借問誰所居丞相大將軍平明事遊謁車馬若雲屯芍藥調羮鼎狒狖鑄酒尊頌聲美東魯逸奏出西秦迴風薄蘭氣十里揚清芬東家有狂生容顔若中人謬言擬宣聖幽思切𤣥文著書空自苦名宦乃不振悠悠千載下安有揚子雲又昊天轉時律大火西南馳勁商發羣籟白露降嚴威攬衣起視夜明月鑒薄帷翩翩征雁翔唧唧寒蛩悲紅蘭委芳采柏葉亦離披喬喬千丈松孤生泰山隈凝霜裂其膚層氷斷其柢摧殘若傾蓋蒼翠終不移草木有至性明哲宜戒之白馬誰家子白馬誰家子緑轡縵胡纓腰間雙寶劍璀璨雪花明甫出金華省還過五鳯城君王賜顔色七寶奉威聲夜入瓊樓飲金罇滿繡楹燕姬陳屢舞楚女奏鳴箏慷慨顧賔從英風四座生一朝富貴盡不如秋草榮黔婁固貧賤千載有餘名擬古贈楊沛楊生仕州縣謀國不謀身一朝解印綬歸來但長貧茅茨上穿漏頽垣翳緑榛空牀積風雨蝸牛止其巾辛苦豈足念殺身且成仁天門山保寧知府楊丹梓人作記楊子博地志名山屢出王但言隠彌匿崇冠峙嵩梁井絡通遙甸天經列鉅障羣峰如菡萏歴亂發金塘玉壺既嶇崿天門逈開張宛虹連紫蓋丹泉濺石床入門䕃􅁱竹中夏若寒霜靈鳥多異色中林皆妙香耀真啓幽室積石構瑤房萬里秘㝠奥千秋阻秩望惟應學仙侣結桂共相羊送劉伯温之江西亷使得雲字祖帳依山舘車蓋何繽紛使君驅駟馬衣上繡成文中坐陳綺席羽觴流薄薰情多酒行急意促歌吹殷况我同鄉友同館復離羣初暘麗神臯遙望澄逺氛迴鑣望雙闕五色若卿雲蒼茫歲年徂東西岐路分道長會日逺何以奉殷勤惟有凌霜柏天寒可贈君送李好古之南臺御史都門相送處旭日動蘭暉綺樹鸎初下金溝絮漸飛分驂向逺道把袂戀音徽去去江南陌應看滿路威送普原理之南臺御史兼東察士安霜署起南天雲霄畫榜懸兩幃猶可對二妙古難全夏木籠雕檻風華度繡筵時應聯騎出誰謂非神仙送霍維肅令尹握手蘭宫外朝光滿徑塗山寒知塞近苑静覺鶯疎草草離罇既悠悠征輛驅還應軫時念不羡報金吾秋興亭涉江登危榭引望二川流雙城共臨水兩岸起飛樓漢渚深初緑江臯迥易秋金風揚素浪丹霞麗綵舟登髙及佳日能賦命良儔御者奉㫖酒庖人供膳羞一為山水媚能令車騎留為語同懷者有暇即來遊安南王留宴將命坐藩服式禮奉國賔賢王重意氣延客到華裀肅肅髙堂上圓方饋八珍齊優雜趙女歌曲一何新遺響從風發雕梁落素塵中觴每傳滿眷眷難具陳厚徃已有愧懷報恐無因九日鄂渚登髙南州理秋祓嘉節協乾陽爰與幕中友臨眺陟崇岡維時天氣肅芬菊已沾霜霤霤風振谷凄凄日在房髙雲斂楚岫曜景遊川漲微徑出丹林列坐泛金觴佳賓未易合良會安可常英曹幸文雅獻酬寧計行預恐還吹㡌煩君戒太康吕公亭鄂渚江漢會兹亭宅其幽我來窺石鏡兼得眺芳洲逺岫雲中没春江雨外流何如乘白鶴吹笛過南樓詠井上桃花本是仙源種移來禁中栽為愛妖嬈色偏臨露井開先天觀仙客鍊金地蒼山深幾重至今龍虎氣猶在琵琶峰峰前石路整金澗垂楊嶺萬壑閟阿宫千年奉丹鼎日日采三秀人人吹玉笙既要王子晉復命董雙成方朔金門步春來多自豫青鳥幾時還銜書寄君去北闕懷美禄南山思逺遊勞心如御水東去復西流黄鶴樓嶕嶢黄鵠嶺巋巍構楚材澄江還畫楯連城抗鉛階雕衡朱鳥峙淵井緑荷開隠見長沙渚想望陽雲臺晴霄一仰止輪奐信美哉淮南儻好道日夕化人來别樊時中桃花灼灼栁絲柔立馬看君發鄂州懊惱人生是離别不如江漢共東流宴晴江山拱北樓漢坻開繡閣蕭然似渚宫晴江華楯外列岫綺錢中樹色青罇緑荷花女臉紅賢王敬愛客樂宴意何終山亭會琴圖連山環絶壑雲木亂紛披中有抱琴者有如榮啓期蕭然久不去問子欲何為絶塵軒網軒開翠崿山水下葱蘢江中寶牀擁樹杪畫欄紅心融二障滅境静六塵空應似青蓮葉齊開緑水中壓雪軒軒轅鑄鼎處仙臺成畫圖寒雲生洞渚暝色入蒼梧如霧飄丹閣非烟起玉爐年年漫來此無處挽龍胡大别山柏樹竒樹如蛟蜃盤骪上虛空孤生雖異挂半死反如桐香帶金爐氣色映綺錢中靈從后皇服年隨天地終常瞻北枝翠終古鬱葱葱竹嶼秋水鏡臺隍孤洲入淼茫地如方丈好山接會稽長紫蔓林中合紅蓮葉底香何人酒船裏似是賀知章題虞邵菴送别圖南州山水麗中田歲事豐時貞文物粲道合朋輩同濟濟衆君子班坐䕃青松迴洲環偃月丹林結綵虹翔鷗方矯矯鳴雁亦嗈嗈即趣情已展染翰思彌工予亦幽棲者纓冠朝北宫披圖誦佳詠邈爾想髙風送危應奉分院上京峽路傳清警金輿夾綵旃還如向姑射詎比幸甘泉苑樹紛成幄關榆始委錢從臣偏寵近載筆幔城邊題段應奉山水圖二首水如剡溪水山似剡溪山想見鱸魚美扁舟常不還花隠玉堂署曲几對雲峰為問江南客何如九里松嘉樹軒為胡士恭作嘉植將百歲積翠廣庭間髙柯出閭巷低枝䕃井榦流膏從風颺芳氣散如蘭别有清霜節將同綺樹看鶴齋為薛茂𢎞道士賦葉縣飛鳬舄琴髙駕赤鱗豈若青田鶴蕭灑迺仙倫刷羽琪樹側振唳華池津鶱騰望霄漢逸氣已沖辰鍊液諒有驗滅景入無垠還乘過緱嶺舉手謝鄉人禎祥菊為實喇卜院使賦舊花已萎絶新花迺再芳都縁禀金氣特解傲司藏旖旎生殘馥葳㽔出故房應憐蕙草質戢頴委微霜賦得九里松送吳元振之江浙左丞結駟向青郊松隂九里遙言從天竺寺自度小春橋偃蹇成芝蓋蕭瑟䕃蘭橈相送將何贈期君保後彫龍丘萇吟贈程子正戰龍起新室羣鳥亦翩翩偉哉龍丘生抱琴歸故山仰視天際鴻俯弄席上絃清音發疏越逸響遺澗泉悠悠鳯翔漢婉婉虬媚川清風自千古何用能草𤣥送觀至能赴歸徳知府善理崇富教長郡等烹鮮况兹久彫瘵望治切宸淵紆組承明裏結駟雙闕前燕郊芳草歇商墟大火懸髙懷薄霄漢攬轡殊慨然揆予昧時用載槖從甘泉庶聞兩岐詠為予書汗篇送黄紹及第歸江西上林華落盡東門餞别初遊絲横輦道金波溢鏤渠含觴不能飲躑躅此城隅念子正英妙丹泉媚緑蕖翻然阻山岫邈爾問離居芸閣誰同坐蒲生孰共書時應有詞賦為寄北飛魚送胥式南還孟冬寒律應原野䧏繁霜客子倦遊覽結笥還故鄉驅車出城闕旭日懸晶光綺宫上爛爛翠閣後蒼蒼豈無京華志晞景發清揚富貴在榮遇貧賤有安行恒恐歲年迫臯蘭凋紫芳君看沙上雁鶱翮乃隨陽題果囉羅易之四明山水圖窓中望蒼翠春木起晨霏孤嶂纔盈尺長松未合圍蕭蕭此仙客日日候岩扉念爾空延佇王孫且未歸題黄河清艮岑幽居大明照四海之子乃陸沈逺絶仁義絆結宇幽藪隂薈翳谷中路嶄崱北山岑窓鸎響初䕃隴月頽夕林時憑曲水几蕭散發長吟委化諒為逹滯樂恐遂淫援琴鼔招隠念子為薰心題施氏西嶼書堂中智得貴性得性非易求羡君淠水曲松竹蔽層丘春秋當佳日兄弟各命儔摠轡凌晨術展席靣緑流參差瓊峰出泓澄綺磧周緗荷承繡宇黄鳥響疏樓起坐玩芳帙為樂鮮優游河陽恥巧宦建春厭旅愁安得周公瑾為舘孫仲謀送方以愚之嘉興推官帝仁同禹泣典憲輟朝纓我友膺時選銜命出承明是日芳節屆列餞多鉅卿桃花疑組色鳥囀雜歌聲仰獻一杯酒逺慰千里行丈夫有逺業文墨非所營勉布惟良政持用答皇情玉雪坡為周伯温賦江梅有至性能怡君子顔開花競芳節擢秀帶春寒惟與玉同色還嗤雪易殘芳香拂羅袖如薰金博山置此賓席上人人别意看題劉氏聴雪樓羣峰擁臨檻倄竹鬱菁菁䕃向曲池好聲惟雪夜清天寒三日臥人道是袁生題光禄主事虎仲桓海棠圖沈香羯鼔打春寒纔見開時又見闌爭似君家屏幛裏年年歲歲有花看送王其用隨州省親都門楊栁萬絲垂城下行人駟牡騑宫中近得三年謁篋裏新裁五色衣漢臯秋晚遊娼少夢渚波寒獵火微我有愁心似征雁隨君日日向南飛題果囉羅易之鄞江送别圖欲去更還顧依依戀所知今朝去京日似子渡江時宋顯夫學士輓詩紫陌暗蒼茫松門近太行悲笳翼蜃軸素紱引魚荒故筆誰探取神書永共藏愁尋持槖地秋隂結女牀馬伯庸中丞哀詩結纓趨魏闕俛仰二十霜化運易遷逝故老今盡亡維時遊公門時節㑹髙堂崢嶸奉餘論炫燿希報章制若縟繡陳聲若寶瑟張儀若龍文鼎爛若照夜璫芊眠出工巧幻妙極豪芒抽思究皇術振藻詠時康是時朝廷上才彦羣有望公如逸虬出萬驥為留行念此今已矣松栢杳茫茫驅車入珂里穹門委舊衡珠移青淵涸桃盡故蹊荒龍火出勁秋玉衡變春陽朝榮計已殞夕香豈不芳感彼推輪始惻惻我心傷祝蕃逺經歴輓詩逸軌無還轍驚川有怨思蒼苔生舊舘素簡委空帷龔勝誰相弔虞翻少見知惟應問道者廬墓薦江蘺題紅梅翠竹圖竹葉梅花一色春盈盈翠鈿掩丹脣休言畫史無情思却勝宫中剪綵人題蛾眉亭空亭瞰牛渚髙高凌紫氛澄江萬里至華崿兩眉分落日兼霞綵流光成綺紋憑軒引蘭酌休憶謝將軍南山贈隠者君家南山下南山果何如開如陣雲黑向背凌空虛木客采薜荔怨女詠蘼蕪何當牽白犬見君巖下書賦得慈恩寺塔送李惟中赴西臺侍御祇園開塔廟遐瞰盡三秦琱玉裁文陛金銅結綺輪髙標雙闕外流影灞陵津攬轡還登眺題名繼昔人蘭亭奉節過東鄙摠轡臨越墟覽此崇山阿亭樹猶晉餘陽林積珍木禊舘疏鏤渠㣲風旋輕瀬宛委寫成書秋杪霜露滋清商滿縣隅紅蓮彫綺蕋微瀾見躍魚藉芳泛羽觴視聴良有娛逍遙大化内豈必三月初汪尚書夫人輓詩喧喧引長紱簫鳴閭井間旌連綺霞閣路指敬亭山泉㡳鸞臺掩城中翟蓋還尚書老歸國誰與襲芳蘭贈澄上人壞色衣裳䕶七條手持經卷意蕭蕭頭陀寺裏相逢後又向天台訪石橋贈山中道士善琴山中道士緑荷衣新抱瑤琴出翠微已與塵縁斷來往逢人猶鼔雉朝飛題紅葵蛺蝶圖蛺蝶既無數秋花亦滿枝終焉不飛去似怨弄芳遲自集賢嶺入大龍山皖公標楚甸兹嶺孕竒形翠積樅江滸崇冠吕䝉城戒途入中林平岡駐我旌延望失來術周覽多所經峩峩石窓矗窅窅巖岫㝠離離雲朝隮粲粲樹敷榮關弓射鳴雁羣谷振絃聲仰憐山人居俯悦洞下耕蒼龍啓春候金虎收光精欋家既非學農用或可明顧言同載者為爾鑄阿兵安慶郡庠後亭讌董僉事亭名天開圖畫鯨鯢起襄漢郡邑盡燒殘兹城獨完好使者一開顔省風降文囿弭節遵曲干雙池夾行徑累榭在雲間天凈羣峰出地迥蒼江環霞生射蛟臺雁没逢龍山開罇華堂上命酌頫危闌主人送瑤爵但云嘉㑹難豈為杯酒讙樂此罷民安魄淵無恒彩清川有急瀾明晨起驂服相望阻重關題周伯寧畫殺機起無象平陸忽成紅蒼生既猛虎日馭經紛虹舉目墟里間但見蒿與蓬惟有王官谷于今似畫中九日宴盛唐門今日良宴集玉帳設金縣賔稱此嘉辰令徳應重乾凄凄秋陽升湛湛江景鮮西馳三澨津東瞻九華山文湍帶粉堞卿雲覆綵旃清歌送銀爵泛此秋花妍嗟予逺征人别家今四年采薇夜歸戍操築朝治垣微此一日歡苦辛良可憐中腸感前謀撫運當泰年燔柴盛唐郡泛舟樅江前臨川射長蛟雄風推八埏豎儒繆從役任重力迺綿武功既無成文徳何由宣微勲倘有濟敢愧魯仲連登太平寺次韻董憲副蕭寺行春望下方城中雲物變凄凉野人籬落通􅏦口賈客帆檣出漢陽多難漸平堪對酒一罇未盡更焚香憑將使者陽春曲消盡征人鬢上霜三月廿九日郡庠後亭讌盧啓先僉事晨集疑江渚列席當蕙楊斯亭信顯敞翠嶺帶澄川潮駕宜城步山積司空原青松紛被徑紅桃競發園衆賓起為夀繁轉出嬌絃中觴念逺離歲行已再遷漂萍有時合浮雲未見旋今朝不為樂來會知何年寄題環秀亭五祖寺宗老來相報黄梅盗已平傳聞一峯下還有九江横象構誰能壞香臺積可成憑詢幾小刼又復到昆明題溪樓溪水緑悠悠髙樓在溪上日暮望江南舟中采菱唱奉和㫖南上人喜雨之什叔良雖不作詩不妨一觀也出車横門道采薇皖溪水雜耕不逢年軍士常飢餒奉牲走羣望悃迫忘汝爾皇皇大司命配天奠南紀方屯啓時澤拯民出瀕死雲章變膚寸雨勢來不已睇嶺三峯深行阡九江起開房各菶菶擢葉方泥泥説郊君牡騑饁野田畯喜未論車箱滿已見沽酒㫖斯民既云樂兵甲行可洗赫靈有耿祉夀夭誠在已淫隂無往轍薄伐有凶理撫事非偶然凉薄那致此騁辭繼周頌屢豐自天子送康上人往三城嘗登大龍嶺横槊視四方原野何蕭條白骨紛交横維昔休明日兹城冠荆楊芳郊列華屋文纕被五章乘車衣螭繡貴擬金與張此禍誰所為念之五内傷豎儒謬乘障永賴天降康樅陽將解甲皖邑寖開疆耕夫縁南畝士女各在桑念子中林士振策亦有行我聞三城美龍嶺在其傍連林積修阻下有澄湖光明當洗甲兵從子臥石牀七哀殷武誦罙阻周魯歌東征聖哲則有然我何敢留行斬牲祀好畤釁鼓起前旌野布魚麗陣山鳴鐃吹聲函關何用塞受降行已城路逢故鄉人取書寄東京寄言東京友勉樹千載名一身未足惜妻子非無情葛編修輓歌景光昔别情何樂今還語向誰幽房通貝闕空館􅇢蕪絲未過徐公墓徒懷有道碑扁舟望湖曲清淚濕江蘺凌孝女詩王裒廢蓼莪女亦有凌娥哭魚奉慈母凄凉䕃女蘿幽叢啼蕙露芳樹罷鶯歌迢遞城南路諸姑將謂何賦得鉅野澤送宋顯夫僉事之南山堤上栁沈沈春蒲泛渚禽濟田東滙闊汶水北流深落日依中沚浮雲積太隂微茫看不盡渾似别時心夜坐和成太常二首片月生碣石微光挂玉弓秋河空窅窕遙映建章宫哀鴻知時節南飛正匆匆感君思親咏惻惻此心中牽牛表宫雉華星動綺錢沈沈鳷鵲觀悠悠清漏傳無才愧三益虛食念百㕓綿思至中旦莫繼瑤華篇送張有恒赴安慶郡經歴曉路通髙嶂春城入大江草生垂釣浦人語讀書窓肅客移茶鼎行田載酒缸幕竂誰得似髙步絶紛龎宋祭酒輓歌二首文章知有數耆舊忽先零東井開圖畫西山閟爽靈司徒虚執饋太史早垂銘悵望平原繡時時問客心東閣哀長别南宫闕嗣音相知誰復舊為報果如今江漢無時返奎文永夜深凄凉釣魚地落日下遥隂謝堯章妻輓歌草滿章臺墓松欹石柱廬憶歸司𨽻里能誦伏生書夜哭聞茅店春祠雜筍菹傷心夫與子塵簡若為舒送李伯寔下第還江西之子不得意南行無怨辭官河人杳杳客路雨絲絲古木淮隂市春城孺子祠悽然千里别為賦小星詩美浦江鄭氏義門省風浦江滸憑軾歴髙門借問居幾何九世今不分觧驂青松林愛此季與昆檢身事先訓禮度尤恭温生祥亦何用有後天所敦常棣閔叔咸厲階悲婦言一朝或罔念喪敗寧具論清源無濁流芳蘭有競芬摛毫誦勿替勉哉賢子孫大口迎駕和觀應奉韻二首晨光開翠崿廣路净炎氛玉䭾度流水華蓋爛垂雲既御大宛馬還朝鯷海君都人望旌纛樂哉歌采芹仗出彈筝峽川原彀騎分天行肅大化時邁耀前聞整蹕傳清道激吹入行雲日暮望雙闕草木亦欣欣送王開赴泗州行捕提舉蒼茫吳楚會縱横淮坂流春氷未泮渚芳杜已生洲揚旌朱樓前張獵青山幽獻功效大兕亦致公子裘逍遙足為樂何嗟晚不侯待制張廷美姑阿慶詩葭菼啓望國灼灼詠桃夭操觚染芳藻短髪未勝翹始聆白雪句兼傳黄竹謠蘭萌初映砌春霜已降霄秋榛覆故隴驚蓬颯迴飈金尊與瑤席庶足奉阿嬌雲松棲初日髙樓上卷幔對黄山黄山出霄漢爛漫發青蓮參差非一狀朝夕看屢妍九華承雙舄敬亭附駢筵漫漫雲罨嶺沈沈松覆泉清飈坐中起如聞帝女絃静有幽事樂動無塵慮牽逍遥悦心目兹道可長年楊平章崇徳樓重城控秋塞丹樓耀芳甸頳霞上氛氲蒼林下葱蒨長河城邊急積岫窓中見逺雁滅居延行雲歸鄯善大賢謝卿相垂幃化鄉縣春蟲觸寶瑟餘花飄玉硏方從董園樂陋彼歌梁轉伊予去山澤寒齋秋草徧載覽登樓篇益重臨淵羨八月十五日處州分司對月𤣥武夕始正華月生秋旻金波何穆穆緑桂滿中輪徘徊出西陸照耀此甌閩光流河宿隠氣隨商律振餘輝動軒房紫蘭含微津皇天降嘉歲五政亦已陳樂哉一巵酒允矣同庶人有所思春風起寒色春衣方重熏新裝捲羅幕清唱入行雲艶色若流月芳澤謝蘭芬嬋娟信無度我思何在君長安陌浩浩長安陌瓊樓夾廣㕓鴛鴦御溝上芍藥吹樓前駿馬追韓嫣金尊約鄭䖍功名有時有且得樂當年伯九徳興學詩上徳撫𤣥運籲俊尹神京三雍烝髦士五學訓齊氓登歌陳羽縣鸞刀奉麗牲優游樂清化大道嘉方行送孫教授皇情重聲教宵裝爾載馳邊城南徼外禮殿左江陲揖讓陳椰器弦歌䕃薜帷全勝宜春郭花落閉門時賦得君子泉送彭公權為黄州教授君子没已久遺井郡齋中本寓思人意兼全澤物功銀牀駁故蘚玉甃落寒桐幾日趨官舍横經誦養蒙賦得春雁送司執中江西憲幙春風起蘋末旅雁尚四翔乳鴨嬌同啑新蒲短可藏應懷洞庭水非避塞垣霜客路頻懷舊題書寄帝鄉賦得蛾眉亭送王徳常御史赴南臺江亭望華崿望望似脩眉掃黛偏能巧含顰知為誰娟娟微雨裏脈脈夕陽時千里乘驄去因之傷别離南歸偶書二首帝城南下望江城此去鄉關半月程同向春風折楊栁一般離别兩般情二月不歸三月歸已將行篋換征衣殷勤未報家園樹緩緩開花緩緩飛别樊時中亷使光禄橋西惜解㩦春星欲傍露盤低自來宫栁多離思更着城烏在上啼題段吉甫助教别墅圖玉署掛新圖如君舊隠居峰髙乃霞上葉變是秋初游客看常在溪聲聴却無只此同登望豈必命柴車青陽集卷一欽定四庫全書青陽集卷二元余闕撰序送歸彦温赴河西㢘使序河西本匈奴昆耶休屠王之地三代之時不通於中國漢始取而有之置五郡其間自李唐以來拓跋氏乃王其地號為西夏至於遼宋日事戰伐故其民多武勇而少文理然以予觀之予家合淝合淝之戍一軍皆夏人人面多黎黒善騎射有長身至八九尺者其性大抵質直而上義平居相與雖異姓如親姻凡有所得雖簞食豆羮不以自私必召其朋友朋友之間有無相共有餘即以與人無即以取諸人亦不少以屬意百斛之粟數千百緍之錢可一語而致具也歲時往來以相勞問少長相坐以齒不以爵獻夀拜舞上下之情怡然相讙醉即相與道其鄉鄰親戚各相持涕泣以為常予初以為此異鄉相親乃爾及以問夏人凡國中之俗莫不皆然其異姓之人乃如此則其親姻可知矣宜其民皆親上死長而以彈丸黑子之地抗二大國傳世五六百年而後亡非偶然也自數十年來吾夏人之居合淝者老者皆已亡少者皆已長其習日以異其俗日不同少貴長賤則少傲其長兄强弟弱則兄棄其弟臨小利害不翅毫髮則親戚相賊害如仇讐予猶疑江淮之土薄而人之生長於此者亦因以變及以問夏人凡國中之俗今亦莫不皆然其於親姻如此則異姓之人可知也夫夏小國也際時分裂而用武必不能篤於所教而區區遐方教之亦未必合於先王之法及國家受天命一海内收其兵甲而摩以仁柔養之以學校而誘之以利禄今百餘年於兹絃誦之聲内自京師逹於海徼其教亦云至矣而俗迺日降如此吾不知其何説也我祖宗之置肅政亷訪司於天下大要以風俗為先而其職以學校為重故世謂之風憲是得先王為治之意也故嘗選任尊官非道徳爵位出乎庶僚者不得與是選所以為民表也今皇帝用嵬名公為御史大夫公乃歴選朝著盡拔諸名臣為亷訪使而吾歸君彦温以樞宻院判官而為河西君少擢科目能古文辭有大節由國子博士五轉而遷是官今為亷使於夏必能興學施教以澤吾夏人吾夏人聞朝廷以儒臣為尊官以蒞巳必能勸於學以服君之化風俗必當丕變以復於古其異姓相與如親姻如國初時如余所云者矣故道吾夏之俗以望吾歸君焉送月彦明經歴赴行都水監序中國之水賴禹治之而悉平而河獨為患至今未已者何也河失禹之道而治河者不以禹之所治治之也蓋河出崑崙合諸戎之水東流以入中國其性勁悍若人性之有強力其來也甚逺而其注中國也為甚下又若建瓴水於峻宇之上則其所難治也固宜且中原之地平曠夷衍無洞庭彭蠡以為之滙故河嘗横潰為患其勢非多為之委以殺其流未可以力勝也故禹之治河自大伾而下則析為二渠大陸而下則播為九河然後其委多河之大有所瀉而其力有所分而患可平也此禹治河之道也自周定時河始南徙訖於漢而禹之故道失矣故西京時其受患特甚雖以武帝之才乘文景富庶之業而一瓠子之微終不能塞而付之無可奈何而後已自瓠子再决而其流為屯氏諸河其後河入千乘而徳棣之河又播為八漢人指以為太史馬頰河者是其委多河之大有所瀉而力有所分大抵偶合於禹所治河者由是而訖東都至唐河不為患者千數百年或者以謂王景隄防之力乃大不然使無屯氏及徳棣諸河河之大無所瀉而力無所分景以尋丈之防而捍猶螳螂之臂而可以捍大車之奔吾不信也惟河之委既多大有所瀉而力又有所分景之隄防特以捍漸水之衍溢者耳比趙宋時河又南决至於南渡乃由彭城合汴泗東南以入淮而漢之故道又失以河之大且力惟一淮以為之委無以瀉而分之故今之河患與武帝無異余嘗以為中國之地西南髙而東北下故水至中國而入海者一皆趨於東北古河自龍門即穿西山踵趾而入大陸地之最下者也然河天下之濁水也凡水一石率泥數斗嘗道出梁宋觀河所决凡水之所被比其去即穹居大木盡没地中漫不見踪跡河之行於地也方數千年而河徙千乘自漢而後千數百年而河徙彭城然南方之地本髙於北故河之南徙也難而其北徙也易自宋南渡至今殆二百年而河旋北迺其勢然非有他説也比者河北破金堤踰豐沛曹鄆諸郡大受其害天子哀民之墊溺迺疏柳河欲引之南工不就又遣平章政事嵬名公御史中丞李公及禮部尚書台哈布哈公沈兩珪有邸及白馬而祀之河之患不已乃會諸老臣集議治河者諸老臣無能言其説獨尚書台哈布哈公以為當濬河棄道復引河以入彭城而待制楊梓义力以為棄道不可濬設使濬之而河未必能入廟堂無所從遣都水使者相其便害或者以為當築隄起曹南訖嘉祥東西三百里以障河之北流則漸可圖以導之使南廟堂從之迺置都水分監以任其事選朝臣之知水者為都水而吾同年月君彦明為元幕將行以問於余余不知河事者雖然諺有之曰不習為吏眡已成事以事已成者為君言則古所以治河者可見也今河惟不反故道則其勢可障而排之使南使反於故道由漢之千乘以入海則國家將無水患千餘年如東都與唐之時乎今禹之九河既不可復考而河亦不復徳棣之間漢人指以為太史馬頰河者尚未泯可尋究如縷河之道是將大有所瀉而力有所分非若一淮之小而扼其勢而使之横潰為吾民害也今夫廟堂之議非以南為壑也其慮以為河之北則會通之漕廢其係於朝廷甚重余則以為河北而會通之漕不廢何也漕以汶而不可以河也河北則汶自彭城以下必微微則吾有制而相之亦可以舟以漕書所謂浮于汶逹于河者是也余特欲防鉅野而使河不妄行俟河復千乘然後相水之宜而脩治之特一人之私言也朝廷方事隄防固無事此迺以彦明言者似迂逺而不切也萬一隄防不足以禦河則余之言或有時而驗焉故為之叙送樊時中赴都水庸田使序國家置都水庸田使於江南本以為民而賦税為之後往年使者昧於本末之義民嘗以旱告率拒之不受而盡征其租入比又以水告復逮繫告者而以為姦治之其心以為官為都水而民有水旱之患如我何於是吳越之人咻然相譁以為厲已會天子問民所苦迺以為民實水非姦遂劾逐使者破械縱民而以聞上朝議乃歴選公卿有學術知大體者為之使而吾樊君時中以江南湖北道肅政㢘訪使而選是職自君之來官僚協和吏畏民服政以大行命下之日無不相視嗟咨以惜其去獨其友余闕躍然曰東南民力自前已謂之竭矣况今三百餘年昔之盛者衰登者耗今其貧者力作以苟生富者悉力以供賦有持其産為酒食予人人皆望而去之其窮而無告甚於前世益逺矣其可重困之今而得賢使者以蒞之修其溝澮相其作息不幸而有水旱之災則哀矜而為之所民之窮者其少瘳矣乎今夫木之實繁者其枝披其本疏者其幹抜况於國與民乎哉故善樹木者簡其實而厚其本善為國者疏其賦而厚其民理之較然者也時中慷慨有大志臨大事果毅不擇利害而為之今其行也其能有以大慰吳越之民望以副朝廷之倚注也必矣二月初吉式發鄂城卉木繁盛賓僚具在各為詩以稱美之予故首序焉送范立中赴襄陽詩序宋高宗南遷合淝遂為邊地守臣多以武人為之九十餘年間未嘗一歲無兵革故民之豪傑者皆去而為將校累功多至節制郡中衣冠之族惟范氏商氏葛氏三家而已三家之在當時貴不過通判顯者或至知縣與府族亦未甚大也皇元受命包裹兵革休養元元民既富庶矣而又修禮樂定治具諸武臣之子弟無所用其能多伏匿而不出春秋月朔郡太守有事於學衣深衣戴烏角巾執籩豆罍爵唱贊道引者皆三家之子孫也故其材皆有所成就至學校官纍纍有焉當宋季時諸武臣之富貴眂三家蔑如也而百餘年之後惟儒家子入為弟子出為人師隨其才之大小皆有聞於時雖天道忌滿惡盈而儒者之澤深且逺從古然也范氏世多聞人立中尤通敏由郡直學為襄陽教諭宋亡時蜀流寓之士多在江漢意必有老成典型人也有老成典型人與之遊立中此行將大有得范氏之後有大顯者必立中也於其行也書以贈之李克復總管赴贑州詩序仁皇帝即位録懷來功致髙位者無慮數十百人獨韓國李公以甘盤之舊為最顯位平章總百度君臣一徳銳精治古而韓公相業見稱於天下後世者設科取士其最也元統初余忝論薦計偕如京師與諸同年求韓公子孫得今伯徴太常相往來又識克復屯田於京師比來佐泗州而君復為泗州屯田提舉日與君處念天下士所以復見前代賓興之盛者由韓公士不及見韓公見屯田不其猶見韓公乎且與太常同年辱使納禮故以太常之事君者事君朔月歲時必從諸僚友造君第君暇亦輕裘緩帶以一小吏持馬過我我必為之傾蓋而後去君色嚴而氣和有學而知體坐終日屹然於先朝人物故實無不熟而知聴其言亹亹如環之無端坐客無能置一辭也去年秋既書滿宰相以君有門閥且久更事非散地所宜處奏為贑州路總管州之長貳及諸屯田與九州之人往賀君闕在次舉琖拜君言曰仁皇帝之文徳入人也深天下不忘仁皇帝必及於韓公朝廷録勲舊家首言君斯文之興可俟矣請以為天下賀又曰韓公能以道術昌其家君兄弟能保功名以有光於韓公致中二千石請以賀君又言江之西文教之盛者曰吉曰贑多士彬彬焉人之所以厲於學科目之興也於韓公之始而厲於學獨不於韓公之季以治哉贑雖號難治君處之余知其為易也請以賀於是程泗州賦詩四韻坐客人士皆為詩以道其行使書吾說以為引楊君顯民詩集序我國初有金宋天下之人惟才是用之無所專主然用儒者為居多也自至元以下始浸用吏雖執政大臣亦以吏為之由是中州小民麤識字能治文書者得入臺閣共筆劄累日積月皆可以致通顯而中州之士見用者遂浸寡况南方之地逺士多不能自至於京師其抱材藴者又往往不屑為吏故其見用者尤寡也及其久也則南北之士亦自町畦以相訾甚若晉之與秦不可與同中國故夫南方之士微矣延祐中仁皇初設科目亦有所不屑而甘自没溺於山林之間者不可勝道是可惜也夫士惟不得用於世則多致力於文字之間以為不朽而文辭者有幸有不幸者不幸者至於老而無所用矣而其文又遂泯不顯是可哀也比年大江之南山林之士有挾其文藝遊上國而遇知於當世士之彈冠而起者相踵京師大官之家皆有其客而遇知於當世者亦比比有之若豫章楊顯民者抱其才藴不屑於科目甘自没溺於山林之間當士羣起而有遇之時而又終不肯一出以干時取譽是其中必有所負而然也予雖不識顯民然聞其人力學而操行通古今之務江南之士漸其澤而有名者甚衆其弟子之登科目仕州縣者亦能以政稱其家固貧而年又將老迺日蕭然吟咏以自樂無少怨怒不平之氣其殆古有道之士耶余讀而愛之其弟子凃頴持其所謂水北小房集者來京師將刻之以傳於世余為題其首使後知顯民南州之士有所負者也是蓋有道之士也貢泰父文集序余天性素迂常力矯治之然終不能入繩墨矯治或甚則遂病不能勝因思以為迂者亦聖賢以為美徳遂任之一切從其所樂常行四方必迂者然後心愛之而與之合凡捷機變者雖强與之然心終不樂也故暫合而輙去京師馳逐聲譽之區也迂非所宜有嘗隂以求之士大夫之間得一人焉曰貢泰父泰父故學士仲章君之子能詩文少游太學有時名因自貴重不妄為進取有所不可交者亦不妄與交故吾二人者驩然相得若魚之泳於江獸之走於林也時泰父為應奉翰林文字固多暇者即與聚盍有蔬一品魚一盤飲酒三行或五行即相與賦詩論文凡經史詞章古今上下治亂賢否圖書彞器無不言者意少適即聯鑣過市㨿鞍談謔信其所如而止及暮無所止則相與問曰將何之皆曰無所之也乃各策馬還自古暨今王公貴人能求賢常少然自至元初姦回執政乃大惡儒者因説當國者罷科舉擯儒士其後公卿相師皆以為常然而小夫賤𨽻亦皆以儒為嗤詆當是時士大夫有欲進取立功名者皆强顔色昏旦往候於門媚説以妾婢始得尺寸此正迂者之所不能為也因翺翔自放無所求於人已而皆無所遇予既歸淮南泰父亦以親嫌辭官歸除紹興推官不相見者為最久去年大原賀君為丞相蒐羅天下人才之有政譽者而泰父之治為浙東西第一迺得復召為應奉余適入朝為待制相見益歡計其别十年矣吾年少於泰父鬚髮皆白而泰父鋭然靣紅白如常出其别後所為詩文甚富且大進益知泰父真豪士也夫以士之賢無所遇而淹於下僚宜其悲憤無聊而不能盡也顧乃自樹卓卓以其餘力而致勤於文學且其貌充然非其中有所負蓋不能爾然則吾泰父之迂又過我逺矣夫古之賢士多不兼於文藝文藝雖卑而世且貴而傳之者愛其人故也不賢者之於文藝雖極其精人猶將賤之亦何以為也泰父忠孝人也其功名事業當不待文與詩而傳而况於兼有之耶余昔與之别今見其文如此今又當别去計相見時其文又必有過此矣於其行也序而識之送葛元哲序文者物之成章者也在天而為三辰在地而為川岳其在於人若堯舜之治化孔孟之道徳仲由之政冉求之藝一皆謂之文今特以言辭之精為文者夫言之精莫精於周公孔子二聖人之於言豈有求其精而然哉而其文何若是其蔚也揚雄司馬相如韓子歐陽子始號為工於文者彼其於周公孔子之文非不欲窮日夜之力極一世之所好孜孜焉追琢磨礪以求其精而卒不能至焉濂溪二程夫子之學其視揚雄司馬相如韓子歐陽子蓋有所不暇然味其言淵然而深雄然而厚睟然而醇使得列於聖門雖顔子曾子將不能過則夫言之精者又若不待窮日夜之力極一世之所好孜孜焉追琢磨礪以求至於聖人而後已此無他聖賢道徳之光積中而發外故其言不期其精而自精譬猶天地之化雨露之潤物之魂魄以生葩華毛羽極人之智巧所不能為亦自然耳故學於聖人之道則得聖人之言學於聖人之言則非惟不得其道幷所謂言胥不能至矣金谿葛元哲舊以文章名江南既擢第其文又傳於京師衆謂元哲之文宜為天子粉飾太平鋪張鴻業以傳於後世會有守宰之選遂以為興化録事余知元哲終以文選非久於外者也於其别也故與之論文送許具瞻序余讀周易之謙未嘗不掩卷而歎曰聖人待小人之心一何如是其至也夫陽君子也隂小人也小人盛則干君子故隂至三則履君子盛亦未嘗不下小人故陽至三則謙謙虛也陽本實而云虛者不自滿假故屈而下於隂也是謙以下為徳者也初而謙謙下而又下者也二則浸以上矣故以鳴謙鳴者以言謙也三則益上而位髙故以勞謙勞者以功謙者也以功而謙厚之至也厚之至而民焉有不服者乎故三之辭曰勞謙君子有終謙而民既服君子之道終矣謙既終民既服進而之四何施而不可聖人之心猶以為吾之待小人者未之厚也又自反而撝謙故四之辭曰無不利撝謙其徳已厚其謙已撝進而之五而小人者之終不可以化入也於是乎有侵伐之師故五之辭曰不富以其隣利用侵伐不富以鄰徳之盛也利用侵伐順之至也聖人之待小人至是可謂盡心焉耳矣昔者禹征有苗苗民逆命益之賛禹惟在於謙禹遂有舞干之舉此其所謂撝謙也謙猶撝而未格則其侵伐者禹終得而已乎哉祖宗受命迅掃六合以有堯舜所未有之天下聖天子紹承熙洽愛民猶子堯舜之仁不是過也頃者盜起海隅剽民財犯官漕其罪可誅而區區赤子又特一將校之力所能舉迺不以為罪止於招諭盜又止我省臣以求降此尤可誅也而亦從其請且曰徳不下宣此吏之罪遂盡變易瀕海之為宣慰及其郡縣之官選能當其任者得三十八人親御便殿給符傳而諭遣之嗚呼此所謂無不利撝謙而禹之所以待苗民者也三十八人之中天台許君具瞻當治鄞具瞻佘同年進士也其行端潔其材勇以幹前知武義時攝金華縣事武義之民羣訴憲府請還君金華之民亦羣訴於憲府留君不欲其去其得民如此可謂稱兹選矣故余為道聖天子愛民之深與夫所用具瞻者如此非惟勉具瞻亦以告夫民也贈刑部掾史劉彦通使還京序舒岸大江為城北走英頴南亘畨歙西通黄蘄湘漢鄂岳東距鳩巢所謂四通八逹之地也自兵興所在從亂舒介其間而獨徇義秉節不與之共戴天故羣盜環攻之舒亦不少屈撓日治矟㦸弓矢以與之相格鬬盗大至則男操兵婦給餉童子負瓦石空巷乘城與之決戰如是者今五年其勞如此故其富者日貧而貧者日死以耗入其市㕓里蕭然適其野榛莽没人不見行跡至其館簠簋不治餼牽不具委積不充使者之道此怒而去者往往有焉其以公事來者多眂賂以為喜愠喜為春温愠為秋凜或怒而去則民相與踧踖曰禍其始此耳不甘食安處者累月而未寧逮無事迺已浚儀劉君彦通為秋官掾亦以事來居郡浮圖每食蔬一器飯一盂饋之珍羞則辭賮之財則艴然以怒持節至軍中勇者執手以勉之創者涕泣以勞之其居此特久而民愛之如始至惟恐其去已也傳曰有功而見之則説也君重其民情而閔其勞民之説也亦其宜也臨川毛順孫愛君尤至與士大夫賦詩以美之余故處合淝知君為掾亷而有能以為士之美君者非譽也故序而冠諸其首髙士方壺子歸信州序堯舜之時以幽幷為朔易元興舉堯舜未有之天下而一之而幽并始為土中以為四方之極然其地去荆揚數千里而氣苦寒而多風非其土著至則手皸而足裂其居處服食異用絺葛果茗魚鱐之物不能以易致皆性之所不便故南方之人其至者恒少非為名與利無從而至焉又况浮圖老子之徒以遺外世俗為道其於名與利蓋有所不屑故其至者尤少或至焉者則亦名利之人也髙士方壺子至正中至自信州余始遇之以為名利之人也徐與往來見其氣洎然其貌充然人與之談當世之事則俛而不答獨其性好畫人以禮求之始為出其一二皆蕭散非世人所能及嘗為余言太行者天下之脊而居庸古北者天下之岩險也其雄傑竒麗非江南之所有天府之藏王公鉅人之所有皆古之名畫余所願見者今皆見之而有以慊吾志充吾之所操吾非若世俗者區區而至也余曰賢哉方壺其古所謂善操技者與夫輪扁之為斵知斵之為美不知有王公之貴知斵之為得不知有晉楚之富故其為技也古今之善斵者莫加焉今子幾於是矣其有不臻於古者耶吾黨之學者苟遷於物其尚能望子耶於其行也相率為詩以贈之聚魁堂詩序安慶郡文學秦宗徳持其友人豫章嚴撰書來請曰去年丙申江西行中書之鄉試也臨江貢士有曾魯者偕其友廬陵解蒙髙飛鳯劉倩玉俱就試寓止同舍往還復同舟而載拆號四人者俱在甲乙選列捷報至髙與劉解乃留魯家鄉人因名曾氏之館曰聚魁堂云僕與魯姻婭也復率大夫士之能文辭者賦詩美之謂宗徳常獲私於公書來請序願勿辭將以為榮焉余曰科目取士吾嘗司文衡於中外矣退而攷其所得父子同榜者有之兄弟聯名者有之師生俱在選者有之若同志同升鮮有聞如曾魯者也其理似不偶然豈有數存其間耶然不足泥也余惟愛魯之交友得人而人之與魯交能登科目發身也由此而升以行道以致君以澤民將無不可吾意四方者亦當彈冠相慶矣則親朋賦詩以志喜也固宜宗徳曰斯言甚善請書以為序送李宗泰序淮東南西北道之地其民忠而能守國者三郡曰廬夀舒自盗興夀守先治戰備與民為守至輙敗然不能保其近地民無耕收而長淮之餉道义絶以致父子相食而後潰廬大郡其南沮澤之地大而有名者三十六俗名之曰圍地廣而足耕而守與將才下余嘗識之凡其日之所營夜之所思非宴樂之事則掊克之政也民有持耒耜於門者則曰召使奪而辱之民飢以死城大而不能守乃斂四境鄉兵以守之又無以食以賦富者大都剽吏殺人而莫之禁至以其兵去之城遂陷余至舒時國門之外數十里之地皆盗柵也幸戰而勝乃為攘剔旁近之地令民耕之築壘以䕶其作役其不能耕者時節與之繕城隍修矛㦸而又明其政刑平其賦斂治其爭訟朞月而頗張今民之勇者無敢譁弱者無所悵如承平時然惟教民之術有未治耳方將與學士修其庠舍共講唐虞治道天人性命之説則禍亂有不足定者若姑孰李宗泰志學而行端义吾所當延而禮之者也而力不足宗泰族人陷在姑孰者聞多自抜於宣將往來之又義之所不敢止者姑序吾懷而與之别藏乘法疏後序天下之書博者未嘗無要法五聲十二管可以盡天下之音聲十干十二支可以盡天下之甲子象形指事轉註諧聲會意假借可以盡天下之文字其統之有宗其會之有元充之而不窮合之而不遺知者創物其有功於世類如此佛氏有法疏書會萃名義而藏十二部之理無不在誠要法也西菴遂公罷講遊方二十年歸乃取而修訂之補其所未備白其所未明去其所未安明性相析機宜刋定名體目曰藏乘法疏濡須有道之士文公無學以衣資若干貫刻之板以惠四方昔卲子皇極經世以元會運世衍為十二萬九千六百年以盡事物無窮之變其文博其義富蔡西山撮其機括為指要一編其有功於卲子大矣遂公之書是亦大藏之指要與余讀傳燈婆子請趙州轉經繞禪床一帀云轉經已婆云只轉得半藏半藏全藏姑置勿問五千四十八卷一周行頃何為而轉之此又西菴不傳之妙因書之卷末在學者所自得青陽集卷二欽定四庫全書青陽集卷三元余闕撰記含章亭記坤者天下之至文而世謂坤為含章者美而含之六三之事非盡坤之道也嘗觀於地山川之流峙至文也風霆之流形至文也鳥獸草木之彚生至文也故夫子贊之以為光大又以為化光又以為美在其中暢於四肢天下之文孰加焉而三獨含章何謂也夫乾尊道也坤卑道也故乾主於五而坤主於二若三四者爻之無位者也乾之四近於尊故曰或躍或可以進也坤之三近乎卑故曰含章可貞可晦而可用也夫子釋含章可貞以為以時發者相時而動之意故曰可者僅詞也若四近於尊而括囊矣上儗於尊則龍戰矣是故龍君象也若六五者可謂至尊而非據矣自非中徳何以能吉故曰黄裳黄中之色裳下之服夫惟有是中徳故不失其體也無棣徐君子謙博古而通今自監察御史郎官署為諸道肅政亷訪使者政理蔚然俱可謂之文矣惟坤之六二可以當之非六三之事而其名亭謂之含章者人不知其所云也余與君處江夏凡期年知君之為人沖然賢者也曾子稱顔子以為以能問於不能以多問於寡有若無實若虛君嘗慕而師之羣居相與不言不知其有藴也然則君所謂含章者其必以此豈世所謂斷章取義者歟君曰子之言然雖然子論含章先儒所云請求諸通經者而質之穰縣學記學校之教聖人所以盡人性者也夫人之性天命也天命者諸生徧予者也其理仁義禮智其器君臣父子夫婦長㓜朋友其文昏喪冠祭朝覲會同射飲軍蒐此性之體然也若夫忠信也而流為殘賊禮讓也而流為爭奪文理也而流為淫慝此性之失而非其本然者也聖人人之綦隆也是故為之學校之教師法之化禮義之道所以正人心而定天命也而世儒之言有曰殘賊爭奪淫慝者性也必賴聖人為之教然後忠信禮讓文理興而生人之道立是不知性者之言也今夫鳥之鷇也飛而逐其雌獸之生也走而軼其羣然止於飛走而已也惟人之性其天命者也是故充其知可以通晝夜之道而知死生之説推其才可以參天地而贊化育何也所性而有故也今曰性無善也必聖人為之教而後善則敺鳥獸以由于學校之教師法之化禮義之道亦可以為忠信禮讓之理也其可乎是故桮棬棟宇聖人所以盡木之性也引重致逺聖人所以盡馬牛之性也學校之教師法之化禮義之道聖人所以盡人之性也其教已立其化以行其道以成之後於是忠信立而殘賊息禮讓著而爭奪寡文理明而淫慝平其動之也神其漸之也深則夫民之心可與為善可與為惡可與為治可與為亂夫豈奪之以惡而與之以善易之以亂而誘之以治使其民至於如是哉亦盡其性而已矣有弗若於吾化弗迪於吾道者然後為之刑政以齊之則刑政者先王所以輔治而未嘗以為先也是故教成而王政成而霸咸無焉而亡其道有大小而其教有淺深如此自先王之迹息而天下之治皆苟且由其知治而不知教而其甚者遂至亂亡相尋終莫能勝民之棼棼者皆不考乎此大元之興百有餘年列聖丕承日務興學以為教黨庠塾序徧於中國雖成周之盛將不是過夫穰大縣也自入職方以距于今吏猶未能為民立學蒙古伊嚕布哈君來監縣乃曰學校之教先王為治本也遂出其田禄以為民倡民歡樂之乃買地於州治之西攻其正位肖孔子及顔子以下十四人之像於殿餘七十二子以及諸儒之從祀者悉繪之於兩序後為學舍廩厝以安居其師弟子前闢門道屬於大衢立表而題其上曰穰縣之學學甫成會天子以學校考吏課君方樂有學校教民也而乃以憂去其同年友成君遵寔家於穰入朝為禮部郎中言君所以待穰之民甚厚而篤於教思如此故既去而民至今思之而恐後之未知所以教而民未知所以學也為予誦其所聞以告之君操行廉白為政以愛民為本日常偲偲然若已傷之是可謂良有司也况予於君亦同年也故為記之湘隂州鎮湘橋記湘水出零陵北至湘隂入洞庭而湘隂諸山谷之水則會於城南為東湖以入湘方春夏時水潦降而洞庭漲則湘水不能入湖因以湠漫為大浸州為湖南北孔道凡行者之陸出與夫鄉民之有事於州者每涉湖則有風濤之虞否則又為舟人還阻之患宋之時州有鄧氏媪率其田人作大堤絶湖以屬之州為二木橋以釃湖水行者徳之謂之鄧婆橋當徳祐末橋毁官為復之至大徳中旋敝州人黄仲規乃以私財命其子惟敬率衆為石橋南北楗石為崖中纍石為髙柱布木靣石其上為屋九楹覆之以與民為㕓易其名曰鎮湘橋歴四十餘年至元初覆木又敝屋且壞惟敬之弟惟賢惟徳徳發其帑得錢萬貫以告州人將卒其先之功州人樂為相之又得錢二萬五千貫乃撤覆木施石梁更作大屋中為道左右為市肆橋廣若干尺袤若干尺上可以任大車下可以通千斛舟飾以綵繪逺而望之爛若隂虹之飲湖中行者之􅉨來與州人之市於此者若由康莊而履堂奥不知其有湖之阻也夫水天下之至險聖人為之舟楫以濟民而舟楫需人之力人之力有限而涉者之無窮也不須人而能濟有無窮之利者惟橋為然夫橋之利大故其費亦大非若一舟楫之可易具非有司與大家之力則不能為黄氏非有大作業大廩藏而為有司大家之事力有不足至父子相承乃克成此夫亦難能也惟徳之子天禧有才藻通經術屢領鄉薦余校藝鄂渚時得其文以置前列其擢第也將亦易然黄氏有子如此必多益於人如是橋類也故為記之漢陽府大成樂記禮樂出於天而備於人卑髙以陳者禮也絪緼而化者樂也故禮者天地之大節樂者天地之大和其體極乎天蟠乎地其用行乎隂陽而通乎鬼神夫人者天地隂陽鬼神之會而禮樂者觀㑹通以行其道也其君臣上下賓主之有其文升降揖讓綴兆清濁之有其度禮以著節樂以為和節以别同和以合異是皆天之所畀而非人之所為也然心天命也欲心生也欲熾而無以治之則心梏亡矣禮樂者先王用之以迪民心而定天命者也是故朝覲會同禮樂以接郊社廟享禮樂以成軍旅賓客禮樂以治用之於天神格用之於人鬼享用之於民而民事治故習俗美而侵侮蕩淫之心無自而生天下之大政豈有出於此者哉洪荒之道邈矣堯舜以還歴夏商周禮樂始備而天下稱為極治成康之後浸以就弛至春秋而壞爛極矣漢之時禮雖麤具於經而亡散者亦已甚樂之道蕩然雅頌所存特其文而已耳是故其禮失者其俗汙其樂濫者其教衰天下之治所以不及於三代者禮樂不足之故也皇元之興諸事未遑即定著孔子廟祀之禮既又令天下廟祀用大成樂令雖具而吏亦鮮能應詔制春秋奠薦類以鼔吹行事夫禮樂者以之習民使之飽聞而飫見之然後入人深而成功大孔子廟者鄉大夫屬民敷教之地而民幸有禮可以畧見先王之道而樂又不備由吏之為政不知本末與所先後也如此漢陽府孔子廟祀舊亦循用俗樂河東譚君知府事乃率其同寅相與出俸金作雅樂器教授余時獻以其事來請宰臣是之為遣一封傳作之平江數月而樂至為琴瑟笙笛塤篪各二特鐘特磬柷敔鞉鼔各一簫八編鐘磬各十六擇諸生肄習之八月丁丑有事於學宫人聲在上樂奏在下翕如純如疾舒以度禮儀既舉觀者咸作而歎曰禮樂之用大矣若夫子監於四代樂取韶舞其治所先在放鄭聲欽若彞教以迪民性夫禮樂之存有如餼羊薦于明靈永永是享於是州之士相與樂譚君之政而喜民復見先王之樂也咸願刻石樹之廟廷余為之書而使歸刻焉新修大寧宫記華西神川原大寧宫者華人以為古后土之祠也宫故並嶽祠宋真宗幸華山賜今額以華山道士武元亨主之其後元亨以祠隘請於朝改作之於神川之上宫初甚侈大至靖康時兵燬里中人嘗修復之然庳隘不能如舊觀金正大中乃加增拓下距於今二百有餘年故屋皆壞無能修葺之者里人張某欲以私力加繕治之未及為而殁其子某乃追成先志以錢二萬五千貫具材木瓴甓會工藝自門至寢為屋若干楹凡期月而成左氏曰共工氏之子曰勾龍能平水土為后土之官故祀以為后土盧植諸儒從之遂以為后土勾龍也蔡邕則曰勾龍社神也堯祠之稷之神柱與棄也漢后土祠在國壬地社稷之位在未地為王肅之説者又曰社與稷皆土神但生育之功異故有二名耳史記武帝初郊雍太史祠官言當祀后土於方澤立為五壇壇一黄犢太牢具天子從之乃東立后土祠於汾隂脽上親望拜之如郊則漢以下地祗有社又有后土后土之説紛紛莫能統一以余考之皆失也鄭司農曰后土社神也蓋社以地言后土以神言社之有后土猶郊之有上帝也曰帝曰后皆能宰之稱天子之社神曰后土諸侯而下之社神亦曰后土者猶郊之神曰上帝而五方主氣者亦謂之帝不以嫌也五土之神吐生萬物而稷者五穀之長也人非土不生非榖不養是以先王尊而祀之勾龍有功於水土柱與棄有功於稼穡故以配食其神曰祀勾龍以為后土者猶所謂禘嚳而郊稷是也又周禮以血祭祭社稷五嶽其以血祭則非人鬼且其祀先五嶽則不得為勾龍亦明也古之制天子祭天地諸侯祭山川大夫祭五祀位有貴賤故祀有大小而后土之祀自天子逹於庶人所以生者一也王者為羣姓立社曰大社自立社曰王社諸侯為百姓立社曰國社自立社曰侯社大夫以下成羣立社曰置社大社國社為民祈報也王社侯社自為祈報也大夫以下無民人莫為立社又不得自立社故與民族居百姓之上乃立社以祈報之今國都至於郡縣皆有社獨置社亡耳民春秋雖有社祭然無壇壝主位牲齊儀章皆不應於禮其踵事而生者益甚莫為之禁夫不祀其所得祀非義也祀其所不得祀非禮也后土者民之所得祀者也今雖不能應於禮能修而祀之其賢於失禮而犯義者也余之同年光禄主事虎理翰君家於華義張氏之斯舉也而屬記於余焉梯雲莊記晉地土厚而氣深田凡一歲三藝而三熟少施以糞力恒可以不竭引汾水而溉歲可以無旱其地之上者畝可以食十人民又勤生力業當耕之時虛里無閒人野樹禾牆下樹桑庭有隙地即以樹菜茹麻枲無尺寸廢者故其民皆足於衣食無甚貧乏家皆安於田里無外慕之好間有豪傑欲出而仕由他岐皆可以得官爵故其為俗特不尚儒周行郡邑之間環數百里數百家之聚無有一人儒衣冠者獨楊黄許氏以儒稱於鄉三時力田一時為學褒衣博帶出入里巷之間其族數十家化之皆敦於禮每歲時上塚族人各具酒饌羣至墓下推長者一人主祀以次奠薦既竣長者坐少者以序羅拜之然後皆坐相與行獻酬之禮子弟有為小不善者則長者進而誚讓之衆皆進曰長者言然請改是乃已至於再至於三而終不能改也則衆相與擯絀之不與同祭祀如是者已三世矣嘗詢其族人許氏之祖有義甫君者攻詞賦有聲於時其弟恒甫君治經義通周易號松谿先生然皆隠不仕恒甫之仲子克敬始以教官歴太常奉禮翰林國史院編修官而孫寅字可賓與余同登元統元年進士第擢翰林國史院檢閱官中書掾中書照磨名聲益顯楊黄之許遂為其鄉著姓郡守為表其邑中之居曰梯雲坊其後河東僉憲楊君士傑行郡至是曰楊黄者可賓之所生長其田廬丘墓皆在如是又命有司易其莊為今名以風厲其鄉人使知儒之為可貴也夫儒之所以為可貴以先王之道之所在也是以古者少使居學老使居塾不如是者不列於王官不可以長民故時不貴儒而儒貴後世之用人不必盡出於儒者也則民何由知其可貴而貴之比年朝廷設科以待天下之士民始稍稍知所趨向獨晉俗堅强不輕而變今賢使者殊其宅里明其貴賤示其好惡其意豈為許氏計哉昔常衮為福建觀察禮貌其士俗以丕變而况上有用儒之君下有風厲之使吾見晉之人父詔其子兄訓其弟其必相謂曰弗若許氏不可以同祀弗若可賓不得以為秀民耒耜以業詩書以語民之彬彬將若鄒魯矣然余嘗聞之民可以身化難以利誘可賓為人侃侃篤於孝誼有位於朝行顯貴矣乃以親老棄其官而養人皆賢之以賢者而化民如草尚之以風也其有不從者乎故余為記其表閭之始且以觀其成焉合淝修城記至正十一年冦起淮南自浙西江東西湖南北以及閩蜀之地凡城所不完者皆陷合淝之城久圮且夷倉卒為木栅以守栅成賊大至民賴栅以完其後僉憲馬君至顧而曰以栅完民幸也非所以固迺白皇孫宣讓王及其憲使髙昌公議修其城遂發公私錢十萬貫召富人之為千夫長百夫長者傭小民相故所圮夷盡築之富人得官發錢無甚費咸喜助所不足小民方饑得傭錢奔來執事鼛鼔不設鞭扑不施捧柴荷畚麕至競作自十三年二月朔戒事九月畢城四千七百有六尺六門環為睥睨設周廬廬具飾器門皆起樓櫓相盗所必攻者甓之計用木若干甓四百四十八萬用人之力七十七萬八千城成而盗不至者今期月矣余生長合淝知其俗之羙與夫所不從亂而可與守者有三焉其民質直而無二心其俗勤生而無外慕之好其材强悍而無孱弱可乘之氣當王師之取江南所至諸郡望風降附獨合淝終始為其主守至國亡乃出降天下既定南人爭出仕而少不逹則怨議其上而不可止吾合淝之民布衣蔬食秀者治詩書朴者服農賈昏喪社飲合坐數百人無一顯者無愠怒不平之色驅牛秉耒雞鳴而耕朝而息日出而耕莫而息不合耦而終十畝負二石之米日中趨百里而無徳容惟其質直而無二心故盗不能欺勤生而無外慕之好故利不能誘強悍而無孱弱可乘之氣故兵不能訹昔者木栅猶足以力戰禦冦而無肯失身於不義者今而得賢使君修其垣墉救其疾苦㩦持撫摩以與民守之而民之與君又歌舞愛戴與君守如子弟之於父兄手足之與頭目然自今至於後日是惟無盗有亦不足憂也君前為庸田僉事城姑蘇今憲淮南又城合淝一人之身而二郡之民賴之以有無窮之固儒者之利不其博哉君名世徳字元臣雅爾喀斡國人由進士第厯官應舉翰林文字樞宻都事中書檢校庸田僉事為今官與余前後為史氏城又余之所志而未成者也義為紀之其敦事與凡供役之人則載之碑隂大節堂記皇帝御天下之十五年念君徳之不宣民生之未遂乃詔丞相更守令之法著考課之令厯柬朝臣以為郡縣親御便殿賜之酒而諭遣之於是天下之吏人人奮厲以治所謂六事者以成功名稱上意宗正郎中韓君建之守安慶也獨鮮有所事其政清浄而已在官三年頴六之盗起所在竒衺之民羣起從之殺守令據城邑時天下久平民生長不識兵革而郡縣無城廓無兵備卒然有變吏往往盗未至先去而城陷有不去者盗至而民不與之守城亦陷明年十一月盗入宿松破太湖潛山吏多徙家江中為去計君獨無所徙而治城隍計軍實以示民必守不去越明年春盗入桐城以桐人來攻城君縱民出擊之盗敗去自二月至於九月盗之來攻者十有一大小百餘戰皆敗之盗大忿乃悉衆而東舳艫數百里鉦鼔之聲動天地王師敗績小孤山十月癸夘盗逐北至城下城南郛久􅈥為民居而聯羣艦為城盗縱火舟燒聯艦艦潰火入南門燒民居諸守將亦潰民恐甚走來眂君君方部署寮吏為戰守如恒日民乃無恐且戰且撲火甲辰盗傅西郛戰却之明日傅東郛又戰却之相火所經撤民屋材夜栅之旦具甲寅盗力攻無所得利諸潰者聞城完且相率來援盗望見之乃夜引去余來戍郡道聞城陷矣比至乃完問故父老皆曰韓君完我君時亦去則民無與為守民無與為守則城之完不完蓋未可知矣方朝廷更化時吏皆黼藻其政以角一日之能君若無能然者及臨大變其所能者乃若人之所未易能君誠不可以小知也予觀於今南方之國不頻於盗非其所力攻有能守者矣而頻於盗者為難頻於盗徼幸於一勝有能守者矣而屢勝者為難民屢勝矣至於敗且危於是不去而上効死以保其下下効死以衞其上卒能因敗為功以危為安如君之為者蓋千百之十一此人之所難能也曾子所謂臨大節而不可奪者君其人歟郡所治屬縣六西至於懷寧又西至於潜山又西至於太湖武夫義民列砦相望百戰抗盗賴君以為根本而無叛意東至於池又東至於姑孰數郡之民賴君以為藩屛而無死傷之禍君之所完不既大矣哉余抵郡十日盗復大至與君率衆殱之盗不至者今再朞矣十四年春三月朝廷録十月功特加君中奉大夫秩從二品幙官以下各升秩有差余因名其㕔事曰大節之堂所以揚君之懿於無窮也雖然治之亂猶旦之有夜也後之人坐其堂而思其人思其人而懼其時有不協於其行不完於其民者獨不欿然於君者乎余之名堂又所以勸於無窮也時與君守者逹嚕噶齊西夏阿爾長普照磨楊恒録事司逹嚕噶齊摩哩齊録事黄圖倫台録判爕理桀錫權懷寧縣逹嚕噶齊約蘓圖安慶萬户府經歴郝瑞千户李思禮卲永堅王國英許元琰賈伯英額森特穆爾魯沁耀珠洪保張彬路忠金嗣元葛延齡百戸盧顯宗卲文質韋與權齊世英宗達周文謝茂陳士達楊買兒朱傑李玉祝茂夏興侯興祖吕重禄朱臣孫朱惠龍彈壓嚴繼祖伍子雲張宏晁關保揚州弩軍翼千户賈禧百户王孫兒伯勒齊爾布哈㳂海翼百户毛偉牽連書之使與有聞於不朽君字公懋遼西人憲使董公均役記古者井天下之田以授民民百畝易者倍之再易者再倍之其養均也則九壤程九貢市㕓二十而一近郊十一逺郊二十而三甸稍縣都皆十二其取之又均也小任以力則上地家三人中地二家五人下地家二人大任以兵則比為五閭為兩族為卒䣊為旅州為師鄉為軍其役之又均也之二者王政之大端也大端具而又為之刑政以防民情為之學校以道民性為之公卿大夫士以登民材其制詳故不亂其本深故不拔是以商周之世皆七八百年而後衰也自經界廢於是田不在公而養不均矣養不均則土會民數皆不可知而賦與役不均矣養與賦與役之不均雖周公為政不可以言治也浙東古於越之地也其地之民無甚貧甚富之家山谷之間有一畝之居十畝之田者祖孫相保至累世不失又其土瘠故其小人勤身而飭力其君子尚樸儉而敦詩書非若吳人之兼幷武斷大家收穀歲至數百萬斛而小民皆無蓋藏此固易治之地有賢師帥為之制而道利之其亦可以庶幾矣乎然余嘗行郡以觀民風其庶人之役於官者往往閭左之民也而富人則有田而不役甚者或不以征歲終保正稱貸而輸之至破産者無算此其田雖近於均而役則不均也至正十年秋藁城董公來長越憲省民所疾苦乃曰井田者吾雖不得而行而役不可不均於是擇其部吏之精强者委之以事以衢州路經厯王仲謙西安縣主簿張拜珠治金華青田縣尹葉巴延治武義永嘉縣丞林彬祖治永康而蘭溪州逹嚕噶齊齊哩克齊義烏縣逹嚕噶齊額琳沁浦江縣逹嚕噶齊羅阿李巴哈東陽縣丞蔣受益自治其邑義烏縣則復以衢州路録事范公琇為之輔而總管陳巴延布哈總領之先期一月令民及浮圖道士各以田自占其或蔽匿及占不以實者没其田令既浹乃保以一正屬民履畝而書之具其田形疆畎主名甲乙比次以上官官按故牘而加詳覈之曰魚鱗册以會田别為右契予民使藏之曰易由以主業其征之所會曰鼠尾册以詔役弓兵𨽻卒鋪兵為至勞坊里正主首次之館夫步夫又次之凡民田多者役其勞少者役其逸又其少而不足役者則出錢以助竒田不助者則以待夫不虞之役其一人而有數保之田者各役之即賣其田則買者承其役凡一州六縣之田二萬六千四百二十四頃四十九畝役者一萬二千六百六十八名故役而今復者四千三百名所未役而今役者三千四百六十名役而不復者休而始役之册成一留縣一藏府一上憲司於是野無倖民公無逸征强弱有倫賦役有經上下和洽歲以有年蓋公之遇人有禮故吏盡其力其使民有義故貧者戴其徳而樂其復富者服其公而忘其勞以故為是大制政不肅而成民不擾而治也傳曰天地養萬物聖人養賢以及萬民公之是舉兼禮與義則誠賢者矣繼今之人毋替公政或推其所未及則越之民樂樂利利其福豈可既哉故於終事也其下咸願刻石以示不朽以闕嘗陪其末議而知其梗槩遂來屬筆焉至正辛夘十二月記青陽
