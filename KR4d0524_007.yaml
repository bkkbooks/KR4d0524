front:
  text: 青陽先生文集卷之七門人淮西郭奎子章輯
  hash: sha256:8af3b0b861f49fcd6690da2df4b556699fb78cad68a9c5c1ae4875f90aeda641
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0524_SBCK_007-1a}
body:
  text: 墓表葛徴君墓表君諱聞孫字景先姓葛氏纍世皆隱合肥巢湖之上有少田力耕以為學至君祖嗣武始𥙷太學生遷桐城縣主簿宋亡遂歸隱淮安忠武王録宋官襲泉縣丞辭不受而自放于詩酒以終父天民亦隱德弗耀君生十九年而孤能自䇿厲為學天性警敏日誦數千言輒終身不忘居家孝友待朋友有信義每旦冠衣詣毋束夫人問起居躬眠食飲惟夫人色所𣣔即趨為之凡物夫人未食即弗御也親奮知其然每食親以先以餽君使奉夫人嘗以貧出為頓文學既而曰此非養志之道也尋不復仕其後宰相薦君文行可用擢翰林國史院編修官復辭不赴召而教授于其家諸生不逺齊楚之路皆來從之余嘗謁君湖上升堂拜束夫人君侍側須髮皓然進几捧觴進退旋辟惟謹為好言溫藉之母夫人年八十餘耳目聰明泄泄然樂也食下始出坐館中為諸生談先生之道諸生環列修整皆若有得焉者間以親故入城中城中人無少長爭候迎謁以不至其家為耻君與人言無賢不肖率依于忠孝其語切直初若不可親及徐就之乃甚有味久而不厭也里中有閗訟官府所不能折者君以一言决之其見重于鄉如此以故鄉大夫有大政與大獄多以詢君君亦通練誠懇問無不言諸大夫隂用之鄉人多蒙其利此余之所知而鄉人未盡知也至正五年毋夫人以夀終于家豫往吊之君衰經癯然衆以為君者不勝喪如此是年冬余還京師而君遂以死矣鳴呼聖人之道猶夭然而一本于卑近精粗本末無二致也而世或騖于髙虛若德合一官行庇一鄉者往往薄之以為不足為君平生不事大言髙論而先生行事皆聖賢之實用其用以教人亦必以此雖不肯出仕以盡其所學而其學之可用蓋不待出而後見也其文章平實稱其為人有文集若干卷藏于家配倪氏子男一人楨黃岡縣學教諭女六人皆適士族君之殁以至正五年九月癸巳其葬在十二月癸酉年六十一明年其友余闕表其墓曰昔豫登第還里中里中長老言朝廷召君時合肥之學甘露降于松明年又降于柏占者曰國家養老之祥也君得于人者如此而得于天者又如彼非䔍于孝友積誠而不巳其能然乎鄉人之士過君墓者式之張同知墓表澧之兹利有隱者曰張君積學厲操居州之雍沙鄉雍沙之人稱之以為能孝君喪父時年始十四即養毋而能敬生事大小自盡身力一不以屬毋而務有以樂其心母素多病君自侍側具湯液食飲行坐卧起必自扶掖之而未嘗去左右如此者殆三十年間適市心動亟歸視毋火發帷家人無在者毋病卧且驚不能起君冒烟熖裭幃撲滅之微君毋幾不能免毋病甚嘗割股肉以療之夜即焚香籲天願以已年益毋壽毋殁哀戚甚躬負土為墓不以委僮奴人是以謂之孝也良重信之有爭訟者不詣公府而詣君取直其里之麀鹿泉者鄉人素賴以溉田延祐丙辰夏大旱泉竭衆相與祠其上喪豚敗鼓卒不能出泉乃水以赱君曰泉閟禾且稿民不知死所矣泉其或者聽孝子乎君為沐浴而􅉨再拜為民請泉出如線衆歡曰泉至矣君乃又再拜泉沛然如初所溉方數十里之地是年獨得歲人益齺然謂君誠孝子也君性介直不阿鄉里敬之有撓曲為欺者見君面輒發赤其事寡娣有恩義經紀其家事如其家凡細行類此多可書者不書大其孝也君通尚書以授其子兊兊亦博學有文章元統元年貢于禮部中髙等授同知茶陵州事君以子貴封承事郎英德州同知聲光顯融享有祿飬凡七年以夀終于家自君之沒兊之治民日有政譽轉尹當塗公廉徑毅以治行稱徴為翰林國史院編修官君子曰天與善人孝者善之紀也故孝者必有子今于君徴之尤信君諱杏孫字子春以至元已即十一月二十一日卒年五十有四以某年某月葬州之懷德鄉永樂村青山谷張氏世為蜀之安嶽人曽祖文震宋吳潜榜進士官至知江安縣相圎避亂始遷澧自圎而下皆世治儒術然無顯者顯乃自君始是可表也
