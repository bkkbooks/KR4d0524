body:
  text: 詩楊平章崇德樓重城控秋塞丹樓耀芳甸赬霞上氛氲蒼林下蔥倩長河城邊急積岨窗中見逺鴈滅居延行雲歸鄯善大賢謝卿相垂幃化鄉縣春蟲觸寶瑟餘花飄玉研方從董園樂陋彼歌梁轉伊子去山澤寒齋秋草遍載覽登樓篇益重臨淵羡八月十五日處州分司對月玄武夕始正華月生秋旻金波何穆穆緑桂滿中輪俳佪出西陸照耀此甌閩光流河宿隱氣隨商律振餘輝動軒房紫蘭含微津皇天降嘉歲五政亦已陳樂哉一巵酒允矣同庶人有所思春風起寒色春衣方重熏新裝􅐈羅幕清唱入行雲艷色若流月芳澤謝蘭芬嬋姢信無度我思何在君長安陌浩浩長安陌璚樓夾廣㕓鴛鴦御溝上芍藥吹樓前駿馬追韓嫣金尊約鄭虔功名有時有且得樂當年伯九德興學詩上德撫玄運籲㑓尹神京三雍蒸髦士五學訓齊氓登歌陳羽縣鵉刀奉麗牲優遊樂清化大道嘉方行送孫教授皇情重聲教宵裝尓載馳邉城南􅗲外禮殿左江陲楫讓陳椰器弦歌蔭薜帷全勝冝春郭花落閉門時賦得君子泉送彭公權為黃州教君子沒已久遺井郡齋中本寓思人意兼全澤物功銀牀駁故蘚玉甃落寒桐幾日趨官舍橫經誦飬蒙賦得春雁送司執中江西憲幕春風起蘋末旅鴈尚回翔乳鴨嬌同喋新蒲短可藏應懷洞庭水非避寒垣霜客路煩懷奮題書寄帝鄉賦得蛾眉亭送王德常御史赴南臺江亭望華崿望望似修眉掃黛偏能巧含顰知為誰姢娟微雨裏脈脈夕陽時千里乘􅍡去因之傷别離南歸偶書二首帝城南下望江城此去鄉關半月程同向春風折楊柳一般離别兩般情二月不歸三月歸已將行篋換征衣殷勤為報家園樹緩緩開花緩緩飛别樊時中廉使光祿橋西惜解携春星𣣔傍露盤低自來宫柳多離思更著城烏在上啼龍丘萇吟贈程子正重出戰龍起新室群鳥亦翩翩偉哉龍丘生抱琴歸故山仰視天際鴻俯弄席上絃清吟發踈越逸響遺澗泉悠悠鳯翔漢婉婉虬媚川清風自千古何用能草玄策續輯元統癸酉廷對䇿苐一甲第二名臣聞之周武王曰惟天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母此言君天下者凡以仁而已臣嘗思之天地生物而厚于人矣而于生人之中尤厚于聖人其所以厚于聖人者𣣔其推生物之心以加諸民是仁者人君臨下之大本也臣謹稽天地之驗之往古則仁之為道夏以之為夏商以之為商周以之為周祖宗以之而創業後聖以之而守成其理可謂至要而亦可謂至難矣恭惟陛下有聰明睿知之姿有寬𥙿溫柔之德愛民而好士神武而不殺爰自𥘉潛仁孝之聲固已播聞于中外今兹誕膺付託龍飛當天輕徭役薄賦斂罷土木之役恤鰥寡之民而仁厚之澤果有以大𬒳于天下當天命眷祐之𥘉人心歸向之日又能不自滿假拳拳以守成之大計下詢承學之臣顧臣庸愚無所通曉然臣觀陛下䇿臣之言反復乎三代及漢守成之艱難而深􅓪乎今日當行之切務自非聖心獨詣深有以考之于古質之于今灼知上天作君之心與夫祖宗創業艱難之計者不能為是言也臣伏讀聖䇿曰古人有言得天下者為難保天下為尤難臣以為人之于仁憂患而思勉者易安樂而勿失者難夫造草昧之際英雄角逐之會而世主之心所以不敢暇逸者鮮不如敵國之在旁嚴父之在上其思所以康濟小民惠鮮天下者蓋饋屢輟而寢屢興此其勢之易然者也天下既定方內無事兵革不動四荒向風天下之臣又曰奏祥瑞豐年頌聖德者聲相聞于朝歌太平者足相躡于道雖以創業之君尚不免于不終之漸况其後世乎蓋治平則志易肆崇高則氣易驕志肆則敗度之心滋氣驕則愛民之意熄如是則豈復念夫先世艱難勤苦為何如哉甚者至以其祖宗為昔之人無聞知見其先世勤儉之迹則田舍翁得此亦足矣此亦勢之有必然者也陛下以保天下為難此臣所以踴躍欣忭而不自知陛下此言可以承宗廟可以奉六親可以育群生可以彰洪業臣拜手稽首而為天下賀願陛下永永無忘此言也臣又讀聖䇿曰自古持盈守成之君莫盛于三代夏稱啓能敬承繼禹之道殷稱賢聖之君六七作周稱成康能致形措夫以禹之功而惟啓以文武之德而惟成康賢聖之君之衆莫若殷亦不過六七而已其後惟漢之文景而言文景之治猶不得此之三代善繼承者何若斯之難也臣以為惟思祖宗得天下之難者則于保天下也斯無難啓太丁太甲太戊祖一盤庚成康文景之君則思祖宗創業之難而保之者也桀紂幽厲桓靈則反是故伊尹之于太甲則明言烈祖之成德周公召公之于輔相成王也亦諄諄於文王之典武王之大烈蓋知其祖宗得天下之難則必能求其所以得之之道矣知其所以得天下之道則知所以保天下之道矣夫祖宗得天下之道即其子孫保天下之道也孟子曰三代之得天下也以仁此仁者祖宗得天下之道也易曰何以守位曰仁此仁者子孫保天下之道也夫仁之難成亦已久矣持盈守成之君若是之難得者冝哉臣又讀聖䇿曰我祖宗積德纍世至于太祖肇啓土宇建帝號又七十餘年世祖始一天下以致至元之治厥惟艱哉顧豫沖人賴天地祖宗之靈紹膺嫡統繼承之重實在朕躬夙夜競競未獲其道臣以為陛下此言可謂深知祖宗創業之艱難者也當其巡天西下又詔定西夏懷髙昌北取遼金南取趙宋其經營開創之事有不待賤臣之言而後知若夫祖宗所以淂天下之本則陛下之所當知也臣嘗妄論之我國家之得天下與三代同自太祖起朔漠而膺帝圖世祖揮天戈以一海內不恃強一而其仁義之師自足以服暴亂不用智力而其寬大之德自足以結人心至于渡江臨鄂與建元之詔觀之則我國家得天下之本一仁而巳矣故以曹彬之事􅒛帥臣而革􅒛之日市肆有不閈以火易之元建國號而中統之紹天下所歸心大祖既以七十餘年而平一之世祖又以四十餘載而生聚之德在民心功在史䇿以聖繼聖傳至陛下吾祖宗所以淂天下之道是即陛下保天下之道也然曰未云獲者是即文王望道未見之心也臣何以多言為臣又讀聖第曰子大夫通今學古其求啓之所以敬豕六七君之所以稱賢聖成康之所以致刑措其道安在文景之所以不及三代其故何繇及今日之所以持盈守成孰先孰後孰本孰末何以致刑措稱賢聖繼祖宗之盛悉心以對毋有所隱臣以為三代及漢之君其見稱于當世者雖有不同然不過守其凡世之仁而巳矣而昑陛下之所以持盈守城之道又何以他求也哉洪水滔天下民昏墊而成允成功者禹之仁啓之所以敬承者此也啓網祝征仇餉者湯之仁太甲以之處仁遷義太戊以之治民祗懼武丁以之嘉靖殷邦祖甲以之保惠庶民盤庚以之鞠人謀人之保居此所以稱聖賢也以言文王之仁則無凍綏之老以言武王之仁則行大義而平暴亂成王時制禮樂以文之而巳耳康王物奉恤厥若而巳耳其所以教化行刑罰措仁之浹于民故也漢家制度視三代雖有愧然髙帝之寬仁愛人實滅秦誅項之本原文帝之務在飬民景帝之遵用成業實卓然為漢賢君其不及于三代者無太甲仁義之功無成王緝熙之學故耳以今日之道而言臣則以為守成之本仁也所當先務者仁也至曰功曰利曰甲兵錢榖曰簿書期會曰禁令條教皆末而當後者也然就仁之中而其本末先後亦不容以無序也有先王之仁心有先王之仁政孔子之告顔子曰克已復禮為仁此以心言也孟子告齊梁之君所謂五畒之宅百畒之田與夫學校庠序之類此以政言也有是心無是政則其心終不能有治于天下有是政無是心則其政亦不能以自行必有內外本末交相通貫是即堯舜之近也陛下有顔淵明睿之姿可以致修身之功有堯舜君師之位可以推愛民之澤不冝狃于近功安于卑下而不以聖賢自期也臣顧陛下萬機之睱取孔孟之言而深究之體之于身揆之于事求其何者為欲何者為理知其為𣣔而必克之知其為理而必復之明以察其幾勇以致其決日日而克之事事而復之則自心正身修而仁不可勝用矣或于聽朝之時或于進講之際數召大臣延問故老深知咨訪某事為先王之仁政而未盡行某事為今日之弊端而未盡革某害未去某利未興某賢未用某物失所敏以求之信以出之時省而速行之委任責成而程督之使天下疲癃殘疾淂其生鰥寡孤獨淂其養而無有一物之不遂其生則民物安阜而人莫能禦矣異時陛下五刑不試如周成康聖賢之作如商諸王夫然後可以答上天玉成陛下之心生民蘄望陛下之意先帝兹皇付託陛下之深計而我國家時萬時億之統可以傳之永世而無疆矣詩云冝民冝人受祿于天古人有言曰愛民者必有天報陛下誠如臣之所期則申命之休將如日之升如月之恆矣伏願陛下少開天日之光淂賜鑒察則臣不勝大幸祗冒天威臨書不勝戰栗之至題永明智覺壽禪師唯心訣後永明壽禪師平生著述甚多唯心訣者其猶般若之心經也孫城祐上人頃作觀心堂于廣福寺及見西菴遂公明教臺淂是編即以衣資刻之甫畢工屬余歸自范陽詣題其後心者萬化之原也迷則愚悟則聖存則治亡則亂易所謂差之毫釐繆以千里者正指是言也是編于心之細無不燭體用無不該三藏十二部精要之言無不在是先民言聖賢千言萬語只是𣣔人將已放之心約之使返復入身來自能尋向上去此又永明著書立言之心也元統甲戌五月謹題憲使董公均役之記浙江東海右道廉訪使古者井天下之田以授民民百畒易者倍之再易者再倍之其養均也則九壤程九貢㕓二十而一近郊十一逺郊二十而三甸稍縣都皆十二其取之又均也小任以力則上地家三人中地二家五人下地家二人大任以兵則比為伍閭為兩族為卒䣊為旅州為師鄉為軍其役之又均也之一者正政之大端也大端具而又為之刑政以防民情為之學校以道民性為之公卿大夫士以登民材其制詳故不亂其本深故不拔是以商周之世皆七八百年而後衰也自經界疲于是田不在公而飬不均矣飬不均則土會民數皆不可知而賦與役不均矣飬與賦與役之不均雖周公為政不可以言治也浙東古千越之地也其地之微無甚貧甚冨之家山谷之間有一畝居十畝之田者祖孫相保至纍世不失又其土瘠故其小人勤身而飾力其君子尚撲儉而敦詩書非若吳人之兼并武斷大家收榖歲至數百萬斛而小民皆無益藏此固易治之地有賢師帥為之制而道利之其亦可以庶幾矣乎然余嘗行郡以觀民風其庶人之役于官者往往閭左之民也而冨人則有田而不役甚者或不以征歲終保正稱貸而輸之至破産者無算此其田雖近于均而役則不均也至正十年秋藁城董公來長越憲省民所疾苦乃田井田者吾雖不得而行而役不可不均于是擇其部吏之清強者委之以事以衢州路經歷王仲謙西安縣主簿張拜住治金華青田縣尹葉伯顔治武義永嘉縣丞林彬祖治永康而蘭溪州逹魯花赤怯烈夫義烏縣逹魯花赤亦憐真浦江縣逹魯花赤廉阿季八哈東陽縣丞蔣受益自治其邑義烏縣則復以衢州路録事范公琇為之輔而捴管陳伯顔不華捴領之先期一月令民及浮圖道士各以田自占其或蔽匿及占不以實者沒其田令既浹乃保以一正屬民履畒而書之具其田形疆畎主名甲乙北次以上官官按故牘而加詳核之曰魚鱗册以會田别為右契豫民使藏之曰烏由以主業其征之所會曰鼠尾册以詔役弓兵隸卒鋪兵為至勞坊里正主首次之館天步夫又次之凡民田多者役其勞少者役其逸又其少而不足役者則出錢以助竒田不助者則以待夫不虞之役其一人而有數保之田者各役之即賣其田則買者丞其役凡一州六縣之田二万六千四百二十四頃四十九畒役者一万二千六百六十八名故役而今復者四千三百名所未役而今役者三千四百六十名役而不復者休而始役之册成一留縣一藏府一上憲司于是野無幸民公無逸征強弱有倫賦役有經上下和洽歲以有年蓋公之遇人有禮故吏盡其力其使民有義故貧者戴其德而樂其復冨者服其公而忘其勞以故為是大制政不肅而成民不優而治也傳曰天地飬万物聖人飬賢以及万民公之是舉兼禮與義則誠賢者矣繼今之人毋替公政或推其所未及則越之民樂樂利利其福豈可既哉故于終事也其下咸願刻石以示不朽以闕嘗陪其末議而知其梗槩遂來屬筆焉至正辛邜十二月記染習寓語為蘇友作人若近賢良喻如紙一張以紙包蘭麝因香而得香人若近邪友喻如一枝桞以桞穿魚鰲因臭而得臭結交警語君子相親姑蘭將春無夭色之媚目有清香之襲人小人相親如桃將春有夭色之媚目無幽香之􅊞人附送余廷心赴大學維揚程廷圭前壬申年作蘆葉蕭蕭江上秋吳船三日住揚州靛花深染青綾𬒳雲葉新裁紫綺裘官驛馬嘶風滿樹别筵人散月當樓明年征鴈將書去人在蓬瀛弟幾洲兩伍張氏阡表張氏本䣜陽人其先世有諱豈者徙家淮南之兩伍村子孫繁冨皆有美田在湖上無貧者君之祖子可始為儒教子君父諒裔日誦書不問其家生業見異書無錢質衣買之故君家在諸張中獨貧而教子益不怠君諱共辰字景星少以儒薦為與化縣教諭崇明州學録泰州學正雲南柏興府建康路兩學教授改將仕郎主安豐霍丘縣簿而卒弟竑字景山亦由天長泰興教諭揚州學正真州教授以將仕郎滁州判官致仕初張氏雖盛然皆農家無聞人自君父以耆學著稱鄉校逮君兄弟登仕版有聞譽故兩伍張氏遂稱江淮間君為人寬厚不嗜利居貧晏如不以動心竑性剛介好賢而疾惡此兩人者所操雖異而士大夫與之交者一愛敬之君兄弟仕時其父巳死矣君每與人言其先世必鳴咽流曰吾先人以儒者望吾兄弟吾兄弟今皆讀書為儒官雖貧亦何憾哉余往吏淮南聞君伯仲之名甚習君之孫天永遂得其先世之概如此重為慨息蓋維俗之數矣來之季時其地専用武故民多尚勇力而事格閗有號為進士登科第者往往皆武學也混一以來其俗益降民之賢者始安於農畝其下則紛趨於末以爭夫魚鹽之利其積而至大富者輿馬之華宫廬之侈封君莫之過也故其俗益薄儒以為不足以利已朝廷設科以誘之今三十年民亦少出應詔君父子自拔于衆人之中傾家以為學可不謂之豪傑之士哉天永自樹嶄然弱冠屬文敦義異時非能振其宗乎詩書之教能淑人心學之至可以為聖賢其次不失為善人其緒餘亦可以得祿以振耀其宗族夫孰知不足以利巳者為其家之大利與君之於鄉可表以厲俗矣君兄弟殁兩伍之墓隘不能葬乃改卜倪村葬焉君配陳氏子二人禎桃源縣教諭男三人天序天庭天庸竑娶李氏子一人燮將仕佐郎楊州教授孫男三人長天永次天竒天亨至正六年二月述題黃氏貞節集皇元至正十二年余闕奉旨出守安慶時邊警事嚴日尋干戈憫憫無須臾得攄懷思越六年丁酉撫金溪吳級以書抵轅門請題其母黃氏貞節集併録其所撰祭夫文及訓子詩三十韻讀之辭義嚴正風莭凛凛令人增氣概所恨行伍中筆硯廢置久安得從容諸先輩翰墨之後思發其幽潛乎然闕也方以忠君為務而級也拳拳以孝母為念聲相應而氣相求是可無一言以慰人子顯親之心耶及觀黃氏年十九嬪于吳曽未幾而夫死涕泣誓不更嫁破衣弊屣身操井臼賣簮珥以襄舅姑之喪日訓二子以學夜分乃寐男長以室女長以家閨門肅雍動止無纎毫愧悚叔德著于鄉閭令名逹于朝省足以表儀于當世矣若古之衛共薑曹大家班班經史者不是過也其同郡翰林吳公奎章虞公皆有敘述同里危素敘其詩曰世之人不能天其天而有愧于黃氏者多矣嗚呼我國家以仁義肇基朔土乾端坤倪靡不臣服列聖相承風教宏逺宜可以登三邁五超越乎漢唐矣胡何自兵興以來州縣披靡能卓然以正道自立者僅不一二見其餘賣降恐後不啻犬豕昻昻丈夫真無女婦之識良不悲哉且天下有可為之機而無敢為之士民情有向善之意而無激善之才遂使淳良化為梟惡骨肉轉為仇讎叛潰奔離益相戕賊聞黃氏操行如此彼獨何心朝廷百年休養之恩寧不辜矣此豫讀黃氏詩文益有感焉宜夫德人巨卿咏贊不已盛朝所以旌其門復其家昭名于史册者豈偶然哉豫又聞黃氏之子級以一介貧賤奮不顧身集鄉丁禦強暴里閈淂全非其毋訓之素能若是耶是皆可書淮南行省參政西夏余闕識題假吉甫助教別野圖玉署挂新圖如君舊隱居峰髙乃霞上葉變是秋𥘉遊客看常在溪聲聽却無只此同登望豈必命柴車青陽先生文集卷之九終
