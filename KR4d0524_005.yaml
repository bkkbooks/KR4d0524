front:
  text: 青陽先生文集卷之五門人淮西郭奎子章輯
  hash: sha256:2d66cdb5f0bd75ad14f4a37cf45aae544e32c08b2147adca53f77fb639d33b01
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0524_SBCK_005-1a}
body:
  text: 書上賀丞相書闕以微才叨蒙柬拔伏惟閣下以不世出之才居大有為之位此誠千載一遇之㑹切欲奔走左右以效微勞以報知遇之萬一特事親日短烏鳥情切急急謀歸而閣下眷願之恩筆舌莫既南至金華不勝依戀因念下之報上不限逺邇苟有尺寸之功即事左右之道撫間雕瘵屏除姦貪所按郡縣粗見條理特以上無知已即罹謗議老親衰病旋棄諸孤煢㷀廬次又遭俶擾墨衰從役辛苦萬狀嘗切痛恨以為當賢者擯棄之時乃有天步艱難之事仰天號痛譬猶中流遇風波無所維楫私心自分惟有與城俱斃而巳仰荷天休偶全性命且聞閣下為時一出董師淮南其喜何可云喻也瞻望前茅為日巳久比聞旌節巳渡大河限于守城不能親詣轅門以聽約束今遣縣尹陳秉德迎迓馬首事上常禮僣易塵瀆伏計不拒部內地圖就用呈上盜之賊勢可見大端小邑城郭不完方議修築去年飢饉不能進兵今冬欲調各縣義兵掃除餘孽二者非有錢糧不能成功倘朝廷饋餉有餘乞撥糧數萬石鈔五七萬定或者犬馬之力少得展布部內之地可以澄清外有區區之請世祖之取江南或日中未食或中夜以興艱難混一非偶然而致也國家經費太半仰之非砂磧不毛郡縣之所比也今者不幸半淪于盜切計以為江南不定中原殆難獨守中原不守則朝廷不能獨安朝廷不安則宰相不能獨富貴伏願廣忠集思勉圖大業以作穆穆迓衡而用兵之道所以驅人赴湯蹈火無賞無罰央難集事仰瞻光範多所欲言粗陳其大者如此因布區區伏望垂鍳上賀丞相書前聞六纛已至廣陵遣縣尹陳秉德迎迓想徹崇嚴比日朔氣應祥雪瑞屢至伏計天聲所振逺邇畏懷神介動履多福下情良慰小邑借庇粗守今歲賊人三次見攻皆已克捷但所部縣分民寨多為殘破止存懷寧潜山兩縣百姓賊勢𦦨𦦨將及于此城中軍壯四千精鋭者不滿千人僅能城守不敢抽撤若此二縣民寨不守孤城亦危孤城倘危則淮西之地盡為盜有長江之險誰與控制古人謂解雜亂紛紏者不控拳救鬪者不摶擊批亢搗虛形格勢禁即自為解今南方之賊以蘄黃為之首往時朝廷太不花平章攻其北卜顔不花攻其西卜顔帖木兒平章蠻子海牙中丞攻其東賊勢大窘將就擒滅忽調卜顔不花軍入安豐蠻子海牙軍之格溪救廬州而太不花平章亦還河南往夏止存卜顔帖木兒孤軍駐劄蘭溪巳致盜勢復振武昌隨陷㳂江諸成聞風皆潰豈天未欲平治天下亦由人謀不臧以至此耳今聞河南之兵巳至黃州以孤軍而討群盜恐未易定妄意以為卜顔帖木兒蠻子海牙二枝軍馬先係蘄黃收捕軍數正在大人節制之內今二軍收捕江東江東為尋常蘄黃乃腹心之疾一軍之中得抽勇鋭者如王逹中萬戶胡伯顔同知使之由望江登岸勦捕而西餘軍留取江東如此則不惟可以救援安慶蘄黃勢分似亦易破南賊自平所謂一舉而兩得者也若二軍或不用抽撤麾下兵多切望垂念淮西之地止有此城急調精鋭三五千人量與錢糧賞犒與本路兵一同勦捕望江宿松之盜亦䇿之善也自非窘迫不敢僣易干瀆伏兾垂察再上賀丞相書前聞斧鉞出鎮淮南兩遣屬吏詣謁前茅皆至廣陵道阻而還近承台劄伏審六纛已至耿山降附踵至室家相慶以為有穆穆迓衡之望其為欣慰何可云喻兹遣懷寧縣逹魯花赤亦速甫賫狀前詣轅門呈報兼有𬋩見上塵台聽切以為淮南之敵今有兩枝一枝在濠一枝在蘄擒必先擒其首余當自㝎今廬州安豐别無官軍似難下手惟蘄黃乃有可攻之機近日潜山縣報蘄其僞官吳右丞投降大軍攻破㳂江諸寨昨日郡人自賊中逃來云白水包家窩義丁攻蘄水甚急白水諸寨萬戶陳漢所部也西兵既進如東首得一軍乘機併進冦必難支所索王建中胡伯顔等正係節制之內軍馬今宣城已降姑孰猶疥癬即目文有阿魯灰平章收捕之軍得一鈞帖調來共攻望江宿松蘄黃之冦東西受敵决然可㝎蘄黃既㝎可以合兵東㝎廬州安豐更得一重臣監軍多與錢糧建中伯顔等許以優加名爵則無不盡力淮南有可平之望萬若或無人可委江西省完者帖木郎中亦可統率謬計如此不知尊意以為何如此外又有私請城守之急錢糧功賞二者而已自兵起之𥘉大郡皆破安慶以蕞尓孤城如寸草以當疾風賴國洪休上下血戰至于今日某誠不佞斯亦人所難能也今倉廪匱乏錢糧不充所上戰功又以朝廷隔逺不得准報今幸閣下照臨其地若麾下錢糧有餘曲為接濟城治可安所舉有功皆出衆論不敢置纎毫私意於其間早與准除庶易以使人也兼以菲儀就用塵瀆此部吏事大府之常切望不拒再上賀丞相書春末聞九重加惠淮土特起大臣出鎮雄藩罷民俱慶如旱得雨嘗遣懷寧縣逹魯花赤奉微禮祗迓遄間復有台衡之命此雖一方暫失怙恃當此多艱而得元老大賢斡旋元化天下之難其可濟乎某受知公門為日巳久軍中之事不能悉陳粗言其略以復上執事皆知格亦易定特以委任失冝賞罰不當以致餘孽復張江襄大振所謂委任失冝者夫將之用兵自有其才譬秋之於奕非學可至如近宋科目有文有武兼是二者一代幾人而比日將兵惟用大臣或用謫官夫戰陳之難如赴湯蹈火市井貧賤未得冨貴者或肯捐身為之大臣冨貴巳極夫復何望又謫官者心志俱喪豈能有為覆軍殺將皆由於此用人不效甚至用賊用賊之弊尤為難言一則使天下豪傑有以窺朝廷之無人二則功多賞薄者皆起作賊之志將恐一賊未滅一賊復起目前之事未見快意將來噬臍有不可悔者矣如安慶小邑世襲官軍善戰者少而善戰之士多田野市井之子故某於此事不盡責世襲軍官而多用田野市井之子往往得其死力克捷俱多朝廷選將不限有官無官惟擇能者用之而以廉公大臣臨之以行賞罰則將得其人矣所謂賞罰不當者比見軍將勇怯在上有若不知而上之賞罰與外議絶不相似頗聞慶刑之典多出愛憎或左右便嬖為之營幹以近軍所賞聞見者而言如蘭溪之功卜顔帖木兒平章為最蠻子海牙中丞特因之成事者耳而朝廷頒賞中丞居上平章次之中丞部內得官者數百人而平章不過五六人此猶不過有髙下之爭耳如廬州開義兵三品衙門而使者悉以富啇大賈為之有一巨啇五兄弟受宣者此豈嘗有寸箭之功而有功者皆不受賞故冦至之日得賞者皆以城降而未賞者皆去為賊夫用兵之道紀律為先故街亭之戰武侯不得不誅馬謖知髙未破狄青不得不誅陳曙比觀諸將略無忌憚擁兵不戰誰與相督冦至棄城無復問罪不惟不罰甚又賞之遷官增秩之功無異故之攻城如燎毛兵之柘地如拔山某之守此智勇俱乏特以有功必賞有罪必罰奉以至公罔敢阿比是以列郡多陷小邑獨存朝廷苟於諸部悉以廉公大臣監之信賞而必罰天下亦不難定矣夫江南不定則中原不能獨守中原不守則朝廷不能獨安朝廷不安則宰相不能獨富貴此膚淺易見之說豈足為明智而言計亦大賢之所不厭聞也夫某之不肖豈定亂之才特此邦之民天性忠義故易與為守而難與為亂然亦戰守五年大小咸弊邇日江南郡縣皆破此邦獨完如洪爐片雪大可凛凛者也謹遣奏差丁正前詣台階白事諸所請求具如别幅伏望鈞慈曲為准報豈特門下之士賴之孤城得安江淮有可定之緒亦國家之利也謹奉狀上陳以聞伏冀照察與中書參攻成誼叔書别後凡三奉書而使者久皆不還伏計道梗不能上逹閣下位望日隆負荷日難特切為之懸心比聞賀公復相乃大可慶然聞尚在軍中不知置左右者何人相知曽見任否江淮賊勢本不難定特以考察不明刑賞失當諸將玩愒遂致難圖區區小邑雖曰上下一心幸爾完固大類紅爐片雪實為可憂耳今長江萬里止存此城如大病之人命脉未絶猶有復生之理失今不救則首尾衡决江南大難定也兹遣奏差丁正等前赴左右白事諸所請求惟閣下是賴倘蒙朝廷俱賜准報不惟此邦之幸未破城邑孰不以安慶自勉國家亦有利也縷縷之言具别幅上陳不善為斫使還賜教以匡不及不勝幸荷不具與月可察爾平章書自旌麾致討髙沙兩嘗奉狀候問起居皆以道梗不能得逹比聞兵威振揚賊勢消衄驛置頗通謹遣山長秦宗德千户也先帖木爾持微禮謁轅門獻歲發春伏惟履兹新正即清氛祲天下蒼生均蒙福祉與國子助教程以文書近叔良過舒始聞動履之悉所寄髙詠尤慰下懷乾坤卦說問商主簿言巳付貢公想惟所戲藏此真玩齊矣多事以來不特僕輩受此荼苦聞館閣文臣亦有差使之勞此際當淂優遊矣子美近有書言鄉人多相思者欲取公還山中斯文無人淂且住為好紀千户輩如京師軍中諸事左轄公話次淂贊助一言旱賜准報為荷僕至軍時賊勢方熾然心安去歲又有讀書之樂今年賊浸平惡况百出每俗事不如意歸思浩然近又有同知之除似未即得歸矣奈何奈何自牧聞除禮部向有一書見寄手病不能裁答彥中惜未嘗一見歆羡歆羡並煩致意何時聚晤話此苦辛未見自愛不既與曽舜剄書别後屢得書及𥿄墨之惠良仞契誼江西德星所聚年榖屢登深為可喜徐鄒之冦僕久與之比鄰無長不足畏况于已衰而逃者也下視此間窘迫則公等皆天上人也徐朝升糴糧江右百望維持得滿載早歸為好有便時時惠教雖相逺即同見也餘惟自望不具叔良佳否煩道致意手病不能多書與危太朴內翰書續輯史館兩得從遊豈勝榮幸區區南行又辱盛餞尤其感烈也鄉暑伏想文菀優遊雅候動履多福良慰良慰友人趙子章北上觀光謹此附謝子章有學而能詩佳士也得公眄睞當價增之倍矣仲舉志道以聲景先中夫希先鳴謹諸先生處不及别狀望致下忱為感餘惟自重不具與劉彥昺書闕記事奉復彥昺茂異文契足下李宗泰來辱四月中教墨且審舟楫善逹無虞深慰所想兼豕葛布銅香模璧魯𥿄諸貺感佩感佩所聞京兆公還朝蘄黃官軍棲音可喜區區孤城無援糧之兵虛願望者皇天悔禍耳先大夫墓銘率爾呈醜軍務轇轕殊無清貺幸刪削之春雨軒集中樂府擬題甚古中朝名賢多未如此用心五七言亦佳𣣔作數語冠于集首俟後便當寄逹也景濓宋先生文集不審板在何處得一本寄惠為幸望介意耳附去漢椒二斤大能明目開胃亦服食所冝也風塵滿眼關河阻修何時良晤獲文字之益也耶斯文寥寥令人短氣便風幸垂音問以慰懷想老懷耿耿臨書馳神秋向熱惟多愛為吾道自重
