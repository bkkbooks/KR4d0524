front:
  text: 青陽先生文集卷之八門人淮西郭奎子章輯
  hash: sha256:290147cdc3f9a70fbd79a2536ed9939ab25cc8e40c188f6188212e312e1fc299
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0524_SBCK_008-1a}
body:
  text: 雜著題宋顧主簿論朋黨書後先生之時上與下同患故國家之政夫人而得言之召康公所謂士獻詩史獻典瞽獻書百工諫庶人傅語近臣盡規親戚輔察故凡事之得失政之利害國之治亂上無不有以全知而慎修之而至于無敗蓋天下之勢如操舟舵師失利豈特棹夫之患哉而凡同舟之人患也故有憂天下之心者無不有以盡其言不盡其言者是不憂天下者也有憂天下之心者由有以知其得失利害治亂之故不憂天下者是不知所以得失利害治亂之故者也夫天下之大患在于人之不淂言而淂言者不以言與雖言之而不用其甚者至以為俗雖有憂天下之心之人而知天下淂失利害治亂之故者亦不敢言而國遂以亂亡如秦季世蓋可監見而世主終不以為戒何哉三代而不若宋之一代人心世道猶有近古內而宰執侍從臺諌有奏疏卿監以下不得日奉朝請則有論對朝臣上殿則有奏劄皆與天子酬酢于殿陛之間如家人父子之相與外而監司郡守几所職事皆淂以疏聞天子親御筆劄以報之目有書至萬言者若事大體重言者不以言則大學京學諸生與凡韋布之士皆淂詣闕上書言之至其晚年權臣執命士益探䁀鑊冒刀鋸而論事不可壅遏其下與上同患如此故能外捍強國內修民事傅緒三百餘年而後亡雖先王之世人心之微亦何以過此也豫昔與圭齋諸先輩修宋史嘗愛德祐時有蕭規者前論丁大全黔面貶嶺南既舍還又與京學生葉李論賈似道又再貶似道罷陳冝中當國得詔還學猶伏闕論事竒氣櫟櫟如平時宋亡我世祖皇帝追大臣物素當時言者淂葉李用以為執政而規獨不見蓋當時率諸生論賈者規也李特因以成事者耳惟李應時掩以為名而規遂不見知于世歟于是時規巳老死或伏溺而不出耶豫屢𣣔傳其人于史以不能詳而止至今惜之永嘉顧仲明謁選來京師示余以今大宗伯逹公所書其先世主簿君與蕭侍郎論朋黨書言論慷慨而激烈時秦檜柄國方以威權銓制天下士大夫罹其禍者甚衆而君言若此此豫之所素歎以為人心世道之􅍇者故為之書逹公昔豫局之監也其為之書亦必重歎于斯焉題孟天暐擬古文後秦燔燒詩書百家之言漢興稍掇拾之諸子後出然頗雜以依倣之説如國䇿諸篇多蒯徹之流所撰甚至竊取他書以足之如見秦者豈盡短長之舊哉孟君天暐善模倣先秦文章多能似之其讀國䇿當能辨之知豫言為不妄也跋揭侍講遺墨後豫章揭先生好稱奬後學人有片善即誇道之不去口况于通家之好故人之子有可誇道者耶故世稱先生為忠厚先而生子沿亦克樹立世其文行此忠厚之報書曰人之有善若巳有之以能保我子孫黎民信哉彼竭疾者聞先生之風亦可愧矣題凃頴詩集後凃君叔良來京師與余同寢處凡兩載羔藜飯糗之餘相與論古今人詩皆有造詣尤長于五言其精麗有謝宣城步驟平淡間適不減孟浩然叔良年甚少將來何可量耶余嘗論學詩如錬丹砂非有仙風道骨者不能有所或也叔良殆有仙風道骨者耶旦晚余將有越中之行與叔良同處不知又在何日臨別殊難為情讀此尤不𣣔舍吾叔良也叔良勉旃他日聞大江之南有謝宣城者必吾叔良也此亦足以名世豈待區區外物哉御書贊今上皇帝潛邸廣西時書方谷字賜臣毛遇順謹贊曰皇德淵靚泊如大虛海上浴日惟書為娛穆穆玄雲垂若脂素神馬登河驚鵉遊霧臣順霑賜今益造玄雲漢在上湖可寶焉灊嶽禱雨文具官余闕謹告于南嶽灊山之神曰凡列于天地之間者吏食君祿以治其爭訟神享君祀以禦其災患無非事者也自盜之興同安之民農失其耕工失其業商失其資吾吏日夜孜孜以啚利之安集之以思報君食然自去歲以來田苗屢旱雨澤不時百姓飢死此則非吏之所能為而神之責也夫所謂神者以其聰明正直而能福善禍淫者也昔者凶盜燔爾宫廟既爾粢盛而吾民紓忠迪義以殄滅之而神乃禍民而弗禍盜所謂福善禍淫者安在吏或不職以干天和神乃降災于民而弗降災于吏所謂聰明正直者安在夫群神雖舉各有攸職能興雲致雨者惟山川之神耳爾神受命作嶽司命之寄在東北西三神之上又吾同安封內之神也水旱之責不于汝而奚歸今白露將近雖雨無及兹與神期三日大雨田禾熟成將率吾民修爾宫廟奉爾祭祀不然將與民啚變置汝其無悔勉勵葉縣尹手批名伯顔告青田縣尹葉承事聖天子憂憫黎元而承宣者不能道揚德意反以厲民君蒞邑之初即有政平訟理之譽若漢黃霸魯恭皆可師法詩云靡不有𥘉鮮克有終君尚冝益修美政以追配于前人固不偉歟公堂酒二樽專人奉勞西海祝文維兊為澤奠位宅西翕輸隂彚蕩泊金天我有駿􅒛肇域兹澨祀事惟常于皇無替后土祝文媪靈旁魄合德于天食于汾睢為古方澤有嚴毋事殷薦齋明蘄我亟生永沐光化西嶽祝文節彼靈嶽荒于華陽二儀鍾秀三條分方興雨祈祈嘉祉耿耿以報以霾神休惟永河瀆祝文水伯之德稱自前古肆豫寧神罔有弗至粹廟伊嘉况載薦閔兹瘝人以翕暴橫江瀆祝文水德之靈神實位長鴻紀六州澤施三壤粳稌允殖飛潛資飬我報以祀神哉昭享中鎮祝文岩岩大嶽為望于兾宣德稟神作鎮中土唯中是建四方之極神祐我民列嶽所視西鎮祝文天作髙山典司雲雨作福于下秩配君公有嚴崇鎮奠我岐下惠于西土民人所薦湖廣省正旦賀表二儀啓曆申逢首祚之期四海登圗誕際朝元之會普天均慶庶物皆春中賀運撫休嘉功深對育與民同始須解網之寬條屬吏在延布畫衣之新憲光輝縟典益固皇基臣等猥以凡庸叨陪亮采身江湖而心魏闕遙陳晉錫之詞內君子而外小人願介泰來之祉正旦賀箋伏以青陽煥景丕陳元會之儀􅊮史表年申告履端之慶和薰率土喜治岩宸合德無疆徽音有馥六宫進御人涵樛木之恩九廟蒸嘗時謹采蘩之事茂臨蒼律益介鴻禧臣等逺任旬宣阻趨朝覲椒盤獻頌仰瞻玄武之光桂殿迎春早應高禖之瑞聖節賀表伏以華渚效祥光臨首夏大廷行慶欣對上儀凡四表之尊親同一心而舞蹈功超振古仁治含生竭智附賢特重合衡之選輕徭薄賦屢預綸紱之思德與氣遊夀冝川至臣等旬宣江漢企望蓬萊承露絲囊遙獻無疆之頌齊天寶命願符有道之長書合魯易之作頴川老翁歌後續集至正四年河南北大飢明年又疫民之死者半朝廷嘗議鬻爵以賑之江淮冨民應􅒛者甚衆凡得鈔十餘萬錠粟稱是會夏小稔賑事遂已然民罹此大困田萊盡荒蒿藜沒人孤兔之迹滿道時豫為御史行河南北請以富民所入錢粟貸民具牛種以耕豐年則收其本不報覽易之之詩追憶往事為之惻然濟川字説濟川者熙寧張子瑞之號也子瑞世以活人為功聞于時其艱於衛生若川險者咸以舟楫濟之乙未春避地來歸袖卷求豫字并説豫方𣣔濟時艱得其人亦可尚已而言曰濟川者司命之謂忠惟􅒛弗罹于險弗嬰于疾卑終其天者為正嬰于疾罹于險乃戕其生為夭夭也者靡有司之者也嗚呼惟天生民有欲汲汲于民孜孜于利蛟龍黿鼉之澗風濤險濬之所阻車馬限往來罔知禍厲者唯病夫涉情蕩于中氣戾于外膏肓蠱瘵之府疲癃殘疾之基賊脈理伐夀齡罔重攝飬者唯病夫身此醫藥之利于人猶舟楫之利于天下二者固相若已雖然巨君正國燮隂陽以利天下其道其術亦不外于是説􅒛曰若濟巨川用汝作舟楫此子瑞之志也此其所以為號也此濟川字之説也贊晦父前子後大帶長𥚑人仰其名家誦其書盛哉若人是謂用譽
