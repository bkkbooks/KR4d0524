front:
  text: 青陽先生文集卷之六門人淮西郭奎子章輯
  hash: sha256:51cb4b7eaf1491e30aa7c2dcae7600fd5c30e25707b8832311923ba7a4d6aac1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0524_SBCK_006-1a}
body:
  text: 銘濟美堂銘觀夫封建之命攸貴象賢考室之詩奧蘄朱芾蓋人以人而競家以材而興情之所願孰大于此濟美堂者丞相賀公所居之正寢也自公之先奕世載德忠貞以茂功而基業惠愍以厚澤而亢宗名冠庶僚勳配名族故能保其富貴世守兹堂蕭何之第不為勢家所奪晏嬰之廬當守先人之奮念兹多懼思貼無窮故取文子之言以為扁表所以昭先烈示後昆庶幾持盈之戒不忘于侑坐良相之業可續于箕裘某忝登公之堂知公所以命名之意謹為銘曰皇慶有極析木之津孰為林匹作我世臣烈烈賀氏祖孫承德肅肅崇構奠兹王國厥兹有室爰考斯堂儉不至國質乃逾章前檐翠觀後麗玄武榮並棲鵉制惟旋馬疏承但嶺閾鏡瑶泉􅔿􅔿文井塵筵惟公先王克濟厥美其美維向黃中通理忠貞法相我世皇啓兹陪輔為時廪京惠愍肯構樹立有茂惠農商工澤深仁厚兩公之懿後先相望故居不斥疏爵弥光禮賢于館麗族於室廟寧鬯貞庭具鍾食出有旌棨入有圖書龍光載錫戚里通車德及纍世至于今公奮庸于位開誠布公登選㑓良挈彼宇寰隮于平康天子是君民命是賴敦功盤石垂裔河帶小心寅畏念兹厥𥘉欲其曽玄眠此渠渠百尺之木其本必倍混混源泉其流無既惟忠惟孝為本為源勉師元凱相我皇軒青陽縣尹袁君功銘并序紅軍起頴六縱掠江淮之南南方之地雄都巨鎮諸侯王之所封藩臣臬司之所治髙城浚隍長㦸強弩之所守環輒碎之鮮有固其國者青陽小邑也非有山溪之險兵甲之利貔貅熊虎之衆以為之固也昔者行戍過之其邑屋無所燬敗其民安生樂事無桴鼓之驚其館人具酒肉芻粟迎勞使者無喪亂窮苦之態如治平時問其所以全則皆其尹袁君之功也君𥘉逰太學舉茂才五轉而尹兹邑為人端敏精強重知人情里俗與其所疾苦而其心一以愛人為主本民有閗訟從容召逮不數言折之庭中未嘗有留獄也邑有積患吏之所不為理者悉薅􅌨治一切與之道利之冗吏悍卒不敢入縣門以干其公大家武人不敢肆虐其鄉與其過人其治既巳張矣乃以其睱日作伏羲神農黃帝祠祀之俾民知所本始吉月望日衣深衣角巾拜謁孔子廟退坐講席橫經析義進民觀聽其左以習知立身行巳之大端于是上下相率惟君言之為聽張弛禁止無抑其教者其治如此故民德之而無畔心及盜入番君即委家野處令民為保伍自守其地而身往來督㫝之相民之良者收其豪以為已用其無良而起應者誅磔無遺有盜至率民􅊇戰如武夫健將然其勇如此故民恃之而有競心卒能外捍憑陵內固根本至于今日休也余出入亂中以觀南方之民或盜至而亂或未至而迎降撞搪譎怪有如鬼蜮豈獨異性人哉由吏政不足以淂民心勇不足以振民氣民興而善者亦莫之能守也使夫天下之吏皆得如君者用之則亦何至如今者之事㦲不幸有之則亦易治不至若是極也今亂而甫定也湖湘之間千里為虛驛馳十餘日荆棘沒人漫不見行跡青陽之民于是益以君為有德于我也平居稱謂皆曰我君而不忍名字君邑之故老與其學士願銘貞石薦君功德垂于無窮而使儒生程孔昭請辝于余余故史氏也于志義無所讓乃為之銘君名俊字孟敏富州人也辭曰元受天命并臣萬邦如山如澤或生蛇龍馮淮逾江殘吳嚙楚信嘯厚凶邑無完者徂兹青陽番人所毗君治有政民亂無階亂民來既俾民為伍君先以勇衆繕厥武民以為城治以為兵大邦攸畏小邦攸愾相彼亂邦裒骨如麻爾父爾子耕稼嘯歌亂之所定棘生有爾室爾家䆒為安宅君功在時民亂弗知既克底靖功為君歸載其肥羜及其㫖酒祝君無歸亦戒難老念之謂之易由卑之至于孫子懷允無止南山之華其媺如英嫓于君功民說無疆勉學齊銘為汪民作飛黃之疾一日千里駑馬弗輟十駕可至聖源于學不以其才或利而勉殊塗同歸人十已千人一巳百孰云余愚而聖可作行百里者其半九十十里弗勉不入于室爾祖好修厥有令名勉兹學者聿觀其成鎦府君墓銘元至元戊寅八月十六日鄱鎦君殁既葬而天下兵亂不克立竭墓左今海宇晏夷冢子昺始刻銘以昭厥志君諱斗鳯字友梧毋李夢鳯翥北斗間而生故名君踈髯偉度倜儻負竒氣嘗攻舉子業屢試不利監郡馬公某舉茂材部使者主公都中賢之復交薦授集慶句容校官既而慨然曰大丈夫坐廟堂佐天子出號令以保丈庶民不然仗節出萬里外氣懾夷狄耳奈何棲棲服章逢鄉井耶逐絶江渡淮遡河濟過齊魯之邦遨逰燕趙間周回秦漢故都南還吳楚登髙酌酒弟古豪傑遺跡發為歌詩皆磊落魁竒當時虞文靖公集揭文安公奚斯札部郎中具公師道皆咸交君愛其材雄贍爭言于中書擢應奉翰林文字未上而卒年三十二以卒之年十月十五日葬鄱義城東潘超之源遺詩文若干卷燬于兵父諱環岫字傑夫兩浙鹽運提舉大父安朝宋國子生君家世簮纓光奕史牒宋贈檢校太尉中書令左僕射封頴川王浩八世祖也君克繼詩書有志弗獲顯庸惜哉配朱生昺昱燮三男子昱燮亦夭昺復業儒文聲動縉紳間銘曰猗鳯鳥昧靈兆壽曷少氣則浩跖而老顔而夭匪天道兮
