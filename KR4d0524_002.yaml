front:
  text: 青陽先生文集卷之二門人淮西郭奎子章輯
  hash: sha256:b69823348e2feb283d686bc51e21c52164d480d688ae69f500373e5beaf73c2c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0524_SBCK_002-1a}
body:
  text: 碑慈利州天門書院碑皇上稽古明道飭躬建極孜孜于治者十有四年慨然念生民之未遂徽化之未洽遂詔大臣嚴守令之選更考績之法使之務農桑興學校以其殿最而進退之維時貫侯阿思蘭海牙來監慈利乃均賦疏訟剔除奸強期月之間民志丕應州有廟學既敝且壞侯與同知州事楊君雄偉判官李君伯顔焦君克忠勸其邑人萬文綬悉修完之天門書院者國𥘉時州民田公著作之山中傍鄰獠峒職教罕至椽棟摧腐神用弗寧租入單寡士無以飬名存實廢靡所為教於是山長張德明以請於侯侯益大愳不任以墮教本民有田懷德詣侯言曰昔吾父榮孫嘗為州作三皇廟鄉邦稱之今仁侯幸導宣德意惠教遐壤願輸財力遷而大之乃度地於澧水之陽天門之麓揆日程事百工並作期月而學成宫廟間敞階序整峻講肄厝㸑具治弗遺稱其所謂諸侯頖官者民士懷道鼓篋而至敬業樂群惟侯之教侯復為之據經引史開祈疑義訴訴顒顒有如鄹魯邑人楊侯舟張侯兊㫮以髦俊登名天府有政有文侯又尊而禮之以表民厲俗其于教思亦云勤矣然不自以為功使使來鄂願有紀述曰俾吾民獲聞道德仁義之言君之賜也昔我祖宗巳篤于教武宗仁宗益大用勸至於皇上同符往哲法宫之中萬幾之睱惟先王簡冊卧起與俱以古之治德禮是首乃著吏課俾民興學荒遐所任非賢不使故爾民得賢侯以治以教俾尓遊平詩書之淵而息乎禮義之圃其小人服禮以事其上其君子力學以待用則上之德與民之幸其視于古豈不侈且大哉宜有銘詩以昭化志功章于無窮前侯野仙海牙君之昆季世系勳閥具見州學之碑銘曰帝䔍保惠惟守惟比詢于台衡命以六事貫侯振振葱利是監去其螟蟊使民耕蠶既綱既紀于學有事民誰子耒惟此田氏惟此田氏訾長厥里相侯有作丕應厥志厥初玄聖越處在阿樂是侯興式遷于嘉嵩梁有陮井絡所委淩黔轢溆為望于澧山有松柏是斫是削是髹是艧為棟為桶陟其在筵龍章朱延臨爾炳然降觀于宇秋秋有序作配在下笙磬柷敔牲齊維旅侯入即事其儀伊詡坎坎擊鼓有士如雨侯陳其書以教以語以酬以酢以論以報執爵與醬以事老父理融于中和暢于膚有頑弗即亦耒在隅有蕳有秩惟帝訓勑惠于天常于帝之極昔弗課吏祗事以文今著孔嚴民章聿興楚公之孫兄弟先後克廣帝心道民于厚天門之嗟新廟有儀侈兹侯功俾民遂歌安慶城隍顯忠靈祐王碑城隍祠古不經見自唐以耒始稍稍見之今自天子都邑下逮郡縣至于山夷海嶠荒墟左里之內無不有祠然以余觀之民之事神與夫神之著靈于民鮮有聞如舒者也舒故楚壤也其俗巫鬼今乃它無所祠祀獨于城隍出必祈反必報水旱疾疫必禱一歲之中奉膋䔥膏鐙幡幢于廷者無虗日五月之望里俗相傳以神生之日也民無貧冨男女旄倪空巷閭出樂神吹簫代鼓張百戲逰像與于國中如是者盡三日而後止其祠視郡為特盛至正中賴六之盜起江淮以南郡縣陷沒者十七八及盜之平所在為墟舒特比盜竟大小格鬪前後百餘民率咨神而後行卜朝以戰則朝而捷卜夕以戰則夕而捷群盜未嘗一日得志而去者故其城郭廬屋視他郡為特完民不忘神德相率出泉以新其廟又請于朝乞崇其號以大報之中書下其事太常博士議升神於王號顯忠靈祐十四年夏四月報下帥守及民以少牢祀神于前殿而揚言于衆曰夫舒大嶽之裔也非南方諸國之所能擬其神之著靈固宜且吾舒人親上死長既義而忠神之雍休亦其宜也乃為銘詩刻之廟門以薦道神休民德于無窮其辭曰岩岩大嶽時維皖潜臨此大邦為望于南神宫于鑠追房綺閣玉几在中卷衣朱舄其靈有皇其聲有那使人齊明奔走是冝彼惛不减盜兵以狂蜂屯于疆其斾央央我民秉義弗隨禦之殷輪鼓之褁創斧之其衷伊奭赫若皎日神之正直冝福之錫天人之縡具曰旭卉明者視之端若觀火天目者人人成者大相彼草木其固可言此有榮木蕃彼雨露彼有顛由自無承者凡今亂邦孰無神依民失厥道胡能有右桓桓舒人為君為國先民有言自求多福其充厥行孝父長兄弗祈于神丕乃降祥而自不義不率不迪來憺于言神吐不食古師之克執律以報今我小康敢忘厥祐嚴嚴奉常秩號有光牲幣版章升真于王禮行既具樂奏既卒工祝致告徂賴無極其自于今無害有年民樂齗齗丞衎于神化城寺碑小河出霍東流至六北轉南折以入于􅚉河曲有洲二參互衍迤帶之以清流𬒳之以嘉木齊頭諸峯離列其前森蔚峭麗如屏如㦸可指而數禪師洪聰泰㝎初自邢開元寺遊淮過而樂之州民闞氏為買其地乃築室前洲居焉學佛者聞其行多往從之室隘不能容六人乃委貨利輪材未築廣其居久而從之者益衆而人之為築者益大前有門中有壂左右有序為穹屋壂後以􅍥佛為堂序西以棲僧鍾魚鈴磬凡浮圖之器皆具隄其傍聮絡二洲滙水其中以溉田為圃以𬞞為埸以樹雜植梨栗棗柿㮤竹之屬數千本春土膏則率其從及優婆塞負耒出耕而躬為耨衆亦勤田力作力齊而糞多凡食百餘人而稻麥麻菽果茹不取于人而常𥙿務閒即合其衆講其師之說因號其寺為化城皇孫宣讓王雅敬佛乘與為外護六人之事佛者亦無不禮為余聞聰嘗歷事江南名僧其才幹敏其行敦朴而動苦其言辦慱善于誘人平生未嘗蓄一錢有所得悉以俾其弟子使治其居故人慕而愛之而就此易也然余聞之古農工商士皆用世之人也浮圖後出其道以出世為說而須丗以生故言道者病焉聰學出世之道而不須于丗故君子取之禪師松江人姓陸氏𥘉事法忍海翁師後受具于開元明公銘曰洋洋清川藹藹蘭渚名標化城斯實寶所芝陑井丹檻瓊户翠嶺承窗瑶溪環宇寶樹朝䕃水華晚妍未瞻靈鷲已肅祗園朱鳥殷宵倉庚司序夫須以耕間間于野陽烏斂矅清鍾或夕詵詵學徒栖禪于室練心净域結軌玄涂渡河析獸抽衣啓珠內無佚已外弗求物以學以耕其誰之疾王侯歸依四姓效績斫辭貞珉永告無斁青陽先生文集卷之二
