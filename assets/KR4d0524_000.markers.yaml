  - {type: variant, offset: 0, length: 256, content: 重刋青陽文集有元死節之士合肥余忠宣公闕既後之數載當國朝洪武初敕命有司祠公于安慶春秋祭祀其旌忠勸義之意厚矣先友吴陵張君彦剛好古尚賢嘗衰輯公之遺文􅍢板以傳然其所作散佚四方弗克盡覩其全君恒以為憾至今又數載矣予宗姪沅陵縣丞誠盖聞彦剛之風而興起者臨民稍暇𣸪取忠宣公文集譌者正之偽者去之損者𥙷之遺者益之積累既乆仍夀諸梓其意不亦羙㢤雖然忠宣公之節義政亊當與日月争光宇宙悠久固不待乎斯文之傳與否然晩生後學仰企前脩霑溉餘馥有不能忘情者庶或扵兹見焉正統十年春三月吉曰翰林院侍講學士兼經筵官淮南髙榖引青陽先生文集附録序青陽先生文集若干, WYG: ''}
