  - {type: variant, offset: 787, length: 1797, content: 甚至竊取他書以足之如見秦者豈盡短長之舊㢤孟君天暐善模倣先秦文章多能似之其讀國䇿當能辨之知予言爲不妄也䟦揭侍講遺墨後豫章掲先生好稱奨後斈人有片善即誇道之不去口况扵通家之好故人之子有可誇道者耶故世称先生爲忠厚先而生子㳂亦克樹立世其文行此忠厚之報書曰人之有善若巳有之以能保我子孫黎民信㢤彼竭疾者聞先生之風亦可媿矣題凃頴詩集後凃君叔良来京師與余同寝䖏凡兩載羔藜飯糗之餘相與論古今人詩皆有造詣尤長扵五言其精䴡有謝宣城歩驟平淡閒適不减孟浩然叔良年甚少将来何可量耶余嘗論學詩如錬丹砂非有仙風道骨者不能有所或也叔良殆有仙風道骨者耶旦晚余将有越中之行與叔良同處不知又在何日臨別殊難爲情讀此尤不𣣔舎吾叔良也叔良勉旃他日聞大江之南有謝宣城者必吾叔良也此亦足以名世豈待區區外物㢤御書賛今上皇帝潜邸廣西時書方谷字賜臣毛遇順謹賛曰皇徳淵靚泊如大虚海上浴日惟書爲娱穆穆玄雲垂若脂素神馬登河驚鵉㳺霧臣順霑賜今益造玄雲漢在上湖可寳焉灊岳禱雨文具官余闕謹告扵南岳灊山之神曰凡列扵天地之間者吏食君禄以治其争訟神享君祀以禦其灾患無非事者也自盗之興同安之民農失其耕工失其業商失其資吾吏日夜孜孜以啚利之安集之以思報君食然自去歲以来田苗屡旱雨澤不時百姓饑死此則非吏之所能爲而神之責也夫所謂神者以其聦明正直而能福善禍淫者也昔者凶盗燔尔宫廟既尔粢盛而吾民紓忠迪義以殄㓕之而神乃禍民而弗禍盗所謂福善禍淫者安在吏或不職以干天和神乃降灾扵民而弗降灾扵吏所謂聦明正直者安在夫群神雖舉各有攸職能興雲致雨者惟山川之神耳尔神受命作岳司命之寄在東北西三神之上又吾同安封内之神也水旱之責不扵汝而奚歸今白露将近雖雨無及兹與神期三日大雨田禾熟成将率吾民修尔宫廟奉尔祭祀不然将與民啚變置汝其無悔勉勵葉縣尹手批名伯顔告青田縣尹葉承事聖天子憂憫黎元而承宣者不能道揚徳意反以厲民君蒞邑之初即有政平訟理之譽若漢黄覇魯恭皆可師法詩云靡不有𥘉鮮克有終君尚冝益脩羙政以追配扵前人固不偉欤公堂酒二樽專人奉劳西海祝文維兊爲澤奠位宅西翕輸隂彚蕩泊金天我有駿􅒛肇域兹澨祀事惟常扵皇無替后土祝文媪靈旁魄合徳扵天食扵汾睢爲古方澤有嚴毋事殷薦齋明蘄我亟生永沐光化西岳祝文節彼靈岳荒扵華陽二儀鍾秀三條分方興雨祈祈嘉祉耿耿以報以霾神休惟永河瀆祝文水伯之徳稱自前古肆予寕神罔有弗至粹庙伊嘉况載薦閔兹瘝人以翕暴横江瀆祝文水徳之靈神寔位長鴻紀六州澤施三壌秔稌允殖飛潜資飬我報以祀神㢤昭享中鎮祝文岩岩大岳為望扵兾宣徳禀神作鎮中土唯中是建四方之極神祐我民列岳所眡西鎮祝文天作髙山典司雲雨作福扵下秩配君公有嚴崇鎮奠我岐下恵扵西土民人所薦湖廣省正旦賀表二儀啓暦申逢首祚之期四海登圗誕際朝元之㑹普天均慶庶物皆春中賀運撫休嘉功深對育與民同始須觧網之寛條属吏在延布畫衣之新憲光輝縟典益固皇基臣等猥以凡庸叨陪亮采身江湖而心魏闕遥陳晋錫之詞内君子而外小人願介㤗来之祉正旦賀箋㐲以青陽煥景丕陳元㑹之儀􅊮史表年申告履端之慶和薫率土喜治岩宸合徳無疆徽音有馥六宫進御人涵樛木之㤙九廟烝嘗時謹采蘩之事茂臨蒼律益介鴻禧臣等逺任旬宣阻趋朝覲椒盤獻頌仰瞻玄武之光桂殿迎春早應高禖之瑞聖節賀表㐲以華渚效祥光臨首夏大廷行慶忻對上儀凡四表之尊親同一心而舞蹈功超振古仁治含生竭智附賢特重合衡之選䡖徭薄賦屡預綸紱之思徳與氣㳺夀冝川至臣等旬宣江漢企望蓬莱承露絲囊遥獻無疆之頌齊天寳命願符有道之長書合魯易之作頴川老翁謌後續集至正四年河南北大饑明年又疫民之死者半朝廷嘗議鬻爵以賑之江淮冨民應􅒛者甚衆凡得鈔十餘萬錠粟稱是㑹夏小稔賑事遂已然民罹此大困田莱盡荒蒿藜沒人孤兎之跡滿道時予為御史行河南北請以富民所入錢粟貸民具牛種以耕豊年則收其本不報覧易之之詩追憶往事為之惻然濟川字說濟川者熈寕張子瑞之號也子瑞世以活人為功聞扵時其艱於衞生若川險者咸以舟楫濟之乙未春避地来歸䄂卷求予字并說予方𣣔濟時艱得其人亦可尚已而言曰濟川者司命之謂忠惟􅒛弗罹扵險弗嬰扵疾卑終其天者為正嬰扵疾罹扵險廼戕其生為夭夭也者靡有司之者也嗚呼惟天生民有欲汲汲扵民孜孜扵利蛟龍黿鼉之澗風濤險濬之所阻車馬限往来罔知禍厲者唯病夫渉情蕩扵中氣戾扵外膏肓蠱瘵之府疲癃殘疾之基賊脉理伐夀齡罔重攝飬者唯病夫身此醫藥之利扵人猶舟楫之利扵天下二者固相若已雖然巨君正國爕隂陽以利天下其道其術亦不外扵是說􅒛曰若濟巨川用汝作舟楫此子瑞之志也此其所以為號也此濟川字之說也賛晦父前子後大帶長𥚑人仰其名家誦其書盛㢤若人是謂用譽, WYG: ''}
