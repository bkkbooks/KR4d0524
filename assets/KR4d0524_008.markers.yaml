  - {type: line-break, offset: 0, content: '', id: KR4d0524_SBCK_008-1a01}
  - {type: variant, offset: 0, length: 804, content: 青陽先生文集卷之八門人淮西郭奎子章輯雜著題宋頋主簿論朋黨書後先生之時上與下同患故國家之政夫人而得言之召康公所謂士獻詩史獻典瞽獻書百工諫庶人傅語近臣盡規親戚𥙷察故凡事之得失政之利害國之治亂上無不有以全知而慎脩之而至扵無敗盖天下之勢如操舟舵師失利豈特棹夫之患㢤而凢同舟之人患也故有憂天下之心者無不有以盡其言不盡其言者是不憂天下者也有憂天下之心者由有以知其得失利害治亂之故不憂天下者是不知所以得失利害治亂之故者也夫天下之大患在扵人之不淂言而淂言者不以言與雖言之而不用其甚者至以爲俗雖有憂天下之心之人而知天下淂失利害治亂之故者亦不敢言而國遂以亂亡如秦季世盖可監見而世主終不以爲戒何㢤三代而不若宋之一代人心世道猶有近古内而宰執侍從䑓諌有奏䟽卿監以下不得日奉朝請則有論對朝臣上殿則有奏劄皆與天子酬酢扵殿陛之間如家人父子之相與外而監司郡守几所職亊皆淂以䟽聞天子親御筆劄以報之目有書至萬言者若亊大体重言者不以言則大學京學諸生與凡韋布之士皆淂詣闕上書言之至其晚年權臣執命士益探䁀鑊冐刀鋸而論亊不可壅遏其下與上同患如此故能外捍強國内脩民亊傅緒三百餘年而後亡雖先王之世人心之㣲亦何以過此也予昔與圭齋諸先軰脩宋史嘗愛徳祐時有蕭䂓者前論丁大全黔面貶嶺南既舎還又與京學生葉李論賈似道又再貶似道罷陳冝中當國得詔還學猶伏闕論事竒氣櫟櫟如平時宋亡我世祖皇帝追大臣物素當時言者淂葉李用以爲執政而規獨不見盖當時率諸生論賈者規也李特因以成亊者耳惟李應時掩以爲名而䂓遂不見知扵世欤扵是時䂓巳老死或伏溺而不出耶予屡𣣔傳其人扵史以不能詳而止至今惜之永嘉頋仲明謁選来京師示余以今大宗伯逹公所書其先世主簿君與蕭侍郎論朋黨書言論慷慨而激烈時秦檜柄國方以威權銓制天下士大夫罹其禍者甚衆而君言若此此予之所素歎以爲人心世道之􅍇者故爲之書逹公昔予局之監也其爲之書亦必重歎扵斯焉題孟天暐擬古文後秦燔燒詩書百家之言漢興稍掇拾之諸子後出然頗襍以依倣之說如國䇿諸篇多蒯徹之流所, WYG: ''}
