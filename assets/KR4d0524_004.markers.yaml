  - {type: variant, offset: 7339, length: 0, content: '', WYG: 然皆隠不仕恒甫之仲子克敬始以教官歴太常奉禮翰林國史院編修官而孫寅字可賓與余同登元統元年進士第擢翰林國史院檢閱官中書掾中書照磨名聲益顯楊黄之許遂為其鄉著姓郡守為表其邑中之居曰梯雲坊其後河東僉憲楊君士傑行郡至是曰楊黄者可賓之所生長其田廬丘墓皆在如是又命有司易其莊為今名以風厲其鄉人使知儒之為可貴也夫儒之所以為可貴以先王之道之所在也是以古者少使居學老使居塾不如是者不列於王官不可以長民故時不貴儒而儒貴後世之用人不必盡出於儒者也則民何由知其可貴而貴之比年朝廷設科以待天下之士民始稍稍知所趨向獨晉俗堅强不輕而變今賢使者殊其宅里明其貴賤示其好惡其意豈為許氏計哉昔常衮為福建觀察禮貌其士俗以丕變而况上有用儒之君下有風厲之使吾見晉之人父詔其子兄訓其弟其必相謂曰弗若許氏不可以同祀弗若可賓不得以為秀民耒耜以業詩書以語民之彬彬將若鄒魯矣然余嘗聞之民可以身化難以利誘可賓為人侃侃篤於孝誼有位於朝行顯貴矣乃以親老棄其官而養人皆賢之以賢者而化民如草尚之以風也其有不從者乎故余為記其表閭之始且以觀其成焉合淝修城記至正十一年冦起淮南自浙西江東西湖南北以及閩蜀之地凡城所不完者皆陷合淝之城久圮且夷倉卒為木栅以守栅成賊大至民賴栅以完其後僉憲馬君至顧而曰以栅完民幸也非所以固迺白皇孫宣讓王及其憲使髙昌公議修其城遂發公私錢十萬貫召富人之為千夫長百夫長者傭小民相故所圮夷盡築之富人得官發錢無甚費咸喜助所不足小民方饑得傭錢奔來執事鼛鼔不設鞭扑不施捧柴荷畚麕至競作自十三年二月朔戒事九月畢城四千七百有六尺六門環為睥睨設周廬廬具飾器門皆起樓櫓相盗所必攻者甓之計用木若干甓四百四十八萬用人之力七十七萬八千城成而盗不至者今期月矣余生長合淝知其俗之羙與夫所不從亂而可與守者有三焉其民質直而無二心其俗勤生而無外慕之好其材强悍而無孱弱可乘之氣當王師之取江南所至諸郡望風降附獨合淝終始為其主守至國亡乃出降天下既定南人爭出仕而少不逹則怨議其上而不可止吾合淝之民布衣蔬食秀者治詩書朴者服農賈昏喪社飲合坐數百人無一顯者無愠怒不平之色驅牛秉耒雞鳴而耕朝而息日出而耕莫而息不合耦而終十畝負二石之米日中趨百里而無徳容惟其質直而無二心故盗不能欺勤生而無外慕之好故利不能誘強悍而無孱弱可乘之氣故兵不能訹昔者木栅猶足以力戰禦冦而無肯失身於不義者今而得賢使君修其垣墉救其疾苦㩦持撫摩以與民守之而民之與君又歌舞愛戴與君守如子弟之於父兄手足之與頭目然自今至於後日是惟無盗有亦不足憂也君前為庸田僉事城姑蘇今憲淮南又城合淝一人之身而二郡之民賴之以有無窮之固儒者之利不其博哉君名世徳字元臣雅爾喀斡國人由進士第厯官應舉翰林文字樞宻都事中書檢校庸田僉事為今官與余前後為史氏城又余之所志而未成者也義為紀之其敦事與凡供役之人則載之碑隂大節堂記皇帝御天下之十五年念君徳之不宣民生之未遂乃詔丞相更守令之法著考課之令厯柬朝臣以為郡縣親御便殿賜之酒而諭遣之於是天下之吏人人奮厲以治所謂六事者以成功名稱上意宗正郎中韓君建之守安慶也獨鮮有所事其政清浄而已在官三年頴六之盗起所在竒衺之民羣起從之殺守令據城邑時天下久平民生長不識兵革而郡縣無城廓無兵備卒然有變吏往往盗未至先去而城陷有不去者盗至而民不與之守城亦陷明年十一月盗入宿松破太湖潛山吏多徙家江中為去計君獨無所徙而治城隍計軍實以示民必守不去越明年春盗入桐城以桐人來攻城君縱民出擊之盗敗去自二月至於九月盗之來攻者十有一大小百餘戰皆敗之盗大忿乃悉衆而東舳艫數百里鉦鼔之聲動天地王師敗績小孤山十月癸夘盗逐北至城下城南郛久􅈥為民居而聯羣艦為城盗縱火舟燒聯艦艦潰火入南門燒民居諸守將亦潰民恐甚走來眂君君方部署寮吏為戰守如恒日民乃無恐且戰且撲火甲辰盗傅西郛戰却之明日傅東郛又戰却之相火所經撤民屋材夜栅之旦具甲寅盗力攻無所得利諸潰者聞城完且相率來援盗望見之乃夜引去余來戍郡道聞城陷矣比至乃完問故父老皆曰韓君完我君時亦去則民無與為守民無與為守則城之完不完蓋未可知矣方朝廷更化時吏皆黼藻其政以角一日之能君若無能然者及臨大變其所能者乃若人之所未易能君誠不可以小知也予觀於今南方之國不頻於盗非其所力攻有能守者矣而頻於盗者為難頻於盗徼幸於一勝有能守者矣而屢勝者為難民屢勝矣至於敗且危於是不去而上効死以保其下下効死以衞其上卒能因敗為功以危為安如君之為者蓋千百之十一此人之所難能也曾子所謂臨大節而不可奪者君其人歟郡所治屬縣六西至於懷寧又西至於潜山又西至於太湖武夫義民列砦相望百戰抗盗賴君以為根本而無叛意東至於池又東至於姑孰數郡之民賴君以為藩屛而無死傷之禍君之所完不既大矣哉余抵郡十日盗復大至與君率衆殱之盗不至者今再朞矣十四年春三月朝廷録十月功特加君中奉大夫秩從二品幙官以下各升秩有差余因名其㕔事曰大節之堂所以揚君之懿於無窮也雖然治之亂猶旦之有夜也後之人坐其堂而思其人思其人而懼其時有不協於其行不完於其民者獨不欿然於君者乎余之名堂又所以勸於無窮也時與君守者逹嚕噶齊西夏阿爾長普照磨楊恒録事司逹嚕噶齊摩哩齊録事黄圖倫台録判爕理桀錫權懷寧縣逹嚕噶齊約蘓圖安慶萬户府經歴郝瑞千户李思禮卲永堅王國英許元琰賈伯英額森特穆爾魯沁耀珠洪保張彬路忠金嗣元葛延齡百戸盧顯宗卲文質韋與權齊世英宗達周文謝茂陳士達楊買兒朱傑李玉祝茂夏興侯興祖吕重禄朱臣孫朱惠龍彈壓嚴繼祖伍子雲張宏晁關保揚州弩軍翼千户賈禧百户王孫兒伯勒齊爾布哈㳂海翼百户毛偉牽連書之使與有聞於不朽君字公懋遼西人憲使董公均役記古者井天下之田以授民民百畝易者倍之再易者再倍之其養均也則九壤程九貢市㕓二十而一近郊十一逺郊二十而三甸稍縣都皆十二其取之又均也小任以力則上地家三人中地二家五人下地家二人大任以兵則比為五閭為兩族為卒䣊為旅州為師鄉為軍其役之又均也之二者王政之大端也大端具而又為之刑政以防民情為之學校以道民性為之公卿大夫士以登民材其制詳故不亂其本深故不拔是以商周之世皆七八百年而後衰也自經界廢於是田不在公而養不均矣養不均則土會民數皆不可知而賦與役不均矣養與賦與役之不均雖周公為政不可以言治也浙東古於越之地也其地之民無甚貧甚富之家山谷之間有一畝之居十畝之田者祖孫相保至累世不失又其土瘠故其小人勤身而飭力其君子尚樸儉而敦詩書非若吳人之兼幷武斷大家收穀歲至數百萬斛而小民皆無蓋藏此固易治之地有賢師帥為之制而道利之其亦可以庶幾矣乎然余嘗行郡以觀民風其庶人之役於官者往往閭左之民也而富人則有田而不役甚者或不以征歲終保正稱貸而輸之至破産者無算此其田雖近於均而役則不均也至正十年秋藁城董公來長越憲省民所疾苦乃曰井田者吾雖不得而行而役不可不均於是擇其部吏之精强者委之以事以衢州路經厯王仲謙西安縣主簿張拜珠治金華青田縣尹葉巴延治武義永嘉縣丞林彬祖治永康而蘭溪州逹嚕噶齊齊哩克齊義烏縣逹嚕噶齊額琳沁浦江縣逹嚕噶齊羅阿李巴哈東陽縣丞蔣受益自治其邑義烏縣則復以衢州路録事范公琇為之輔而總管陳巴延布哈總領之先期一月令民及浮圖道士各以田自占其或蔽匿及占不以實者没其田令既浹乃保以一正屬民履畝而書之具其田形疆畎主名甲乙比次以上官官按故牘而加詳覈之曰魚鱗册以會田别為右契予民使藏之曰易由以主業其征之所會曰鼠尾册以詔役弓兵𨽻卒鋪兵為至勞坊里正主首次之館夫步夫又次之凡民田多者役其勞少者役其逸又其少而不足役者則出錢以助竒田不助者則以待夫不虞之役其一人而有數保之田者各役之即賣其田則買者承其役凡一州六縣之田二萬六千四百二十四頃四十九畝役者一萬二千六百六十八名故役而今復者四千三百名所未役而今役者三千四百六十名役而不復者休而始役之册成一留縣一藏府一上憲司於是野無倖民公無逸征强弱有倫賦役有經上下和洽歲以有年蓋公之遇人有禮故吏盡其力其使民有義故貧者戴其徳而樂其復富者服其公而忘其勞以故為是大制政不肅而成民不擾而治也傳曰天地養萬物聖人養賢以及萬民公之是舉兼禮與義則誠賢者矣繼今之人毋替公政或推其所未及則越之民樂樂利利其福豈可既哉故於終事也其下咸願刻石以示不朽以闕嘗陪其末議而知其梗槩遂來屬筆焉至正辛夘十二月記青陽集卷三欽定四庫全書青陽集卷四元余闕撰碑銘慈利州天門書院碑皇上稽古明道飭躬建極孜孜於治者十有四年慨然念生民之未遂徽化之未洽遂詔大臣嚴守令之選更考績之法使之務農桑興學校以其殿最而進退之維時貫侯阿尔思蘭哈雅來監慈利乃均賦疏訟剔除奸强期月之間民志丕應州有廟學既敝且壞侯與同知州事楊君雄偉判官李君巴延焦君克忠勸其邑人萬文綬悉修完之天門書院者國初時州民田公著作之山中傍隣䝤峒􅕄教罕至椽棟摧腐神用弗寧租入單寡士無以養名存實廢靡所為教於是山長張徳明以請於侯侯益大愳不任以􅈥教本民有田懷徳詣侯言曰昔吾父榮孫嘗為州作三皇廟鄉邦稱之今仁侯幸導宣徳意惠教遐壤願輸財力遷而大之乃度地於澧水之陽天門之麓揆日程事百工並作期月而學成宫廟閑敞堦序整峻講肄厝㸑具治弗遺稱其所謂諸侯頖宫者民士懷道鼔篋而至敬業樂羣惟侯之教侯復為之據經引史開析疑義訢訢顒顒有如鄹魯邑人楊侯舟張侯兊皆以髦俊登名天府有政有文侯又尊而禮之以表民厲俗其於教思亦云勤矣然不自以為功使使來鄂願有紀述曰俾吾民獲聞道徳仁義之言君之賜也昔我祖宗已篤於教武宗仁宗益大用勸至於皇上同符往哲法宫之中萬幾之暇惟先王簡册臥起與俱以古之治徳禮是首乃著吏課俾民興學荒遐所任非賢不使故爾民得賢侯以治以教俾爾㳺乎詩書之淵而息乎禮義之圃其小人服禮以事其上其君子力學以待用則上之徳與民之幸其眂於古豈不侈且大哉宜有銘詩以昭化志功章於無窮前侯額森哈雅君之昆季世系勲閥具見州學之碑銘曰帝篤保惠惟守惟比詢於台衡命以六事貫侯振振慈利是監去其螟蟊使民耕蠶既綱既紀於學有事民誰子來惟此田氏惟此田氏貲長厥里相侯有作丕應厥志厥初𤣥聖越處在阿樂是侯興式遷於嘉嵩梁有佳井絡所委凌黔轢溆為望於澧山有松栢是斵是削是髹是艧為棟為桷陟其在筵龍章朱延臨爾炳然降觀於宇秩秩有序作配在下笙磬柷敔牲齊維旅侯入即事其儀伊詡坎坎擊鼔有士如雨侯陳其書以教以語以酬以酢以論以報執爵與醬以事父老理融於中和暢於膚有頑弗即亦來在隅有簡有秩惟帝訓勑惠於天常於帝之極昔弗課吏祇事以文令著孔嚴民章聿興楚公之孫兄弟先後克廣帝心道民於厚天門之嵯新廟有儀侈兹侯功俾民遂歌安慶城隍顯忠靈祐王碑城隍祠古不經見自唐以來始稍稍見之今自天子都邑下逮郡縣至於山夷海嶠荒墟左里之内無不有祠然以余觀之民之事神與夫神之著靈於民鮮有聞如舒者也舒故楚壤也其俗巫鬼今乃他無所祠祀獨於城隍出必祈反必報水旱疾疫必禱一歲之中奉膋蕭膏鐙旛幢於庭者無虚日五月之望里俗相傳以神生之日也民無貧富男女旄倪空巷閭出樂神吹簫伐鼔張百戱遊像輿於國中如是者盡三日而後止其祠眂他郡為特盛至正中頴六之盗起江淮以南郡縣陷没者十七八及盗之平所在為墟舒特與盗竟大小格鬬前後百餘民率咨神而後行卜朝以戰則朝而捷卜夕以戰則夕而捷羣盗未嘗一日得志而去者故其城郭廬屋眂他郡為特完民不忘神徳相率出泉以新其廟又請於朝乞崇其號以大報之中書下其事太常博士議升神於王號顯忠靈佑十四年夏四月報下帥守及民以少牢祀神於前殿而揚言於衆曰夫舒大嶽之裔也非南方諸國之所能擬其神之著靈固宜且吾舒人親上死長既義而忠神之降休亦其宜也乃為銘詩刻之廟門以薦道神休民徳於無窮其辭曰巖巖大嶽時維皖潜臨此大邦為望於南神宫於鑠追房綺閤玉几在中衮衣朱舄其靈有皇其聲有那使人齋明奔走是宜彼惛不臧盗兵以狂蠭屯於疆其斾央央我民秉義弗隨禦之殷輪鼔之褁創斧之其衷伊奭赫若皎日神之正直宜福之錫天人之縡具曰旭卉明者眎之端若觀火天因者人人成者天相彼草木其固可言此有榮木蕃彼雨露彼有顛由自無承者凡今亂邦孰無神依民失厥道胡能有右桓桓舒人為君為國先民有言自求多福其充厥行孝父長兄弗祈於神丕乃降祥而自不義不率不迪來瞻於宫神吐不食古師之克執律以報今我小康敢忘厥佑嚴嚴奉常秩號有光牲幣版章升真于王禮行既具樂奏既卒工祝致告徂賴無極其自於今無害有年民樂齗齗烝衎於神化城寺碑小河出霍東流至六北轉南折以入於􅚉河曲有洲二參互衍迤帶之以清流被之以嘉木齊頭諸峯離列其前森蔚峭麗如屏如㦸可指而數禪師洪聰泰定初自邢開元寺游淮過而樂之州民闞氏為買其地乃築室前洲居焉學佛者聞其行多往從之室隘不能容六人乃委貨利輸材木築廣其居久而從之者益衆而人之為築者益大前有門中有壂左右有序為穹屋壂後以庋佛為堂序西以棲僧鐘魚鈴磬凡浮圖之器皆具隄其傍聯絡二洲滙水其中以溉田為圃以蔬為塲以樹襍植梨栗棗柿寮竹之屬數千本春土膏動則率其徒及優婆塞負耒出耕而躬為耨衆亦勤田力作力齊而糞多凡食百餘人而稻麥麻菽果茹不取於人而常裕務閒即合其衆講其師之説因號其寺為化城皇孫宣讓王雅敬佛乘與為外護六人之事佛者亦無不禮焉余聞聰嘗厯事江南名僧其才幹敏其行敦樸而勤苦其言辯博善於誘人平生未嘗蓄一錢有所得悉以俾其弟子使治其居故人慕而愛之而就此易也然余聞之古農工商士皆用世之人也浮圖後出其道以出世為説而須世以生故言道者病焉聰學出世之道而不須於世故君子取之禪師松江人姓陸氏初事法忍海翁師後受具於開元明公銘曰洋洋清川藹藹蘭渚名標化城斯實寳所芝陑藤井丹檻瓊戸翠嶺承牕瑤溪環宇寳樹朝䕃水華晚妍未瞻靈鷲已肅祇園朱鳥殷宵倉庚司序夫須以耕閑閑於野陽烏斂曜清鐘戒夕詵詵學徒栖禪于室練心淨域結軌𤣥涂渡河析獸袖衣啓珠内無佚已外弗求物以學以耕其誰之疾王侯歸依四性效績斵辭貞珉永告無斁濟美堂銘觀夫封建之命攸貴象賢考室之詩粤蘄朱芾蓋國以人而競家以材而興情之所願孰大於此濟美堂者丞相賀公所居之正寢也自公之先奕世載徳忠貞以茂功而基業惠愍以厚澤而亢宗名冠庶僚勲配名族故能保其富貴世守兹堂蕭何之第不為勢家所奪晏嬰之廬當守先人之舊念兹多懼思貽無窮故取文子之言以為扁表所以昭先烈示後昆庶幾持盈之戒不忘於侑坐良相之業可續於箕裘某忝登公之堂知公所以命名之意謹為銘曰皇慶有極析木之津孰為林匹作我世臣烈烈賀氏祖孫承徳肅肅崇構奠兹王國厥兹有室爰考斯堂儉不至固質乃逾章前檐翠觀後麗𤣥武榮並棲鸞制惟旋馬疏承仙嶺閾鏡瑤泉􅔿􅔿文井塵筵惟公先世克濟厥美其美維何黄中通理忠貞㡳法相我世皇啓兹陪輔為時廩梁惠愍肯構樹立有茂惠農商工澤深仁厚兩公之懿後先相望故居不斥疏爵彌光禮賢於館麗族於室廟寧鬯貞庭具鐘食出有旌棨入有圖書龍光載錫戚里通車闕徳及累世至於今公奮庸於位開誠布公登選俊良挈彼宇寰隮於平康天子是若民命是賴敦功磐石垂裔河帶小心寅畏念兹厥初欲其曾𤣥眠此渠渠百尺之木其本必倍混混源泉其流無既惟忠惟孝為本為源勉師元凱相我皇軒青陽縣尹袁君功銘并序紅軍起頴六縱掠江淮之南南方之地雄都鉅鎮諸侯王之所封藩臣臬司之所治高城浚隍長㦸强弩之所守環輙碎之鮮有固其國者青陽小邑也非有山溪之險兵甲之利貔貅熊虎之衆以為之固也昔者行戍過之其邑屋無所燬敗其民安生樂事無桴鼓之驚其館人具酒肉芻粟迎勞使者無喪亂窮苦之態如治平時問其所以全則皆其尹袁君之功也君初遊太學舉茂才五轉而尹兹邑為人端敏精强重知人情里俗與其所疾苦而其心一以愛人為本至民有鬬訟從容召逮不數言折之庭中未嘗有留獄也邑有積患吏之所不為理者悉薅櫛治一切與之道利之冗吏悍卒不敢入縣門以干其公大家武人不敢肆虐其鄉與其過人其治既已張矣乃以其暇日作伏羲神農黄帝祠祀之俾民知所本始吉月望日衣深衣角巾拜謁孔子廟退坐講席横經析義進民觀聽其左以習知立身行巳之大端於是上下相率惟君言之為聽張弛禁止無抑其教者其治如此故民徳之而無畔心及盗入畨君即委家野處令民為保伍自守其地而身往來督眂之相民之良者收其豪以為巳用其無良而起應者誅磔無遺有盗至率民逆戰如武夫健將然其勇如此故民恃之而有競心卒能外捍憑陵内固根本至於今日休也余出入亂中以觀南方之民或盗至而亂或未至而迎降撞搪譎恠有如鬼蜮豈獨異於人哉由吏政不足以得民心勇不足以振民氣民興而善者亦莫之能守也使夫天下之吏皆得如君者用之則亦何至如今者之事哉不幸有之則亦易治不至若是極也今亂而甫定也湖湘之間千里為墟驛馳十餘日荆棘没人漫不見行踪青陽之民於是益以君為有徳於我也平居稱謂皆曰我君而不忍名字君邑之故老與其學士願銘貞石薦君功徳垂於無窮而使儒生程孔昭請辭於余余故史氏也於志義無所讓乃為之銘君名俊字孟敏富州人也辭曰元受天命并臣萬邦如山如澤或生蛇龍馮淮逾江殘吳嚙楚狺嘯厚㓙邑無完者徂兹青陽畨人所毗君治有政民亂無階亂民來既俾民為伍君先以勇衆繕厥武民以為城治以為兵大邦攸畏小邦攸愾相彼亂邦裒骨如麻爾父爾子耕稼嘯歌亂之所定棘生有闢爾室爾家究為安宅君功在時民亂弗知既克㡳靖功為君歸載其肥羜及其㫖酒祝君無歸亦戒難老念之謂之易由畀之至於孫子懷允無止南山之華其媺如英嫓於君功民説無疆勉學齋銘為江澤民作飛黄之疾一日千里駑馬弗輟十駕可至聖源於學不以其才或利而勉殊塗同歸人十巳千人一已百孰云余愚而聖可作行百里者其半九十十里弗勉不入於室爾祖好修厥有令名勉兹學者聿觀其成鎦府君墓銘元至元戊寅八月十六日鄱鎦君殁既葬而天下兵亂不克立碣墓左今海宇晏夷冡子昺始刻銘以昭厥志君諱斗鳯字友梧母李夢鳯翥北斗間而生故名君疎髯偉度倜儻負竒氣嘗攻舉子業屢試不利監郡馬公某舉茂材部使者王公都中賢之復交薦授集慶句容校官既而慨然曰大丈夫坐廟堂佐天子出號令以保乂庶民不然仗節出萬里外氣懾强敵耳奈何棲棲服章逄鄉井耶遂絶江渡淮遡河濟過齊魯之邦遨遊燕趙間週迴秦漢故都南還吳楚登髙酌酒弔古豪傑遺跡發為歌詩皆磊落魁竒當時虞文靖公集揭文安公傒斯禮部郎中吳公師道咸交君愛其材雄贍爭言於中書擢應奉翰林文字未上而卒年三十二以卒之年十月十五日葬鄱義城東潘超之原遺詩文若干卷燬於兵父諱環岫字傑夫兩浙鹽運提舉大父安朝宋國子生君家世簮纓光奕史牒宋贈檢討太尉中書令左僕射封潁川王浩八世祖也君克繼詩書有志弗獲顯庸惜哉配朱生昺昱燮三男子昱燮亦天昺復業儒文聲動縉紳間銘曰猗鳯鳥昧靈兆夀曷少氣則浩跖而老顔而夭匪天道兮墓表葛徴君墓表君諱聞孫字景先姓葛氏累世皆隠合肥巢湖之上有少田力耕以為學至君祖嗣武始補太學生遷桐城縣主簿宋亡遂歸隠淮安忠武王録宋官授龍泉縣丞辭不受而自放於詩酒以終父天民亦隠徳弗耀君生十九年而孤能自策厲為學天性警敏日誦數千言輒終身不忘居家孝友待朋友有信義每旦冠衣詣母束夫人問起居躬眂食飲惟夫人色所欲即趨為之凡物夫人未食即弗御也親舊知其然每食親必先以餽君使奉夫人嘗以貧出為頓文學既而曰此非養志之道也尋不復仕其後宰相薦君文行可用擢翰林國史院編修官復辭不赴召而教授於其家諸生不逺齊楚之路皆來從之余嘗謁君湖上升堂拜束夫人君侍側鬚鬢皓然進几捧觴進退旋辟惟謹為好言温藉之母夫人年八十餘耳目聰明泄泄然樂也食下始出坐館中為諸生談先王之道諸生環列修整皆若有得焉者問以親故入城中城中人無少長爭候迎謁以不至其家為恥君與人言無賢不肖率依於忠孝其語切至初若不可親及徐就之乃甚有味久而不厭也里中有鬬訟官府所不能折者君以一言決之其見重於鄉如此以故鄉大夫有大政與大獄多以詢君君亦通練誠懇問無不言諸大夫隂用之鄉人多蒙其利此余之所知而鄉人未盡知也至正五年母夫人以夀終於家予往弔之君衰絰癯然衆以為君若不勝喪如此是年冬余還京師而君遂以死矣嗚呼聖人之道猶天然而一本於卑近精粗本末無二致也而世或騖於高虚若徳合一官行庇一鄉者往往薄之以為不足為君平生不事大言髙論而行事皆聖賢之實用其用以教人亦必以此雖不肯出仕以盡其所學而其學之可用蓋不待出而後見也其文章平實稱其為人有}
