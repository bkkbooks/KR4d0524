  - {type: variant, offset: 7337, length: 0, content: '', WYG: 集卷二欽定四庫全書青陽集卷三元余闕撰記含章亭記坤者天下之至文而世謂坤為含章者美而含之六三之事非盡坤之道也嘗觀於地山川之流峙至文也風霆之流形至文也鳥獸草木之彚生至文也故夫子贊之以為光大又以為化光又以為美在其中暢於四肢天下之文孰加焉而三獨含章何謂也夫乾尊道也坤卑道也故乾主於五而坤主於二若三四者爻之無位者也乾之四近於尊故曰或躍或可以進也坤之三近乎卑故曰含章可貞可晦而可用也夫子釋含章可貞以為以時發者相時而動之意故曰可者僅詞也若四近於尊而括囊矣上儗於尊則龍戰矣是故龍君象也若六五者可謂至尊而非據矣自非中徳何以能吉故曰黄裳黄中之色裳下之服夫惟有是中徳故不失其體也無棣徐君子謙博古而通今自監察御史郎官署為諸道肅政亷訪使者政理蔚然俱可謂之文矣惟坤之六二可以當之非六三之事而其名亭謂之含章者人不知其所云也余與君處江夏凡期年知君之為人沖然賢者也曾子稱顔子以為以能問於不能以多問於寡有若無實若虛君嘗慕而師之羣居相與不言不知其有藴也然則君所謂含章者其必以此豈世所謂斷章取義者歟君曰子之言然雖然子論含章先儒所云請求諸通經者而質之穰縣學記學校之教聖人所以盡人性者也夫人之性天命也天命者諸生徧予者也其理仁義禮智其器君臣父子夫婦長㓜朋友其文昏喪冠祭朝覲會同射飲軍蒐此性之體然也若夫忠信也而流為殘賊禮讓也而流為爭奪文理也而流為淫慝此性之失而非其本然者也聖人人之綦隆也是故為之學校之教師法之化禮義之道所以正人心而定天命也而世儒之言有曰殘賊爭奪淫慝者性也必賴聖人為之教然後忠信禮讓文理興而生人之道立是不知性者之言也今夫鳥之鷇也飛而逐其雌獸之生也走而軼其羣然止於飛走而已也惟人之性其天命者也是故充其知可以通晝夜之道而知死生之説推其才可以參天地而贊化育何也所性而有故也今曰性無善也必聖人為之教而後善則敺鳥獸以由于學校之教師法之化禮義之道亦可以為忠信禮讓之理也其可乎是故桮棬棟宇聖人所以盡木之性也引重致逺聖人所以盡馬牛之性也學校之教師法之化禮義之道聖人所以盡人之性也其教已立其化以行其道以成之後於是忠信立而殘賊息禮讓著而爭奪寡文理明而淫慝平其動之也神其漸之也深則夫民之心可與為善可與為惡可與為治可與為亂夫豈奪之以惡而與之以善易之以亂而誘之以治使其民至於如是哉亦盡其性而已矣有弗若於吾化弗迪於吾道者然後為之刑政以齊之則刑政者先王所以輔治而未嘗以為先也是故教成而王政成而霸咸無焉而亡其道有大小而其教有淺深如此自先王之迹息而天下之治皆苟且由其知治而不知教而其甚者遂至亂亡相尋終莫能勝民之棼棼者皆不考乎此大元之興百有餘年列聖丕承日務興學以為教黨庠塾序徧於中國雖成周之盛將不是過夫穰大縣也自入職方以距于今吏猶未能為民立學蒙古伊嚕布哈君來監縣乃曰學校之教先王為治本也遂出其田禄以為民倡民歡樂之乃買地於州治之西攻其正位肖孔子及顔子以下十四人之像於殿餘七十二子以及諸儒之從祀者悉繪之於兩序後為學舍廩厝以安居其師弟子前闢門道屬於大衢立表而題其上曰穰縣之學學甫成會天子以學校考吏課君方樂有學校教民也而乃以憂去其同年友成君遵寔家於穰入朝為禮部郎中言君所以待穰之民甚厚而篤於教思如此故既去而民至今思之而恐後之未知所以教而民未知所以學也為予誦其所聞以告之君操行廉白為政以愛民為本日常偲偲然若已傷之是可謂良有司也况予於君亦同年也故為記之湘隂州鎮湘橋記湘水出零陵北至湘隂入洞庭而湘隂諸山谷之水則會於城南為東湖以入湘方春夏時水潦降而洞庭漲則湘水不能入湖因以湠漫為大浸州為湖南北孔道凡行者之陸出與夫鄉民之有事於州者每涉湖則有風濤之虞否則又為舟人還阻之患宋之時州有鄧氏媪率其田人作大堤絶湖以屬之州為二木橋以釃湖水行者徳之謂之鄧婆橋當徳祐末橋毁官為復之至大徳中旋敝州人黄仲規乃以私財命其子惟敬率衆為石橋南北楗石為崖中纍石為髙柱布木靣石其上為屋九楹覆之以與民為㕓易其名曰鎮湘橋歴四十餘年至元初覆木又敝屋且壞惟敬之弟惟賢惟徳徳發其帑得錢萬貫以告州人將卒其先之功州人樂為相之又得錢二萬五千貫乃撤覆木施石梁更作大屋中為道左右為市肆橋廣若干尺袤若干尺上可以任大車下可以通千斛舟飾以綵繪逺而望之爛若隂虹之飲湖中行者之􅉨來與州人之市於此者若由康莊而履堂奥不知其有湖之阻也夫水天下之至險聖人為之舟楫以濟民而舟楫需人之力人之力有限而涉者之無窮也不須人而能濟有無窮之利者惟橋為然夫橋之利大故其費亦大非若一舟楫之可易具非有司與大家之力則不能為黄氏非有大作業大廩藏而為有司大家之事力有不足至父子相承乃克成此夫亦難能也惟徳之子天禧有才藻通經術屢領鄉薦余校藝鄂渚時得其文以置前列其擢第也將亦易然黄氏有子如此必多益於人如是橋類也故為記之漢陽府大成樂記禮樂出於天而備於人卑髙以陳者禮也絪緼而化者樂也故禮者天地之大節樂者天地之大和其體極乎天蟠乎地其用行乎隂陽而通乎鬼神夫人者天地隂陽鬼神之會而禮樂者觀㑹通以行其道也其君臣上下賓主之有其文升降揖讓綴兆清濁之有其度禮以著節樂以為和節以别同和以合異是皆天之所畀而非人之所為也然心天命也欲心生也欲熾而無以治之則心梏亡矣禮樂者先王用之以迪民心而定天命者也是故朝覲會同禮樂以接郊社廟享禮樂以成軍旅賓客禮樂以治用之於天神格用之於人鬼享用之於民而民事治故習俗美而侵侮蕩淫之心無自而生天下之大政豈有出於此者哉洪荒之道邈矣堯舜以還歴夏商周禮樂始備而天下稱為極治成康之後浸以就弛至春秋而壞爛極矣漢之時禮雖麤具於經而亡散者亦已甚樂之道蕩然雅頌所存特其文而已耳是故其禮失者其俗汙其樂濫者其教衰天下之治所以不及於三代者禮樂不足之故也皇元之興諸事未遑即定著孔子廟祀之禮既又令天下廟祀用大成樂令雖具而吏亦鮮能應詔制春秋奠薦類以鼔吹行事夫禮樂者以之習民使之飽聞而飫見之然後入人深而成功大孔子廟者鄉大夫屬民敷教之地而民幸有禮可以畧見先王之道而樂又不備由吏之為政不知本末與所先後也如此漢陽府孔子廟祀舊亦循用俗樂河東譚君知府事乃率其同寅相與出俸金作雅樂器教授余時獻以其事來請宰臣是之為遣一封傳作之平江數月而樂至為琴瑟笙笛塤篪各二特鐘特磬柷敔鞉鼔各一簫八編鐘磬各十六擇諸生肄習之八月丁丑有事於學宫人聲在上樂奏在下翕如純如疾舒以度禮儀既舉觀者咸作而歎曰禮樂之用大矣若夫子監於四代樂取韶舞其治所先在放鄭聲欽若彞教以迪民性夫禮樂之存有如餼羊薦于明靈永永是享於是州之士相與樂譚君之政而喜民復見先王之樂也咸願刻石樹之廟廷余為之書而使歸刻焉新修大寧宫記華西神川原大寧宫者華人以為古后土之祠也宫故並嶽祠宋真宗幸華山賜今額以華山道士武元亨主之其後元亨以祠隘請於朝改作之於神川之上宫初甚侈大至靖康時兵燬里中人嘗修復之然庳隘不能如舊觀金正大中乃加增拓下距於今二百有餘年故屋皆壞無能修葺之者里人張某欲以私力加繕治之未及為而殁其子某乃追成先志以錢二萬五千貫具材木瓴甓會工藝自門至寢為屋若干楹凡期月而成左氏曰共工氏之子曰勾龍能平水土為后土之官故祀以為后土盧植諸儒從之遂以為后土勾龍也蔡邕則曰勾龍社神也堯祠之稷之神柱與棄也漢后土祠在國壬地社稷之位在未地為王肅之説者又曰社與稷皆土神但生育之功異故有二名耳史記武帝初郊雍太史祠官言當祀后土於方澤立為五壇壇一黄犢太牢具天子從之乃東立后土祠於汾隂脽上親望拜之如郊則漢以下地祗有社又有后土后土之説紛紛莫能統一以余考之皆失也鄭司農曰后土社神也蓋社以地言后土以神言社之有后土猶郊之有上帝也曰帝曰后皆能宰之稱天子之社神曰后土諸侯而下之社神亦曰后土者猶郊之神曰上帝而五方主氣者亦謂之帝不以嫌也五土之神吐生萬物而稷者五穀之長也人非土不生非榖不養是以先王尊而祀之勾龍有功於水土柱與棄有功於稼穡故以配食其神曰祀勾龍以為后土者猶所謂禘嚳而郊稷是也又周禮以血祭祭社稷五嶽其以血祭則非人鬼且其祀先五嶽則不得為勾龍亦明也古之制天子祭天地諸侯祭山川大夫祭五祀位有貴賤故祀有大小而后土之祀自天子逹於庶人所以生者一也王者為羣姓立社曰大社自立社曰王社諸侯為百姓立社曰國社自立社曰侯社大夫以下成羣立社曰置社大社國社為民祈報也王社侯社自為祈報也大夫以下無民人莫為立社又不得自立社故與民族居百姓之上乃立社以祈報之今國都至於郡縣皆有社獨置社亡耳民春秋雖有社祭然無壇壝主位牲齊儀章皆不應於禮其踵事而生者益甚莫為之禁夫不祀其所得祀非義也祀其所不得祀非禮也后土者民之所得祀者也今雖不能應於禮能修而祀之其賢於失禮而犯義者也余之同年光禄主事虎理翰君家於華義張氏之斯舉也而屬記於余焉梯雲莊記晉地土厚而氣深田凡一歲三藝而三熟少施以糞力恒可以不竭引汾水而溉歲可以無旱其地之上者畝可以食十人民又勤生力業當耕之時虛里無閒人野樹禾牆下樹桑庭有隙地即以樹菜茹麻枲無尺寸廢者故其民皆足於衣食無甚貧乏家皆安於田里無外慕之好間有豪傑欲出而仕由他岐皆可以得官爵故其為俗特不尚儒周行郡邑之間環數百里數百家之聚無有一人儒衣冠者獨楊黄許氏以儒稱於鄉三時力田一時為學褒衣博帶出入里巷之間其族數十家化之皆敦於禮每歲時上塚族人各具酒饌羣至墓下推長者一人主祀以次奠薦既竣長者坐少者以序羅拜之然後皆坐相與行獻酬之禮子弟有為小不善者則長者進而誚讓之衆皆進曰長者言然請改是乃已至於再至於三而終不能改也則衆相與擯絀之不與同祭祀如是者已三世矣嘗詢其族人許氏之祖有義甫君者攻詞賦有聲於時其弟恒甫君治經義通周易號松谿}
