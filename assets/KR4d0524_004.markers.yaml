  - {type: variant, offset: 7344, length: 0, content: '', WYG: 即養母而能敬生事大小自盡身力一不以屬母而務有以樂其心母素多病君自侍側具湯液食飲行坐臥起必自扶掖之而未嘗去左右如此者殆三十年間適市心動亟歸眂母火發帷家人無在者母病臥且驚不能起君冒烟熖褫幃滅之微君母幾不能免母病甚嘗割股肉以療之夜即焚香籲天願以巳年益母夀母殁哀戚甚躬負土為墓不以委僮奴人是以謂之孝也良重信之有爭訟者不詣公府而詣君取直其里之麀鹿泉者鄉人素賴以溉田延祐丙辰夏大旱泉竭衆相與祠其上喪豚敗鼓卒不能出泉乃率以走君曰泉閟禾且槁民不知死所矣泉其或者聴孝子乎君為沐浴而往再拜為民請泉出如綫衆讙曰泉至矣君乃又再拜泉沛然如初所溉方數十里之地是年獨得歲人益齺然謂君誠孝子也君性介直不阿鄉里敬之有撓曲為欺者見君靣輒發赤其事寡姊有恩義經紀其家事如其家凡細行類此多可書者不書大其孝也君通尚書以授其子兊兊亦博學有文章元統元年貢于禮部中髙等授同知茶陵州事君以子貴封承事郎英徳州同知聲光顯融享有禄養凡七年以夀終於家自君之没兊之治民日有政譽轉尹當塗公亷勁毅以治行稱徴為翰林國史院編修官君子曰天與善人孝者善之紀也故孝者必有子今於君徴之尤信君諱杏孫字子春以至元己夘十一月二十一日卒年五十有四以某年某月𦵏州之懷徳鄉永樂村青山谷張氏世為蜀之安岳人曾祖文震宋吳潜榜進士官至知江安縣祖圓避亂始遷澧自圓而下皆世治儒術然無顯者顯乃自君始是可表也兩伍張氏阡表張氏本䣜陽人其先世有諱豈者徙家淮南之兩伍村子孫繁富皆有美田在湖上無貧者君之祖子可始為儒教子君父諒裔日誦書不問其家生業見異書無錢質衣買之故君家在諸張中獨貧而教子益不怠君諱拱辰字景星少以儒薦為興化縣教諭崇明州學録泰州學正雲南栢興府建康路兩學教授改將仕郎主安豐霍丘縣簿而卒弟竑字景山亦由天長泰興教諭揚州學正真州教授以將仕郎滁州判官致仕初張氏雖盛然皆農家無聞人自君父以耆學著稱鄉校逮君兄弟登仕版有聞譽故兩伍張氏遂稱江淮間君為人寛厚不嗜利居貧晏如不以動心竑性剛直好賢而疾惡此兩人者所操雖異而士大夫與之交者一愛敬之君兄弟仕時其父已死矣君每與人言其先世必嗚咽流涕曰吾先人以儒者望吾兄弟吾兄弟今皆讀書為儒官雖貧亦何憾哉余往吏淮南聞君伯仲之名甚習會君之孫天永遂得其先世之槩如此重為慨息蓋淮俗之數易矣宋之季時其地專用武故民多尚勇力而事格鬬有號為進士登科第者徃往皆武學也混一以來其俗益降民之賢者始安於農畮其下則紛趨於末以爭夫魚鹽之利其積而至大富者輿馬之華宫廬之侈封君莫之過也故其俗益薄儒以為不足以利巳朝廷設科以誘之今三十年民亦少出應詔君父子自拔於衆人之中傾家以為學可不謂之豪傑之士哉天永自樹嶄然弱冠屬文敦義異時非能振其宗乎詩書之教能淑人心學之至可以為聖賢其次不失為善人其緒餘亦可以得禄以振耀其宗族夫孰知不足以利巳者為其家之大利與君之於鄉可表以厲俗矣君兄弟殁兩伍之墓隘不能葬乃改卜倪村𦵏焉君配陳氏子二人禎桃源縣教諭孫男三人天序天庭天庸竑娶李氏子一人燮將仕佐郎揚州教授孫男三人長天永次天竒天亨至正六年二月述青陽集卷四欽定四庫全書青陽集卷五元余闕撰䇿元統癸酉廷對䇿臣聞之周武王曰惟天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母此言君天下者凡以仁而已臣嘗思之天地生物而厚於人矣而於生人之中尤厚於聖人其所以厚於聖人者欲其推生物之心以加諸民是仁者人君臨下之大本也臣謹稽天地之理驗之往古則仁之為道夏以之為夏商以之為商周以之為周祖宗以之而創業後聖以之而守成其理可謂至要而亦可謂至難矣恭惟皇帝陛下有聰明睿知之姿有寛裕温柔之徳愛民而好士神武而不殺爰自初潜仁孝之聲固已播聞於中外今兹誕膺付託龍飛當天輕徭役薄賦斂罷土木之役恤鰥寡之民而仁厚之澤果有以大被於天下當天命眷祐之初人心歸向之日又能不自滿假拳拳以守成之大計下詢承學之臣顧臣庸愚無所通曉然臣觀陛下䇿臣之言反覆乎三代及漢守成之艱難而深徹乎今日當行之切務自非聖心獨詣深有以考之於古質之於今灼知上天作君之心與夫祖宗創業艱難之計者不能為是言也臣伏讀聖策曰古人有言得天下者為難保天下為尤難臣以為人之於仁憂患而思勉者易安樂而勿失者難天造草昧之際英雄角逐之會而世主之心所以不敢暇逸者鮮不如敵國之在旁嚴父之在上其思所以康濟小民惠鮮天下者蓋饋屢輟而寢屢興此其勢之易然者也天下既定方内無事兵革不動四荒向風天下之臣又日奏祥瑞豐年頌聖徳者聲相聞於朝歌太平者足相躡於道雖以創業之君尚不免於不終之漸况其後世乎蓋治平則志易肆崇高則氣易驕志肆則敗度之心滋氣驕則愛民之意熄如是則豈復念夫先世艱難勤苦為何如哉甚者至以其祖宗為昔之人無聞知見其先世勤儉之迹則曰田舍翁得此亦足矣此亦勢之有必然者也陛下以保天下為難此臣所以踴躍忻忭而不自知陛下此言可以承宗廟可以奉六親可以育羣生可以彰洪業臣拜手稽首而為天下賀願陛下永永無忘此言也臣又讀聖䇿曰自古持盈守成之君莫盛於三代夏稱啓能敬承繼禹之道殷稱聖賢之君六七作周稱成康能致刑措夫以禹之功而惟啓以文武之徳而惟成康賢聖之君之衆莫若殷亦不過六七而已其後惟漢之文景而言文景之治猶不得比之三代善繼承者何若斯之難也臣以為惟思祖宗得天下之難者則於保天下也斯無難啓太丁太甲太戊祖乙盤庚成康文景之君則思祖宗創業之難而保之者也桀紂幽厲桓靈則反是故伊尹之於太甲則明言烈祖之成徳周公召公之於輔相成王也亦諄諄於文王之典武王之大烈蓋知其祖宗得天下之難則必能求其所以得之之道矣知其所以得天下之道則知所以保天下之道矣夫祖宗得天下之道即其子孫保天下之道也孟子曰三代之得天下也以仁此仁者祖宗得天下之道也易曰何以守位曰仁此仁者子孫保天下之道也夫仁之難成亦已久矣持盈守成之君若是之難得者宜哉臣又讀聖䇿曰我祖宗積徳累世至於太祖皇帝肇啓土宇建帝號又七十餘年世祖皇帝始一天下以致至元之治厥惟艱哉顧予沖人賴天地祖宗之靈紹膺嫡統繼承之重實在朕躬夙夜兢兢未獲其道臣以為陛下此言可謂深知祖宗創業之艱難者也當其巡天西下又詔定西夏懷高昌北取遼金南取趙宋其經營開創之事有不待賤臣之言而後知若夫祖宗所以得天下之本則陛下之所當知也臣嘗妄論之我國家之得天下與三代同自太祖皇帝起朔漠而膺帝圖世祖皇帝揮天戈以一海内不恃强大而其仁義之師自足以服暴亂不用智力而其寛大之徳自足以結人心至於渡江臨卾與建元之詔觀之則我國家得天下之本一仁而已矣故以曹彬之事命帥臣而革命之日市肆有不閉以大易之元建國號而中統之紹天下所歸心太祖既以七十餘年而平一之世祖皇帝又以四十餘載而生聚之徳在民心功在史策以聖繼聖傳至陛下吾祖宗所以得天下之道是即陛下保天下之道也然猶云未獲者是即文王望道未見之心也臣何以多言為臣又讀聖策曰子大夫通今學古其求啓之所以敬承六七君之所以稱賢聖成康之所以致刑措其道安在文景之所以不及三代其故何繇及今日之所以持盈守成孰先孰後孰本孰末何以致刑措稱賢聖繼祖宗之盛悉心以對毋有所隠臣以為三代及漢之君其見稱於當世者雖有不同然不過守其先世之仁而已矣而今日陛下之所以持盈守成之道又何以他求也哉洪水滔天下民昏墊而成允成功者禹之仁啓之所以敬承者此也啓網祝征仇餉者湯之仁太甲以之處仁遷義太戊以之治民祇懼武丁以之嘉靖殷邦祖甲以之保惠庶民盤庚以之鞠人謀人之保居此所以稱聖賢也以言文王之仁則無凍餒之老以言武王之仁則行大義而平暴亂成王特制禮樂以文之而已耳康王特奉恤厥若而已耳其所以教化行刑罰措仁之浹於民故也漢家制度視三代雖有愧然髙帝之寛仁愛人實滅秦誅項之本原文帝之務在養民景帝之遵用成業實卓然為漢賢君其不及於三代者無太甲仁義之功無成王緝熙之學故耳以今日之道而言臣則以為守成之本仁也所當先務者仁也至曰功曰利曰甲兵錢穀曰簿書期會曰禁令條教皆末而當後者也然就仁之中而其本末先後亦不容以無序也有先王之仁心有先王之仁政孔子之告顔子曰克己復禮為仁此以心言也孟子告齊梁之君所謂五畝之宅百畝之田與夫學校庠序之類此以政言也有是心無是政則其心終不能有洽於天下有是政無是心則其政亦不能以自行必有内外本末交相通貫是即堯舜之道也陛下有顔淵明睿之姿可以致修身之功有堯舜君師之位可以推愛民之澤不宜狃於近功安於卑下而不以聖賢自期也臣願陛下萬機之暇取孔孟之言而深究之體之於身揆之於事求其何者為欲何者為理知其為欲而必克之知其為理而必復之明以察其幾勇以致其決日日而克之事事而復之則自心正身修而仁不可勝用矣或於聽朝之時或於進講之際數召大臣延問故老深加咨訪某事為先王之仁政而未盡行某事為今日之弊端而未盡革某害未去某利未興某賢未用某物失所敏以求之信以達之時省而速行之委任責成而程督之使天下疲癃殘疾得其生鰥寡孤獨得其養而無有一物之不遂其生則民物安阜而人莫能禦矣異時陛下五刑不試如周成康聖賢之作如商諸王夫然後可以答上天玉成陛下之心生民蘄望陛下之意先帝慈皇付託陛下之深計而我國家時萬時億之統可以傳之永世而無疆矣詩云宜民宜人受禄于天古人有言曰愛民者必有天報陛下誠如臣之所期則申命之休將如日之昇如月之恒矣伏願陛下少開天日之光得賜鑒察則臣不勝大幸祇冒天威臨書不勝戰慄之至}
