  - {type: variant, offset: 7343, length: 0, content: '', WYG: 殁以至正五年九月癸巳其葬在十二月癸酉年六十一明年其友余闕表其墓曰昔予登第還里中里中長老言朝廷召君時合肥之學甘露降於松明年又降於柏占者曰國家養老之祥也君得於人者如此而得於天者又如彼非篤於孝友積誠而不已其能然乎鄉之人士過君墓者式之張同知墓表澧之慈利有隠者曰張君積學厲操居州之雍沙鄉雍沙之人稱之以為能孝君喪父時年始十}
