  - {type: variant, offset: 1307, length: 0, content: '', WYG: 秩配君公有嚴崇鎮奠我岐下惠於西土民人所薦湖廣省正旦賀表二儀啓歴申逢首祚之期四海登圖誕際朝元之會普天均慶庶物皆春申賀運撫休嘉功深對育與民同始須解網之寛條屬吏在延布畫衣之新憲光輝縟典益固皇基臣等猥}
  - {type: page-break, offset: 1307, content: '', id: KR4d0524_WYG_006-8a, image: WYG1214/WYG1214-0422c.png}
  - {type: variant, offset: 1308, length: 6, content: 保天下爲难此, WYG: 凡庸叨陪亮采身江湖而心魏闕遥陳晉錫之詞内君子而外小人願介泰來之祉正旦賀箋伏以青陽煥景丕陳元會之儀彤史表年申告履端之慶和薰率土喜洽岩宸合徳無疆徽音有馥六宫進御人涵樛木之恩九廟烝嘗時謹采蘩之事茂臨蒼律益介鴻禧}
