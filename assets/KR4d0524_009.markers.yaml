  - {type: variant, offset: 1294, length: 1, content: 足, SBCK: 􅁕}
  - {type: variant, offset: 1295, length: 4, content: 矣此亦势, WYG: 以名世豈待區區外物哉御書贊今上皇帝潜邸廣西時書方谷字賜臣毛遇順謹賛曰皇徳淵靚泊如大虚海上浴日惟書為娛穆穆𤣥雲垂若脂素神馬登河驚鸞游霧臣順霑賜今益造𤣥雲漢在上胡不寳焉潛嶽禱雨文具官余闕謹告於南嶽潛山}
  - {type: page-break, offset: 1295, content: '', id: KR4d0524_WYG_006-5a, image: WYG1214/WYG1214-0421a.png}
  - {type: variant, offset: 1300, length: 3, content: 有必然, WYG: 神曰凡列於天地之間者吏食君禄以治其爭訟神享君祀以禦其菑患無非事}
  - {type: variant, offset: 1305, length: 1, content: 陛, WYG: 自盗之興同安之民農失其耕工失其業商失其資吾吏日夜孜孜以圖利之安集之以思報君食然自去歲以來田苗屢旱雨澤不時百姓饑死此則非吏之所能為而神之責也夫所謂神者以其聰明正直而能福善禍淫者也昔者凶盗燔爾宫廟竭爾粢盛而吾民紓忠迪義以殄㓕之而神乃禍民而弗禍盗所謂福善禍淫者安在吏或不職以干天和神乃降灾於民而弗降灾於吏所謂聰明正直者安在夫羣神雖舉各有攸職能興雲致雨者惟山川之神耳爾神受命作嶽司命之寄在東北西三神之上又吾同安封内之神也水旱之責不於汝而奚歸今白露將近雖雨無及玆與神期三日大雨田禾熟成將率吾民修爾宫廟奉爾祭祀不然將與民圖變置汝其無悔勉勵葉縣尹手批名巴延告青田縣尹葉承事聖天子憂憫黎元而承宣者不能道揚徳意反以厲民君蒞邑之初即有政平訟理之譽若漢黄霸魯恭皆可師法詩云靡不有初鮮克有終君尚宜益修美政以追配於前人固不偉歟公堂酒二尊專人奉勞西海祝文維兊為澤奠位宅西翕輸隂彚蕩泊金天我有駿命肇域兹澨祀事惟常於皇無替后土祝文媪靈旁魄合徳於天食於汾脽為古方澤有嚴母事殷薦齋明蘄我涵生永沐光化西嶽祝文節彼靈嶽荒於華陽二儀鍾秀三條分方興雨祈祈嘉祉耿耿以報以霾神休惟永河瀆祝文水伯之徳稱自前古肆予寧神罔有弗至萃廟伊嘉况載薦醟閔兹瘝人以翕暴横江瀆祝文水徳之靈神實位長鴻紀六州澤施三壤秔稌允殖飛潛資養我報以祀神哉昭享中鎮祝文岩岩大嶽為望於兾宣徳禀神作鎮中土唯中是建四方之極神祐我民列嶽所眂西鎮祝文天作髙山典司雲雨作福於}
