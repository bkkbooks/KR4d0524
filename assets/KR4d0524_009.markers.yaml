  - {type: variant, offset: 3214, length: 1842, content: 憲使董公均役之記浙江東海右道㢘訪使古者井天下之田以授民民百畒易者倍之再易者再倍之其養均也則九壌程九貢㕓二十而一近郊十一逺郊二十而三甸稍縣都皆十二其取之又均也小任以力則上地家三人中地二家五人下地家二人大任以兵則比為伍閭為两族為卒䣊為旅州為師郷為軍其役之又均也之一者正政之大端也大端具而又為之刑政以防民情為之學校以道民性為之公卿大夫士以登民材其制詳故不亂其本深故不㧞是以商周之世皆七八百年而後衰也自經界疲扵是田不在公而飬不均矣飬不均則土㑹民数皆不可知而賦與役不均矣飬與賦與役之不均雖周公為政不可以言治也浙東古千越之地也其地之微無甚貧甚冨之家山谷之間有一畆居十畆之田者祖孫相保至累世不失又其土瘠故其小人勤身而飾力其君子尚撲儉而敦詩書非若呉人之兼并武断大家收榖歲至数百萬斛而小民皆無益藏此固易治之地有賢師帥爲之制而道利之其亦可以庻㡬矣乎然余嘗行郡以觀民風其庻人之役扵官者徃徃閭左之民也而冨人則有田而不役甚者或不以征歲終保正称貸而輸之至破産者無筭此其田雖近扵均而役則不均也至正十年秋藁城董公来長越憲省民所疾苦乃田井田者吾雖不得而行而役不可不均扵是擇其部吏之清強者委之以事以衢州路經歴王仲謙西安縣主簿張拜住治金華青田縣尹葉伯顔治武義永嘉縣丞林彬祖治永康而蘭溪州逹魯花赤怯烈夫義烏縣逹魯花赤亦憐真浦江縣逹魯花赤㢘阿季八哈東陽縣丞蔣受益自治其邑義烏縣則復以衢州路録事范公琇爲之輔而捴管陳伯顔不華捴領之先期一月令民及浮圖道士各以田自占其或蔽匿及占不以實者没其田令既浃乃保以一正属民履畒而書之具其田形疆畎主名甲乙北次以上官官按故牘而加詳覈之曰魚鱗冊以㑹田别為右契予民使蔵之曰烏由以主業其征之所㑹曰䑕尾冊以詔役弓兵隷卒鋪兵為至劳坊里正主首次之館天歩夫又次之凡民田多者役其劳少者役其逸又其少而不足役者則出錢以助竒田不助者則以待夫不虞之役其一人而有数保之田者各役之即賣其田則買者丞其役凡一州六縣之田二万六千四百二十四頃四十九畒役者一万二千六百六十八名故役而今復者四千三百名所未役而今役者三千四百六十名役而不復者休而始役之冊成一留縣一蔵府一上憲司扵是野無倖民公無逸征強弱有倫賦役有經上下和洽歲以有年盖公之遇人有礼故吏盡其力其使民有義故貧者戴其徳而樂其復冨者服其公而忘其劳以故為是大制政不粛而成民不優而治也傳曰天地飬万物聖人飬賢以及万民公之是舉兼礼与義則誠賢者矣継今之人毋替公政或推其所未及則越之民樂樂利利其福豈可既哉故扵終事也其下咸願刻石以示不朽以闕嘗陪其末議而知其梗槩遂来属筆焉至正辛邜十二月記染習寓語為蘇友作人若近賢良喻如紙一張以紙包蘭麝因香而得香人若近邪友喻如一枝桞以桞穿魚鰲因臭而得臭結交警語君子相親姑蘭将春無夭色之媚目有清香之襲人小人相親如桃将春有夭色之媚目無幽香之􅊞人附送余廷心赴大學維揚程廷珪前壬申年作蘆葉䔥蕭江上秋呉船三日住揚州靛花深染青綾𬒳雲葉新裁紫綺裘官驛馬嘶風滿樹别筵人散月當樓明年征鴈将書去人在蓬瀛弟㡬洲两伍張氏阡表張氏本䣜陽人其先世有諱豈者徙家淮南之两伍邨子孫繁冨皆有羙田在湖上無貧者君之祖子可始為儒教子君父諒裔日誦書不問其家生業見異書無錢質衣買之故君家在諸張中獨貧而教子益不怠君諱共辰字景星少以儒薦爲與化縣教諭崇明州學録㤗州學正雲南栢興府建康路两學教授改将仕郎主安豊霍丘縣簿而卒弟竑字景山亦由天長㤗興教諭揚州學正真州教授以将仕郎滁州判官致仕初張氏雖盛然皆農家無聞人自君父以耆學著称鄕校逮君兄弟登仕版有聞譽故两伍張氏遂称江淮間君爲人寛厚不嗜利㞐貧晏如不以動心竑性剛介好賢而疾悪此两人者所操雖異而士大夫与之交者一爱敬之君兄弟仕時其父巳死矣君毎与人言其先世必鳴咽流曰吾先人以儒者望吾兄弟吾兄弟今皆讀書爲儒官雖貧亦何憾㢤余徃吏淮南聞君伯仲之名甚習君之孫天永遂得其先世之㮣如此重爲慨息盖維俗之数矣來之季時其地専用武故民多尚勇力而事格閗有號為進士登科第者徃徃皆武學也混一以来其俗益降民之賢者始安於農畮其下則紛趨於末以争夫魚塩之利其積而至大富者輿馬之華宫廬之侈封君莫之過也故其俗益薄儒以為不足以利已朝廷設科以誘之今三十年民亦少出應詔君父子自㧞扵衆人之中傾家以為學可不謂之豪傑之士哉天永自樹嶄然弱冠属文敦義異時非能振其宗乎詩書之教能淑人心學之至可以為聖賢其次不失為善人其緒餘亦可以得禄以振耀其宗族夫孰知不足以利巳者為其家之大利與君之於郷可表以厲俗矣君兄弟殁两伍之墓隘不能塟乃改卜倪邨塟焉君配陳氏子二人禎桃源縣教諭男三人天序天庭天庸竑娶李氏子一人爕将仕佐郎楊州教授孫男三人長天永次天竒天亨至正六年二月述, WYG: ''}
