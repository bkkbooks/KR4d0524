  - {type: variant, offset: 837, length: 428, content: 理可謂至要而亦可謂至難矣恭惟陛下有聦明睿知之姿有寛𥙿温柔之徳愛民而好士神武而不殺爰自𥘉潜仁孝之聲固已播聞扵中外今兹誕膺付託龍飛當天䡖徭役薄賦歛罷土木之役恤鰥寡之民而仁厚之澤果有以大𬒳扵天下當天命眷祐之𥘉人心歸向之日又能不自滿假拳拳以守成之大計下詢承學之臣頋臣庸愚無所通暁然臣觀陛下䇿臣之言反復乎三代及漢守成之艱難而深􅓪乎今日當行之切務自非聖心獨詣深有以考之扵古質之扵今灼知上天作君之心與夫祖宗創業艱難之計者不能爲是言也臣伏讀聖䇿曰古人有言得天下者爲難保天下爲尤難臣以爲人之扵仁憂患而思勉者易安樂而勿失者難夫造草昧之際英雄角逐之㑹而世主之心所以不敢暇逸者鮮不如敵國之在旁嚴父之在上其思所以康濟小民恵鮮天下者盖饋屡輟而寝屡興此其势之易然者也天下既定方内無事兵革不動四荒向風天下之臣又曰奏祥瑞豊年頌聖徳者聲相聞扵朝歌太平者足相躡扵道雖以創業之君尚不免扵不終之漸况其後世乎盖治平則志易肆崇高則氣易驕志肆則敗度之心滋氣驕則爱民之意熄如是則豈復念夫先世艱难勤苦爲何如㢤, WYG: 情}
