  - {type: variant, offset: 1855, length: 5, content: 也臣嘗妄論, WYG: 禍厲者唯病夫涉情蕩於中氣戾於外膏肓蠱瘵}
  - {type: variant, offset: 1861, length: 974, content: 我國家之得天下與三代同自太祖𧺫朔漠而膺帝圖世祖揮天戈以一海内不恃強一而其仁義之師自足以服暴亂不用智力而其寛大之徳自足以結人心至扵渡江臨鄂與建元之詔觀之則我國家得天下之本一仁而巳矣故以曹彬之事􅒛帥臣而革􅒛之日市肆有不閈以火易之元建國號而中綂之紹天下所歸心大祖既以七十餘年而平一之世祖又以四十餘載而生聚之徳在民心功在史䇿以聖継聖傳至陛下吾祖宗所以淂天下之道是即陛下保天下之道也然曰未云獲者是即文王望道未見之心也臣何以多言爲臣又讀聖第曰子大夫通今學古其求啓之所以敬豕六七君之所以称賢聖成康之所以致刑措其道安在文景之所以不及三代其故何繇及今日之所以持盈守成孰先孰後孰本孰末何以致刑措称賢聖継祖宗之盛悉心以對毋有所隱臣以爲三代及漢之君其見称扵當世者雖有不同然不過守其凡世之仁而巳矣而昑陛下之所以持盈守城之道又何以他求也哉洪水滔天下民昏墊而成允成功者禹之仁啓之所以敬承者此也啓網祝征仇餉者湯之仁太甲以之處仁遷義太戊以之治民祗懼武丁以之嘉靖殷邦祖甲以之保恵庶民盤庚以之鞠人謀人之保㞐此所以称聖賢也以言文王之仁則無凍綏之老以言武王之仁則行大義而平暴乱成王時制礼樂以文之而巳耳康王物奉恤厥若而巳耳其所以教化行刑罰措仁之浹扵民故也漢家制度視三代雖有愧然髙帝之寛仁爱人實㓕秦誅項之本原文帝之務在飬民景帝之遵用成業實卓然爲漢賢君其不及扵三代者無太甲仁義之功無成王緝熈之學故耳以今日之道而言臣則以爲守成之本仁也所當先務者仁也至曰功曰利曰甲兵錢榖曰簿書期㑹曰禁令條教皆末而當後者也然就仁之中而其本末先後亦不容以無序也有先王之仁心有先王之仁政孔子之告顔子曰克已復礼爲仁此以心言也孟子告齊梁之君所謂五畒之宅百畒之田與夫學校庠序之類此以政言也有是心無是政則其心終不能有治扵天下有是政無是心則其政亦不能以自行必有内外本末交相通貫是即尭舜之近也陛下有顔淵明睿之姿可以致脩身之功有尭舜君師之位可以推愛民之澤不冝狃扵近功安扵卑下而不以聖賢自期也臣頋陛下萬機之睱取孔孟之言而深䆒之体之扵身揆之扵事求其何者爲欲何者爲理知其爲𣣔而必克之知其爲理而必復之明以察其幾勇以致其决日日而克之亊事而復之則自心正身脩而仁不可勝用矣或扵聴朝之時或扵進講之際数召大臣延問故老深知咨訪某事爲先王之仁政而未盡行某亊爲今日之弊端而未盡革某害未去某利未興某賢未用某物失所敏以求之信以出之時省而速行之委任責成而程督之使天下, WYG: 府}
