  - {type: variant, offset: 1543, length: 308, content: 扵太甲則明言烈祖之成徳周公召公之扵輔相成王也亦諄諄於文王之典武王之大烈盖知其祖宗得天下之難則必能求其所以得之之道矣知其所以得天下之道則知所以保天下之道矣夫祖宗得天下之道即其子孫保天下之道也孟子曰三代之得天下也以仁此仁者祖宗得天下之道也易曰何以守位曰仁此仁者子孫保天下之道也夫仁之难成亦已乆矣持盈守成之君若是之难得者冝㢤臣又讀聖䇿曰我祖宗積徳累世至扵太祖肇啓土宇建帝號又七十餘年世祖始一天下以致至元之治厥惟艱哉頋予冲人頼天地祖宗之靈紹膺嫡綂継承之重實在朕躬夙夜競競未獲其道臣以爲陛下此言可謂深知祖宗創業之艱難者也當其巡天西下又詔定西夏懐髙昌北取遼金南取趙宋其經营開創之事有不待賤臣之言而後知若夫祖宗所以淂天下之本則陛下, WYG: 澗風濤險濬}
