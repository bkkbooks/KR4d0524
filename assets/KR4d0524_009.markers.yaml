  - {type: variant, offset: 1269, length: 5, content: 其祖宗爲昔, WYG: 為俗雖有憂天下之心}
  - {type: variant, offset: 1276, length: 1, content: 無, WYG: 而不知天下得失利害治亂之故者亦不敢言而國遂以亂亡如秦季世蓋可監已而世主終不以為戒何哉三代而下若宋之一代人心世道猶有近古内而宰執侍從臺諫有奏疏卿監以下不得日奉朝請則有論對朝臣上殿則有奏劄皆與天子酬酢於殿陛之間如家人父子之相與外而監司郡守凡所職事皆得以疏}
  - {type: page-break, offset: 1276, content: '', id: KR4d0524_WYG_006-2a, image: WYG1214/WYG1214-0419c.png}
  - {type: variant, offset: 1278, length: 0, content: '', WYG: 天子親御筆劄以報之日有書至萬言者若事大體重言者不以言則大學京學諸生與凡韋布之士皆得詣闕上書言之至其晚年權臣執命士益探鼎鑊冒刀鋸而論事不可壅遏其下與上同患如此故能外捍强國内修民事傳緒三百餘年而後亡雖先王之世人心之􅍇亦何以過此也予昔與圭齋諸先輩修宋史嘗愛徳祐時有蕭規者前論丁大全黔靣貶嶺南既赦還又與京學生葉李論賈似道又再貶似道罷陳宜中當國得詔還學猶伏闕論事竒氣烈烈如平時宋亡我世祖皇帝追大臣物色當時言者得葉李用以為執政而規獨不見蓋當時率諸生論賈者規也李特因以成事者耳惟李應時掩以為名而規遂不見}
  - {type: page-break, offset: 1278, content: '', id: KR4d0524_WYG_006-2b, image: WYG1214/WYG1214-0419d.png}
  - {type: page-break, offset: 1278, content: '', id: KR4d0524_WYG_006-3a, image: WYG1214/WYG1214-0420a.png}
  - {type: variant, offset: 1279, length: 1, content: 見, WYG: 於世歟於是時規已老死或伏溺而不出耶予屢欲傳其人於史以不能詳而止至今惜之永嘉顧仲明謁選來亰師示余以今大宗伯達公所書}
  - {type: variant, offset: 1283, length: 2, content: 勤儉, WYG: 主簿君與蕭侍郎論朋黨書言論慷慨而激烈時秦檜柄國方以威權鈐制天下士大夫罹其禍者甚衆而君言若此此予}
  - {type: variant, offset: 1286, length: 6, content: 迹則田舎翁得, WYG: 所素歎以為人心世道之媺者故為之書達公昔予局之監也其為之書亦必重歎於斯焉題孟天暐擬古文後秦燔燒詩書百家之言漢興稍掇拾之諸子後出然頗襍以依倣之説如國䇿諸篇多蒯徹之流所撰甚至竊取他書以足之如先秦者豈盡短長之舊哉孟君天暐喜模倣先秦文章多能似之其讀國䇿當能辯之知予言為不妄也跋掲侍講遺墨後豫章掲先生好稱奬後學人有片善即誇道之不去口况於通家之好故人之子有可誇道者耶故世稱先生為忠厚先生之子㳂亦克樹立世其文行此忠厚之報書曰人之有善若已有之以能保我子孫黎民信哉彼媢疾者聞先生之風亦可媿矣題凃頴詩集後凃君叔良來京師與余同寢處凡兩載羮藜飯糗之餘相與論古今人詩皆有造詣尤長於五言其精麗有謝宣城步驟平淡閒適不減孟浩然叔良年甚少將來何可量耶余嘗論學詩如鍊丹砂非有仙風道骨者不能有所成也叔良殆有仙風道骨者耶旦晚余將有越中之行與叔良同處不知又在何日臨别殊難為情讀此尤不欲舍吾叔良也叔良勉旃他日聞大江之南有謝宣城者必吾叔良也}
