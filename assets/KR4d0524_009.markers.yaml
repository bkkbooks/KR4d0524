  - {type: line-break, offset: 1309, content: '', id: KR4d0524_SBCK_009-4a05}
  - {type: variant, offset: 1315, length: 1, content: 所, SBCK: 􅀁}
  - {type: variant, offset: 1315, length: 110, content: 所以踴躍忻忭而不自知陛下此言可以承宗庙可以奉六親可以育群生可以彰洪業臣拜手稽首而爲天下賀願陛下永永无忘此言也臣又讀聖䇿曰自古持盈守成之君莫盛扵三代夏称啓能敬承継禹之道殷称賢聖之君六七作周称成康能致形措夫以禹之功而惟啓以文, WYG: 等逺任旬宣阻趨朝覲椒盤獻頌仰瞻𤣥}
