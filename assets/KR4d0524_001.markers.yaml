  - {type: variant, offset: 5389, length: 0, content: '', WYG: 然皆隠不仕恒甫之仲子克敬始以教官歴太常奉禮翰林國史院編修官而孫寅字可賓與余同登元統元年進士第擢翰林國史院檢閱官中書掾中書照磨名聲益顯楊黄之許遂為其鄉著姓郡守為表其邑中之居曰梯雲坊其後河東僉憲楊君士傑行郡至是曰楊黄者可賓之所生長其田廬丘墓皆在如是又命有司易其莊為今名以風厲其鄉人使知儒之為可貴也夫儒之所以為可貴以先王之道之所在也是以古者少使居學老使居塾不如是者不列於王官不可以長民故時不貴儒而儒貴後世之用人不必盡出於儒者也則民何由知其可貴而貴之比年朝廷設科以待天下之士民始稍稍知所趨向獨晉俗堅强不輕而變今賢使者殊其宅里明其貴賤示其好惡其意豈為許氏計哉昔常衮為福建觀察禮貌其士俗以丕變而况上有用儒之君下有風厲之使吾見晉之人父詔其子兄訓其弟其必相謂曰弗若許氏不可以同祀弗若可賓不得以為秀民耒耜以業詩書以語民之彬彬將若鄒魯矣然余嘗聞之民可以身化難以利誘可賓為人侃侃篤於孝誼有位於朝行顯貴矣乃以親老棄其官而養人皆賢之以賢者而化民如草尚之以風也其有不從者乎故余為記其表閭之始且以觀其成焉合淝修城記至正十一年冦起淮南自浙西江東西湖南北以及閩蜀之地凡城所不完者皆陷合淝之城久圮且夷倉卒為木栅以守栅成賊大至民賴栅以完其後僉憲馬君至顧而曰以栅完民幸也非所以固迺白皇孫宣讓王及其憲使髙昌公議修其城遂發公私錢十萬貫召富人之為千夫長百夫長者傭小民相故所圮夷盡築之富人得官發錢無甚費咸喜助所不足小民方饑得傭錢奔來執事鼛鼔不設鞭扑不施捧柴荷畚麕至競作自十三年二月朔戒事九月畢城四千七百有六尺六門環為睥睨設周廬廬具飾器門皆起樓櫓相盗所必攻者甓之計用木若干甓四百四十八萬用人之力七十七萬八千城成而盗不至者今期月矣余生長合淝知其俗之羙與夫所不從亂而可與守者有三焉其民質直而無二心其俗勤生而無外慕之好其材强悍而無孱弱可乘之氣當王師之取江南所至諸郡望風降附獨合淝終始為其主守至國亡乃出降天下既定南人爭出仕而少不逹則怨議其上而不可止吾合淝之民布衣蔬食秀者治詩書朴者服農賈昏喪社飲合坐數百人無一顯者無愠怒不平之色驅牛秉耒雞鳴而耕朝而息日出而耕莫而息不合耦而終十畝負二石之米日中趨百里而無徳容惟其質直而無二心故盗不能欺勤生而無外慕之好故利不能誘強悍而無孱弱可乘之氣故兵不能訹昔者木栅猶足以力戰禦冦而無肯失身於不義者今而得賢使君修其垣墉救其疾苦㩦持撫摩以與民守之而民之與君又歌舞愛戴與君守如子弟之於父兄手足之與頭目然自今至於後日是惟無盗有亦不足憂也君前為庸田僉事城姑蘇今憲淮南又城合淝一人之身而二郡之民賴之以有無窮之固儒者之利不其博哉君名世徳字元臣雅爾喀斡國人由進士第厯官應舉翰林}
