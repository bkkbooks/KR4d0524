  - {type: variant, offset: 5390, length: 2, content: 集卷, WYG: 字樞宻都事中書檢校庸田僉事為今官與余前後為史氏城又余}
  - {type: variant, offset: 5393, length: 0, content: '', WYG: 所志而未成者也義為紀之其敦事與凡供役之人則載之碑隂大節堂記皇帝御天下之十五年念君徳之不宣民生之未遂乃詔丞相更守令之法著考課之令厯柬朝臣以為郡縣親御便殿賜之酒而諭遣之於是天下之吏人人奮厲以治所謂六事者以成功名稱上意宗正郎中韓君建之守安慶也獨鮮有所事其政清浄而已在官三年頴六之盗起所在竒衺之民羣起從之殺守令據城邑時天下久平民生長不識兵革而郡縣無城廓無兵備卒然有變吏往往盗未至先去而城陷有不去者盗至而民不與之守城亦陷明年十}
