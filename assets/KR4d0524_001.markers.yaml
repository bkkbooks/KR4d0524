  - {type: variant, offset: 5394, length: 0, content: '', WYG: 月盗入宿松破太湖潛山吏多徙家江中為去計君獨無所徙而治城隍計軍實以示民必守不去越明年春盗入桐城以桐人來攻城君縱民出擊之盗敗去自二月至於九月盗之來攻者十有一大小百餘戰皆敗之盗大忿乃悉衆而東舳艫數百里鉦鼔之聲動天地王師敗績小孤山十月癸夘盗逐北至城下城南郛久􅈥為民居而聯羣艦為城盗縱火舟燒聯艦艦潰火入南門燒民居諸守將亦潰民恐甚走來眂君君方部署寮吏為戰守如恒日民乃無恐且戰且撲火甲辰盗傅西郛戰却之明日傅東郛又戰却之相火所經撤民屋材夜栅之旦具甲寅盗力攻無所得利諸潰者聞城完且相率來援盗望見之乃夜引去余來戍郡道聞城陷矣比至乃完問故父老皆曰韓君完我君時亦去則民無與為守民無與為守則城之完不完蓋未可知矣方朝廷更化時吏皆黼藻其政以角一日之能君若無能然者及臨大變其所能者乃若人之所未易能君誠不可以小知也予觀於今南方之國不頻於盗非其所力攻有能守者矣而頻於盗者為難頻於盗徼幸於一勝有能守者矣而屢勝者為難民屢勝矣至於敗且危於是不去而上効死以保其下下効死以衞其上卒能因敗為功以危為安如君之為者蓋千百之十一此人之所難能也曾子所謂臨大節而不可奪者君其人歟郡所治屬縣六西至於懷寧又西至於潜山又西至於太湖武夫義民列砦相望百戰抗盗賴君以為根本而無叛意東至於池又東至於姑孰數郡之民賴君以為藩屛而無死傷之禍君之所完不既大矣哉余抵郡十日盗復大至與君率衆殱之盗不至者今再朞矣十四年春三月朝廷録十月功特加君中奉大夫秩從二品幙官以下各升秩有差余因名其㕔事曰大節之堂所以揚君之懿於無窮也雖然治之亂猶旦之有夜也後之人坐其堂而思其人思其人而懼其時有不協於其行不完於其民者獨不欿然於君者乎余之名堂又所以勸於無窮也時與君守者逹嚕噶齊西夏阿爾長普照磨楊恒録事司逹嚕噶齊摩哩齊録事黄圖倫台録判爕理桀錫權懷寧縣逹嚕噶齊約蘓圖安慶萬户府經歴郝瑞千户李思禮卲永堅王國英許元琰賈伯英額森特穆爾魯沁耀珠洪保張彬路忠金嗣元葛延齡百戸盧顯宗卲文質韋與權齊世英宗達周文謝茂陳士達楊買兒朱傑李玉祝茂夏興侯興祖吕重禄朱臣孫朱惠龍彈壓嚴繼祖伍子雲張宏晁關保揚州弩軍翼千户賈禧百户王孫兒伯勒齊爾布哈㳂海翼百户毛偉牽連書之使與有聞於不朽君字公懋遼西人憲使董公均役記古者井天下之田以授民民百畝易者倍之再易者再倍之其養均也則九壤程九貢市㕓二十而一近郊十一逺郊二十而三甸稍縣都皆十二其取之又均也小任以力則上地家三人中地二家五人下地家二人大任以兵則比為五閭為兩族為卒䣊為旅州為師鄉為軍其役之又均也之二者王政之大端也大端具而又為之刑政以防民情為之學校以道民性為之公卿大夫士以登民材其制詳故不亂其本深故不拔是以商周之世皆七八百年而後衰也自經界廢於是田不在公而養不均矣養不均則土會民數皆不可知而賦與役不均矣養與賦與役之不均雖周公為政不可以言治也浙東古於越之地也其地之民無甚貧甚富之家山谷之間有一畝之居十畝之田者祖孫相保至累世不失又其土瘠故其小人勤身而飭力其君子尚樸儉而敦詩書非若吳人之兼幷武斷大家收穀歲至數百萬斛而小民皆無蓋藏此固易治之地有賢師帥為之制而道利之其亦可以庶幾矣乎然余嘗行郡以觀民風其庶人之役於官者往往閭左之民也而富人則有田而不役甚者或不以征歲終保正稱貸而輸之至破産者無算此其田雖近於均而役則不均也至正十年秋藁城董公來長越憲省民所疾苦乃曰井田者吾雖不得而行而役不可不均於是擇其部吏之精强者委之以事以衢州路經厯王仲謙西安縣主簿張拜珠治金華青田縣尹葉巴延治武義永嘉縣丞林彬祖治永康而蘭溪州逹嚕噶齊齊哩克齊義烏縣逹嚕噶齊額琳沁浦江縣逹嚕噶齊羅阿李巴哈東陽縣丞蔣受益自治其邑義烏縣則復以衢州路録事范公琇為之輔而總管陳巴延布哈總領之先期一月令民及浮圖道士各以田自占其或蔽匿及占不以實者没其田令既浹乃保以一正屬民履畝而書之具其田形疆畎主名甲乙比次以上官官按故牘而加詳覈之曰魚鱗册以會田别為右契予民使藏之曰易由以主業其征之所會曰鼠尾册以詔役弓兵𨽻卒鋪兵為至勞坊里正主首次之館夫步夫又次之凡民田多者役其勞少者役其逸又其少而不足役者則出錢以助竒田不助者則以待夫不虞之役其一人而有數保之田者各役之即賣其田則買者承其役凡一州六縣之田二萬六千四百二十四頃四十九畝役者一萬二千六百六十八名故役而今復者四千三百名所未役而今役者三千四百六十名役而不復者休而始役之册成一留縣一藏府一上憲司於是野無倖民公無逸征强弱有倫賦役有經上下和洽歲以有年蓋公之遇人有禮故吏盡其力其使民有義故貧者戴其徳而樂其復富者服其公而忘其勞以故為是大制政不肅而成民不擾而治也傳曰天地養萬物聖人養賢以及萬民公之是舉兼禮與義則誠賢者矣繼今之人毋替公政或推其所未及則越之民樂樂利利其福豈可既哉故於終事也其下咸願刻石以示不朽以闕嘗陪其末議而知其梗槩遂來屬筆焉至正辛夘十二月記青陽}
