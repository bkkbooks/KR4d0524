  - {type: variant, offset: 5387, length: 0, content: '', WYG: 時千里乘驄去因之傷别離南歸偶書二首帝城南下望江城此去鄉關半月程同向春風折楊栁一般離别兩般情二月不歸三月歸已將行篋換征衣殷勤未報家園樹緩緩開花緩緩飛别樊時中亷使光禄橋西惜解㩦春星欲傍露盤低自來宫栁多離思更着城烏在上啼題段吉甫助教别墅圖玉署掛新圖如君舊隠居峰髙乃霞上葉變是秋初游客看常在溪聲聴却無只此同登望豈必命柴車青陽集卷一欽定四庫全書青陽集卷二元余闕撰序送歸彦温赴河西㢘使序河西本匈奴昆耶休屠王之地三代之時不通於中國漢始取而有之置五郡其間自李唐以來拓跋氏乃王其地號為西夏至於遼宋日事戰伐故其民多武勇而少文理然以予觀之予家合淝合淝之戍一軍皆夏人人面多黎黒善騎射有長身至八九尺者其性大抵質直而上義平居相與雖異姓如親姻凡有所得雖簞食豆羮不以自私必召其朋友朋友之間有無相共有餘即以與人無即以取諸人亦不少以屬意百斛之粟數千百緍之錢可一語而致具也歲時往來以相勞問少長相坐以齒不以爵獻夀拜舞上下之情怡然相讙醉即相與道其鄉鄰親戚各相持涕泣以為常予初以為此異鄉相親乃爾及以問夏人凡國中之俗莫不皆然其異姓之人乃如此則其親姻可知矣宜其民皆親上死長而以彈丸黑子之地抗二大國傳世五六百年而後亡非偶然也自數十年來吾夏人之居合淝者老者皆已亡少者皆已長其習日以異其俗日不同少貴長賤則少傲其長兄强弟弱則兄棄其弟臨小利害不翅毫髮則親戚相賊害如仇讐予猶疑江淮之土薄而人之生長於此者亦因以變及以問夏人凡國中之俗今亦莫不皆然其於親姻如此則異姓之人可知也夫夏小國也際時分裂而用武必不能篤於所教而區區遐方教之亦未必合於先王之法及國家受天命一海内收其兵甲而摩以仁柔養之以學校而誘之以利禄今百餘年於兹絃誦之聲内自京師逹於海徼其教亦云至矣而俗迺日降如此吾不知其何説也我祖宗之置肅政亷訪司於天下大要以風俗為先而其職以學校為重故世謂之風憲是得先王為治之意也故嘗選任尊官非道徳爵位出乎庶僚者不得與是選所以為民表也今皇帝用嵬名公為御史大夫公乃歴選朝著盡拔諸名臣為亷訪使而吾歸君彦温以樞宻院判官而為河西君少擢科目能古文辭有大節由國子博士五轉而遷是官今為亷使於夏必能興學施教以澤吾夏人吾夏人聞朝廷以儒臣為尊官以蒞巳必能勸於學以服君之化風俗必當丕變以復於古其異姓相與如親姻如國初時如余所云者矣故道吾夏之俗以望吾歸君焉送月彦明經歴赴行都水監序中國之水賴禹治之而悉平而河獨為患至今未已者何也河失禹之道而治河者不以禹之所治治之也蓋河出崑崙合諸戎之水東流以入中國其性勁悍若人性之有強力其來也甚逺而其注中國也為甚下又若建瓴水於峻宇之上則其所難治也固宜且中原之地平曠夷衍無洞庭彭蠡以為之滙故河嘗横潰為患其勢非多為之委以殺其流未可以力勝也故禹之治河自大伾而下則析為二渠大陸而下則播為九河然後其委多河之大有所瀉而其力有所分而患可平也此禹治河之道也自周定時河始南徙訖於漢而禹之故道失矣故西京時其受患特甚雖以武帝之才乘文景富庶之業而一瓠子之微終不能塞而付之無可奈何而後已自瓠子再决而其流為屯氏諸河其後河入千乘而徳棣之河又播為八漢人指以為太史馬頰河者是其委多河之大有所瀉而力有所分大抵偶合於禹所治河者由是而訖東都至唐河不為患者千數百年或者以謂王景隄防之力乃大不然使無屯氏及徳棣諸河河之大無所瀉而力無所分景以尋丈之防而捍猶螳螂之臂而可以捍大車之奔吾不信也惟河之委既多大有所瀉而力又有所分景之隄防特以捍漸水之衍溢者耳比趙宋時河又南决至於南渡乃由彭城合汴泗東南以入淮而漢之故道又失以河之大且力惟一淮以為之委無以瀉而分之故今之河患與武帝無異余嘗以為中國之地西南髙而東北下故水至中國而入海者一皆趨於東北古河自龍門即穿西山踵趾而入大陸地之最下者也然河天下之濁水也凡水一石率泥數斗嘗道出梁宋觀河所决凡水之所被比其去即穹居大木盡没地中漫不見踪跡河之行於地也方數千年而河徙千乘自漢而後千數百年而河徙彭城然南方之地本髙於北故河之南徙也難而其北徙也易自宋南渡至今殆二百年而河旋北迺其勢然非有他説也比者河北破金堤踰豐沛曹鄆諸郡大受其害天子哀民之墊溺迺疏柳河欲引之南工不就又遣平章政事嵬名公御史中丞李公及禮部尚書台哈布哈公沈兩珪有邸及白馬而祀之河之患不已乃會諸老臣集議治河者諸老臣無能言其説獨尚書台哈布哈公以為當濬河棄道復引河以入彭城而待制楊梓义力以為棄道不可濬設使濬之而河未必能入廟堂無所從遣都水使者相其便害或者以為當築隄起曹南訖嘉祥東西三百里以障河之北流則漸可圖以導之使南廟堂從之迺置都水分監以任其事選朝臣之知水者為都水而吾同年月君彦明為元幕將行以問於余余不知河事者雖然諺有之曰不習為吏眡已成事以事已成者為君言則古所以治河者可見也今河惟不反故道則其勢可障而排之使南使反於故道由漢之千乘以入海則國家將無水患千餘年如東都與唐之時乎今禹之九河既不可復考而河亦不復徳棣之間漢人指以為太史馬頰河者尚未泯可尋究如縷河之道是將大有所瀉而力有所分非若一淮之小而扼其勢而使之横潰為吾民害也今夫廟堂之議非以南為壑也其慮以為河之北則會通之漕廢其係於朝廷甚重余則以為河北而會通之漕不廢何也漕以汶而不可以河也河北則汶自彭城以下必微微則吾有制而相之亦可以舟以漕書所謂浮于汶逹于河者是也余特欲防鉅野而使河不妄行俟河復千乘然後相水之宜而脩治之特一人之私言也朝廷方事隄防固無事此迺以彦明言者似迂逺而不切也萬一隄防不足以禦河則余之言或有時而驗焉故為之叙送樊時中赴都水庸田使序國家置都水庸田使於江南本以為民而賦税為之後往年使者昧於本末之義民嘗以旱告率拒之不受而盡征其租入比又以水告復逮繫告者而以為姦治之其心以為官為都水而民有水旱之患如我何於是吳越之人咻然相譁以為厲已會天子問民所苦迺以為民實水非姦遂劾逐使者破械縱民而以聞上朝議乃歴選公卿有學術知大體者為之使而吾樊君時中以江南湖北道肅政㢘訪使而選是職自君之來官僚協和吏畏民服政以大行命下之日無不相視嗟咨以惜其去獨其友余闕躍然曰東南民力自前已謂之竭矣况今三百餘年昔之盛者衰登者耗今其貧者力作以苟生富者悉力以供賦有持其産為酒食予人人皆望而去之其窮而無告甚於前世益逺矣其可重困之今而得賢使者以蒞之修其溝澮相其作息不幸而有水旱之災則哀矜而為之所民之窮者其少瘳矣乎今夫木之實繁者其枝披其本疏者其幹抜况於國與民乎哉故善樹木者簡其實而厚其本善為國者疏其賦而厚其民理之較然者也時中慷慨有大志臨大事果毅不擇利害而為之今其行也其能有以大慰吳越之民望以副朝廷之倚注也必矣二月初吉式發鄂城卉木繁盛賓僚具在各為詩以稱美之予故首序焉送范立中赴襄陽詩序宋高宗南遷合淝遂為邊地守臣多以武人為之九十餘年間未嘗一歲無兵革故民之豪傑者皆去而為將校累功多至節制郡中衣冠之族惟范氏商氏葛氏三家而已三家之在當時貴不過通判顯者或至知縣與府族亦未甚大也皇元受命包裹兵革休養元元民既富庶矣而又修禮樂定治具諸武臣之子弟無所用其能多伏匿而不出春秋月朔郡太守有事於學衣深衣戴烏角巾執籩豆罍爵唱贊道引者皆三家之子孫也故其材皆有所成就至學校官纍纍有焉當宋季時諸武臣之富貴眂三家蔑如也而百餘年之後惟儒家子入為弟子出為人師隨其才之大小皆有聞於時雖天道忌滿惡盈而儒者之澤深且逺從古然也范氏世多聞人立中尤通敏由郡直學為襄陽教諭宋亡時蜀流寓之士多在江漢意必有老成典型人也有老成典型人與之遊立中此行將大有得范氏之後有大顯者必立中也於其行也書以贈之李克復總管赴贑州詩序仁皇帝即位録懷來功致髙位者無慮數十百人獨韓國李公以甘盤之舊為最顯位平章總百度君臣一徳銳精治古而韓公相業見稱於天下後世者設科取士其最也元統初余忝論薦計偕如京師與諸同年求韓公子孫得今伯徴太常相往來又識克復屯田於京師比來佐泗州而君復為泗州屯田提舉日與君處念天下士所以復見前代賓興之盛者由韓公士不及見韓公見屯田不其猶見韓公乎且與太常同年辱使納禮故以太常之事君者事君朔月歲時必從諸僚友造君第君暇亦輕裘緩帶以一小吏持馬過我我必為之傾蓋而後去君色嚴而氣和有學而知體坐終日屹然於先朝人物故實無不熟而知聴其言亹亹如環之無端坐客無能置一辭也去年秋既書滿宰相以君有門閥且久更事非散地所宜處奏為贑州路總管州之長貳及諸屯田與九州之人往賀君闕在次舉琖拜君言曰仁皇帝之文徳入人也深天下不忘仁皇帝必及於韓公朝廷録勲舊家首言君斯文之興可俟矣請以為天下賀又曰韓公能以道術昌其家君兄弟能保功名以有光於韓公致中二千石請以賀君又言江之西文教之盛者曰吉曰贑多士彬彬焉人之所以厲於學科目之興也於韓公之始而厲於學獨不於韓公之季以治哉贑雖號難治君處之余知其為易也請以賀於是程泗州賦詩四韻坐客人士皆為詩以道其行使書吾說以為引楊君顯民詩集序我國初有金宋天下之人惟才是用之無所專主然用儒者為居多也自至元以下始浸用吏雖執政大臣亦以吏為之由是中州小民麤識字能治文書者得入臺閣共筆劄累日積月皆可以致通顯而中州之士見用者遂浸寡况南方之地逺士多不能自至於京師其抱材藴者又往往不屑為吏故其見用者尤寡也及其久也則南北之士亦自町畦以相訾甚若晉之與秦不可與同中國故夫南方之士微矣延祐中仁皇初設科目亦有所不屑而甘自没溺於山林之間者不可勝道是可惜也夫士惟不得用於世則多致力於文字之間以為不朽而文辭者有幸有不幸者不幸者至於老而無所用矣而其文又遂泯不顯是可哀也比年大江之南山林之士有挾其文藝遊上國而遇知於當世士之彈冠而起者相踵京師大官之家皆有其客而遇知於當世者亦比比有之若豫章楊顯民者抱其才藴不屑於科目甘自没溺於山林之間當士羣起而有遇之時而又終不肯一出以干時取譽是其中必有所負而然也予雖不識顯民然聞其人力學而操行通古今之務江南之士漸其澤而有名者甚衆其弟子之登科目仕州縣者亦能以政稱其家固貧而年又將老迺日蕭然吟咏以自樂無少怨怒不平之氣其殆古有道之士耶余讀而愛之其弟子凃頴持其所謂水北小房集者來京師將刻之以傳於世余為題其首使後知顯民南州之士有所負者也是蓋有道之士也貢泰父文集序余天性素迂常力矯治之然終不能入繩墨矯治或甚則遂病不能勝因思以為迂者亦聖賢以為美徳遂任之一切從其所樂常行四方必迂者然後心愛之而與之合凡捷機變者雖强與之然心終不樂也故暫合而輙去京師馳逐聲譽之區也迂非所宜有嘗隂以求之士大夫之間得一人焉曰貢泰父泰父故學士仲章君之子能詩文少游太學有時名因自貴重不妄為進取有所不可交者亦不妄與交故吾二人者驩然相得若魚之泳於江獸之走於林也時泰父為應奉翰林文字固多暇者即與聚盍有蔬一品魚一盤飲酒三行或五行即相與賦詩論文凡經史詞章古今上下治亂賢否圖書彞器無不言者意少適即聯鑣過市㨿鞍談謔信其所如而止及暮無所止則相與問曰將何之皆曰無所之也乃各策馬還自古暨今王公貴人能求賢常少然自至元初姦回執政乃大惡儒者因説當國者罷科舉擯儒士其後公卿相師皆以為常然而小夫賤𨽻亦皆以儒為嗤詆當是時士大夫有欲進取立功名者皆强顔色昏旦往候於門媚説以妾婢始得尺寸此正迂者之所不能為也因翺翔自放無所求於人已而皆無所遇予既歸淮南泰父亦以親嫌辭官歸除紹興推官不相見者為最久去年大原賀君為丞相蒐羅天下人才之有政譽者而泰父之治為浙東西第一迺得復召為應奉余適入朝為待制相見益歡計其别十年矣吾年少於泰父鬚髮皆白而泰父鋭然靣紅白如常出其别後所為詩文甚富且大進益知泰父真豪士也夫以士之賢無所遇而淹於下僚宜其悲憤無聊而不能盡也顧乃自樹卓卓以其餘力而致勤於文學且其貌充然非其中有所負蓋不能爾然則吾泰父之迂又過我逺矣夫古之賢士多不兼於文藝文藝雖卑而世且貴而傳之者愛其人故也不賢者之於文藝雖極其精人猶將賤之亦何以為也泰父忠孝人也其功名事業當不待文與詩而傳而况於兼有之耶余昔與之别今見其文如此今又當别去計相見時其文又必有過此矣於其行也序而識之送葛元哲序文者物之成章者也在天而為三辰在地而為川岳其在於人若堯舜之治化孔孟之道徳仲由之政冉求之藝一皆謂之文今特以言辭之精為文者夫言之精莫精於周公孔子二聖人之於言豈有求其精而然哉而其文何若是其蔚也揚雄司馬相如韓子歐陽子始號為工於文者彼其於周公孔子之文非不欲窮日夜之力極一世之所好孜孜焉追琢磨礪以求其精而卒不能至焉濂溪二程夫子之學其視揚雄司馬相如韓子歐陽子蓋有所不暇然味其言淵然而深雄然而厚睟然而醇使得列於聖門雖顔子曾子將不能過則夫言之精者又若不待窮日夜之力極一世之所好孜孜焉追琢磨礪以求至於聖人而後已此無他聖賢道徳之光積中而發外故其言不期其精而自精譬猶天地之化雨露之潤物之魂魄以生葩華毛羽極人之智巧所不能為亦自然耳故學於聖人之道則得聖人之言學於聖人之言則非惟不得其道幷所謂言胥不能至矣金谿葛元哲舊以文章名江南既擢第其文又傳於京師衆謂元哲之文宜為天子粉飾太平鋪張鴻業以傳於後世會有守宰之選遂以為興化録事余知元哲終以文選非久於外者也於其别也故與之論文送許具瞻序余讀周易之謙未嘗不掩卷而歎曰聖人待小人之心一何如是其至也夫陽君子也隂小人也小人盛則干君子故隂至三則履君子盛亦未嘗不下小人故陽至三則謙謙虛也陽本實而云虛者不自滿假故屈而下於隂也是謙以下為徳者也初而謙謙下而又下者也二則浸以上矣故以鳴謙鳴者以言謙也三則益上而位髙故以勞謙勞者以功謙者也以功而謙厚之至也厚之至而民焉有不服者乎故三之辭曰勞謙君子有終謙而民既服君子之道終矣謙既終民既服進而之四何施而不可聖人之心猶以為吾之待小人者未之厚也又自反而撝謙故四之辭曰無不利撝謙其徳已厚其謙已撝進而之五而小人者之終不可以化入也於是乎有侵伐之師故五之辭曰不富以其隣利用侵伐不富以鄰徳之盛也利用侵伐順之至也聖人之待小人至是可謂盡心焉耳矣昔者禹征有苗苗民逆命益之賛禹惟在於謙禹遂有舞干之舉此其所謂撝謙也謙猶撝而未格則其侵伐者禹終得而已乎哉祖宗受命迅掃六合以有堯舜所未有之天下聖天子紹承熙洽愛民猶子堯舜之仁不是過也頃者盜起海隅剽民財犯官漕其罪可誅而區區赤子又特一將校之力所能舉迺不以為罪止於招諭盜又止我省臣以求降此尤可誅也而亦從其請且曰徳不下宣此吏之罪遂盡變易瀕海之為宣慰及其郡縣之官選能當其任者得三十八人親御便殿給符傳而諭遣之嗚呼此所謂無不利撝謙而禹之所以待苗民者也三十八人之中天台許君具瞻當治鄞具瞻佘同年進士也其行端潔其材勇以幹前知武義時攝金華縣事武義之民羣訴憲府請還君金華之民亦羣訴於憲府留君不欲其去其得民如此可謂稱兹選矣故余為道聖天子愛民之深與夫所用具瞻者如此非惟勉具瞻亦以告夫民也贈刑部掾史劉彦通使還京序舒岸大江為城北走英頴南亘畨歙西通黄蘄湘漢鄂岳東距鳩巢所謂四通八逹之地也自兵興所在從亂舒介其間而獨徇義秉節不與之共戴天故羣盜環攻之舒亦不少屈撓日治矟㦸弓矢以與之相格鬬盗大至則男操兵婦給餉童子負瓦石空巷乘城與之決戰如是者今五年其勞如此故其富者日貧而貧者日死以耗入其市㕓里蕭然適其野榛莽没人不見行跡至其館簠簋不治餼牽不具委積不充使者之道此怒而去者往往有焉其以公事來者多眂賂以為喜愠喜為春温愠為秋凜或怒而去則民相與踧踖曰禍其始此耳不甘食安處者累月而未寧逮無事迺已浚儀劉君彦通為秋官掾亦以事來居郡浮圖每食蔬一器飯一盂饋之珍羞則辭賮之財則艴然以怒持節至軍中勇者執手以勉之創者涕泣以勞之其居此特久而民愛之如始至惟恐其去已也傳曰有功而見之則説也君重其民情而閔其勞民之説也亦其宜也臨川毛順孫愛君尤至與士大夫賦詩以美之余故處合淝知君為掾亷而有能以為士之美君者非譽也故序而冠諸其首髙士方壺子歸信州序堯舜之時以幽幷為朔易元興舉堯舜未有之天下而一之而幽并始為土中以為四方之極然其地去荆揚數千里而氣苦寒而多風非其土著至則手皸而足裂其居處服食異用絺葛果茗魚鱐之物不能以易致皆性之所不便故南方之人其至者恒少非為名與利無從而至焉又况浮圖老子之徒以遺外世俗為道其於名與利蓋有所不屑故其至者尤少或至焉者則亦名利之人也髙士方壺子至正中至自信州余始遇之以為名利之人也徐與往來見其氣洎然其貌充然人與之談當世之事則俛而不答獨其性好畫人以禮求之始為出其一二皆蕭散非世人所能及嘗為余言太行者天下之脊而居庸古北者天下之岩險也其雄傑竒麗非江南之所有天府之藏王公鉅人之所有皆古之名畫余所願見者今皆見之而有以慊吾志充吾之所操吾非若世俗者區區而至也余曰賢哉方壺其古所謂善操技者與夫輪扁之為斵知斵之為美不知有王公之貴知斵之為得不知有晉楚之富故其為技也古今之善斵者莫加焉今子幾於是矣其有不臻於古者耶吾黨之學者苟遷於物其尚能望子耶於其行也相率為詩以贈之聚魁堂詩序安慶郡文學秦宗徳持其友人豫章嚴撰書來請曰去年丙申江西行中書之鄉試也臨江貢士有曾魯者偕其友廬陵解蒙髙飛鳯劉倩玉俱就試寓止同舍往還復同舟而載拆號四人者俱在甲乙選列捷報至髙與劉解乃留魯家鄉人因名曾氏之館曰聚魁堂云僕與魯姻婭也復率大夫士之能文辭者賦詩美之謂宗徳常獲私於公書來請序願勿辭將以為榮焉余曰科目取士吾嘗司文衡於中外矣退而攷其所得父子同榜者有之兄弟聯名者有之師生俱在選者有之若同志同升鮮有聞如曾魯者也其理似不偶然豈有數存其間耶然不足泥也余惟愛魯之交友得人而人之與魯交能登科目發身也由此而升以行道以致君以澤民將無不可吾意四方者亦當彈冠相慶矣則親朋賦詩以志喜也固宜宗徳曰斯言甚善請書以為序送李宗泰序淮東南西北道之地其民忠而能守國者三郡曰廬夀舒自盗興夀守先治戰備與民為守至輙敗然不能保其近地民無耕收而長淮之餉道义絶以致父子相食而後潰廬大郡其南沮澤之地大而有名者三十六俗名之曰圍地廣而足耕而守與將才下余嘗識之凡其日之所營夜之所思非宴樂之事則掊克之政也民有持耒耜於門者則曰召使奪而辱之民飢以死城大而不能守乃斂四境鄉兵以守之又無以食以賦富者大都剽吏殺人而莫之禁至以其兵去之城遂陷余至舒時國門之外數十里之地皆盗柵也幸戰而勝乃為攘剔旁近之地令民耕之築壘以䕶其作役其不能耕者時節與之繕城隍修矛㦸而又明其政刑平其賦斂治其爭訟朞月而頗張今民之勇者無敢譁弱者無所悵如承平時然惟教民之術有未治耳方將與學士修其庠舍共講唐虞治道天人性命之説則禍亂有不足定者若姑孰李宗泰志學而行端义吾所當延而禮之者也而力不足宗泰族人陷在姑孰者聞多自抜於宣將往來之又義之所不敢止者姑序吾懷而與之别藏乘法疏後序天下之書博者未嘗無要法五聲十二管可以盡天下之音聲十干十二支可以盡天下之甲子象形指事轉註諧聲會意假借可以盡天下之文字其統之有宗其會之有元充之而不窮合之而不遺知者創物其有功於世類如此佛氏有法疏書會萃名義而藏十二部之理無不在誠要法也西菴遂公罷講遊方二十年歸乃取而修訂之補其所未備白其所未明去其所未安明性相析機宜刋定名體目曰藏乘法疏濡須有道之士文公無學以衣資若干貫刻之板以惠四方昔卲子皇極經世以元會運世衍為十二萬九千六百年以盡事物無窮之變其文博其義富蔡西山撮其機括為指要一編其有功於卲子大矣遂公之書是亦大藏之指要與余讀傳燈婆子請趙州轉經繞禪床一帀云轉經已婆云只轉得半藏半藏全藏姑置勿問五千四十八卷一周行頃何為而轉之此又西菴不傳之妙因書之卷末在學者所自得青陽集卷二欽定四庫全書青陽集卷三元余闕撰記含章亭記坤者天下之至文而世謂坤為含章者美而含之六三之事非盡坤之道也嘗觀於地山川之流峙至文也風霆之流形至文也鳥獸草木之彚生至文也故夫子贊之以為光大又以為化光又以為美在其中暢於四肢天下之文孰加焉而三獨含章何謂也夫乾尊道也坤卑道也故乾主於五而坤主於二若三四者爻之無位者也乾之四近於尊故曰或躍或可以進也坤之三近乎卑故曰含章可貞可晦而可用也夫子釋含章可貞以為以時發者相時而動之意故曰可者僅詞也若四近於尊而括囊矣上儗於尊則龍戰矣是故龍君象也若六五者可謂至尊而非據矣自非中徳何以能吉故曰黄裳黄中之色裳下之服夫惟有是中徳故不失其體也無棣徐君子謙博古而通今自監察御史郎官署為諸道肅政亷訪使者政理蔚然俱可謂之文矣惟坤之六二可以當之非六三之事而其名亭謂之含章者人不知其所云也余與君處江夏凡期年知君之為人沖然賢者也曾子稱顔子以為以能問於不能以多問於寡有若無實若虛君嘗慕而師之羣居相與不言不知其有藴也然則君所謂含章者其必以此豈世所謂斷章取義者歟君曰子之言然雖然子論含章先儒所云請求諸通經者而質之穰縣學記學校之教聖人所以盡人性者也夫人之性天命也天命者諸生徧予者也其理仁義禮智其器君臣父子夫婦長㓜朋友其文昏喪冠祭朝覲會同射飲軍蒐此性之體然也若夫忠信也而流為殘賊禮讓也而流為爭奪文理也而流為淫慝此性之失而非其本然者也聖人人之綦隆也是故為之學校之教師法之化禮義之道所以正人心而定天命也而世儒之言有曰殘賊爭奪淫慝者性也必賴聖人為之教然後忠信禮讓文理興而生人之道立是不知性者之言也今夫鳥之鷇也飛而逐其雌獸之生也走而軼其羣然止於飛走而已也惟人之性其天命者也是故充其知可以通晝夜之道而知死生之説推其才可以參天地而贊化育何也所性而有故也今曰性無善也必聖人為之教而後善則敺鳥獸以由于學校之教師法之化禮義之道亦可以為忠信禮讓之理也其可乎是故桮棬棟宇聖人所以盡木之性也引重致逺聖人所以盡馬牛之性也學校之教師法之化禮義之道聖人所以盡人之性也其教已立其化以行其道以成之後於是忠信立而殘賊息禮讓著而爭奪寡文理明而淫慝平其動之也神其漸之也深則夫民之心可與為善可與為惡可與為治可與為亂夫豈奪之以惡而與之以善易之以亂而誘之以治使其民至於如是哉亦盡其性而已矣有弗若於吾化弗迪於吾道者然後為之刑政以齊之則刑政者先王所以輔治而未嘗以為先也是故教成而王政成而霸咸無焉而亡其道有大小而其教有淺深如此自先王之迹息而天下之治皆苟且由其知治而不知教而其甚者遂至亂亡相尋終莫能勝民之棼棼者皆不考乎此大元之興百有餘年列聖丕承日務興學以為教黨庠塾序徧於中國雖成周之盛將不是過夫穰大縣也自入職方以距于今吏猶未能為民立學蒙古伊嚕布哈君來監縣乃曰學校之教先王為治本也遂出其田禄以為民倡民歡樂之乃買地於州治之西攻其正位肖孔子及顔子以下十四人之像於殿餘七十二子以及諸儒之從祀者悉繪之於兩序後為學舍廩厝以安居其師弟子前闢門道屬於大衢立表而題其上曰穰縣之學學甫成會天子以學校考吏課君方樂有學校教民也而乃以憂去其同年友成君遵寔家於穰入朝為禮部郎中言君所以待穰之民甚厚而篤於教思如此故既去而民至今思之而恐後之未知所以教而民未知所以學也為予誦其所聞以告之君操行廉白為政以愛民為本日常偲偲然若已傷之是可謂良有司也况予於君亦同年也故為記之湘隂州鎮湘橋記湘水出零陵北至湘隂入洞庭而湘隂諸山谷之水則會於城南為東湖以入湘方春夏時水潦降而洞庭漲則湘水不能入湖因以湠漫為大浸州為湖南北孔道凡行者之陸出與夫鄉民之有事於州者每涉湖則有風濤之虞否則又為舟人還阻之患宋之時州有鄧氏媪率其田人作大堤絶湖以屬之州為二木橋以釃湖水行者徳之謂之鄧婆橋當徳祐末橋毁官為復之至大徳中旋敝州人黄仲規乃以私財命其子惟敬率衆為石橋南北楗石為崖中纍石為髙柱布木靣石其上為屋九楹覆之以與民為㕓易其名曰鎮湘橋歴四十餘年至元初覆木又敝屋且壞惟敬之弟惟賢惟徳徳發其帑得錢萬貫以告州人將卒其先之功州人樂為相之又得錢二萬五千貫乃撤覆木施石梁更作大屋中為道左右為市肆橋廣若干尺袤若干尺上可以任大車下可以通千斛舟飾以綵繪逺而望之爛若隂虹之飲湖中行者之􅉨來與州人之市於此者若由康莊而履堂奥不知其有湖之阻也夫水天下之至險聖人為之舟楫以濟民而舟楫需人之力人之力有限而涉者之無窮也不須人而能濟有無窮之利者惟橋為然夫橋之利大故其費亦大非若一舟楫之可易具非有司與大家之力則不能為黄氏非有大作業大廩藏而為有司大家之事力有不足至父子相承乃克成此夫亦難能也惟徳之子天禧有才藻通經術屢領鄉薦余校藝鄂渚時得其文以置前列其擢第也將亦易然黄氏有子如此必多益於人如是橋類也故為記之漢陽府大成樂記禮樂出於天而備於人卑髙以陳者禮也絪緼而化者樂也故禮者天地之大節樂者天地之大和其體極乎天蟠乎地其用行乎隂陽而通乎鬼神夫人者天地隂陽鬼神之會而禮樂者觀㑹通以行其道也其君臣上下賓主之有其文升降揖讓綴兆清濁之有其度禮以著節樂以為和節以别同和以合異是皆天之所畀而非人之所為也然心天命也欲心生也欲熾而無以治之則心梏亡矣禮樂者先王用之以迪民心而定天命者也是故朝覲會同禮樂以接郊社廟享禮樂以成軍旅賓客禮樂以治用之於天神格用之於人鬼享用之於民而民事治故習俗美而侵侮蕩淫之心無自而生天下之大政豈有出於此者哉洪荒之道邈矣堯舜以還歴夏商周禮樂始備而天下稱為極治成康之後浸以就弛至春秋而壞爛極矣漢之時禮雖麤具於經而亡散者亦已甚樂之道蕩然雅頌所存特其文而已耳是故其禮失者其俗汙其樂濫者其教衰天下之治所以不及於三代者禮樂不足之故也皇元之興諸事未遑即定著孔子廟祀之禮既又令天下廟祀用大成樂令雖具而吏亦鮮能應詔制春秋奠薦類以鼔吹行事夫禮樂者以之習民使之飽聞而飫見之然後入人深而成功大孔子廟者鄉大夫屬民敷教之地而民幸有禮可以畧見先王之道而樂又不備由吏之為政不知本末與所先後也如此漢陽府孔子廟祀舊亦循用俗樂河東譚君知府事乃率其同寅相與出俸金作雅樂器教授余時獻以其事來請宰臣是之為遣一封傳作之平江數月而樂至為琴瑟笙笛塤篪各二特鐘特磬柷敔鞉鼔各一簫八編鐘磬各十六擇諸生肄習之八月丁丑有事於學宫人聲在上樂奏在下翕如純如疾舒以度禮儀既舉觀者咸作而歎曰禮樂之用大矣若夫子監於四代樂取韶舞其治所先在放鄭聲欽若彞教以迪民性夫禮樂之存有如餼羊薦于明靈永永是享於是州之士相與樂譚君之政而喜民復見先王之樂也咸願刻石樹之廟廷余為之書而使歸刻焉新修大寧宫記華西神川原大寧宫者華人以為古后土之祠也宫故並嶽祠宋真宗幸華山賜今額以華山道士武元亨主之其後元亨以祠隘請於朝改作之於神川之上宫初甚侈大至靖康時兵燬里中人嘗修復之然庳隘不能如舊觀金正大中乃加增拓下距於今二百有餘年故屋皆壞無能修葺之者里人張某欲以私力加繕治之未及為而殁其子某乃追成先志以錢二萬五千貫具材木瓴甓會工藝自門至寢為屋若干楹凡期月而成左氏曰共工氏之子曰勾龍能平水土為后土之官故祀以為后土盧植諸儒從之遂以為后土勾龍也蔡邕則曰勾龍社神也堯祠之稷之神柱與棄也漢后土祠在國壬地社稷之位在未地為王肅之説者又曰社與稷皆土神但生育之功異故有二名耳史記武帝初郊雍太史祠官言當祀后土於方澤立為五壇壇一黄犢太牢具天子從之乃東立后土祠於汾隂脽上親望拜之如郊則漢以下地祗有社又有后土后土之説紛紛莫能統一以余考之皆失也鄭司農曰后土社神也蓋社以地言后土以神言社之有后土猶郊之有上帝也曰帝曰后皆能宰之稱天子之社神曰后土諸侯而下之社神亦曰后土者猶郊之神曰上帝而五方主氣者亦謂之帝不以嫌也五土之神吐生萬物而稷者五穀之長也人非土不生非榖不養是以先王尊而祀之勾龍有功於水土柱與棄有功於稼穡故以配食其神曰祀勾龍以為后土者猶所謂禘嚳而郊稷是也又周禮以血祭祭社稷五嶽其以血祭則非人鬼且其祀先五嶽則不得為勾龍亦明也古之制天子祭天地諸侯祭山川大夫祭五祀位有貴賤故祀有大小而后土之祀自天子逹於庶人所以生者一也王者為羣姓立社曰大社自立社曰王社諸侯為百姓立社曰國社自立社曰侯社大夫以下成羣立社曰置社大社國社為民祈報也王社侯社自為祈報也大夫以下無民人莫為立社又不得自立社故與民族居百姓之上乃立社以祈報之今國都至於郡縣皆有社獨置社亡耳民春秋雖有社祭然無壇壝主位牲齊儀章皆不應於禮其踵事而生者益甚莫為之禁夫不祀其所得祀非義也祀其所不得祀非禮也后土者民之所得祀者也今雖不能應於禮能修而祀之其賢於失禮而犯義者也余之同年光禄主事虎理翰君家於華義張氏之斯舉也而屬記於余焉梯雲莊記晉地土厚而氣深田凡一歲三藝而三熟少施以糞力恒可以不竭引汾水而溉歲可以無旱其地之上者畝可以食十人民又勤生力業當耕之時虛里無閒人野樹禾牆下樹桑庭有隙地即以樹菜茹麻枲無尺寸廢者故其民皆足於衣食無甚貧乏家皆安於田里無外慕之好間有豪傑欲出而仕由他岐皆可以得官爵故其為俗特不尚儒周行郡邑之間環數百里數百家之聚無有一人儒衣冠者獨楊黄許氏以儒稱於鄉三時力田一時為學褒衣博帶出入里巷之間其族數十家化之皆敦於禮每歲時上塚族人各具酒饌羣至墓下推長者一人主祀以次奠薦既竣長者坐少者以序羅拜之然後皆坐相與行獻酬之禮子弟有為小不善者則長者進而誚讓之衆皆進曰長者言然請改是乃已至於再至於三而終不能改也則衆相與擯絀之不與同祭祀如是者已三世矣嘗詢其族人許氏之祖有義甫君者攻詞賦有聲於時其弟恒甫君治經義通周易號松谿}
