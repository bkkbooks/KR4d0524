  - {type: variant, offset: 5385, length: 1, content: 靑, WYG: 楊平章崇徳樓重城控秋塞丹樓耀芳甸頳霞上氛氲蒼林下葱蒨長河城邊急積岫窓中見逺雁滅居延行雲歸鄯善大賢謝卿相垂幃化鄉縣春蟲觸寶瑟餘花飄玉硏方從董園樂陋彼歌梁轉伊予去山澤寒齋秋草徧載覽登樓篇益重臨淵羨八月十五日處州分司對月𤣥武夕始正華月生秋旻金波何穆穆緑桂滿中輪徘徊出西陸照耀此甌閩光流河宿隠氣隨商律振餘輝動軒房紫蘭含微津皇天降嘉歲五政亦已陳樂哉一巵酒允矣同庶人有所思春風起寒色春衣方重熏新裝捲羅幕清唱入行雲艶色若流月芳澤謝蘭芬嬋娟信無度我思何在君長安陌浩浩長安陌瓊樓夾廣㕓鴛鴦御溝上芍藥吹樓前駿馬追韓嫣金尊約鄭䖍功名有時有且得樂當年伯九徳興學詩上徳撫𤣥運籲俊尹神京三雍烝髦士五學訓齊氓登歌陳羽縣鸞刀奉麗牲優游樂清化大道嘉方行送孫教授皇情重聲教宵裝爾載馳邊城南徼外禮殿左江陲揖讓陳椰器弦歌䕃薜帷全勝宜春郭花落閉門時賦得君子泉送彭公權為黄州教授君子没已久遺井郡齋中本寓思人意兼全澤物功銀牀駁故蘚玉甃落寒桐幾日趨官舍横經誦養蒙賦得春雁送司執中江西憲幙春風起蘋末旅雁尚四翔乳鴨嬌同啑新蒲短可藏應懷洞庭水非避塞垣霜客路頻懷舊題書寄帝鄉賦得蛾眉亭送王徳常御史赴南臺江亭望華崿望望似脩眉掃黛偏能巧含顰知為誰娟娟微雨裏脈脈夕}
