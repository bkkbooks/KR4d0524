  - {type: variant, offset: 0, length: 2098, content: 青陽先生文集卷之二門人淮西郭奎子章輯碑慈利州天門書院碑皇上稽古明道飭躬建極孜孜扵治者十有四年慨然念生民之未遂徽化之未洽遂詔大臣嚴守令之選更考績之法使之務農桑興斈校以其殿㝡而進退之維時貫侯阿思蘭海牙來監慈利乃均賦䟽訟剔除奸強期月之間民志丕應州有庙學既敝且壊侯與同知州事楊君雄偉判官李君伯顔焦君克忠勸其邑人萬文綬悉修完之天門書院者囯𥘉時州民田公著作之山中傍隣䝤峒職教罕至椽棟摧腐神用弗寜租入單寡士無以飬名存実廢靡所為教於是山長張徳明以請於侯侯益大愳不任以墮教本民有田懐徳詣侯言曰昔吾父荣孫嘗為州作三皇庙鄉邦称之今仁侯幸導宣徳意惠教遐壌願輸財力遷而大之乃度地於澧水之陽天門之麓揆日程事百工並作期月而學成宫庙閑敞階序整峻講肄厝㸑具治弗遺稱其所謂諸侯頖官者民士懐道鼓篋而至敬業楽群惟侯之教侯復為之拠經引史開祈疑義訴訴顒顒有如鄹魯邑人楊侯舟張侯兊㫮以髦俊登名天府有政有文侯又尊而礼之以表民厲俗其扵教思亦云勤矣然不自以為功使使來鄂願有紀述曰俾吾民獲聞道徳仁義之言君之賜也昔我祖宗巳篤扵教武宗仁宗益大用勸至於皇上同符徃哲法宫之中萬㡬之睱惟先王簡冊卧起與俱以古之治徳礼是首乃著吏課俾民興斈荒遐所任非賢不使故爾民得賢侯以治以教俾尓㳺平詩書之淵而息乎礼義之圃其小人服礼以事其上其君子力學以待用則上之徳與民之幸其眡扵古豈不侈且大哉宜有銘詩以昭化志功章扵無窮前侯野仙海牙君之昆季世系勲閥具見州學之碑銘曰帝䔍保恵惟守惟比詢扵台衡命以六事貫侯振振葱利是監去其螟蟊使民耕蠶既綱既紀扵學有事民誰子耒惟此田氏惟此田氏訾長厥里相侯有作丕應厥志厥初玄聖越處在阿樂是侯興式遷扵嘉嵩梁有陮井絡所委淩黔轢溆為望扵澧山有松栢是斵是削是髹是艧為棟為桶陟其在筵龍章朱延臨爾炳然降觀扵宇秋秋有序作配在下笙磬柷敔牲齊維旅侯入即事其儀伊詡坎坎擊鼓有士如雨侯陳其書以教以語以酬以酢以論以報執爵與醬以事老父理融扵中和暢扵膚有頑弗即亦耒在隅有蕳有秩惟帝訓勑恵扵天常扵帝之極昔弗課吏祗事以文今著孔嚴民章聿興楚公之孫兄弟先後克廣帝心道民扵厚天門之嗟新廟有儀侈兹侯功俾民遂歌安慶城隍顯忠靈祐王碑城隍祠古不經見自唐以耒始稍稍見之今自天子都邑下逮郡縣至扵山夷海嶠荒墟左里之内無不有祠然以余觀之民之事神與夫神之著靈扵民鮮有聞如舒者也舒故楚壌也其俗巫鬼今乃它無所祠祀獨扵城隍出必祈反必報水旱疾疫必禱一歲之中奉膋䔥膏鐙旛幢扵廷者無虗日五月之望里俗相傳以神生之日也民無貧冨男女旄倪空巷閭出樂神吹簫代皷張百戯逰像與扵國中如是者盡三日而後止其祠眡郡為特盛至正中頼六之盗起江淮以南郡縣䧟没者十七八及盗之平所在為墟舒特比盗竟大小格闘前後百餘民率咨神而後行卜朝以戰則朝而捷卜夕以戰則夕而捷群盗未嘗一日得志而去者故其城郭廬屋眡他郡為特完民不忘神徳相率出泉以新其廟又請扵朝乞崇其號以大報之中書下其事太常博士議升神於王號顯忠靈祐十四年夏四月報下帥守及民以少牢祀神扵前殿而揚言扵衆曰夫舒大嶽之裔也非南方諸國之所能擬其神之著靈固宜且吾舒人親上死長既義而忠神之雍休亦其宜也乃為銘詩刻之廟門以薦道神休民徳扵無窮其辭曰岩岩大嶽時維皖潜臨此大邦為望扵南神宫扵鑠追房綺閣玉几在中卷衣朱舄其靈有皇其聲有那使人齋明奔走是冝彼惽不减盗兵以狂䗬屯扵疆其斾央央我民秉義弗隨禦之殷輪鼔之褁創斧之其衷伊奭赫若皎日神之正直冝福之錫天人之縡具曰旭卉明者眎之端若觀火天目者人人成者大相彼草木其固可言此有荣木蕃彼雨露彼有顛由自無承者凡今亂邦孰無神依民失厥道胡能有右桓桓舒人為君為國先民有言自求多福其充厥行孝父長兄弗祈扵神丕乃降祥而自不義不率不迪來憺扵言神吐不食古師之克執律以報今我小康敢忘厥祐嚴嚴奉常秩號有光牲幣版章升真于王禮行既具樂奏既卒工祝致告徂頼無極其自扵今無害有年民樂齗齗丞衎扵神化城寺碑小河出霍東流至六北轉南折以入扵􅚉河曲有洲二叅互衍迤帶之以清流𬒳之以嘉木齊頭諸峯離列其前森蔚峭䴡如屏如㦸可指而數禅師洪聡泰㝎初自邢開元寺㳺淮過而樂之州民闞氏為買其地乃築室前洲居焉學佛者聞其行多往從之室隘不能容六人乃委貨利輪材未築廣其居乆而從之者益衆而人之為築者益大前有門中有壂左右有序為穹屋壂後以􅍥佛為堂序西以棲僧鍾魚鈴磬凡浮圖之噐皆具隄其傍聮絡二洲滙水其中以溉田為圃以𬞞為埸以樹襍植梨栗棗柿㮤竹之属數千本春土膏則率其從及優婆塞負耒出耕而躬為耨衆亦勤田力作力齊而糞多凡食百餘人而稻麥麻菽果茹不取扵人而常𥙿務閒即合其衆講其師之說囙號其寺為化城皇孫宣譲王雅敬佛乗與為外護六人之事佛者亦無不禮爲余聞聦嘗歴事江南名僧其才幹敏其行敦樸而動苦其言辦慱善扵誘人平生未嘗蓄一錢有所得悉以俾其弟子使治其居故人慕而愛之而就此易也然余聞之古農工商士皆用世之人也浮圖後岀其道以出世為說而湏丗以生故言道者病焉聦學出世之道而不湏扵丗故君子取之禅師松江人姓陸氏𥘉事法忍海翁師後受具扵開元明公銘曰洋洋清川藹藹蘭陼名標化城斯實寳所芝陑井丹檻瓊户翠嶺承牎瑶溪環宇寳樹朝䕃水華晚妍未瞻靈鷲已肅祗園朱鳥殷宵倉庚司序夫湏以耕閑閑扵野陽烏歛矅清鍾或夕詵詵學徒栖禅于室練心净域結軌玄涂渡河析獸抽衣啓珠内無佚已外弗求物以學以耕其誰之疾王侯歸依四姓效績斵辤貞珉永告無斁青陽先生文集卷之二, WYG: ''}
