  - {type: variant, offset: 1347, length: 0, content: '', WYG: 兩伍張氏阡表張氏本䣜陽人其先世有諱豈者徙家淮南之兩伍村子孫繁富皆有美田在湖上無貧者君之祖子可始為儒教子君父諒裔日誦書不問其家生業見異書無錢質衣買之故君家在諸張中獨貧而教子益不怠君諱拱辰字景星少以儒薦為興化縣教諭崇明州學録泰州學正雲南栢興府建康路兩學教授改將仕郎主安豐霍丘縣簿而卒弟竑字景山亦由天長泰興教諭揚州學正真州教授以將仕郎滁州判官致仕初張氏雖盛然皆農家無聞人自君父以耆學著稱鄉校逮君兄弟登仕版有聞譽故兩伍張氏遂稱江淮間君為人寛厚不嗜利居貧晏如不以動心竑性剛直好賢而疾惡此兩人者所操雖異而士大夫與之交者一愛敬之君兄弟仕時其父已死矣君每與人言其先世必嗚咽流涕曰吾先人以儒者望吾兄弟吾兄弟今皆讀書為儒官雖貧亦何憾哉余往吏淮南聞君伯仲之名甚習會君之孫天永遂得其先世之槩如此重為慨息蓋淮俗之數易矣宋之季時其地專用武故民多尚勇力而事格鬬有號為進士登科第者徃往皆武學也混一以來其俗益降民之賢者始安於農畮其下則紛趨於末以爭夫魚鹽之利其積而至大富者輿馬之華宫廬之侈封君莫之過也故其俗益薄儒以為不足以利巳朝廷設科以誘之今三十年民亦少出應詔君父子自拔於衆人之中傾家以為學可不謂之豪傑之士哉天永自樹嶄然弱冠屬文敦義異時非能振其宗乎詩書之教能淑人心學之至可以為聖賢其次不失為善人其緒餘亦可以得禄以振耀其宗族夫孰知不足以利巳者為其家之大利與君之於鄉可表以厲俗矣君兄弟殁兩伍之墓隘不能葬乃改卜倪村𦵏焉君配陳氏子二人禎桃源縣教諭孫男三人天序天庭天庸竑娶李氏子一人燮將仕佐郎揚州教授孫男三人長天永次天竒天亨至正六年二月述青陽集卷四欽定四庫全書青陽集卷五元余闕撰䇿元統癸酉廷對䇿臣聞之周武王曰惟天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母此言君天下者凡以仁而已臣嘗思之天地生物而厚於人矣而於生人之中尤厚於聖人其所以厚於聖人者欲其推生物之心以加諸民是仁者人君臨下之大本也臣謹稽天地之理驗之往古則仁之為道夏以之為夏商以之為商周以之為周祖宗以之而創業後聖以之而守成其理可謂至要而亦可謂至難矣恭惟皇帝陛下有聰明睿知之姿有寛裕温柔之徳愛民而好士神武而不殺爰自初潜仁孝之聲固已播聞於中外今兹誕膺付託龍飛當天輕徭役薄賦斂罷土木之役恤鰥寡之民而仁厚之澤果有以大被於天下當天命眷祐之初人心歸向之日又能不自滿假拳拳以守成之大計下詢承學之臣顧臣庸愚無所通曉然臣觀陛下䇿臣之言反覆乎三代及漢守成之艱難而深徹乎今日當行之切務自非聖心獨詣深有以考之於古質之於今灼知上天作君之心與夫祖宗創業艱難之計者不能為是言也臣伏讀聖策曰古人有言得天下者為難保天下為尤難臣以為人之於仁憂患而思勉者易安樂而勿失者難天造草昧之際英雄角逐之會而世主之心所以不敢暇逸者鮮不如敵國之在旁嚴父之在上其思所以康濟小民惠鮮天下者蓋饋屢輟而寢屢興此其勢之易然者也天下既定方内無事兵革不動四荒向風天下之臣又日奏祥瑞豐年頌聖徳者聲相聞於朝歌太平者足相躡於道雖以創業之君尚不免於不終之漸况其後世乎蓋治平則志易肆崇高則氣易驕志肆則敗度之心滋氣驕則愛民之意熄如是則豈復念夫先世艱難勤苦為何如哉甚者至以其祖宗為昔之人無聞知見其先世勤儉之迹則曰田舍翁得此亦足矣此亦勢之有必然者也陛下以保天下為難此臣所以踴躍忻忭而不自知陛下此言可以承宗廟可以奉六親可以育羣生可以彰洪業臣拜手稽首而為天下賀願陛下永永無忘此言也臣又讀聖䇿曰自古持盈守成之君莫盛於三代夏稱啓能敬承繼禹之道殷稱聖賢之君六七作周稱成康能致刑措夫以禹之功而惟啓以文武之徳而惟成康賢聖之君之衆莫若殷亦不過六七而已其後惟漢之文景而言文景之治猶不得比之三代善繼承者何若斯之難也臣以為惟思祖宗得天下之難者則於保天下也斯無難啓太丁太甲太戊祖乙盤庚成康文景之君則思祖宗創業之難而保之者也桀紂幽厲桓靈則反是故伊尹之於太甲則明言烈祖之成徳周公召公之於輔相成王也亦諄諄於文王之典武王之大烈蓋知其祖宗得天下之難則必能求其所以得之之道矣知其所以得天下之道則知所以保天下之道矣夫祖宗得天下之道即其子孫保天下之道也孟子曰三代之得天下也以仁此仁者祖宗得天下之道也易曰何以守位曰仁此仁者子孫保天下之道也夫仁之難成亦已久矣持盈守成之君若是之難得者宜哉臣又讀聖䇿曰我祖宗積徳累世至於太祖皇帝肇啓土宇建帝號又七十餘年世祖皇帝始一天下以致至元之治厥惟艱哉顧予沖人賴天地祖宗之靈紹膺嫡統繼承之重實在朕躬夙夜兢兢未獲其道臣以為陛下此言可謂深知祖宗創業之艱難者也當其巡天西下又詔定西夏懷高昌北取遼金南取趙宋其經營開創之事有不待賤臣之言而後知若夫祖宗所以得天下之本則陛下之所當知也臣嘗妄論之我國家之得天下與三代同自太祖皇帝起朔漠而膺帝圖世祖皇帝揮天戈以一海内不恃强大而其仁義之師自足以服暴亂不用智力而其寛大之徳自足以結人心至於渡江臨卾與建元之詔觀之則我國家得天下之本一仁而已矣故以曹彬之事命帥臣而革命之日市肆有不閉以大易之元建國號而中統之紹天下所歸心太祖既以七十餘年而平一之世祖皇帝又以四十餘載而生聚之徳在民心功在史策以聖繼聖傳至陛下吾祖宗所以得天下之道是即陛下保天下之道也然猶云未獲者是即文王望道未見之心也臣何以多言為臣又讀聖策曰子大夫通今學古其求啓之所以敬承六七君之所以稱賢聖成康之所以致刑措其道安在文景之所以不及三代其故何繇及今日之所以持盈守成孰先孰後孰本孰末何以致刑措稱賢聖繼祖宗之盛悉心以對毋有所隠臣以為三代及漢之君其見稱於當世者雖有不同然不過守其先世之仁而已矣而今日陛下之所以持盈守成之道又何以他求也哉洪水滔天下民昏墊而成允成功者禹之仁啓之所以敬承者此也啓網祝征仇餉者湯之仁太甲以之處仁遷義太戊以之治民祇懼武丁以之嘉靖殷邦祖甲以之保惠庶民盤庚以之鞠人謀人之保居此所以稱聖賢也以言文王之仁則無凍餒之老以言武王之仁則行大義而平暴亂成王特制禮樂以文之而已耳康王特奉恤厥若而已耳其所以教化行刑罰措仁之浹於民故也漢家制度視三代雖有愧然髙帝之寛仁愛人實滅秦誅項之本原文帝之務在養民景帝之遵用成業實卓然為漢賢君其不及於三代者無太甲仁義之功無成王緝熙之學故耳以今日之道而言臣則以為守成之本仁也所當先務者仁也至曰功曰利曰甲兵錢穀曰簿書期會曰禁令條教皆末而當後者也然就仁之中而其本末先後亦不容以無序也有先王之仁心有先王之仁政孔子之告顔子曰克己復禮為仁此以心言也孟子告齊梁之君所謂五畝之宅百畝之田與夫學校庠序之類此以政言也有是心無是政則其心終不能有洽於天下有是政無是心則其政亦不能以自行必有内外本末交相通貫是即堯舜之道也陛下有顔淵明睿之姿可以致修身之功有堯舜君師之位可以推愛民之澤不宜狃於近功安於卑下而不以聖賢自期也臣願陛下萬機之暇取孔孟之言而深究之體之於身揆之於事求其何者為欲何者為理知其為欲而必克之知其為理而必復之明以察其幾勇以致其決日日而克之事事而復之則自心正身修而仁不可勝用矣或於聽朝之時或於進講之際數召大臣延問故老深加咨訪某事為先王之仁政而未盡行某事為今日之弊端而未盡革某害未去某利未興某賢未用某物失所敏以求之信以達之時省而速行之委任責成而程督之使天下疲癃殘疾得其生鰥寡孤獨得其養而無有一物之不遂其生則民物安阜而人莫能禦矣異時陛下五刑不試如周成康聖賢之作如商諸王夫然後可以答上天玉成陛下之心生民蘄望陛下之意先帝慈皇付託陛下之深計而我國家時萬時億之統可以傳之永世而無疆矣詩云宜民宜人受禄于天古人有言曰愛民者必有天報陛下誠如臣之所期則申命之休將如日之昇如月之恒矣伏願陛下少開天日之光得賜鑒察則臣不勝大幸祇冒天威臨書不勝戰慄之至書上賀丞相書闕以微才叨蒙柬拔伏惟閤下以不世出之才居大有為之位此誠千載一遇之會切欲奔走左右以効微勞以報知遇之萬一時事親日短烏鳥情切急急謀歸而閤下眷顧之恩筆舌莫既南至金華不勝依戀因念下之報上不限逺邇苟有尺寸之功即事左右之道撫問彫瘵屛除姦貪所按郡縣麤見條理特以上無知已即罹謗議老親衰病旋棄諸孤㷀㷀廬次又遭俶擾墨衰從役辛苦萬狀嘗切痛恨以為當賢者擯棄之時乃有天步艱難之事仰天號痛譬猶中流遇風波無所維楫私心自分惟有與城俱斃而已仰荷天休偶全性命且聞閤下為時一出董師淮南其喜何可云喻也瞻望前茅為日已久比聞旌節已渡大河限於守城不能親詣轅門以聽約束今遣縣尹陳秉徳迎迓馬首事上常禮僣易塵瀆伏計不拒部内地圖就用呈上盗賊之勢可見大端小邑城郭不完方議修築去年飢饉不能進兵今冬欲調各縣義兵掃除餘孽二者非有錢糧不能成功倘朝廷饋餉有餘乞撥糧數萬石鈔五七萬定或者犬馬之力少得展布部内之地可以澄清外有區區之請世祖之取江南或日中未食或中夜以興艱難混一非偶然而致也國家經費大半仰之非砂磧不毛郡縣之所比也今日不幸半淪於盗切計以為江南不定中原殆難獨守中原不守則朝廷不能獨安朝廷不安則宰相不能獨富貴伏願廣忠集思勉圖大業以作穆穆迓衡而用兵之道所以驅人赴湯蹈火無賞無罰決難集事仰瞻光範多所欲言麤陳其大者如此因布區區伏望垂鑒再上賀丞相書前聞六纛已至廣陵遣縣尹陳秉徳迎迓想徹崇嚴比日朔氣應祥雪瑞屢至伏計天聲所振逺邇畏懷神介動履多福下情良慰小邑借庇粗守今歲賊人三次見攻皆已克捷但所部縣分民寨多為殘破止存懷寧潛山兩縣百姓賊勢燄燄將及於此城中軍壯四千精銳者不滿千人僅能城守不敢抽撤若此二縣民寨不守孤城亦危孤城倘危則淮西之地盡為盗有長江之險誰與控制古人謂解雜亂紛糾者不控拳救鬬者不搏擊批亢擣虚形格勢禁即自為解今南方之賊以蘄黄為之首往時朝廷台哈布哈平章攻其北布延布哈攻其西布延特穆爾平章曼濟哈雅中丞攻其東賊勢大窘將就擒滅忽調布延布哈軍入安豐曼濟哈雅軍入格溪救廬州而台哈布哈平章亦還河南往夏止存布延特穆爾孤軍駐劄蘭溪以致盗勢復振武昌隨陷㳂江諸城聞風皆潰豈天未欲平治天下亦由人謀不臧以至此耳今聞河南之兵已至黄州以孤軍而討羣盗恐未易定妄意以為布延特穆爾曼濟哈雅二枝軍馬先係蘄黄收捕軍數正在大人節制之内今二軍收捕江東江東為尋常蘄黄乃心腹之疾一軍之中得抽勇鋭者如王逹中萬户胡巴延同知使之由望江登岸勦捕而西餘軍留取江東如此則不惟可以救援安慶蘄黄勢分似亦易破南賊自平所謂一舉而兩得者也若二軍或不用抽撤麾下兵多切望垂念淮西之地止有此城急調精鋭三五千人量與錢糧賞犒與本路兵一同勦捕望江宿松之盗亦策之善也自非窘迫不敢僭易干凟伏兾垂察再上賀丞相書前聞斧鉞出鎮淮南兩遣屬吏詣謁前茅皆至廣陵道阻而還近承台劄伏審六纛已至耿山降附踵至室家相慶以為有穆穆迓衡之望其為欣慰何可云喻兹遣懷寧縣達嚕噶齊伊蘇甫賫狀前詣轅門呈報兼有管見上塵台聴切以為淮南之敵今有兩枝一枝在濠一枝在蘄擒必先擒其首餘當自定今廬州安豐别無官軍似難下手惟蘄黄乃有可攻之機近日潜山縣報蘄黄偽官吳右丞投降大軍攻破㳂江諸寨昨日郡人自賊中逃來云白水包家窩義丁攻蘄水甚急白水諸寨萬户陳漢所部也西兵既進如東首得一軍乘機併進冦必難支所索王建中胡巴延等正係節制之内軍馬今宣城已降姑孰猶疥癬即日又有鄂爾和平章收捕之軍得一鈞帖調來共攻望江宿松蘄黄之冦東西受敵決然可定蘄黄既定可以合兵東定廬州安豐更得一重臣監軍多與錢粮建中巴延等許以優加名爵則無不盡力淮南有可平之望萬若或無人可委江西省諤勒哲特穆爾郎中亦可統率謬計如此不知尊意以為何如此外又有私請守城之急錢粮功賞二者而已自兵起之初大郡皆破安慶以蕞爾孤城如寸草以當疾風賴國洪休上下血戰至於今日某誠不佞斯亦人所難能也今倉廩匱乏錢粮不充所上戰功又以朝廷隔逺不得准報今幸閤下照臨其地若麾下錢粮有餘曲為接濟城治可安所舉有功皆出衆論不敢置纎毫私意於其間早與准除庶易以使人也兼以菲儀就用塵凟此部吏事大府之常切望不拒再上賀丞相書春末聞九重加惠淮土特起大臣出鎮雄藩罷民俱慶如旱得雨嘗遣懷寧縣達嚕噶齊奉微禮祇迓遄聞復有台衡之命此雖一方暫失怙恃當此多艱而得元老大賢斡旋元化天下之難其可濟乎某受知公門為日已久軍中之事不能悉陳粗言其略以復上執事皆知格亦易定特以委任失宜賞罰不當以致餘孽復張江襄大振所謂委任失宜者夫將之用兵自有其才譬秋之於奕非學可至如近宋科目有文有武兼是二者一代幾人而比日將兵惟用大臣或用謫官夫戰陳之難如赴湯蹈火市井貧賤未得富貴者或肯捐身為之大臣富貴已極夫復何望又謫官者心志俱喪豈能有為覆軍殺將皆由於此用人不效甚至用賊用賊之弊尤為難言一則使天下豪傑有以窺朝廷之無人二則功多賞薄者皆起作賊之志將恐一賊未滅一賊復起目前之事未見快意將來噬臍有不可悔者矣如安慶小邑世襲官軍善戰者少而善戰之士多田野市井之子故某於此事不盡用世襲軍官而多用田野市井之子往往得其死力克捷俱多朝廷選將不限有官無官惟擇能者用之而以亷公大臣臨之以行賞罰則將得其人矣所謂賞罰不當者比見軍將勇怯在上有若不知而上之賞罰與外議絶不相似頗聞慶刑之典多出愛憎或左右便嬖為之營幹以近軍所賞聞見者而言如蘭溪之功布延特穆爾平章為最曼濟哈雅中丞特因之成事者耳而朝廷頒賞中丞居上平章次之中丞部内得官者數百人而平章不過五六人此猶不過有高下之爭耳如廬州開義兵三品衙門而使者悉以富商大賈為之有一巨商五兄弟受賞者此豈嘗有寸箭之功而有功者皆不受賞故冦至之日得賞者皆以城降而未賞者皆去為賊夫用兵之道紀律為先故街亭之戰武侯不得不誅馬謖智髙未破狄青不得不誅陳曙比觀諸將畧無忌憚擁兵不戰誰與相督冦至棄城無復問罪不惟不罰甚又賞之遷官增秩之功無異故賊之攻城如燎毛兵之拓地如抜山某之守此智勇俱乏特以有功必賞有罪必罰奉以至公罔敢阿比是以列郡多陷小邑獨存朝廷苟於諸部悉以亷公大臣監之信賞而必罰天下亦不難定矣夫江南不定則中原不能獨守中原不守則朝廷不能獨安朝廷不安則宰相不能獨富貴此膚淺易見之説豈足為明智而言計亦大賢之所不厭聞也夫某之不肖豈定亂之才特此邦之民天性忠義故易與為守而難與為亂然亦戰守五年大小咸弊邇日江南郡縣皆破此邦獨完如洪爐片雪大可凛凛者也謹遣奏差丁正前詣台階白事諸所請求具於别幅伏望鈞慈曲為准報豈特門下之士賴之孤城得安江淮有可定之日亦國家之利也謹奉狀上陳以聞伏兾照察與中書參政成誼叔書别後凡三奉書而使者久皆不還伏計道梗不能上逹閤下位望日隆負荷日難特切為之懸心比聞賀公復相迺大可慶然聞尚在軍中不知置左右者何人相知曾見任否江淮賊勢本不難定特以考察不明刑罰失當諸將玩愒遂致難圖區區小邑雖曰上下一心幸爾完固大類紅爐片雪實為可憂耳今長江萬里止存此城如大病之人命脈未絶猶有復生之理失今之救則首尾衡決江南大難定也兹遣奏差丁正等前赴左右白事諸所請求惟閤下是賴倘蒙朝廷俱賜准報不惟此邦之幸未破城邑孰不以安慶自勉國家亦有利也縷縷之言具别幅上陳不善為斵使還賜教以匡不及不勝幸荷不具與伊徹察喇平章書自旌麾致討高沙兩嘗奉狀候問起居皆以道梗不能得達比聞兵威振揚賊勢消衂驛置頗通謹遣山長秦宗徳千户額森特穆爾持微禮謁轅門獻歲發春伏惟履兹新正即清氛祲天下蒼生均蒙福祉與國子助教程以文書近叔良過舒始聞動履之悉所寄高詠尤慰下懷乾坤卦説問商主簿言已付貢公想惟所戱藏此真玩齋矣多事以來不特僕輩受此荼苦聞館閤文臣亦有差使之勞此際當得優游矣子美近有書言鄉人多相思者欲取公還山中斯文無人得且住為好紀千户輩如京師軍中諸事左轄公話次得贊助一言早賜准報為荷僕至軍時賊勢方熾然心安去歲又有讀書之樂今年賊浸平惡况百出每俗事不如意歸思浩然近又有同知之除似未即得歸矣奈何奈何自牧聞除禮部向有一書見寄手病不能裁答彦中惜未嘗一見歆羡歆羡並煩致意何時聚晤話此苦辛未見自愛不既與曾舜功書别後屢得書及紙墨之惠良感契誼江西徳星所聚年穀屢登深為可喜徐鄒之㓂僕久與之比隣無長不足畏况於已衰而逃者也下眂此間窘迫則公等皆天上人也徐朝升糴粮江右百望維持得滿載早歸為好有便時時惠教雖相逺即同見也餘惟自重不具叔良佳否煩道致意手病不能多書與危太朴内翰書史館兩得從游豈勝榮幸區區南行又辱盛餞尤其感刻也鄉暑伏想文苑優游雅候動履多福良慰良慰友人趙子章北上觀光謹此附謝子章有學而能詩佳士也得公眄睞當價增十倍矣仲舉志道以聲景先中夫希先鳴謙諸先生處不及别状望致下忱為感餘惟自重不具與劉彦昺書闕記事奉復彦昺茂異文契足下李宗泰來辱四月中教墨且審舟楫善達無虞深慰所想兼承葛布銅香模璧魯紙諸貺感佩感佩所聞京兆公還朝蘄黄官軍捷音可喜區區孤城無援糧乏兵虛願望者皇天悔禍耳先大夫墓銘率爾呈醜軍務轇轕殊無清况幸删削之青陽集卷五欽定四庫全書青陽集卷六元余闕撰}
