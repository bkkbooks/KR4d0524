  - {type: variant, offset: 0, length: 3604, content: 青陽先生文集卷之五門人淮西郭奎子章輯書上賀丞相書闕以㣲才叨蒙柬㧞伏惟閤下以不世出之才居大有爲之位此誠千載一遇之㑹切欲奔走左右以効㣲劳以報知遇之萬一特事親日短烏鳥情切急急謀歸而閤下眷願之㤙筆舌莫旣南至金華不勝依恋因念下之報上不限逺邇苟有尺寸之功即事左右之道撫間彫瘵屏除姦貪所按郡縣粗見條理特以上無知已即罹謗議老親衰病旋棄諸孤煢㷀廬次又遭俶擾墨衰從役辛苦萬状嘗切痛恨以爲當賢者擯棄之時乃有天歩艱難之事仰天號痛譬猶中流遇風波無所維楫私心自分惟有與城俱斃而巳仰荷天休偶全性命且聞閤下爲時一出董師淮南其喜何可云喻也瞻望前茅爲日巳乆比聞旌節巳渡大河限扵守城不能親詣轅門以聴約束今遣縣尹陳秉徳迎迓馬首事上常禮僣易塵瀆伏計不拒部内地圖就用呈上盗之賊势可見大端小邑城郭不完方議修築去年飢饉不能進兵今冬欲調各縣義兵掃除餘孽二者非有錢粮不能成功倘朝廷饋餉有餘乞撥粮數萬石鈔五七萬定或者犬馬之力少得展布部内之地可以澄清外有區區之請世祖之取江南或日中未食或中夜以興艱難混一非偶然而致也國家經費太半仰之非砂磧不毛郡縣之所比也今者不幸半淪扵盗切計以為江南不定中原殆難獨守中原不守則朝廷不能獨安朝廷不安則宰相不能獨富貴伏願廣忠集思勉圖大業以作穆穆迓衡而用兵之道所以驅人赴湯蹈火無賞無罰央難集事仰瞻光範多所欲言粗陳其大者如此因布區區伏望垂鍳上賀丞相書前聞六纛已至廣陵遣縣尹陳秉徳迎迓想徹崇嚴比日朔氣應祥雪瑞屡至伏計天聲所振逺迩畏懐神介動履多福下情良慰小邑借庇粗守今歲賊人三次見攻皆已克捷但所部縣分民寨多爲殘破止存懐寕潜山兩縣百姓賊势𦦨𦦨将及扵此城中軍壮四千精銳者不滿千人僅能城守不敢抽撤若此二縣民寨不守孤城亦危孤城倘危則淮西之地盡爲盗有長江之險誰與控制古人謂觧雜亂紛紏者不控拳救鬪者不摶擊批亢擣虚形格势禁即自爲觧今南方之賊以蘄黄爲之首徃時朝廷太不花平章攻其北卜顔不花攻其西卜顔帖木兒平章蛮子海牙中丞攻其東賊勢大窘将就擒㓕忽調卜顔不花軍入安豊蛮子海牙軍之格溪救廬州而太不花平章亦還河南徃夏止存卜顔帖木兒孤軍駐劄蘭溪巳致盗勢復振武昌随䧟㳂江諸成聞風皆潰豈天未欲平治天下亦由人謀不臧以至此耳今聞河南之兵巳至黄州以孤軍而討群盗恐未易定妄意以為卜顔帖木兒蛮子海牙二枝軍馬先係蘄黄收捕軍数正在大人節制之内今二軍收捕江東江東爲㝷常蘄黄乃腹心之疾一軍之中得抽勇銳者如王逹中萬戸胡伯顔同知使之由望江登岸勦捕而西餘軍留取江東如此則不惟可以救援安慶蘄黄势分似亦易破南賊自平所謂一舉而两得者也若二軍或不用抽撤麾下兵多切望垂念淮西之地止有此城急調精銳三五千人量與錢粮賞犒與本路兵一同勦捕望江宿松之盗亦䇿之善也自非窘迫不敢僣易干瀆伏兾垂察再上賀丞相書前聞斧鉞出鎮淮南两遣属吏詣謁前茅皆至廣陵道阻而还近承台劄伏審六纛已至耿山降附踵至室家相慶以爲有穆穆迓衡之望其爲欣慰何可云喻兹遣懐寕縣逹魯花赤亦速甫賫状前詣轅門呈報兼有𬋩見上塵台听切以爲淮南之敵今有两枝一枝在濠一枝在蘄擒必先擒其首余當自㝎今庐州安豐别無官軍似难下手惟蘄黄乃有可攻之機近日潜山縣報蘄其偽官吳右丞投降大軍攻破㳂江諸寨昨日郡人自賊中逃来云白水包家窩義丁攻蘄水甚急白水諸寨萬戸陳漢所部也西兵既進如東首得一軍乗機併進冦必难支所索王建中胡伯顔䓁正係節制之内軍馬今宣城已降姑孰猶疥癬即目文有阿魯灰平章收捕之軍得一鈞帖調来共攻望江宿松蘄黄之冦東西受敵决然可㝎蘄黄既㝎可以合兵東㝎庐州安豐更得一重臣監軍多與錢粮建中伯顔䓁許以優加名爵則無不盡力淮南有可平之望萬若或无人可委江西省完者帖木郎中亦可統率謬計如此不知尊意以為何如此外又有私請城守之急錢粮功賞二者而已自兵起之𥘉大郡皆破安慶以蕞尓孤城如寸草以當疾風頼國洪休上下血戰至扵今日某誠不佞斯亦人所難能也今倉廪匱乏錢粮不充所上戰功又以朝廷隔逺不得准報今幸閤下照臨其地若麾下錢粮有餘曲為接済城治可安所舉有功皆出衆論不敢置纎毫私意於其間早與准除庶易以使人也兼以菲儀就用塵瀆此部吏事大府之常切望不拒再上賀丞相書春末聞九重加恵淮土特起大臣出鎮雄藩罷民俱慶如旱得雨嘗遣懷寕縣逹魯花赤奉微礼祗迓遄間復有台衡之命此雖一方暫失怙恃當此多艱而得元老大賢斡旋元化天下之難其可済乎某受知公門為日巳乆軍中之事不能悉陳粗言其畧以復上執事皆知格亦易定特以委任失冝賞罰不當以致餘孽復張江㐮大振所謂委任失冝者夫将之用兵自有其才譬秋之於奕非學可至如近宋科目有文有武兼是二者一代㡬人而比日将兵惟用大臣或用謫官夫戰陳之難如赴湯蹈火市井貧賤未得冨貴者或肯捐身為之大臣冨貴巳極夫復何望又謫官者心志俱䘮豈能有為覆軍殺将皆由於此用人不効甚至用賊用賊之弊尤為難言一則使天下豪傑有以窺朝廷之無人二則功多賞薄者皆起作賊之志将恐一賊未㓕一賊復起目前之事未見快意将来噬臍有不可悔者矣如安慶小邑世襲官軍善戰者少而善戰之士多田野市井之子故某於此事不盡責世襲軍官而多用田野市井之子徃徃得其死力克捷俱多朝廷選将不限有官無官惟擇能者用之而以㢘公大臣臨之以行賞罰則将得其人矣所謂賞罰不當者比見軍将勇怯在上有若不知而上之賞罰與外議絶不相似頗聞慶刑之典多出愛憎或左右便嬖為之營幹以近軍所賞聞見者而言如蘭溪之功卜顔帖木兒平章為㝡蛮子海牙中丞特因之成事者耳而朝廷頒賞中丞㞐上平章次之中丞部内得官者數百人而平章不過五六人此猶不過有髙下之争耳如廬州開義兵三品衙門而使者悉以富啇大賈為之有一巨啇五兄弟受宣者此豈嘗有寸箭之功而有功者皆不受賞故冦至之日得賞者皆以城降而未賞者皆去為賊夫用兵之道紀律為先故街亭之戰武侯不得不誅馬謖知髙未破狄青不得不誅陳曙比觀諸将略無忌憚擁兵不戰誰與相督冦至棄城無復問罪不惟不罰甚又賞之遷官増秩之功無異故之攻城如燎毛兵之柘地如㧞山某之守此智勇俱乏特以有功必賞有罪必罰奉以至公罔敢阿比是以列郡多䧟小邑獨存朝廷苟於諸部悉以㢘公大臣監之信賞而必罰天下亦不難定矣夫江南不定則中原不能獨守中原不守則朝廷不能獨安朝廷不安則宰相不能獨富貴此膚淺易見之說豈足為明智而言計亦大賢之所不厭聞也夫某之不肖豈定亂之才特此邦之民天性忠義故易與為守而難與為亂然亦戰守五年大小咸弊迩日江南郡縣皆破此邦獨完如洪爐片雪大可凛凛者也謹遣奏差丁正前詣台階白事諸所請求具如别幅伏望鈞慈曲為准報豈特門下之士頼之孤城得安江淮有可定之緒亦國家之利也謹奉状上陳以聞伏冀照察與中書參攻成誼叔書别後凢三奉書而使者乆皆不還伏計道梗不能上逹閤下位望日隆負荷日難特切爲之懸心比聞賀公復相迺大可慶然聞尚在軍中不知置左右者何人相知曽見任否江淮賊势本不難定特以考察不明刑賞失當諸将玩愒遂致難圖區區小邑雖曰上下一心幸尔完固大類紅爐片雪實爲可憂耳今長江萬里止存此城如大病之人命脉未絶猶有復生之理失今不救則首尾衡决江南大難定也兹遣奏差丁正等前赴左右白事諸所請求惟閣下是賴倘蒙朝廷俱賜准報不惟此邦之幸未破城邑孰不以安慶自勉國家亦有利也縷縷之言具别幅上陳不善爲斵使還賜教以匡不及不勝幸荷不具與月可察尔平章書自旌麾致討髙沙两嘗奉状候問起居皆以道梗不能得逹比聞兵威振揚賊势消衂驛置頗通謹遣山長秦宗徳千户也先帖木尔持㣲礼謁轅門獻歲發春伏惟履兹新正即清氛祲天下蒼生均蒙福祉與國子助教程以文書近叔良過舒始聞動履之悉所寄髙詠尤慰下懐乾坤卦說問商主簿言巳付貢公想惟所戯藏此真玩齋矣多事以来不特僕軰受此荼苦聞舘閣文臣亦有差使之劳此際當淂優㳺矣子羙近有書言鄕人多相思者欲取公還山中斯文無人淂且住爲好紀千户軰如京師軍中諸事左轄公話次淂賛助一言旱賜准報爲荷僕至軍時賊势方熾然心安去歲又有讀書之樂今年賊浸平惡况百出毎俗事不如意帰思浩然近又有同知之除似未即得帰矣柰何柰何自牧聞除礼部向有一書見寄手病不能裁荅彦中惜未嘗一見歆羡歆羡並煩致意何時聚晤話此苦辛未見自爱不既與曽舜剄書别後屡得書及𥿄墨之恵良仞契誼江西徳星所聚年榖屡登深為可喜徐鄒之冦僕乆與之比鄰無長不足畏况扵已衰而逃者也下眡此間窘迫則公等皆天上人也徐朝升糴粮江右百望維持得滿載早帰為好有便時時恵教雖相逺即同見也餘惟自望不具叔良佳否煩道致意手病不能多書與危太朴内翰書續輯史館两得從㳺豈勝荣幸區區南行又辱盛餞尤其感烈也鄉暑伏想文菀優㳺雅候動履多福良慰良慰友人趙子章北上觀光謹此附謝子章有學而能詩佳士也得公眄睐當價増之倍矣仲舉志道以聲景先中夫希先鳴謹諸先生䖏不及别状望致下忱為感餘惟自重不具與劉彦昺書闕記事奉復彦昺茂異文契足下李宗㤗来辱四月中教墨且審舟楫善逹無虞深慰所想兼豕葛布銅香模璧魯𥿄諸貺感佩感佩所聞京兆公還朝蘄黄官軍棲音可喜區區孤城無援粮之兵虚願望者皇天悔禍耳先大夫墓銘率爾呈醜軍務轇轕殊無清貺幸刪削之春雨軒集中樂府擬題甚古中朝名賢多未如此用心五七言亦佳𣣔作数語冠扵集首竢後便當寄逹也景濓宋先生文集不審板在何處得一本寄惠爲幸望介意耳附去漢椒二斤大能明目開胃亦服食所冝也風塵滿眼關河阻脩何時良晤獲文字之益也耶斯文寥寥令人短氣便風幸垂音問以慰懐想老懐耿耿臨書馳神秋向熱惟多愛爲吾道自重, WYG: ''}
