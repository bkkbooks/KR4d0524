  - {type: variant, offset: 0, length: 5894, content: 青陽先生文集卷之三記含章亭記坤者天下之至文而世謂坤為含章者羙而含之六三之事非盡坤之道也嘗觀扵地山川之流峙至文也風霆之流形至文也鳥獸草木之彚生至文也故夫子賛之以為光大又以為化光又以為羙在其中暢扵四肢天下之文孰加焉而三獨含章何謂也夫乾尊道也坤卑道也故乾主扵五而坤主扵二若三四者爻之無位者也乾之四近扵尊故曰或躍或可以進也坤之三近乎卑故曰含章可貞可悔而可用也夫子釋含章可貞以為以時發者相時而動之意故曰可者僅詞也若四近扵尊而括囊矣上儗扵尊則龍戦矣是故龍君象也若六五者可謂至尊而非㩀矣自非中徳何以能吉故曰黄裳黄中之色裳下之服夫惟有是中徳故不失其體也無棣徐君子謙博古而通今自監察御史郎宫署為諸道肅政廉訪使者政理蔚然俱可謂之文矣惟坤之六二可以當之非六三之事而其名亭謂之含章者人不知其所云也余與君處江夏凡期年知君之為人冲然賢者也曽子稱顔子以為以能問扵不能以多問扵寡有若無實若虗君嘗慕而師之羣居相與不言不知其有緼也然則君所謂含章者其必以此豈世所謂㫁章取義者欤君曰予之言然雖然子論含章先儒所去請求諸通經者而質之穣縣學記學校之教聖人所以盡人性者也夫人之性天命也天命者諸生徧予者也其理仁義禮智其噐君臣父子夫婦長㓜朋友其文昏䘮冠祭朝覲㑹同射飲軍蒐此性之體然也若夫忠信也而流為殘賊禮譲也而流為争奪文理也而流為淫慝此性之失而非其本然者也聖人人之隆綦也是故為之學校之教師法之化禮義之道所以正人性而㝎天命也而世儒之言有曰殘賊爭奪淫慝者性也必頼聖人為之教然後忠信禮譲文理興而生人之道立是不知性者之言也今夫鳥之鷇也飛而逐其雌獸之生也走而軼其羣然止扵飛赱而已也惟人之性具天命者也是故充其知可以通晝夜之道而知死生之說推其才可以參天地而賛化育何也所性而有故也今曰性無善也必聖人為之教而後善則敺鳥獸以由于學校之教師法之化禮義之道亦可以為忠信禮譲之理也其可乎是故桮棬棟宇聖人所以盡本之性也引重致逺聖人所以盡馬牛之性也學校之教師法之化禮義之道聖人所以盡人之性也其教已立其化以行其道以成之後扵是忠信立而殘賊息禮譲著而爭奪寡文理明而淫慝平其動之也神其漸之也深則夫民之心可與為善可與為悪可與為治可與為亂夫豈奪之以悪而與之以善易之以乱而誘之以治使其民至扵如是㢤亦盡其性而巳矣有弗若扵吾化弗迪扵吾道者然後為之刑政以齊之則刑政者先王所以輔治而未嘗以為先也是故教成而王政成而覇咸無焉而亡其道有大小而其教有淺深如此自先王之迹息而天下之治皆苟且由其知治而不知教而其甚者遂至亂亡相㝷終莫能勝民之棼棼者皆不考乎此大元之興百有餘年列聖丕承日務興學以為教黨庠塾序徧扵中國雖成周之盛將不是過夫穣大縣也自入職方以距于今吏猶未能為民立學蒙古月魯不花君來監縣乃曰學校之教先王為治本也遂出其田禄以為民倡民歡樂之乃買地扵州治之西攻其正位肖孔子及顔子以下十四人之像扵殿餘七十二子以及諸儒之從祀者悉繪之扵两序後為學舎廩厝以安㞐其師弟子前闢門道属扵大衢立表而題其上曰穣縣之學學甫成㑹天子以學校考吏課君方樂有學校教民也而乃以憂去其同年友成君遵寔家扵穣入朝為禮部郎中言君所以待穣之民甚厚而篤扵救思如此故既去而民至今思之而恐後之耒知所以教而民未知所以學也為予誦其所聞以告之君操行廉白為政以愛民為本日常偲偲然若已傷之是可謂良有司也况予扵君亦同年也故為記之湘隂州鎮湘橋記湘水出零陵北至湘隂入洞庭而湘隂諸山谷之水則㑹扵城南為東湖以入湘方春夏時水潦降而洞庭漲則湘水不能入湖因以湠漫為大浸州為湖南北孔道凢行者之陸出與夫郷民之有事扵阻者每渉湖則有風濤之虞否則又為舟乂邀阻之患宋之時州有鄧氏媪率其田人作大堤絶湖以属之州為二木橋以釃湖水行者徳之謂之鄧婆橋當徳祐末橋毁官為復之至大徳中旋敝州乂黄仲規乃以私財命其子惟敬率衆爲石橋南北楗石爲崖中纍石爲髙柱布木面石其上爲屋九楹覆之以與民爲㕓易其名曰鎮湘橋歴四十餘年至元𥘉覆木又敝屋且壊惟敬之弟惟賢惟徳徳彂其帑得錢萬貫以告州人将卒其先之功州乂樂爲相之又得錢二萬五千貫乃撤覆木施石梁更作大屋中爲道左右爲市肆橋廣若干尺袤若干尺上可以任大車下可以通千斛舟飾以綵繪逺而望之爛若隂虹之飲湖中行者之􅉨來與州人之市扵此者若由康荘而履堂奥不知其有湖之阻也夫水天下之至險聖人爲之舟楫以濟民而舟楫需人之力人之力有限而渉者之無窮也不湏人而能濟有無窮之利者惟橋爲然夫橋之利大故其費亦大非若一舟楫之可易具非有司與大家之力所不能為黄氏非有大作業大廪蔵而為有司大家之事力有不足至父子相承乃克成此夫亦難能也惟徳之子天禧有才藻通經術屢領郷薦余校藝鄂百時得其文以置前列其擢苐也将亦易然黄氏有子如此必多益扵人如是橋類也故為記之漢陽府大成樂記禮樂出扵天而備扵人卑髙以陳者禮也絪緼而化者樂也故禮者天地之大莭樂者天地之大和其体極乎天蟠乎地其用行乎隂陽而通乎鬼神夫人者天地隂陽鬼神之㑹而禮樂者觀㑹通以行其道也其君臣上下賔主之有其文升降揖譲綴兆清濁之有其度禮以著莭樂以為和莭以别同和以合異是皆天之所卑而非人之所為也然心天命也𣣔心生也𣣔熾而無以治之則心梏亡矣礼樂者先王用之以迪民心而㝎天命者也是故朝覲㑹同禮樂以接郊社廟享禮樂以成軍旅賔客礼樂以治用之扵天神格用之扵人鬼享用之扵民而民事治故習俗羙而侵侮傷淫之心無自而生天下之大政豈有岀扵此者㢤洪荒之道邈矣尭舜以還歴夏商周礼樂始備而天下稱為極治成康之後浸以就弛至春秋而壊爛極矣漢之時禮雖粗具扵經而亡散者亦已甚樂之道蕩然雅頌所存特其文而已耳是故其礼失者其俗汙其樂濫者其教衰天下之治所以不及扵三代者禮樂不足之故也皇元之興諸事未遑即定著孔子廟祀之礼既又令天下廟祀用大成樂令雖具而吏亦觧能應詔制春秋奠薦類以鼓吹行事夫礼樂者以之習民使之飽聞而飫見之然後入人深而成功大孔子廟者郷大夫属民敷教之地而民幸有礼可以畧見先王之道而樂又不俻由吏之為政不知本末與所先後也如此漢陽府孔子廟祀旧亦循用俗樂河東譚君知府事乃率其同寅相與岀奉金作雅樂噐教授余時獻以其事来請宰臣是之為遣一封傳作之平江數月而樂至為琴瑟笙笛塤箎各二特鍾特磬祝敔鞉鼓各一簫八編鍾磬各十六擇諸生肄習之八月丁丑有事扵學宫人聲在上樂奏在下翕如純如疾舒以度禮儀既舉觀者咸作而歎曰礼樂之用大矣若夫子監扵四代樂取韶舞其治所先在放鄭聲欽若彛教以迪民性夫礼樂之存有如餼羊薦于明靈永永是享扵是州之士相與樂譚君之政而喜民復見先王之樂也咸願刻石樹之廟廷余爲之書而使歸刻焉新修大寕宫記華西神川原大寕宫者華人以爲古后土之祠也宫故並嶽祠宋真宗幸華山賜今額以華山道士武元亨主之其後元亨以祠隘請拎朝改作之扵神川之上宫初甚侈大至靖康時兵燬里中人嘗修復之然􅋻隘不能如舊觀金正大中乃加増拓下距扵今二百有餘年故屋皆壊無能修葺之者里人張某𣣔以私力加繕治之未及爲而殁其子某乃追成先志以錢二萬五千貫具材木瓴甓㑹工藝自門至寝爲屋若干楹凢期月而成左氏曰共工氏之子曰勾龍能平水土爲后土之官故祀以爲后土盧植諸儒從之遂以為后土勾龍也蔡雍則曰勾龍社神也堯祠之稷之神柱與棄也漢后土祠在囯壬地社稷之位在未地為王肅之說者又曰社與稷皆土神但生育之功異故有二名耳史記武帝𥘉郊雍太史祠官言當祀后土扵方澤丘為五壇壇一黄犢太牢具天子從之乃東立后土祠扵汾隂睢上親望拜之如郊則漢以下地祗有社又有后土后土之說紛紛莫能統一以余考之皆失也鄭司農曰后土社神也盖社以地言后土以神言社之有后土猶郊之有上帝也曰帝曰后皆能宰之稱天子之社神曰后土諸侯而下之社神亦曰后土者猶郊之神曰上帝而五方主氣者亦謂之帝不以嫌也五土之神吐生萬物而稷者五糓之長也人非土不生非糓不飬是以先王尊而祀之勾龍有功扵水土柱與棄有功扵稼穡故以配食其神曰祀勾龍以為后土者猶所謂帝嚳而郊稷是也又周礼以血祭祭社稷五嶽其以血祭則非人鬼且其祀先五嶽則不得為勾龍亦明也古之制天子祭天地諸侯祭山川庶人祭五祀位有貴賤故祀有大小而后土之祀自天子達扵庶人所以生者一也王者為群姓立社曰大社自立社曰王社諸侯為百姓立社曰國社自立社曰侯社大夫以下成群而社曰置社大社國社為民祈報也王社侯社自為祈報也大夫以下無民乂莫為立社又不得自立社故與民族㞐百姓之上乃立社以祈報之今國都至扵郡縣皆有社獨置社亡耳民春秋雖有社祭然無壇㙺主位牲齊儀章皆不應扵礼其事所以生者盡甚莫為之禁夫不祀其所得祀非義也祀其所不得祀非礼也后土者民之所得祀者也今雖不能應扵礼能修而祀之其賢扵失礼而犯義者也余之同年光禄主事虎理翰君家扵華義張氏之斯舉也而属記扵余焉梯雲庄記晉地土厚而氣深田凢一歲三藝而三熟少施以糞力恒可以不竭引汾水而溉歲可以無旱其地之上者畒可以食一人民又勤生力業當耕之時虚里無閒人野樹禾墙下樹桒庭有隙地即以樹菜茹麻枲無尺寸廢者故其民皆足扵衣食無甚貧乏家皆安扵田里無外慕之好間有豪傑𣣔出而仕由他岐皆所以得官爵故其為俗特不尚儒周行郡邑之間環数百里数百家之聚無有一人儒衣冠者獨楊黄許氏以儒稱扵郷三時力田一時為學褒衣博帶出入里巷之間其族數十家化之皆敦扵礼毎歲時上塜族人各具酒饌群至墓下推長者一人主祀以次奠薦既㛖長者坐少者以序羅拜之然後皆坐相與行獻酬之禮子弟有為小不善者則長者進而諸譲之衆皆進曰長者言然請改是乃已至扵再至扵三而終不能改也則衆相與擯絀之不與同祭祀如是者已三世矣嘗詢其族人許氏之祖有義甫君者攻詞賦有聲扵時其弟恒甫君治經義通周易號松谿先生然皆隱不仕恒甫之仲子克敬始以教官歴太常奉禮翰林國史院編脩官而孫寅字可賔與余同登元統元年進士苐擢翰林國史院檢閱官中書掾中書照磨名聲益顯楊黄之許遂為其郷著姓郡守為表其邑中之㞐曰梯雲坊其後河東僉憲楊君士傑行郡至是曰楊黄者可賔之所生長其田廬丘墓皆在扵是又命有司易其庄為今名以風厲其郷又使知儒之為可貴也夫儒之所以為可貴以先王之道之所在也是以古者少使㞐學老使㞐塾不如是者不列扵王官不可以長民故時不貴儒而儒貴後世之用人不必盡出扵儒者也則民何由知其可貴而貴之比年朝廷設科以待天下之士民始稍稍知所趨向獨晉俗堅強不輕而變今賢使者殊其宅里明其貴賤示其好惡其意豈為許氏計㢤昔常衮為福建觀察礼貌其士俗以丕變而况上有用儒之君下有風厲之使吾見晉之乂父詒其子兄訓其弟其必相謂曰弗若許氏不可以同祀弗若可賔不得以為秀民耒耜以業詩書以語民之彬彬将若鄒魯矣然余嘗聞之民可以身化難以利誘可賔爲人侃侃䔍扵孝誼有位扵朝行顯貴矣乃以親老棄其官而飬人皆賢之以賢者而化民如草尚之以風也其有不從者乎故余爲記其表閭之始且以觀其成焉合淝修城記至正十一年寇起淮南自浙西江東西湖南北以及閩蜀之地凢城所不完者皆䧟合淝之城乆圯且夷倉卒爲木柵以守栅成賊大至民賴柵以完其後僉憲馬君至頋而曰以柵完民幸也非所以固廼白皇孫宣譲王及其憲使髙昌公議修其城遂發公私錢十萬貫召冨人之爲千夫長百夫長者傭小民相故所圯夷盡築之冨人得官發錢無甚費咸喜助所不足小民方飢得傭錢奔来執事鼕鼔不設鞭朴不施捧柴荷畚􅍪至競作自十三年二月朔戒事九月畢城四千七百有六又六門環為睥睨設周廬廬具飾噐門皆起樓櫓樹盗所必攻者甓之計用木若干甓四百四十八萬用人之力七十七萬八千城成而盗不至者今期月矣余生長合淝知其俗之羙與夫所不從亂而可與守者有三焉其民質直而無二心其俗勤生而無外慕之好其材強悍而無孱弱可秉之氣當王師之取江南所至諸郡望風降附獨合淝終始為其主守至國亡乃出降天下旣㝎南人争出仕而少不逹則怨議其上而不可止吾合淝之民布衣育秀者治詩書朴者服農賈昬䘮社飲合坐教百人無一顯者無怒不平之色驅牛秉耒鷄鳴而耕朝而息日􅉴而耕莫而息不合耦而終十畝負二石之米日中趍百里而無徳容惟其質直而無二心故盗不能欺勤生而兼外慕之好故利不能誘強悍而無孱弱可乗之氣故兵不能訹昔者木柵猶足以力戰禦冦而無肯失身扵不義者今而得賢使君脩其垣墉救其疾苦擕持撫摩以與民守之而民之與君又歌舞爱戴與君守如子弟之扵父兄手足之與頭目然自今至扵後日是雖無盗有亦不足憂也君前爲庸田僉事城姑蘇今憲淮南又城合淝一人之身而二郡之民頼之以有無窮之固儒者之利不其博㢤君名世徳字元臣也里可温國人由進士弟歴官應奉翰林文字樞宻都事中書檢校庸田僉事爲今官與余前後爲史氏城又余之所志而未成者也義爲紀之其敦事與凢供役之人則載之碑隂大節堂記皇帝御天下之十五年念徳之不宣民生之未遂乃詔丞相更守令之法著考課之令歴東朝臣以爲郡縣親御便殿賜之酒而喻遣之於是天下之吏人人奮厲以治所謂六事者以成功名稱上意宗正郎中韓君建之守安慶也獨鮮所有事其政清浄而巳在官三年頴六之盗起所在竒睘之民群起從之殺守令㩀城邑時天下乆平民生長不識兵革而郡縣無城郭無兵備卒然有變吏徃徃盗未至先去而城䧟有不去者盗去而民不與之守城亦䧟明年十一月盗入宿松破太湖潜山吏多徙家江中爲去計君獨無所徒而治城隍計軍實以示民必守不去越明年春盗入桐城以桐人来攻城君縦民出擊之盗敗去自二月至於九月盗之来攻者十有一大小百餘戰皆敗之盗大忿乃悉衆而東舳艫数百里鉦鼔之聲動天地王師敗績小孤山十月癸卯盗逐北至城下城南郛乆隳為民居而聮群艦為城盗縦火舟燒聮艦艦潰火入南門焼民居諸守將亦潰民恐甚赱来眂君君方部署寮吏為戰守如恒曰民乃無恐且戰且撲火甲辰盗傳西郛戰却之明日傳東郛又戰却之相火所經撤民屋村夜柵之旦具甲寅盗力攻無所得利諸潰者聞城完且相率来援盗望見之乃夜引去余来成郡道間城䧟矣比至乃完問故父老皆曰韓君完我君時亦去則民無與為守民無與為守則城之完不完盖未可知矣方朝廷更化時吏皆黼藻其政以角一日之能君若無能然者及臨大變其所能者乃若人之所未易能君誠不可以小知也予觀扵今南方之國不頻扵盜非其所力攻有能守者矣而頻扵盗者為難頻於盗􅗲幸扵一勝有能守者矣而屢勝者為難民屢勝矣至扵敗且危扵是不去而上効死以保其下下効死以衞其上卒能因敗為功以危為安如君之為者盖千百之十一此人之所難能也曽子所謂臨大節而不可奪者君其人欤郡所治属縣六西至扵懐寕又西至扵潜山又西至扵太湖武夫義民列柴相望百戰杭盗頼君以為根本而無叛意東至扵池又東至扵姑孰數郡之民賴君以為藩屏而無死傷之禍君之所完不旣大矣㢤余抵郡十日盗復大至與君率衆纎之盗不至者今再朞矣十四年春三月朝廷録十月功特加君中奉大夫秩從二品幙官以下各升秩有差余因名其聽事曰大節之堂所以掦君之懿扵無窮也雖然治之有亂猶旦之有夜也後之人坐其堂而思其人思其人而懼其時有不恊扵其行不完扵其民者獨不欿然扵君者乎余之名堂又所以觀扵無窮也時與君守者逹魯花赤西夏阿尔長普照磨楊恒録事司逹魯花赤莫倫赤録事黄啚倫台録判􅝂理桀錫權懐寕縣逹魯花赤禹蘇福安慶萬户府經歴郝瑞千户李思礼邵永堅王國英許元琰賈伯英也先帖木兒立卺咬住洪保張彬路忠金嗣元葛延齡百户盧顯宗邵文質韋与權齊世英宗逹周文謝茂陳士逹楊買兒朱傑李玉祝茂夏興侯興祖吕重禄朱臣孫朱惠龍弹壓嚴継祖伍予雲張宏晁関保揚州弩軍翼千户賈禧百户王孫兒别列怯不華㳂海翼百户毛偉牽連書之使與有聞扵不朽君字公懋遼西人青陽先生文集卷之三, WYG: ''}
