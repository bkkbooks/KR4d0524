front:
  text: 青陽先生文集卷之四門人淮西郭奎子章輯
  hash: sha256:7e615862b2074042256a2e7072f53613ceb3779d98216f23628e40e862f6d006
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0524_SBCK_004-1a}
body:
  text: 序送歸彥溫赴河西廉使序河西本胸奴昆耶休屠王之地三代之時不通于中國漢始取而有之置五郡其間自李唐以來拓跋氏乃王其地號為西夏至于遼宋日事戰伐故其民多武勇而少文理然以豫觀之豫家合淝合淝之戍一軍皆夏人人面多黎墨善騎射有長身至八九尺者其性大抵質直而上義平居相與雖異姓如親姻凡有所得雖簟食豆羔不以自私必召其朋友朋友之間有無相共有餘即以與人無即以取諸人亦不少以屬意百斛之粟數千百緍之錢可一語而致具也歲時往耒以相勞問少長相坐以齒不以爵獻夀拜舞上下之情怡然相歡醉即相與道其鄉鄰親戚各相持涕泣以為常豫初以為此異鄉相親乃尓及以問夏人凡國中之俗莫不皆然其異姓之人乃如此則其親姻可知矣宜其民皆親上死長而以彈丸黑子之地抗二大國傳世五六百年而後亡非偶然也自數十年來吾夏人之居合淝者老者皆巳亡少者皆巳長其習日以異其俗日不同少貴長賤則少傲其長兄強弟弱則兄棄其弟臨小利害不翅毫髮則親戚相賊害如仇讐豫猶疑江淮之土薄而人之生長于此者亦因以變及以問夏人凡國中之俗今亦莫不皆然其于親姻如此則異姓之人可知也夫夏小國也際時分裂而用武必不能篤于所教而區區遐方教之亦未必合于先王之法及國家受天命一海內收其兵甲而摩以仁柔飬之以學校而誘之以利祿今百餘年于兹絃誦之聲內自京師逹于海􅗲其教亦云至矣而俗乃日降如此吾不知其何說也我祖宗之置肅政廉訪司于天下大要以風俗為先而其職以學校為重故世謂之風憲是得先王為治之意也故嘗選任尊官非道德爵位出乎庶僚者不得與是選所以為民表也今皇帝用嵬名公為御史大夫公乃歷選朝著盡拔諸名臣為廉訪使而無歸君彥溫以樞密院判官而為河西君少擢科目能古文辭有大節由國子博士五轉而遷是官仐為廉使于夏必能興學施教以澤吾夏人吾夏人聞朝廷以儒臣為尊官以蒞已必能觀于學以服君之化風俗必當丕變以復于古其異姓相與如親姻如國𥘉時如余所云者矣故道吾夏之俗以望吾歸君焉送月彥明經歷赴行都水監序中國之水賴禹治之而悉平而河獨為患至今未巳者何也河失禹之道而治河者不以禹之所治治之也蓋河出崑崙合諸戎之水東流以入中國其性徑悍若人性之有強力其來也甚逺而其注中國也為甚下又若建瓴水于峻宇之上則其所難治也固冝且中原之地平曠夷衍無洞庭彭蠡以為之滙故河嘗橫潰為患其執非多為之委以殺其流未可以力勝也故禹之治河自大邳而下則析為三渠大陸而下則播為九河然後其委多河之大有所寫而其力之所分而患可平也此禹治河之道也自周定時河始南從訖于漢而禹之故道失矣故西京時其受患特甚雖以武帝之才乘文景冨庶之業而一瓠子之微終不能塞而付之無可奈何而後巳自瓠子再决而其流為屯氏諸河其後河入千乘而德棣之河又播為八漢人指以為太史馬頰河者是其委多河之大有所寫而力有所分大抵偶合于禹所治河者由是而訖東都至唐河不為患者千數百年或者以謂玉景隄防之力及大不然使無屯氏及德棣諸河河之大無所寫而力無所分景以尋文之防而捍猶螳螂之駕而可以捍大車之奔吾不信也惟河之委既多大有所寫而力又有所分景之隄防特以捍漸水之衍溢者耳比趙宋時河又南决至於南渡乃由彭城合汴泗東南以入惟而漠之故道又失以河之大且力惟一淮以為之委無以寫而分之故今之河患與武帝無異余嘗以為中國之地西南髙而東北下故水至中國而入海者一皆趍于東北古河自龍門即穿西山踵趾而入大陸地之最下者也然河天下之獨水也凡水一石率泥數斗嘗道出梁宋觀河所决凡水之所𬒳比其去即穹居大木盡沒地中漫不見踪跡河之行于地方也數十年而河徙千乘自漢而後千數百年而河徙彭城然南方之地本髙於北故河之南徙也難而其北徙也易自宋南渡至今殆二百年而河旋北乃其勢然非有他說也比者河北破金堤輸豐沛曺鄆諸郡大受其害天子哀民之墊溺乃疏桞河𣣔引之南工不就又遣平章政事嵬名公御史中丞李公及禮部尚書泰不花公沉雨圭有邸及白馬而祀之河之患不已乃㑹諸老臣集議治河者諸老臣無能言其說獨尚書泰不華公以為當濬河棄道復引河以入彭城而待制楊梓人力以為棄道不可濬設使濬之而河未必能入廟堂無所從遣都水使者相其便害或者以為當築隄起曹南訖嘉祥東西三百里以障河之北流則漸可啚以導之使南廟堂從之乃置都水分監以任其事選朝臣之知水者為都水而吾同年月君彥明為元幕將行以問于余余不知河事者雖然諺有之曰不習為吏視巳成事以事巳成者為君言則古所以治河者可見也今河惟不反故道則其勢可障而排之使南使反于故道由漢之千乘以入海則國家將無水患千餘年如東都與唐之時乎今禹之九河既不可復考而河亦不復德棣之間漢人指以為太史馬頰河者尚未泯可尋究如縷河之道是將大有所寫而力有所分非若一淮之小而扼其勢而使之橫潰為吾民害也今夫廟堂之議非以南為壑也其慮以為河之北則㑹通之漕廢其係于朝廷甚重余則以為河北而㑹通之漕不廢何也漕以汶而不可以河也河北則汶自彭城以下必微微則吾有制而相之亦可以舟以漕書所謂浮于汶逹于河者是也余特𣣔防巨野而使河不妄行俟河復千乘然後相水之冝而修治之特一人之私言也朝廷方事隄防固無事此乃以彥明言者似迂逺而不切也萬一隄防不足以禦河則余之言或有時而驗焉故為之叙送樊時中赴都水庸田使序國家置都水庸田使于江南本以為民而賦稅為之後往年使者昧于本末之義民嘗以旱告率挋之不受而盡征其租入比又以水告復逮繫告者而以為姦治之其心以為官為都水而民有水旱之患如我何于是吳越之人咻然相譁以為厲巳㑹天子問民所苦乃以為民實水非姦遂劾逐使者破械縱民而以聞上朝議乃歷選公卿有學術知大體者為之使而吾樊君時中以江南湖北道肅政廉訪使而遷是職自君之來官僚叶和吏畏民服政以大行命下之日無不相視嗟咨以惜其去獨其友余闕躍然曰東南民力自前巳謂之竭矣况今三百餘年昔之盛者衰登者耗今其貧者力作以苟生冨者悉力以供賦有持其産為酒食子人人皆望而去之其窮而無告甚于前世益逺矣其可重困之今而得賢使者以蒞之修其溝澮相其作息不幸而有水旱之灾則哀矝而為之所民之窮者其少瘳矣乎今之木之實繁者其技披其本疏者其幹拔况于國與民乎哉故善樹木者簡其實而厚其本善為國者疏其賦而厚其民理之較然者也時中慷慨有大志臨大事果毅不擇利害而為之今其行也其能有以大慰吳越之民望以副朝廷之倚注也必矣二月𥘉吉式發鄂城卉木繁盛賔僚具在各為詩以稱美之豫故首序焉送范立中赴襄陽詩序宋髙宗南遷合淝遂為邊地守臣多以武人為之凡百餘年間未嘗一歲無兵革故民之豪傑者皆去而為將校纍功多至莭制郡中衣冠之族惟范氏商氏葛氏三家而巳三家之在當時貴不過通判顯者或至知縣與府族亦未甚大也皇元受􅒛包褁兵革休飬元元民既冨庶矣而又修禮樂㝎治具諸武臣之子弟無所用其能多伏匿而不出春秋月朔郡太守有事于學衣深衣戴烏角巾執籩豆罍爵唱贊道引者皆三家之子孫也故其材皆有所成就至學校官纍纍有焉當宋季時諸武臣之冨貴視三家篾如也而百餘年之後惟儒家子入為弟子出為人師隨其才之大小皆有聞于時雖天道忌滿惡盈而儒者之澤深且逺從古然也范氏世多聞人立中尤通敏由郡直學為襄陽教諭宋亡時蜀流寓之士多在江漢意必有老成典刑人也有老成典刑人與之逰立中此行將大有得范氏之後有大顯者必立中也于其行也書以贈之李克復總管赴贑州詩序仁皇帝即位録懷來功致髙位者無慮數十百人獨韓國李公以甘盤之奮為最顯位平章總百度君臣一德鋭精治古而韓公相業見稱於天下後世者設科取士其最也元統𥘉余忝論薦計偕如京師與諸同年求韓公子孫得今伯徴太常相往來又識克復屯田于京師比來佐泗州而君復為泗州屯田提舉日與君處念天下士所以復見前代賔興之盛者由韓公士不及見韓公見屯田不其猶見韓公乎且與太常同年辱使納禮故以太常之事君者事君朔月歲時必從諸僚友造君苐君暇亦輕裘緩帶以一小吏持馬過我我必為之傾蓋而後去君色嚴而氣和有學而知體坐終日屹然于先朝人物故實無不熟而知聽其言亹亹如環之無端坐客無能置一辭也去年秋既書滿宰相以君有門閥且久更事非散地所冝處奏為贑州路總𬋩州之長二及諸屯田與九州之人往賀君闕在次舉盞拜君言曰仁皇帝之文德入人也深天下不忘仁皇帝必及于韓公朝廷録勳舊家首言君斯文之興可俟矣請以為天下賀又曰韓公能以道術昌其家君兄弟能保功名以有光于韓公致中二千石請以賀君又言江之西文教之盛者曰吉曰贑多士彬彬焉人之所以厲于學科目之興也于韓公之始而厲于學獨不于韓公之季以治哉贑雖號難治君處之余知其為易也請以賀于是程泗州賦詩四韻坐客人士皆為詩以道其行使書吾說以為引揚君顯民詩集序我國𥘉有金宋天下之人惟才是用之無所專主然用儒者為居多也自至元以下始浸用吏雖執政大臣亦以吏為之由是中州小民粗識字能治文書者得入臺閣共筆劄纍日積月皆可以致通顯而中州之士見用者遂浸寡况南方之地逺士多不能自至于京師其抱材緼者又往往不屑為吏故其見用者尤寡也及其久也則南北之士亦自町畦以相訾甚若晋之與秦不可與同中國故夫南方之士微矣延祐中仁皇初設科目亦有所不屑而甘自沒溺于山林之間者不可勝道是可惜也夫士惟不得用于世則多致力于文字之間以為不朽而文辝者有幸有不幸者至于老而無所用矣而其文又遂泯不顯是又可哀也比年大江之南山林之士有挾其文藝逰上國而遇知于當世士之彈冠而起者相踵京師大官之家皆有其客而周知于當世者亦比比有之若豫章楊顯民者抱其才藴不屑于科目甘自沒溺于山林之閒當士群起而有遇之時而又終不肯一出以干時取譽是其中必有所負而然也豫雖不識顯民然聞其人力學而操行通古今之務江南之士漸其澤而有名作甚衆其弟子之登科目仕州縣者亦能以政稱其家固貧而年又將老乃日䔥然吟咏以自樂無少怨怒不平之氣其殆古有道之士耶余讀而愛之其弟子凃頴持其所謂水北小房集者來京師將刻之以傳于世余為題其首使後知顯民南州之士有所負者也是蓋有道之士也貢泰父文集序余天性素迂常力矯治之然終不能入繩墨矯治或甚則遂病不能勝因思以為迂者亦聖賢以為美德遂任之一切從其所樂常行四方必迂者然後心愛之而與之合凡捷機變者雖強與之然心終不樂也故暫合而輒去京師天下聲利之區也迂非所冝有嘗隂以求之士大夫之間得一人焉曰貢泰父泰父故學士仲章君之子能詩文少逰太學有時名因自貴重不妄為進取有所不可交者亦不妄與交故吾二人者驤然相得若魚之泳于江獸之赱于林也時泰父為應奉翰林文字固多暇者即與聚盍有𬞞一品魚一盤飲酒三行或五行即相與賦詩論文凡經史詞章古今上下治亂賢否啚書彛器無不言者意少適即聮鑣過市據鞍談謔信其所如而止及暮無所止則相與問曰將何之皆曰無所之也乃各䇿馬還自古暨今在公貴人能求賢常少然自至元𥘉姦回執政乃大惡儒者因說當國者罷科舉擯儒士其後公卿相師皆以為常然而小夫賤隸亦皆以儒為嗤詆當是時士大夫有欲進取立功名者皆強顔色昏旦往候于門媚說以妾婢始得尺寸此正迂者之所不能為也因翶翔自放無所求于人巳而皆無所遇豫既歸淮南泰父亦以親嫌辭官歸除紹興推官不相見者為最久去年大原賀君為丞相搜羅天下人才之有政譽者而泰父之治為浙東西苐一乃得復召為應奉余適入朝為待制相見益歡計其别十年矣吾年少于泰父鬚髮皆白而泰父鋭然面紅白如出其别後所為詩文甚冨且大進益知為泰父真豪士也夫以士之賢無所遇而淹于下僚冝其悲憤無聊而不能盡也顧乃自樹卓卓以其餘力而致勤于文學且其貌充然非其中有所負蓋不能尓然則吾泰父之迂又過我逺矣夫古之賢士多不兼于文藝文藝雖卑而世亦貴而傳之者愛其人故也不賢者之于文藝雖極其精人猶將賤之亦何以為也泰父忠孝人也其功名事業當不待文與詩而傳而况于兼有之耶余昔與之别今見其文如此今又當别去計相見時其文又必有過此矣于其行也序而識之送葛元哲序文者物之成章者也在天而為三辰在地而為川嶽其在于人若堯舜之治化孔孟之道德仲由之政冉求之藝一皆謂之文今持以言辝之精為文者夫言之精莫精于周公孔子二聖人之于言豈有求其精而然哉而其文何其若是其蔚也其楊雄司馬相如韓子歐陽子始號為工于文者彼其于周公孔子之文非不𣣔窮日夜之力極一世之所好孜孜焉追硺磨礪以求其精而卒不能至焉濂溪二程大子之學其視楊雄司馬相如韓子歐陽子蓋有所不暇然味其言淵然而深雄然而厚晬然而醇使得列于聖門雖顔子曽子將不能過則夫言之精者又若不待窮日夜之力極一世之所好孜孜焉追琢磨礪以求至于聖人而後賢此無他聖賢道德之光積中而彂外故其言不期其精而自精譬猶天地之化雨露之潤物之魂魄以生葩華毛羽極人之智巧所不能為亦自然耳故學于聖人之道則得聖人之言學于聖人之言則非惟不得其道并所謂言胥不能至矣金溪葛元哲奮以文章名江南既擢弟其文又傳于京師衆謂元哲之文冝為天子粉飾太平鋪張鴻業以傳于後世㑹有守宰之選遂以為興化録事余知元哲終以文選非久于外者也于其别也故與之論文送許具瞻序余讀周易之謙未嘗不掩卷而歎曰聖人待小人之心一何如是其至也夫陽君子也隂小人也小人盛則干君子故隂至三則履君子盛亦未嘗不下小人故陽至三則謙謙虛也陽本實而云虛者不自滿假故屈而下于隂也是謙以下為德者也𥘉而謙謙下而又下者也二則浸以上矣故以鳴謙鳴者以言謙也三則益上而位髙故以勞謙勞者以功謙者也以功而謙厚之至也厚之至而民焉有不服者乎故三之辭曰勞謙君子有終謙而民既服君子之道終矣謙既終民既服進而之四何施而不可聖人之心猶以為吾之待小人者未之厚也又自反而撝謙故四之辭曰無不利撝謙其德巳厚其謙已撝進而之五而小人者之終不可以化入也于是乎有侵伐之師故五之辭曰不冨以其鄰利用侵伐不冨以鄰德之盛也利用侵伐順之至也聖人之待小人至是可謂尽心焉耳矣昔者禹征有苗苗民逆􅒛益之贊禹惟在于謙禹遂有舞干之舉此其所謂撝謙也謹猶撝而未格則其侵伐者禹終得而巳乎哉祖宗受􅒛汛掃六合以有堯舜所未有之天下聖天子紹承熙洽愛民猶子堯舜之仁不是過也頃者盜起海隅剽民財犯官漕其罪可誅而區區赤子又特一將校之力所能舉乃不以為罪止于招諭盜又止我省臣以求降此尤可誅也而亦從其請且曰德不下宣此吏之罪遂盡變易並海之為宣慰及其郡縣之官選能當其任者得三十八人親御便為給符傳而諭遣之嗚呼此所謂無不利撝謙而禹之所以待苗民者也三十八人之中天台許君具瞻當治鄞具瞻余同年進士也其行端潔其材勇以幹前知武義時攝金華縣事武義之民群欣憲府請還君金華之民亦群訴于憲府留君不𣣔其去其得民如此可謂稱兹選矣故余為道聖天子愛民之深與夫所用具瞻者如此非惟勉具瞻亦以告夫民也贈刑部掾史鎦彥通使還京序舒岸大江為城北赱英頴南直番歙西通黃蘄湘漢鄂嶽東距鳩巢所謂四通八逹之地也自之興所在從亂舒介其間而獨徇義乘莭不與之共戴天故群盜環攻之舒亦不少屈撓日治矝㦸弓矢以與之相格閗盜大至則男操兵婦給餉童子負瓦石空巷乘城與之決戰如是者今五年其勞如此故其冨者日貧而貧者日死以耗入其市㕓里䔥然適其野榛莾沒人不見行跡至其館簠簋不治餼牽不具委積不充使者之道此怒而去者往往有焉其以公事來者多視賂以為喜愠喜為春溫愠為秋凛或怒而去則民相與踧踖曰禍其始此耳不甘食安處者纍月而未寧逮無事乃巳浚儀鎦君彥通為秋官掾亦以事來居郡浮啚每食𬞞一器飯一盂饋之珍羞則辭盡之財則艴然以怒持莭至軍中勇者執手以勉之創者涕泣以勞之其居此特久而民愛之如始至惟恐其去巳也傳曰有功而見之則說也君重其民情而閔其勞民之說也亦其冝也臨川毛順孫受君尤至與士大夫賦詩以美之余故處合淝知君為掾廉而有能以為士之美君者非譽也故序而冠諸其首為髙士方壼子歸信州序堯舜之時以幽并為朔易元興舉堯舜未有之天下而一之而幽并始為土中以為四方之極然其地去荆揚數千里而氣苦寒而多風非其土著至則手皸而足裂其居處服食異用絺葛果茗魚鱐之物不能以易致皆性之所不便故南方之人其至者恆少非為名與利無從而至焉又况浮啚老子之徒以遺外世俗為道其于名與利蓋有所不屑故其至者尤少或至焉者則亦名利之人也髙士方壼子至正中至自信州余始遇之以為名利之人也徐與往耒見其氣泊然其貌充然人與之談當世之事則俯而不答獨其性好畫人以禮求之始為出其一二皆䔥散非世人所能及嘗為余言太行者天下之脊而居庸虎北者天下之岩險也其雄傑竒麗非江南之所有天府之藏王公巨人之所有皆古之名晝余所願見者今皆見之而有以慊吾志充吾之所操吾非若世俗者區區而至也余曰賢哉方壼其古所謂善操技者與夫輪扁之為斫知斫之為美不知有王公之貴知斫之為得不知有晉楚之冨故其為技也古今之善斫者莫加焉今子幾于是矣其有不臻于古者耶吾黨之學者苟遷于物其尚能望子耶于其行也相率為詩以贈之聚魁堂詩序安慶郡文學秦宗德特其友人豫章嚴撰書耒請曰去年丙申江西行中書之鄉試也臨江貢士有曽魯者偕其友廬陵解蒙髙飛鳯劉倩玉俱就試寓止同舍往還復同舟而載拆號四人者俱在甲乙選列捷報至髙與劉解乃留魯家鄉人因名曽氏之館曰聚魁堂云璞與魯姻婭也復率大夫士之能文辭者賦詩美之謂宗德常獲私于公書耒請序願勿辝將以為榮焉余曰科目取士吾嘗司文衡于中外矣退而考其所得父子同榜者有之兄弟聮名者有之師生俱在選者有之若同志同升鮮有聞如曽魯者也其理似不偶然豈有數存其間耶然不足泥也余惟愛魯之交友得人而人之與魯交能登科目發身也由此而升以行道以致君以澤民將無不可吾意四方者亦嘗彈冠相慶矣則親朋賦詩以志喜也固冝宗德曰斯言甚善請書以為序送李宗泰序淮東南西北道之地其民忠而能守國者三郡曰廬夀舒自之興壽守先治戰備與民為守至輒敗然不能保其近地民無耕收而長淮之餉道又絶以致父子相食而後潰廬大郡其南沮澤之地大而有名者三十六俗名之曰圍地廣而足耕而守與將才下余嘗識之凡其日之所營夜之所思非宴樂之事則掊克之政也民有持耒耜于門者則曰召使奪而辱之民飢以死城大而不能守乃斂四境鄉兵以守之又無以食以賦冨者大都剽吏殺人而莫之禁至以其兵去之城遂陷余至舒時國門之外數十里之地皆盜柵也幸戰而勝乃為攘剔旁近之地令民耕之築壘以護其作役其不能耕者時莭與之繕城隍修豫㦸而又明其政刑平其賦斂治其爭訟朞月而頗張今民之勇者無敢譁弱者無所悵如氶平特然惟教民之術有未治耳方將與學士修其庠舍共講唐虞治道夫人性命之說則禍亂有不足㝎者若姑孰李宗秦志學而行端又吾所當延而禮之者也而力不足宗泰族人陷在姑孰者聞多自拔于宣將往來之又義之所不敢止者姑序吾懷而與之别藏乘法疏後序續增天下之書博者未嘗無要法五聲十二管可以盡天下之音聲十干十二支可以盡天下之甲子象形指事轉注諧聲㑹意假借可以盡天下之文字其統之有宗其㑹之有元充之而不窮合之而不遺知者創物其有功于世類如此佛氏有法疏書㑹萃名義而藏十二部之理無不在誠要法也西菴遂公罷講逰方二十年歸乃取而修訂之𥙷其所未備白其所未明去其所未安明性相析機冝刋定名體目曰藏乘法疏濡須有道之士文公無學以衣資若干貫刻之板以惠四方昔邵子皇極經世以元㑹運世衍為十二萬九千六百年以盡事物無窮之變其文博其義冨蔡西山撮其機括為指要一編其有功于邵子大矣遂公之書是亦大藏之指要與余讀傳燈婆子請趙州轉經繞禪床一市云轉經巳婆云只轉得半藏半藏全藏姑置勿問五千四十八卷一周行頃何為而轉之此父西菴不傳之妙因書之卷末在學者所自得青陽先生文集卷之四
