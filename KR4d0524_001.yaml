front:
  text: 青陽先生文集卷之一門人淮西郭奎子章輯
  hash: sha256:22890d41f8d55b5591a3f67498068fe743b88dbe89ba35412c49b6788ddfe863
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0524_SBCK_001-1a}
body:
  text: 詩擬古二首昔在西京日縱觀質前聞皇皇九衢裏列第起朱門借問誰所居丞相大將軍平明事逰謁車馬若雲屯芍藥調羔鼎拂狖鑄酒尊頌聲美東魯逸奏出西秦廽風薄蘭氣十里楊清芬東家有狂生容顔若中人謬言擬宣尼幽思切玄文著書空自苦名宦乃不振悠悠千載下安有楊子雲昊天轉時律大火西南馳徑商發羣籟白露降嚴威攬衣起視夜明月鑒薄蜼翩翩征鴈翔唧唧寒蛩悲紅蘭委芳采柏葉亦離披喬喬千丈松孤生泰山隈凝霜裂其膚層氷斷其柢摧殘若傾益蒼翠終不移草木有至性明哲冝戒哉白馬誰家子白馬誰家子緑轡縵胡纓腰間雙寶劒璀璨雪花明甫出金華省還過五鳳城君王賜顔色七寶奉威聲夜入瓊樓飲金樽滿繍楹燕姬陳屢舞楚女奏鳴筝慷慨顧賔從英風四坐生一朝富貴盡不如秋草榮黔婁固貧賤千載有餘名擬古楊沛楊生仕州縣謀國不謀身一朝解印綬歸來但長貧茅茨上穿漏頽垣翳緑榛空牀積風雨蝸牛止其巾辛苦豈足念殺身旦成仁天門山保寧知府楊丹梓人作記楊子博地志名山屢出王但言隱彌匪崇冠峙嵩梁井絡通遙甸天經列巨障羣峰如􅔽蓞歷亂發金塘玉壷既嶇愕天門逈開張宛蟲連紫蓋丹泉濺石床入門蔭修竹中夏若寒霜靈鳥多異色中林皆妙香耀真啓幽室積石構瑶房萬里祕冥奧千秋阻秩望惟應學仙侣結桂共相羊送鎦伯溫之江西廉使得雲字祖帳依仙館車蓋何􅌭紛使君驅駟馬衣上繡成文中坐陳綺席羽觴流薄薰情多酒行急意促歌吹殷况我同鄉友同館復同羣𥘉暘麗神臯遙望澄逺氛廽鏕望雙闕五色若卿雲蒼茫歲年徂東西𡵨路分道長會曰逺何以奉殷勤惟有凌霜柏天寒可贈君送李好古之南臺御史都門相送處旭日動蘭暉綺樹鶯𥘉下金溝絮漸飛分驂向逺道把𬒮戀音徽去去江南陌應看滿路威送普原理之南臺御史兼東察士安霜署起南天雲霄畫榜懸兩幃猶可對二妙古難全夏木籠雕檻風華度繡筵時應聮騎出誰謂非神仙送霍維肅令尹握手蘭宫外朝光滿禁塗山寒知塞近苑靜覺鶯踈草草離樽既悠悠征輛驅還應􅎮時念不羡執金吾秋興亭涉江登危榭引望二川流雙城共臨水兩岸起飛樓漢渚深初緑江皋逈易秋金風揚素浪丹霞麗綵舟登髙及佳日能賦命良儔御者奉旨酒庖人供膳羞一為山水媚能令車騎留為語同懷者有睱即來遊安南王留宴將命坐藩服式禮奉國賔賢王重意氣延客列華禋肅肅髙堂上圎方饋八珍齊優雜趙女歌曲一何新遺響從風發雕梁落素塵中觴每傳滿眷眷難具陳厚往已有愧懷報恐無因九日鄂渚登髙南州理秋拔嘉節協乾陽爰與幕中友臨眺陟崇岡維時天氣肅芬菊巳沾霜雷雷風振谷凄凄日在房髙雲斂楚岫曜景逰川漲微徑出丹林列坐泛金觴佳賔未易合良會安可常英曹幸文雅獻酬寧計行預恐還吹帽煩君戒太康吕公亭鄂渚江漢會茲亭宅其幽我來窺石鏡兼得眺芳洲逺岫雲中沒春江雨外流何如乘白鶴吹笛過南樓詠井上桃花本是仙源種移向禁中栽為愛妖嬈色偏臨露井開先天觀仙客錬金地蒼山深幾重至今龍虎氣猶在琵琶峰峰前石路整金澗垂楊嶺万壑閟阿宫千年奉丹鼎日日采三秀人人吹玉笙既要王子晉復命董雙成方朔金門步春來多自豫青鳥幾時還御書寄君去北闕懷美祿南山思逺逰勞心如御水東去復西流黃鶴樓嶣嶤黃鵠嶺巋巍構楚材澄江環盡楯連城抗鉛階雕衡朱鳥峙淵井緑荷開隱見長沙渚想望陽雲臺晴霄一仰止輪奐信美哉淮南儻好道日夕化人來别樊時中桃華灼灼柳絲柔立馬看君發鄂州懊惱人生是離别不如江漢共東流宴晴江山拱北樓漢坻開繡閣蕭然似渚宫晴江華楯外列岫綺錢中樹色青樽緑荷花女臉紅賢王敬愛客樂宴意何終山亭會琴圖連山環絶壑雲木亂紛披中有抱琴者有如榮啓期蕭然久不去問子欲何為絶塵軒元興寺二首網軒開翠崿山水下蔥籠江中寶牀擁樹杪畫欄紅心融二障滅境靜六塵空應似青蓮葉齊開緣水中壓雲軒軒轅鑄鼎處仙臺成晝圗寒雲生洞渚暝色入蒼梧如霧飄丹閣非煙起玉爐年年漫耒此無處挽龍胡大别山柏樹竒樹如蛟蜃盤骫上虛空孤生雖異桂半死反如桐香帶金爐氣色映綺錢中靈從后皇服年隨天地終常瞻北枝翠終古鬱䓤蔥竹嶼秋水鏡臺隍孤州入渺茫地如方丈好山接會稽長紫蔓林中合紅蓮葉底香何人酒船裏似是賀知章題虞邵菴送别圗南州山水麗中田歲事豐時貞文物粲道合朋輩同濟濟衆君子班坐蔭青松回洲環偃月丹林結綵虹翔鷗方矯矯鳴鴈亦嗈嗈即趣情已展染翰思彌工豫亦幽棲者纓冠朝北宫披圗誦佳詠邈尓想髙風送危應奉分院上京峽路傳清警金輿夾綵旃還如向姑射詎比幸井泉苑樹紛成幄關榆始委錢從臣偏寵近載筆幔城邊題假應奉山水圗二首水如剡溪水山似剡溪山想見魲魚美扁舟常不還花隱玉堂署曲几對雲峰為問江南客何如九里松嘉樹軒為胡士恭作嘉植將百歲積翠廣庭間髙柯出閭巷低枝蔭井乾流膏從風揚芳氣散如蘭别有清霜節將同綺樹看鶴齋為薛茂弘道士賦葉縣飛鳬舄琴髙駕赤鱗豈若青田鶴蕭灑乃仙倫刷羽琪樹側振唳華池津騫騰望霄漢逸氣已沖天錬液諒有驗滅景入無垠還乘過緱嶺舉手謝鄉人禎祥菊為沙伽班院使賦舊花已萎絶新花乃再芳都緣稟金氣特解傲司藏旖旎生殘馥葳蕤出故房應憐蕙草質戢頴委微霜賦得九里松送吳元振之江浙左丞結駟向青郊松隂九里遙言從天笁寺自度小春矯偃蹇成芝蓋蕭瑟蔭蘭橈相送將何贈期君保後凋龍丘萇吟贈程子正戰龍起新室羣鳥亦翩翩偉哉龍丘生抱琴歸故山仰視天際鴻俯弄席上絃淸音發疏越逸響遺澗泉悠悠鳯翔漢婉婉虬媚川清風自千古何用能草玄送觀至能赴歸德知府善理崇富教長辟等烹鮮况兹久凋瘵望治功宸淵綬組承明裏結駟雙闕前燕郊芳草歇啇墟大火懸髙懷薄霄漢攬轡殊慨然揆豫眛時用載槖從甘泉庶聞兩歧詠為豫書汗篇送黃紹及第歸江西上林華落盡東門餞别𥘉逰絲橫輦道金波溢鏤渠含觴不能飲躑躅此城隅念子正英妙丹泉媚緑蕖翻然阻山岫邈爾問離居藝閣誰同坐蒲生孰共書時應有詞賦為寄北飛魚送胥式南還孟冬寒律應原野降繁霜客子􅌒逰覽結笥還故鄉驅車出城闕旭日懸晶光綺宫上爛爛翠閣後蒼蒼豈無京華志晞景發清楊冨貴在榮遇貧賤有安行恆恐歲年迫皋蘭凋紫芳君看沙上鴈騫翮乃隨陽題合魯易之四明山水圗窗中望蒼翠春木起晨霏孤嶂才盈尺長松未合圍蕭蕭此仙客日日候岩扉念爾空延佇王孫且未歸題黃河清艮岑幽居大明照四海之子乃陸沉逺絶仁義絆結宇幽藪隂薈翳谷中路嶄崱北山岑窗鶯響初蔭隴月頽夕林時憑曲水几蕭散發長吟委化諒為逹滯樂恐遂淫援琴鼓招隱念子為薰心題施氏西嶼書堂中智貴得性得性非易求羡君淠水曲松竹􅞴層丘春秋當佳日兄弟各命儔捴轡凌晨術展席面緑流參差瓊峰出泓澄綺磧周緗荷承繡宇黃鳥響疏樓起坐玩芳帙為樂鮮優遊河陽耻巧宦建春厭旅愁安得周公瑾為館孫仲謀送方以愚之嘉興權官帝仁同禹泣典憲輟朝纓我友膺時選御命出承明是日芳莭屇列餞多巨卿桃開疑組色鳥囀雜歌聲仰獻一杯酒逺慰千里行丈夫有逺業文墨非所營勉布惟良政持用畣皇情玉雪坡為周伯溫賦江梅有至性能怡君子顔開花競芳莭棹秀帶春寒惟與玉同色還嗤雪易殘芳香拂羅袖如薰金博山置此賔席上人人別意看題劉氏聽雪樓羣峰擁臨檻修竹欎菁菁蔭向曲池好聲惟雪夜清天寒三日卧人道是袁生題光祿主事􅍑仲桓海棠圖沉香羯鼓打春寒才見開時又見闌爭似君家屏幛裏年年歲人有花看送王其用隨州省親都門楊桞萬絲垂城下行人駟牡騑宫中近得三年謁篋裏新裁五色衣漢皋秋晚逰娼少夢渚波寒獵火微我有愁心似征鴈隨君日日向南飛題合魯易之鄞江送别圗欲去更還顧依依戀所知今朝去亰日似子渡江時宋顯夫學士挽詩紫陌暗蒼茫松門近太行悲笳翼唇軸素􅌧引魚荒故筆誰探取神書永共藏愁尋持槖地秋隂結女牀馬伯庸中丞哀詩結纓趨魏闕俯仰二十霜化途易遷逝故老今盡亡維時逰公門時莭會髙堂峥嶸奉餘論炫耀晞報章制若縟繡陳聲若寶瑟張儀若龍文鼎燁若照夜璫阡眠出工巧幻妙極豪芒抽思究皇術振藻詠時康是時朝廷上才彥侯有望公如逸虬出萬驥為留行念此今已矣松柏杳茫茫驅車入珂里穹門委奮衡珠移靑淵涸桃盡故蹊荒龍火出徑秋玉衡變春陽朝榮計巳殞夕秀豈不芳感彼椎輪始惻惻我心傷祝蕃逺經歷挽詩逸軌無還轍驚川有怨思蒼苔生奮館素簡委空帷龔勝誰相弔虞翻少見知惟應問道者廬墓薦江蘺顯紅梅翠竹圗竹葉梅花一色春盈盈翠佃俺丹唇休言畫史無情思却勝宫中剪綵人題蛾眉亭空亭瞰牛渚髙髙凌紫氛澄江萬里至華崿兩眉分落日兼霞彩流光成綺紋慿軒引蘭酌休憶謝將軍南山贈隱者君家南山下南山果何如開如陳雲黑向背凌空虛木客采薜荔怨女詠蘼蕪何當牽白大見君巖下書賦得慈恩寺塔送李惟中赴西臺侍御祗園開塔廟遐瞰盡三秦雕玉裁文陛金銅結綺輪髙摽雙闕外流影灞陵津攬轡還登晀題名繼昔人蘭亭奉節過東鄙揔轡臨越墟覽此崇山阿亭樹猶晉餘陽林積珍木禊館疏􅍢渠徴風旋輕瀨宛委寫成書秋抄霜露滋清商滿縣隅紅蓮凋綺蕊微瀾見躍魚籍芳泛羽觴視聽良有娛消搖大化內豈必三月𥘉汪尚書夫人挽詩喧喧引長紱簫鳴閭井間旌連綺霞閣路指敬亭山泉底鵉臺掩城中翟蓋還尚書老歸國誰與襲芳蘭贈澄上人壞色衣裳護七條手持經卷意蕭蕭頭陀寺裏相逢後又向天台訪石橋贈山中道士善琴山中道士緑荷衣新抱瑶琴出翠微巳與塵緣斷來􅉨逢人猶鼓雉朝飛題紅葵蛺蝶圗蛺蝶既無數秋花亦滿枝終焉不飛去似怨弄芳遲自集賢嶺入大龍山皖公標椘甸兹嶺孕竒形翠積樅江滸崇冠吕蒙城戒途入中林平岡駐我旌延望失來術周覽多所經峩峩石窗矗窅窅巖岫冥離離雲朝隮粲粲樹敷榮關弓射鳴鴈羣谷振弦聲仰憐山人居俯恱洞下耕蒼龍啓春候金虎收光精權家既非學農用或可明顧言同載者為爾鑄阿兵安慶郡庠後亭宴董僉事亭名天開圗畫鯨鯢起襄漢郡邑盡燒殘兹城獨完好使者一開顔省風降文囿弭莭遵曲于雙池夾行徑纍榭在雲間天姓羣峰出地逈滄江環霞生射蛟臺鴈沒逢龍山開樽華堂上命酌俯危闌主人送瑶爵伹云嘉會難豈為杯酒歡樂此罷民安魄淵無恆彩清川有急瀾明晨起驂服相望阻重關題周伯寧畫殺機起無象平陸忽成江蒼生既猛􅍑日馭經紛虹舉目墟里間但見蒿與蓬惟有王官谷于今似畫中九日宴盛唐門今日良宴集玉帳設金縣賔稱此嘉辰令德應重乾凄凄秋陽升湛湛江景鮮西馳三澨津東瞻九華山文湍帶粉堞卿雲覆綵旃清歌送銀爵泛此秋花妍嗟豫逺征人别家今四年采薇夜歸戍操築朝治垣微此一日歡苦辛良可憐中觴感前諜撫運當太平燔柴盛唐郡泛舟摐江前臨川射長蛟雄風推八埏竪儒􅓎從役任重力乃綿武功既無成文德何由宣徴勳倘有濟敢愧魯仲連登太平寺次韻董憲副蕭寺行春望下方城中雲物變凄涼野人籬落通灊口賈客帆檣出漢陽多難漸平堪對酒一樽未盡更焚香慿將使者陽春曲消盡征人鬢上霜三月草九日郡庠後亭宴盧啓先僉事晨集欵江渚列席當蕙櫋斯亭信顯敞翠嶺帶澄川潮駕冝城步山積司空原青松紛𬒳徑紅桃競發園衆賔起為夀繁轉出嬌絃中觴念逺離歲行巳再遷漂萍有時合浮雲未見旋今朝不為樂來會知何年寄題環秀亭五柤寺宗老來相報黃梅盜已平傳聞一峯下還有九江橫象構誰能壞香臺積可成慿詢幾小劫又復到昆明題溪樓溪水緑悠悠髙樓在溪上日暮望江南舟中采菱唱奉和旨南上人喜雨之什叔良雖不作詩不妨一觀也出車橫門道采薇皖溪水雜耕不逢年軍士常飢餒奉牲赱羣望悃迫忘汝尓皇皇大司命配天奠南紀方屯啓時澤拯民出頴死雲章變膚寸雨勢來不巳睇領三峰深行阡九江起開房各菶菶擢葉方泥泥説郊君牡騑饁野田畯喜未論車箱滿巳見沽酒旨斯民既云樂兵甲行可洗赫靈有耿祉夀夭誠在巳淫隂無往轍薄伐有凶理撫事非偶然涼薄那致此騁辭繼周頌屢豐自天子送康上人往三城嘗登大龍嶺橫槊視四方原野何蕭條白骨紛交橫維昔休明日兹城冠荆楊芳郊列華屋文欀𬒳五章乘車衣螭繡貴擬金與張此􅍔誰所為念之五內傷竪儒􅍝乘障永賴天降康摐陽將解甲皖邑寖開壃耕夫緣南畝士女各在桑念子中林士振策亦有行我聞三城美龍嶺在其傍連林積修阻下有澄湖光明當洗甲兵從子卧石牀七哀殷武誦罙阻周魯歌東征聖哲則有然我何敢留行斬牲祀怒時釁鼓起前旌野布魚麗陳山鳴鐃吹聲函關何用塞受降行巳成路逢故鄉人取書寄東亰寄言東亰友勉樹千載名一身未足惜妻子非無情葛編修挽歌景光昔别情何樂今還語向誰幽房通貝闕空館罥蕪絲未過徐公墓徒懷有道碑扁舟望湖曲消淚濕江蘺􅓸孝女詩王裒廢蓼莪女亦有􅓸娥哭漁奉慈母凄涼蔭女蘿幽叢啼蕙露芳樹罷鶯歌迢遞城南路諸姑將謂何賦得巨野澤送宋顯夫僉事之山南堤上柳沉沉春蒲泛渚禽濟田東滙闊汝水北流深落日依中沚浮雲積太隂微茫看不盡渾似别時心夜坐和成太常二首叔片月生碣石微光桂玉弓秋河空窅窕遙映建章宫哀鴻知時莭南飛正匆匆感君思親味惻惻此心中牽牛表宫雉華星動綺錢沉沉鳷鵲觀悠悠清漏傳無才愧三益虗食念百㕓綿思至申旦莫繼瑶華篇送張有恆赴安慶郡經歷曉路通髙嶂春城入大江草生垂釣浦人語讀書總肅客移茶鼎行田載酒缸幕寮誰得似髙步絶紛厖宋祭酒挽歌二首文章知有數耆奮忽先零東井開圗晝西山閟爽靈司徒虗執饋太史早刊銘帳望平原繍時時問客星又東閣哀長别南宫闕嗣音相知誰復舊為恨果如今江漢無時返奎文永夜深凄􅋽釣魚地落日下遙隂謝堯章妻挽歌草滿章臺墓松欹石柱廬憶歸司隸里能誦伏生書夜哭聞茅店春祠雜筍爼傷心夫與子塵簡若為舒送李伯實下苐逺江南已後續增之子不得意南行無怨辭官河人杳杳客路雨絲絲古木淮隂市春城孺子祠悽然十里别為賦小星詩美浦江鄭氏義門復大篆浙東苐一家五字以旌之省風浦江滸慿軾歷髙門借問居幾何九世今不分解驂青松林愛此季與昆檢身事先訓禮度尤恭溫生祥亦何用有後天所敦常棣閔叔咸厲階悲婦言一朝或問念喪敗寧具論清源無濁流芳蘭有競芬摛毫誦勿替勉哉賢子孫大口迎駕和觀應奉韻二首晨光開翠崿廣路淨炎氛玉馱度流水華蓋爛垂雲既御大宛馬還朝鯷海君都人望旌纛樂哉歌采芹仗出彈筝峽川原彀騎分天行肅大化時邁耀前聞整蹕傳清道激吹入行雲日暮望雙闕草木亦欣欣送王關赴泗州行捕提舉蒼茫吳楚會縱橫淮坂流春氷未泮渚芳杜巳生洲揚旌朱樓前張獵靑山幽獻功效大兕亦致公子裘消搖足為樂何嗟晚不侯待制張廷美姑阿慶詩葭菼啓望國灼灼詠桃夭操觚染芳藻短髮未勝翹始聆白雪句兼傳黃竹謡蘭萌𥘉映砌春霜巳降霄秋榛覆故隴驚蓬颯回飈金尊與瑶席庶足奉仁嬌雲松棲初日髙樓上卷幔對黃山黃山出霄漢爛熳發靑蓮參差非一狀朝夕看屢妍九華承雙舄敬亭附駢筵漫漫雲罨嶺沉沉松覆泉清焱坐中起如聞帝女絃靜有幽事樂動無塵慮牽消搖恱心目兹道可長年靑陽先生文集卷之一
